<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<base target="_top">
<title>07_報工作業V2</title>
<style>
:root{--藍:#0b74ff;--深:#081827;--底:#f3f7fc;--卡:#fff;--線:#d8e2f0;--字:#172033;--淡:#64748b;--紅:#d93025;--綠:#188038;--橘:#f29900;--陰:0 12px 34px rgba(20,40,80,.16)}
*{box-sizing:border-box}body{margin:0;background:var(--底);color:var(--字);font-family:Arial,'Noto Sans TC','Microsoft JhengHei',sans-serif;font-size:15px}.外框{max-width:760px;margin:0 auto;padding:12px 12px 120px}.頁首{position:sticky;top:0;z-index:10;margin:-12px -12px 12px;padding:14px;background:linear-gradient(135deg,#0062ff,#48b5ff);color:#fff;box-shadow:var(--陰)}.標題{font-size:25px;font-weight:900}.副標{font-size:12px;opacity:.95;margin-top:4px;line-height:1.5}.狀態卡{margin-top:12px;background:rgba(0,0,0,.30);border-radius:16px;padding:10px 12px;font-weight:900;line-height:1.65}.卡片{background:var(--卡);border:1px solid var(--線);border-radius:22px;padding:14px;margin:12px 0;box-shadow:0 6px 22px rgba(18,38,76,.07)}.區標{font-size:20px;font-weight:900;margin-bottom:12px}.小字{font-size:12px;color:var(--淡);line-height:1.5}label{display:block;font-weight:900;margin:10px 0 6px}.必填:after{content:' *';color:var(--紅)}select,input,textarea{width:100%;border:1px solid #c9d5e6;border-radius:14px;padding:12px;background:#fff;font-size:15px;color:var(--字)}textarea{min-height:80px;resize:vertical}.兩欄{display:grid;grid-template-columns:1fr 1fr;gap:10px}.三欄{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}.摘要{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}.數字卡{background:#f7fbff;border:1px solid #dbe8f7;border-radius:16px;padding:10px;text-align:center}.數字卡 b{display:block;font-size:26px;color:#0b57d0}.預覽{white-space:pre-wrap;background:#101827;color:#e7efff;border-radius:18px;padding:14px;font-family:monospace;font-size:13px;line-height:1.55}.結果{white-space:pre-wrap;border-radius:18px;padding:14px;font-family:monospace;font-size:13px;line-height:1.55;background:#f8fafc;border:1px solid #cbd5e1;color:#0f172a;min-height:80px}.結果.ok{background:#ecfdf5;border-color:#86efac;color:#064e3b}.結果.err{background:#fef2f2;border-color:#fca5a5;color:#7f1d1d}.底部{position:fixed;left:0;right:0;bottom:0;z-index:20;background:rgba(245,248,252,.96);backdrop-filter:blur(10px);border-top:1px solid var(--線);padding:10px 12px;display:grid;grid-template-columns:1fr 1fr;gap:10px}.主按鈕,.次按鈕{border:0;border-radius:16px;padding:15px 10px;font-size:17px;font-weight:900}.主按鈕{background:var(--藍);color:#fff}.主按鈕:disabled{background:#9ebee6}.次按鈕{background:#fff;color:#0b57d0;border:1px solid #bfd2ef}.載入{position:fixed;inset:0;background:rgba(245,248,252,.88);display:flex;align-items:center;justify-content:center;z-index:50}.載入 div{background:#fff;border-radius:22px;padding:22px;box-shadow:var(--陰);font-weight:900}.隱藏{display:none!important}@media(max-width:520px){.兩欄,.三欄,.摘要{grid-template-columns:1fr}.標題{font-size:21px}}
</style>
</head>
<body>
<div id="載入" class="載入"><div>資料讀取中...</div></div>
<div class="外框">
  <header class="頁首">
    <div class="標題">🏭 報工作業 V2</div>
    <div class="副標">智慧製造中央作戰指揮中心｜v1.6.2 穩定送出版</div>
    <div id="狀態卡" class="狀態卡">正在連線主資料庫...</div>
  </header>

  <section class="卡片">
    <div class="區標">① 人員與工件</div>
    <label class="必填">作業員</label>
    <select id="作業員" onchange="作業員變更()"></select>
    <div class="兩欄">
      <div><label>工號</label><input id="工號" readonly></div>
      <div><label>姓名</label><input id="姓名" readonly></div>
    </div>
    <div class="兩欄">
      <div><label>班別</label><select id="班別"></select></div>
      <div><label>是否加班</label><select id="是否加班"><option value="否">否</option><option value="是">是</option></select></div>
    </div>
    <label class="必填">報工項目 / 產品 + 工站 + 機台</label>
    <input id="項目搜尋" placeholder="搜尋產品編號、品名、工站、機台" oninput="建立項目選單()">
    <select id="報工項目" onchange="項目變更()"></select>
    <div class="三欄">
      <div><label>產品編號</label><input id="產品編號" readonly></div>
      <div><label>客戶品號</label><input id="客戶品號" readonly></div>
      <div><label>主機台</label><input id="主機台" readonly></div>
    </div>
    <label>品名</label><input id="品名" readonly>
    <label>報工工站</label><input id="報工工站名稱" readonly>
    <label>機台清單</label><input id="機台清單" readonly>
  </section>

  <section class="卡片">
    <div class="區標">② 產出與品質</div>
    <div class="兩欄">
      <div><label class="必填">今日共做數</label><input id="今日共做數" type="number" min="0" inputmode="numeric" oninput="計算數量()"></div>
      <div><label>不良數</label><input id="不良數" type="number" min="0" value="0" inputmode="numeric" oninput="計算數量()"></div>
    </div>
    <div class="摘要">
      <div class="數字卡"><span>今日共做</span><b id="顯示今日共做">0</b></div>
      <div class="數字卡"><span>不良</span><b id="顯示不良">0</b></div>
      <div class="數字卡"><span>實際良品</span><b id="顯示實際良品">0</b></div>
    </div>
    <div class="兩欄">
      <div><label>開始時間</label><input id="開始時間" type="datetime-local" onchange="計算工時()"></div>
      <div><label>結束時間</label><input id="結束時間" type="datetime-local" onchange="計算工時()"></div>
    </div>
    <div class="兩欄">
      <div><label>實際工時</label><input id="實際工時" readonly></div>
      <div><label>異常類型</label><select id="異常類型"></select></div>
    </div>
    <div class="兩欄">
      <div><label>不良類別</label><select id="不良類別" onchange="不良類別變更()"><option value="無">無</option><option value="Z">Z 素材 / 外觀</option><option value="Y">Y 加工 / 尺寸</option></select></div>
      <div><label>不良原因</label><select id="不良原因"></select></div>
    </div>
    <label>備註</label><textarea id="備註" oninput="更新預覽()"></textarea>
  </section>

  <section class="卡片">
    <div class="區標">③ 報工預覽</div>
    <div id="報工預覽" class="預覽">尚未產生預覽</div>
  </section>

  <section class="卡片">
    <div class="區標">④ 送出結果 / 錯誤明細</div>
    <div id="送出結果" class="結果">尚未送出。按下方「送出報工」後，成功或錯誤會固定顯示在這裡。</div>
  </section>
</div>

<div class="底部">
  <button class="次按鈕" onclick="重新載入資料()">重新載入</button>
  <button id="送出鈕" class="主按鈕" onclick="送出報工()">送出報工</button>
</div>

<script>
let 全域資料={人員:[],報工工站群組:[],班別清單:[],不良原因:{Z:[],Y:[]},異常類型:[]};
let 狀態={人員:null,項目:null};
window.addEventListener('load',()=>{設定預設時間();重新載入資料();});
function 取(id){return document.getElementById(id)}
function 值(id,v){const el=取(id);if(v===undefined)return el?el.value:'';if(el)el.value=v;}
function 數字(id){const n=Number(值(id));return isNaN(n)?0:n}
function 顯示載入(show){取('載入').classList.toggle('隱藏',!show)}
function 顯示結果(obj,type){const el=取('送出結果');el.className='結果 '+(type||'');el.textContent=typeof obj==='string'?obj:JSON.stringify(obj,null,2);el.scrollIntoView({behavior:'smooth',block:'center'});}
function 呼叫後端(fn,arg,ok,fail){try{if(typeof google==='undefined'||!google.script||!google.script.run)throw new Error('目前不是 GAS HTML 環境，請用 Web App URL?page=07_報工作業V2 開啟');let r=google.script.run.withSuccessHandler(ok).withFailureHandler(e=>{(fail||顯示結果)({成功:false,錯誤:e.message||String(e),堆疊:e.stack||''},'err')});arg===null?r[fn]():r[fn](arg);}catch(e){(fail||顯示結果)({成功:false,錯誤:e.message||String(e)},'err')}}
function 重新載入資料(){顯示載入(true);顯示結果('資料載入中...','');呼叫後端('取得報工作業v2初始資料',null,data=>{顯示載入(false);if(!data||!data.成功){顯示結果(data||'資料讀取失敗','err');return}全域資料=data;全域資料.報工工站群組=(data.報工工站群組||data.途程工站群組||[]).map(標準化項目);填狀態();建立人員選單();建立班別選單();建立項目選單();建立品質選單();顯示結果('✅ 資料載入完成，可以送出報工。','ok');},err=>{顯示載入(false);顯示結果(err,'err')});}
function 標準化項目(g){g=g||{};if(typeof g.機台清單==='string'){try{g.機台清單=JSON.parse(g.機台清單)}catch(e){g.機台清單=String(g.機台清單).split(/[,，、\s]+/).filter(Boolean).map(x=>({機台編號:x}))}}if(!Array.isArray(g.機台清單))g.機台清單=[];g.報工工站名稱=g.報工工站名稱||g.工站名稱||'';g.機台清單文字=g.機台清單.map(m=>m.機台編號||m).filter(Boolean).join(',');g.主機台=g.主機台||((g.機台清單[0]&&g.機台清單[0].機台編號)||'');g.顯示名稱=[g.產品編號,g.客戶品號,g.品名,g.報工工站名稱,g.機台清單文字].filter(Boolean).join('｜');return g;}
function 填狀態(){const p=全域資料.筆數||{};取('狀態卡').innerHTML='🟢 資料已載入｜人員：'+(p.人員||全域資料.人員.length)+' 筆｜報工工站群組：'+(p.報工工站群組||全域資料.報工工站群組.length)+' 筆｜機台：'+(p.工站機台關聯||0)+' 筆｜照片索引：'+(p.照片索引||0)+' 筆';}
function 建立人員選單(){const s=取('作業員');s.innerHTML='<option value="">請選擇作業員</option>';全域資料.人員.forEach((r,i)=>{if(r.啟用==='否')return;s.add(new Option([r.姓名,r.工號,r.班別].filter(Boolean).join('｜'),i));});}
function 建立班別選單(){const s=取('班別');s.innerHTML='';(全域資料.班別清單||[]).forEach(x=>s.add(new Option(x.名稱||x.值,x.值||x.名稱)));if(!s.options.length)['自動判斷','早班','中班','大夜班','加班'].forEach(x=>s.add(new Option(x,x)));}
function 建立項目選單(){const s=取('報工項目');const kw=String(值('項目搜尋')||'').toUpperCase();s.innerHTML='<option value="">請選擇報工項目</option>';全域資料.報工工站群組.forEach((g,i)=>{const text=g.顯示名稱.toUpperCase();if(kw&&text.indexOf(kw)<0)return;s.add(new Option(g.顯示名稱,i));});}
function 建立品質選單(){const a=取('異常類型');a.innerHTML='';(全域資料.異常類型||[]).forEach(x=>a.add(new Option(x,x)));if(!a.options.length)['無異常 / Normal','機台停機 / Machine Down','待料 / Waiting Material','換刀 / Tool Change','品質確認 / Quality Check','其他 / Others'].forEach(x=>a.add(new Option(x,x)));不良類別變更();}
function 作業員變更(){const i=值('作業員');狀態.人員=i===''?null:全域資料.人員[Number(i)];const r=狀態.人員||{};值('工號',r.工號||'');值('姓名',r.姓名||'');if(r.班別)值('班別',推估班別(r.班別));更新預覽();}
function 推估班別(v){const t=String(v||'');if(t.includes('中'))return'中班';if(t.includes('夜'))return'大夜班';if(t.includes('加班'))return'加班';return'早班';}
function 項目變更(){const i=值('報工項目');狀態.項目=i===''?null:全域資料.報工工站群組[Number(i)];const g=狀態.項目||{};值('產品編號',g.產品編號||'');值('客戶品號',g.客戶品號||'');值('品名',g.品名||'');值('報工工站名稱',g.報工工站名稱||g.工站名稱||'');值('機台清單',g.機台清單文字||'');值('主機台',g.主機台||'');更新預覽();}
function 計算數量(){let total=數字('今日共做數'),ng=數字('不良數');if(ng>total&&total>0){值('不良數',total);ng=total}取('顯示今日共做').textContent=total;取('顯示不良').textContent=ng;取('顯示實際良品').textContent=Math.max(total-ng,0);更新預覽();}
function 計算工時(){const a=值('開始時間'),b=值('結束時間');if(a&&b){const h=(new Date(b)-new Date(a))/3600000;值('實際工時',h>0?h.toFixed(2):'0');}更新預覽();}
function 不良類別變更(){const t=值('不良類別');const s=取('不良原因');s.innerHTML='<option value="">無</option>';if(t==='無')return;(全域資料.不良原因[t]||[]).forEach(x=>s.add(new Option((x.代碼||'')+'｜'+(x.名稱||''),(x.代碼||'')+'｜'+(x.名稱||''))));更新預覽();}
function 組合資料(){const op=狀態.人員||{},g=狀態.項目||{},total=數字('今日共做數'),ng=數字('不良數');return{工號:op.工號||值('工號'),姓名:op.姓名||值('姓名'),班別:值('班別'),是否加班:值('是否加班'),加班類型:值('是否加班')==='是'?'平日加班':'無',產品編號:g.產品編號||值('產品編號'),客戶品號:g.客戶品號||值('客戶品號'),品名:g.品名||值('品名'),工站名稱:g.工站名稱||g.報工工站名稱||值('報工工站名稱'),報工工站名稱:g.報工工站名稱||g.工站名稱||值('報工工站名稱'),工序:g.工序||g.工序範圍||'',工序清單:Array.isArray(g.工序清單)?g.工序清單.join(','):(g.工序清單||g.工序||''),機台清單:g.機台清單文字||值('機台清單'),主機台:g.主機台||值('主機台'),機台照片清單:g.機台清單||[],今日共做數:total,不良數:ng,實際良品數:Math.max(total-ng,0),開始時間:值('開始時間'),結束時間:值('結束時間'),實際工時:值('實際工時'),不良類別:值('不良類別'),不良代碼:(值('不良原因').split('｜')[0]||''),不良原因:值('不良原因'),異常類型:值('異常類型'),備註:值('備註'),現場照片清單:[]};}
function 驗證(d){if(!d.工號)return'請選擇作業員';if(!d.產品編號&&!d.品名)return'請選擇報工項目';if(!d.報工工站名稱&&!d.工站名稱)return'請選擇報工工站';if(d.今日共做數<=0)return'今日共做數必須大於 0';if(d.不良數<0||d.不良數>d.今日共做數)return'不良數不可小於0，也不可大於今日共做數';return'';}
function 更新預覽(){const d=組合資料();取('報工預覽').textContent='📋 報工預覽\n作業員：'+(d.姓名||'')+' / '+(d.工號||'')+' / '+(d.班別||'')+'\n產品：'+(d.產品編號||'')+'｜'+(d.客戶品號||'')+'｜'+(d.品名||'')+'\n工站：'+(d.報工工站名稱||'')+'\n機台：'+(d.機台清單||'')+'｜主機台 '+(d.主機台||'')+'\n今日共做：'+d.今日共做數+'\n不良：'+d.不良數+'\n實際良品：'+d.實際良品數+'\n不良原因：'+(d.不良原因||'無')+'\n備註：'+(d.備註||'');}
function 送出報工(){const d=組合資料();const err=驗證(d);if(err){顯示結果('❌ '+err,'err');return}const btn=取('送出鈕');btn.disabled=true;顯示結果({狀態:'送出中',資料:d},'');呼叫後端('寫入報工作業v2',d,res=>{btn.disabled=false;if(res&&res.成功){顯示結果(res,'ok');值('今日共做數','');值('不良數','0');計算數量();}else{顯示結果(res||'後端未回傳成功','err')}},err=>{btn.disabled=false;顯示結果(err,'err')});}
function 設定預設時間(){const now=new Date(),local=new Date(now.getTime()-now.getTimezoneOffset()*60000).toISOString().slice(0,16);值('開始時間',local);值('結束時間',local);值('實際工時','0');}
</script>
</body>
</html>
