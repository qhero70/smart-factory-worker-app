<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<title>生產計劃表清洗器 v1｜智慧製造中央作戰指揮中心</title>
<meta http-equiv="Cache-Control" content="no-store,no-cache,must-revalidate,max-age=0">
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<style>
:root{--藍:#0b74ff;--深:#082f63;--青:#06b6d4;--綠:#16a34a;--黃:#f59e0b;--紅:#dc2626;--底:#eef5ff;--卡:#fff;--線:#d9e6f5;--字:#172033;--淡:#64748b;--影:0 12px 32px rgba(15,23,42,.12)}*{box-sizing:border-box}body{margin:0;min-height:100vh;background:radial-gradient(circle at top left,#dff5ff,#eef5ff 42%,#f8fbff);color:var(--字);font-family:-apple-system,BlinkMacSystemFont,'Noto Sans TC','Microsoft JhengHei',system-ui,sans-serif;padding-bottom:88px}.頁首{position:sticky;top:0;z-index:20;background:linear-gradient(135deg,var(--深),var(--藍),var(--青));color:#fff;box-shadow:0 8px 28px rgba(11,116,255,.28)}.頁首內,.外框,.底內{max-width:1180px;margin:auto}.頁首內{padding:14px}.標題列{display:flex;gap:10px;align-items:center;justify-content:space-between}.品牌{display:flex;gap:10px;align-items:center;min-width:0}.標誌{width:44px;height:44px;border-radius:16px;background:rgba(255,255,255,.18);display:flex;align-items:center;justify-content:center;font-size:24px;border:1px solid rgba(255,255,255,.35)}h1{font-size:20px;margin:0;font-weight:1000;letter-spacing:-.4px}.副標{font-size:11px;opacity:.82;line-height:1.35}.狀態{margin-top:10px;background:rgba(0,0,0,.22);border:1px solid rgba(255,255,255,.22);border-radius:999px;padding:7px 12px;font-size:12px;font-weight:900;display:inline-flex;max-width:100%;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.外框{padding:14px}.卡{background:rgba(255,255,255,.88);backdrop-filter:blur(14px);border:1px solid rgba(255,255,255,.78);border-radius:22px;box-shadow:var(--影);padding:16px;margin:12px 0}.導引{background:linear-gradient(135deg,#fff7d8,#fff);border:1px solid #fde68a}.導引 h2,.卡 h2{font-size:17px;margin:0 0 8px;font-weight:1000}.導引 p{margin:5px 0;color:#76520a;line-height:1.65;font-size:13px}.上傳{border:2px dashed #7dd3fc;background:rgba(240,249,255,.78);border-radius:22px;padding:18px;text-align:center}.上傳.drag{background:#e0f2fe;border-color:#0ea5e9}.主鈕,.鈕{border:none;border-radius:14px;padding:11px 13px;font-weight:1000;cursor:pointer}.主鈕{background:linear-gradient(135deg,var(--藍),var(--青));color:white;box-shadow:0 10px 22px rgba(11,116,255,.24)}.鈕{background:#e8f0ff;color:#0b3a75}.危{background:#fee2e2!important;color:#991b1b!important}.小字{font-size:12px;color:var(--淡);line-height:1.5}.工具{display:flex;gap:8px;flex-wrap:wrap;align-items:center}.工具 button.active{background:var(--藍);color:#fff}.指標{display:grid;grid-template-columns:repeat(5,minmax(0,1fr));gap:10px}.指標卡{background:linear-gradient(180deg,#fff,#f8fbff);border:1px solid var(--線);border-radius:18px;padding:12px;min-height:86px}.指標名{font-size:12px;color:#64748b;font-weight:900}.指標值{font-size:24px;font-weight:1000;margin-top:5px;color:#0f2f5d}.表外{overflow:auto;border:1px solid var(--線);border-radius:18px;background:white;max-height:62vh}.表{border-collapse:collapse;width:100%;font-size:12px;min-width:980px}.表 th{position:sticky;top:0;background:#0b3a75;color:white;padding:9px;z-index:1;white-space:nowrap}.表 td{border-bottom:1px solid #e5edf7;padding:7px 9px;vertical-align:top}.表 tr:hover{background:#f8fbff}.膠{display:inline-flex;border-radius:999px;padding:3px 8px;font-size:11px;font-weight:1000}.綠{background:#dcfce7;color:#166534}.黃{background:#fef3c7;color:#92400e}.紅{background:#fee2e2;color:#991b1b}.藍{background:#dbeafe;color:#1d4ed8}.隱{display:none!important}.底{position:fixed;left:0;right:0;bottom:0;background:rgba(255,255,255,.94);backdrop-filter:blur(12px);border-top:1px solid var(--線);z-index:30;padding:10px 14px}.底內{display:flex;gap:8px;align-items:center;justify-content:space-between}.錯{background:#fff1f2;border:1px solid #fecdd3;color:#991b1b;border-radius:16px;padding:12px;white-space:pre-wrap}.好{background:#ecfdf5;border:1px solid #bbf7d0;color:#166534;border-radius:16px;padding:12px}.輸入{border:1px solid var(--線);border-radius:12px;padding:9px;background:white;font-weight:800}@media(max-width:860px){.指標{grid-template-columns:repeat(2,minmax(0,1fr))}.底內{display:block}.卡{padding:13px}.表{font-size:11px}.工具 button{padding:10px}.指標值{font-size:21px}}
</style>
</head>
<body>
<header class="頁首"><div class="頁首內"><div class="標題列"><div class="品牌"><div class="標誌">🧼</div><div><h1>生產計劃表清洗器 v1</h1><div class="副標">生產計劃表 → 每日明細 → 本月彙總 → 出貨訂單 → 10_排程需求池</div></div></div><button class="鈕" onclick="location.reload()">重新載入</button></div><div class="狀態" id="狀態文字">🟡 等待上傳生產計劃表 Excel</div></div></header>
<main class="外框">
<section class="卡 導引"><h2>第一階段標準：先把生管原始計劃表清洗成乾淨資料</h2><p>本頁只做「清洗與標準化」，不碰報工 V4。上傳生管 Excel 後，請依序看：<b>每日明細、本月彙總、出貨訂單、10_排程需求池</b>。</p><p>輸出的 10_排程需求池會對齊下一階段自動排程：需求編號、產品編號、客戶品號、品名、需求日期、需求數量、還需加工量、產能8H、建議開工日、急迫性。</p></section>
<section class="卡"><div class="上傳" id="拖拉區"><input id="檔案輸入" class="隱" type="file" accept=".xlsx,.xls,.xlsm,.csv" onchange="選擇檔案(event)"><button class="主鈕" onclick="檔案輸入.click()">📂 上傳生產計劃表 Excel</button><div class="小字" style="margin-top:10px">可拖拉檔案到這裡。建議檔名含年月，例如：2026年6月份生產計劃.xlsx</div></div><div style="height:12px"></div><div class="工具"><label><input type="checkbox" id="隱藏零" checked onchange="重算()"> 隱藏 0 數量</label><label>每日班數 <input class="輸入" id="每日班數" type="number" value="2" min="1" max="4" style="width:70px" onchange="重算()"></label><label>風險天數 <input class="輸入" id="風險天數" type="number" value="7" min="1" max="30" style="width:70px" onchange="重算()"></label></div></section>
<section class="卡" id="結果區" style="display:none"><div class="工具" id="切頁"><button onclick="切換('每日明細')">每日明細</button><button onclick="切換('本月彙總')">本月彙總</button><button onclick="切換('出貨訂單')">出貨訂單</button><button onclick="切換('排程需求池')">10_排程需求池</button></div><div class="指標" id="指標區" style="margin-top:12px"></div></section>
<section class="卡" id="視圖區" style="display:none"></section>
</main>
<div class="底"><div class="底內"><div class="工具"><button onclick="匯出CSV('每日明細')">匯出每日明細 CSV</button><button onclick="匯出CSV('本月彙總')">匯出本月彙總 CSV</button><button class="主鈕" onclick="匯出CSV('排程需求池')">匯出 10_排程需求池 CSV</button></div><div class="小字" id="底部狀態">尚未清洗資料</div></div></div>
<script>
'use strict';
const $=id=>document.getElementById(id);let 狀態={檔名:'',年月:null,每日明細:[],本月彙總:[],出貨訂單:[],排程需求池:[],目前:'每日明細',錯誤:[]};
const 類型鍵=['訂單','訂單(出貨)','出貨','供料','計畫','產出'];
const 欄位={產品編號:['產品編號','料號','品號','ERP','ERP料號','化新料號'],客戶品號:['客戶品號','客戶料號','客戶圖號'],品名:['品名','產品名稱','名稱'],工單:['工單','工單號碼','製令'],期初庫存:['期初庫存','庫存','期初'],產能8H:['產能8H','8H產能','8小時產能','標準產能']};
function 文(v){return String(v??'').trim()}function 數(v){let n=Number(String(v??'').replace(/,/g,''));return isFinite(n)?n:0}function 正(v){return 文(v).replace(/\s+/g,'').toUpperCase()}function 日期字串(d){let z=n=>String(n).padStart(2,'0');return d.getFullYear()+'-'+z(d.getMonth()+1)+'-'+z(d.getDate())}function 今天(){return 日期字串(new Date())}
function 解析日期(v){if(v instanceof Date&&!isNaN(v))return 日期字串(v);let s=文(v);if(!s)return'';if(/^\d{4}[-\/]\d{1,2}[-\/]\d{1,2}$/.test(s)){let d=new Date(s.replace(/\//g,'-'));if(!isNaN(d))return 日期字串(d)}if(/^\d{1,2}[\/\-]\d{1,2}$/.test(s)){let [m,d]=s.split(/[\/\-]/).map(Number);let y=(狀態.年月&&狀態.年月.y)||new Date().getFullYear();return 日期字串(new Date(y,m-1,d))}return''}
function 找欄(row,names){let ns=names.map(正);for(let i=0;i<row.length;i++){let c=正(row[i]);if(ns.some(n=>c.includes(n)||n.includes(c)))return i}return-1}
function 解析年月(name){let m=文(name).match(/(20\d{2})\D{0,3}(\d{1,2})/);return m?{y:+m[1],m:+m[2]}:null}
function 類型(v){let s=正(v);return 類型鍵.find(k=>s.includes(正(k)))||''}
function 更新狀態(t){$('狀態文字').textContent=t;$('底部狀態').textContent=t}
async function 選擇檔案(e){let f=e.target.files[0];if(!f)return;狀態={檔名:f.name,年月:解析年月(f.name),每日明細:[],本月彙總:[],出貨訂單:[],排程需求池:[],目前:'每日明細',錯誤:[]};更新狀態('🧼 清洗中：'+f.name);try{let buf=await f.arrayBuffer();let wb=XLSX.read(buf,{type:'array',cellDates:true,raw:false,blankrows:false});wb.SheetNames.forEach(n=>清洗工作表(n,wb.Sheets[n]));重算();$('結果區').style.display='block';$('視圖區').style.display='block';更新狀態('✅ 清洗完成：每日明細 '+狀態.每日明細.length+' 筆｜排程需求 '+狀態.排程需求池.length+' 筆')}catch(err){$('視圖區').style.display='block';$('視圖區').innerHTML='<div class="錯">讀取失敗：'+安全(err.message||err)+'</div>';更新狀態('❌ 清洗失敗')}}
function 清洗工作表(name,ws){let rows=XLSX.utils.sheet_to_json(ws,{header:1,defval:'',raw:false,blankrows:false});if(!rows.length)return;let headI=-1,dateCols=[];for(let r=0;r<Math.min(rows.length,25);r++){let d=rows[r].map(解析日期);let count=d.filter(Boolean).length;if(count>=2){headI=r;dateCols=d.map((x,i)=>x?{i,iso:x}:null).filter(Boolean);break}}if(headI<0)return;let head=rows[headI];let idx={};Object.keys(欄位).forEach(k=>idx[k]=找欄(head,欄位[k]));let last={};for(let r=headI+1;r<rows.length;r++){let row=rows[r];let t=類型(row.find(c=>類型(c))||row[0]||row[1]);let hasDate=dateCols.some(c=>數(row[c.i])!==0);if(!t&&!hasDate)continue;Object.keys(idx).forEach(k=>{if(idx[k]>=0&&文(row[idx[k]])!=='')last[k]=文(row[idx[k]])});if(!last.產品編號&&!last.品名)continue;if(!t)t='計畫';dateCols.forEach(c=>{let q=數(row[c.i]);if($('隱藏零').checked&&q===0)return;狀態.每日明細.push({區域:name,產品編號:last.產品編號||'',客戶品號:last.客戶品號||'',品名:last.品名||'',工單:last.工單||'',日期:c.iso,類型:t,數量:q,期初庫存:數(last.期初庫存),產能8H:數(last.產能8H)})})}}
function 重算(){建立彙總();建立出貨();建立需求();渲染指標();切換(狀態.目前||'每日明細',true)}
function key(r){return [r.區域,r.產品編號,r.客戶品號,r.品名].join('|')}
function 建立彙總(){let m={};狀態.每日明細.forEach(r=>{let k=key(r);if(!m[k])m[k]={區域:r.區域,產品編號:r.產品編號,客戶品號:r.客戶品號,品名:r.品名,本月計畫量:0,本月產出量:0,本月出貨量:0,本月供料量:0,期初庫存:r.期初庫存||0,產能8H:r.產能8H||0};let x=m[k];if(r.類型.includes('計畫'))x.本月計畫量+=r.數量;if(r.類型.includes('產出'))x.本月產出量+=r.數量;if(r.類型.includes('出貨')||r.類型==='訂單')x.本月出貨量+=r.數量;if(r.類型.includes('供料'))x.本月供料量+=r.數量;if(r.期初庫存)x.期初庫存=r.期初庫存;if(r.產能8H)x.產能8H=r.產能8H});狀態.本月彙總=Object.values(m).map(x=>{x.可用量=x.期初庫存+x.本月產出量+x.本月供料量;x.欠量=Math.max(0,x.本月出貨量-x.可用量);x.達成率=x.本月出貨量?x.可用量/x.本月出貨量:1;x.訂單已滿足=x.欠量<=0?'Y':'N';return x}).filter(x=>x.本月計畫量||x.本月產出量||x.本月出貨量||x.欠量)}
function 建立出貨(){let i=0,today=今天();狀態.出貨訂單=狀態.每日明細.filter(r=>(r.類型.includes('出貨')||r.類型==='訂單')&&r.數量>0&&r.日期>=today).sort((a,b)=>a.日期.localeCompare(b.日期)).map(r=>({訂單號:'ORD'+r.日期.replace(/-/g,'')+String(++i).padStart(5,'0'),區域:r.區域,產品編號:r.產品編號,客戶品號:r.客戶品號,品名:r.品名,需求日期:r.日期,需求數量:r.數量,狀態:'待確認'}))}
function 建立需求(){let 班=數($('每日班數').value)||2,風險=數($('風險天數').value)||7,i=0;狀態.排程需求池=狀態.本月彙總.filter(x=>x.欠量>0).sort((a,b)=>b.欠量-a.欠量).map(x=>{let 天=x.產能8H?Math.ceil(x.欠量/(x.產能8H*班)):999;let start=new Date();start.setDate(start.getDate()+Math.max(0,風險-天));let end=new Date(start);end.setDate(end.getDate()+Math.max(0,天-1));return {需求編號:'REQ'+日期字串(new Date()).replace(/-/g,'')+String(++i).padStart(4,'0'),來源:'生產計劃表清洗器',區域:x.區域,產品編號:x.產品編號,客戶品號:x.客戶品號,品名:x.品名,需求日期:日期字串(end),需求數量:x.本月出貨量,期初庫存:x.期初庫存,本月產出量:x.本月產出量,還需加工量:x.欠量,產能8H:x.產能8H,建議開工日:日期字串(start),建議完工日:日期字串(end),主機台:'待工站主檔對應',急迫性:天>=風險?'高':'中',狀態:'待排程',備註:'欠量='+x.欠量+'；可用量='+x.可用量}})}
function 渲染指標(){let sum=k=>狀態.本月彙總.reduce((a,b)=>a+(+b[k]||0),0);let a=[['每日明細',狀態.每日明細.length],['本月出貨',sum('本月出貨量')],['本月產出',sum('本月產出量')],['未滿足項目',狀態.本月彙總.filter(x=>x.訂單已滿足==='N').length],['排程需求池',狀態.排程需求池.length]];$('指標區').innerHTML=a.map(x=>'<div class="指標卡"><div class="指標名">'+x[0]+'</div><div class="指標值">'+格式(x[1])+'</div></div>').join('')}
function 切換(v,quiet){狀態.目前=v;document.querySelectorAll('#切頁 button').forEach(b=>b.classList.toggle('active',b.textContent.includes(v)||v==='排程需求池'&&b.textContent.includes('10_')));let cols,rows,title;if(v==='每日明細'){title='每日明細';rows=狀態.每日明細;cols=['區域','產品編號','客戶品號','品名','工單','日期','類型','數量','期初庫存','產能8H']}if(v==='本月彙總'){title='本月彙總';rows=狀態.本月彙總;cols=['區域','產品編號','客戶品號','品名','本月出貨量','本月產出量','期初庫存','可用量','欠量','達成率','產能8H','訂單已滿足']}if(v==='出貨訂單'){title='出貨訂單';rows=狀態.出貨訂單;cols=['訂單號','區域','產品編號','客戶品號','品名','需求日期','需求數量','狀態']}if(v==='排程需求池'){title='10_排程需求池';rows=狀態.排程需求池;cols=['需求編號','來源','區域','產品編號','客戶品號','品名','需求日期','需求數量','期初庫存','本月產出量','還需加工量','產能8H','建議開工日','建議完工日','主機台','急迫性','狀態','備註']}表格(title,rows,cols);if(!quiet)$('視圖區').scrollIntoView({behavior:'smooth',block:'start'})}
function 表格(title,rows,cols){let body=rows.length?rows.map(r=>'<tr>'+cols.map(c=>'<td>'+顯示(r[c],c)+'</td>').join('')+'</tr>').join(''):'<tr><td colspan="'+cols.length+'">尚無資料</td></tr>';$('視圖區').innerHTML='<h2>'+title+'｜'+rows.length+' 筆</h2><div class="表外"><table class="表"><thead><tr>'+cols.map(c=>'<th>'+c+'</th>').join('')+'</tr></thead><tbody>'+body+'</tbody></table></div>'}
function 顯示(v,c){if(c==='急迫性')return '<span class="膠 '+(v==='高'?'紅':'黃')+'">'+安全(v||'')+'</span>';if(c==='訂單已滿足')return '<span class="膠 '+(v==='Y'?'綠':'紅')+'">'+v+'</span>';if(c==='達成率')return ((Number(v)||0)*100).toFixed(1)+'%';return 安全(v)}function 安全(s){return String(s??'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]))}function 格式(n){return Number(n||0).toLocaleString('zh-TW')}
function 匯出CSV(type){let rows=[],cols=[];if(type==='每日明細'){rows=狀態.每日明細;cols=['區域','產品編號','客戶品號','品名','工單','日期','類型','數量','期初庫存','產能8H']}if(type==='本月彙總'){rows=狀態.本月彙總;cols=['區域','產品編號','客戶品號','品名','本月出貨量','本月產出量','期初庫存','可用量','欠量','達成率','產能8H','訂單已滿足']}if(type==='排程需求池'){rows=狀態.排程需求池;cols=['需求編號','來源','區域','產品編號','客戶品號','品名','需求日期','需求數量','期初庫存','本月產出量','還需加工量','產能8H','建議開工日','建議完工日','主機台','急迫性','狀態','備註']}let csv='\ufeff'+cols.join(',')+'\n'+rows.map(r=>cols.map(c=>'"'+String(r[c]??'').replace(/"/g,'""')+'"').join(',')).join('\n');let a=document.createElement('a');a.href=URL.createObjectURL(new Blob([csv],{type:'text/csv;charset=utf-8'}));a.download=type+'.csv';a.click();setTimeout(()=>URL.revokeObjectURL(a.href),1000)}
['dragenter','dragover'].forEach(e=>$('拖拉區').addEventListener(e,ev=>{ev.preventDefault();$('拖拉區').classList.add('drag')}));['dragleave','drop'].forEach(e=>$('拖拉區').addEventListener(e,ev=>{ev.preventDefault();$('拖拉區').classList.remove('drag')}));$('拖拉區').addEventListener('drop',ev=>{let f=ev.dataTransfer.files[0];if(f){$('檔案輸入').files=ev.dataTransfer.files;選擇檔案({target:{files:[f]}})}});
</script>
