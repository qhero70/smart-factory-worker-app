<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Register</title></head><body><main><h1>NEXUS OS Register</h1><input id="id" placeholder="工號"><input id="name" placeholder="姓名"><button onclick="q()">查詢</button><button onclick="b()">綁定</button><pre id="out"></pre></main><script src="./pwa-config.js"></script><script src="./gas-bridge.js"></script><script>function $(x){return document.getElementById(x)}function o(x){out.textContent=typeof x==='string'?x:JSON.stringify(x,null,2)}function d(){return {工號:$('id').value.trim(),姓名:$('name').value.trim()}}async function c(a,p){return GAS橋接器.呼叫(a,Object.assign({},p,{action:a}),{method:'POST',timeoutMs:12000})}async function q(){try{o(await c('人員註冊38_7_查詢工號',d()))}catch(e){o(e.message)}}async function b(){try{let r=await c('人員註冊38_7_綁定',d());if(r.成功)localStorage.setItem('NEXUS_OS_工號',r.工號||$('id').value.trim());o(r)}catch(e){o(e.message)}}</script></body></html>
