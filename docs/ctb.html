<!doctype html><html lang="zh-Hant"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>CTB齊套缺料看板</title><script src="https://cdn.tailwindcss.com"></script><style>body{font-family:-apple-system,BlinkMacSystemFont,'Noto Sans TC','Segoe UI',sans-serif;background:#07111f;color:#ecfeff}.玻璃{background:rgba(15,23,42,.78);border:1px solid rgba(148,163,184,.22);backdrop-filter:blur(18px)}.卡{border-radius:22px;box-shadow:0 18px 45px rgba(0,0,0,.28)}.按鈕{border-radius:16px;padding:.75rem .9rem;font-weight:900}input,select,textarea{background:#0f172a!important;border:1px solid #334155!important;color:#fff!important;border-radius:14px!important;padding:.75rem!important;width:100%}.需求卡{border-radius:18px;border:1px solid rgba(148,163,184,.25);background:rgba(2,6,23,.72);padding:12px;margin-bottom:10px}.紅卡{border-color:#f87171;background:rgba(127,29,29,.34)}.黃卡{border-color:#facc15;background:rgba(113,63,18,.28)}.綠卡{border-color:#34d399;background:rgba(6,78,59,.28)}.白卡{border-color:#94a3b8;background:rgba(51,65,85,.25)}.小字{font-size:.78rem;color:#94a3b8}.紅{color:#fca5a5}.黃{color:#fde68a}.綠{color:#86efac}.白{color:#e2e8f0}</style></head><body><main class="max-w-7xl mx-auto p-4 pb-24"><section class="玻璃 卡 p-5 mb-4"><div class="flex flex-wrap justify-between items-center gap-3"><div><p class="text-teal-200 font-black text-sm">智慧製造中央作戰指揮中心 v2.2.0</p><h1 class="text-2xl md:text-4xl font-black">CTB 齊套缺料與共用素材搶料看板</h1><p id="狀態文字" class="text-slate-300 mt-1">紅燈缺料禁止投產、黃燈待確認、綠燈可投產；共用素材依交期 Tier 1~4 分配。</p></div><div class="flex gap-2"><a class="按鈕 bg-slate-700" href="./schedule.html">排程看板</a><a class="按鈕 bg-lime-300 text-slate-950" href="./plan.html">計畫清洗</a></div></div></section><section class="玻璃 卡 p-4 mb-4"><div class="grid md:grid-cols-[1fr_auto_auto] gap-2"><input id="GAS網址" placeholder="貼上 GAS Web App URL"><button class="按鈕 bg-teal-500 text-slate-950" onclick="儲存設定()">儲存</button><button class="按鈕 bg-cyan-300 text-slate-950" onclick="載入資料()">同步</button></div><div class="grid md:grid-cols-5 gap-2 mt-3"><input id="搜尋字" placeholder="搜尋產品/品名/共用素材/缺料原因/負責人" oninput="渲染()"><select id="燈號篩選" onchange="渲染()"><option value="全部">全部燈號</option><option value="紅燈缺料">紅燈缺料</option><option value="黃燈待確認">黃燈待確認</option><option value="綠燈可投產">綠燈可投產</option><option value="白燈禁止提前">白燈禁止提前</option></select><select id="Tier篩選" onchange="渲染()"><option value="全部">全部 Tier</option><option>Tier 1</option><option>Tier 2</option><option>Tier 3</option><option>Tier 4</option></select><select id="排序方式" onchange="渲染()"><option value="Tier優先">Tier優先</option><option value="尚缺大到小">尚缺大到小</option><option value="交期由近到遠">交期由近到遠</option><option value="供料日由近到遠">供料日由近到遠</option></select><button class="按鈕 bg-amber-300 text-slate-950" onclick="產生摘要()">產生摘要</button></div></section><section class="grid grid-cols-2 md:grid-cols-6 gap-3 mb-4" id="統計區"></section><section class="grid lg:grid-cols-4 gap-4" id="看板區"></section><section class="玻璃 卡 p-4 mt-4"><h2 class="font-black text-xl mb-3">CTB 缺料摘要</h2><textarea id="摘要結果" rows="12"></textarea><button class="按鈕 bg-amber-300 text-slate-950 mt-3" onclick="複製摘要()">複製摘要</button></section></main><script>const 欄=['紅燈缺料','黃燈待確認','綠燈可投產','白燈禁止提前'];let 需求=[];function GAS(){return localStorage.getItem('GAS網址')||''}async function 呼叫API(action,data={}){const url=GAS();if(!url)throw new Error('請先貼上 GAS Web App URL');const r=await fetch(url,{method:'POST',headers:{'Content-Type':'text/plain;charset=utf-8'},body:JSON.stringify({action,...data})});return r.json()}function 儲存設定(){localStorage.setItem('GAS網址',document.getElementById('GAS網址').value.trim());alert('已儲存')}async function 載入資料(){try{const r=await 呼叫API('取得主檔管理資料',{工作表名稱:'10_排程需求池'});if(!r.成功)throw new Error(r.訊息);需求=(r.資料||[]).filter(x=>(x.狀態||'待排程')!=='完成');document.getElementById('狀態文字').textContent=`已載入未完成排程需求 ${需求.length} 筆`;渲染()}catch(e){document.getElementById('狀態文字').textContent=e.message}}function 日期差(d0){if(!d0)return 99999;const today=new Date();today.setHours(0,0,0,0);const d=new Date(d0);if(isNaN(d))return 99999;d.setHours(0,0,0,0);return Math.round((d-today)/86400000)}function 算Tier(x){if(x.Tier等級)return x.Tier等級;const d=日期差(x.交期||x.預計完工日);if(d<=7)return 'Tier 1';if(d<=14)return 'Tier 2';if(d<=21)return 'Tier 3';return 'Tier 4'}function 燈號(x){if((x.齊套狀態||'').includes('缺')||Number(x.尚缺數量||0)>0||['缺料','材料不足','缺素材','缺棧板'].some(k=>String(x.缺料原因||'').includes(k)))return '紅燈缺料';const tier=算Tier(x);if(tier==='Tier 4')return '白燈禁止提前';if((x.供料狀態||'').includes('待')||!x.供料日||!x.齊套狀態)return '黃燈待確認';return '綠燈可投產'}function 篩選排序(list){const q=(document.getElementById('搜尋字').value||'').toLowerCase();const light=document.getElementById('燈號篩選').value;const tier=document.getElementById('Tier篩選').value;let out=list.filter(x=>{const text=`${x.產品編號||''} ${x.品名||''} ${x.客戶品號||''} ${x.共用素材編號||''} ${x.共用素材名稱||''} ${x.缺料原因||''} ${x.負責人||''}`.toLowerCase();if(q&&!text.includes(q))return false;if(light!=='全部'&&燈號(x)!==light)return false;if(tier!=='全部'&&算Tier(x)!==tier)return false;return true});const sort=document.getElementById('排序方式').value;out.sort((a,b)=>{if(sort==='尚缺大到小')return Number(b.尚缺數量||0)-Number(a.尚缺數量||0);if(sort==='交期由近到遠')return 日期差(a.交期||a.預計完工日)-日期差(b.交期||b.預計完工日);if(sort==='供料日由近到遠')return 日期差(a.供料日)-日期差(b.供料日);return Number(算Tier(a).replace('Tier ',''))-Number(算Tier(b).replace('Tier ',''))||日期差(a.交期||a.預計完工日)-日期差(b.交期||b.預計完工日)});return out}function 渲染(){const view=篩選排序(需求);const c={};欄.forEach(x=>c[x]=0);view.forEach(x=>c[燈號(x)]++);const 缺=view.reduce((s,x)=>s+Number(x.尚缺數量||0),0);document.getElementById('統計區').innerHTML=欄.map(x=>`<div class="玻璃 卡 p-4"><p class="小字">${x}</p><p class="text-2xl font-black">${c[x]||0}</p></div>`).join('')+`<div class="玻璃 卡 p-4"><p class="小字">尚缺數量</p><p class="text-2xl font-black 紅">${缺}</p></div><div class="玻璃 卡 p-4"><p class="小字">總筆數</p><p class="text-2xl font-black">${view.length}</p></div>`;document.getElementById('看板區').innerHTML=欄.map(k=>`<div class="玻璃 卡 p-3 min-h-[300px]"><h2 class="font-black text-lg mb-3">${k}</h2>${view.filter(x=>燈號(x)===k).map(需求卡).join('')||'<p class="text-slate-400 text-sm">目前無資料</p>'}</div>`).join('')}function 卡色(x){const l=燈號(x);if(l==='紅燈缺料')return '紅卡';if(l==='黃燈待確認')return '黃卡';if(l==='綠燈可投產')return '綠卡';return '白卡'}function 需求卡(x){const l=燈號(x);const tier=算Tier(x);return `<div class="需求卡 ${卡色(x)}"><div class="flex justify-between gap-2"><b>${x.需求編號||''}</b><span class="小字">${tier}</span></div><p class="font-bold mt-1">${x.品名||''}</p><p class="小字">產品：${x.產品編號||''}｜客戶：${x.客戶品號||''}</p><p class="小字">交期：${x.交期||x.預計完工日||''}｜最晚投產：${x.最晚投產日||'未算'}</p><p class="小字">共用素材：${x.共用素材編號||'無'} ${x.共用素材名稱||''}</p><p class="小字">齊套：${x.齊套狀態||'未填'}｜供料：${x.供料狀態||x.供料日||'未填'}</p><p class="小字">可用：${x.可用庫存||0}｜鎖定：${x.已鎖定數量||0}｜尚缺：${x.尚缺數量||0}</p><p class="小字 ${l==='紅燈缺料'?'紅':l==='黃燈待確認'?'黃':l==='綠燈可投產'?'綠':'白'}">${l}｜${x.投產允許||''}</p><p class="小字">缺料原因：${x.缺料原因||'無'}</p></div>`}function 產生摘要(){const view=篩選排序(需求);const red=view.filter(x=>燈號(x)==='紅燈缺料');const white=view.filter(x=>燈號(x)==='白燈禁止提前');const 缺=red.reduce((s,x)=>s+Number(x.尚缺數量||0),0);const top=red.slice(0,10).map((x,i)=>`${i+1}. ${x.需求編號}｜${x.品名}｜${算Tier(x)}｜尚缺 ${x.尚缺數量||0}｜原因 ${x.缺料原因||'未填'}`).join('\n')||'目前無紅燈缺料。';document.getElementById('摘要結果').value=`【CTB 齊套缺料摘要 v2.2.0】\n\n紅燈缺料：${red.length}\n白燈禁止提前：${white.length}\n尚缺數量合計：${缺}\n\n紅燈清單：\n${top}\n\n建議動作：\n1. 紅燈缺料直接從前段日排程抽出，改入待料區。\n2. Tier 1 共用素材優先鎖定，禁止被 Tier 3/4 挪用。\n3. 缺棧板、缺包材也視為不可出貨風險，需納入紅燈。`}async function 複製摘要(){const text=document.getElementById('摘要結果').value;if(!text.trim())return alert('尚未產生摘要');await navigator.clipboard.writeText(text);alert('已複製摘要')}document.getElementById('GAS網址').value=GAS();載入資料();</script></body></html>
