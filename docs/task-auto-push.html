<!doctype html><html lang="zh-Hant"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>任務自動推播設定</title><script src="https://cdn.tailwindcss.com"></script><style>body{font-family:-apple-system,BlinkMacSystemFont,'Noto Sans TC','Segoe UI',sans-serif;background:#07111f;color:#ecfeff}.玻璃{background:rgba(15,23,42,.78);border:1px solid rgba(148,163,184,.22);backdrop-filter:blur(18px)}.卡{border-radius:22px;box-shadow:0 18px 45px rgba(0,0,0,.28)}.按鈕{border-radius:16px;padding:.75rem .9rem;font-weight:900}input,select,textarea{background:#0f172a!important;border:1px solid #334155!important;color:#fff!important;border-radius:14px!important;padding:.75rem!important;width:100%}label{font-size:.82rem;color:#a7f3d0;font-weight:800}th,td{white-space:nowrap}.小字{font-size:.78rem;color:#94a3b8}</style></head><body><main class="max-w-7xl mx-auto p-4 pb-24"><section class="玻璃 卡 p-5 mb-4"><div class="flex flex-wrap justify-between items-center gap-3"><div><p class="text-teal-200 font-black text-sm">智慧製造中央作戰指揮中心 v2.9.0</p><h1 class="text-2xl md:text-4xl font-black">任務自動推播設定</h1><p id="狀態文字" class="text-slate-300 mt-1">設定每日任務摘要、逾期推播、LINE 目標 ID 與推播時間。</p></div><div class="flex gap-2"><a class="按鈕 bg-purple-200 text-slate-950" href="./task-dashboard.html">任務儀表板</a><a class="按鈕 bg-blue-200 text-slate-950" href="./task-performance.html">任務績效</a></div></div></section><section class="玻璃 卡 p-4 mb-4"><div class="grid md:grid-cols-[1fr_auto_auto] gap-2"><input id="GAS網址" placeholder="貼上 GAS Web App URL"><button class="按鈕 bg-teal-500 text-slate-950" onclick="儲存設定網址()">儲存URL</button><button class="按鈕 bg-cyan-300 text-slate-950" onclick="載入設定()">同步設定</button></div></section><section class="grid lg:grid-cols-[420px_1fr] gap-4"><div class="玻璃 卡 p-4"><h2 class="font-black text-xl mb-3">推播設定</h2><div class="grid gap-3"><div><label>LINE 任務推播目標ID</label><input id="目標ID" placeholder="userId 或 groupId"></div><div><label>每日任務摘要推播小時</label><input id="推播小時" type="number" min="0" max="23" value="8"></div><div><label>每日任務摘要啟用</label><select id="每日摘要啟用"><option>否</option><option>是</option></select></div><div><label>任務逾期推播啟用</label><select id="逾期推播啟用"><option>否</option><option>是</option></select></div></div><div class="grid grid-cols-2 gap-2 mt-4"><button class="按鈕 bg-lime-300 text-slate-950" onclick="儲存推播設定()">儲存並建立觸發器</button><button class="按鈕 bg-amber-300 text-slate-950" onclick="測試週報預覽()">週報預覽</button><button class="按鈕 bg-orange-300 text-slate-950" onclick="測試逾期預覽()">逾期預覽</button><button class="按鈕 bg-slate-600 text-white" onclick="讀取週月統計()">週/月統計</button></div></div><div class="space-y-4"><div class="玻璃 卡 p-4"><h2 class="font-black text-xl mb-3">目前設定表</h2><div id="設定表區" class="overflow-auto max-h-[24vh]"></div></div><div class="玻璃 卡 p-4"><h2 class="font-black text-xl mb-3">週/月完成率統計</h2><div id="週月統計區" class="overflow-auto max-h-[28vh]"></div></div><div class="玻璃 卡 p-4"><h2 class="font-black text-xl mb-3">預覽 / 回應</h2><textarea id="回應結果" rows="12"></textarea></div></div></section></main><script>let 設定=[];function GAS(){return localStorage.getItem('GAS網址')||''}function 儲存設定網址(){localStorage.setItem('GAS網址',document.getElementById('GAS網址').value.trim());alert('已儲存URL')}async function 呼叫API(action,data={}){const url=GAS();if(!url)throw new Error('請先貼上 GAS Web App URL');const r=await fetch(url,{method:'POST',headers:{'Content-Type':'text/plain;charset=utf-8'},body:JSON.stringify({action,...data})});return r.json()}async function 載入設定(){try{await 呼叫API('升級_v2_9_任務自動推播設定表');const r=await 呼叫API('取得主檔管理資料',{工作表名稱:'00_任務自動推播設定'});設定=r.資料||[];填設定();document.getElementById('設定表區').innerHTML=表格(設定);document.getElementById('狀態文字').textContent='推播設定已同步'}catch(e){alert('請確認 GAS 已加入 v2_9 工具並重新部署。\n'+e.message)}}function 取設定(key){const row=設定.find(x=>x.設定項目===key);return row?row.設定值:''}function 填設定(){document.getElementById('目標ID').value=取設定('LINE任務推播目標ID')||'';document.getElementById('推播小時').value=取設定('每日任務摘要推播小時')||8;document.getElementById('每日摘要啟用').value=取設定('每日任務摘要啟用')||'否';document.getElementById('逾期推播啟用').value=取設定('任務逾期推播啟用')||'否'}async function 儲存推播設定(){const data={目標ID:val('目標ID'),推播小時:Number(val('推播小時')||8),每日摘要啟用:val('每日摘要啟用'),逾期推播啟用:val('逾期推播啟用')};try{const r=await 呼叫API('設定_v2_9_任務自動推播',{資料:data});document.getElementById('回應結果').value=JSON.stringify(r,null,2);await 載入設定()}catch(e){alert(e.message)}}async function 測試週報預覽(){try{const r=await 呼叫API('產生_v2_7_任務週報文字');document.getElementById('回應結果').value=typeof r==='string'?r:JSON.stringify(r,null,2)}catch(e){alert(e.message)}}async function 測試逾期預覽(){try{const r=await 呼叫API('推播_v2_8_LINE任務逾期清單',{目標ID:''});document.getElementById('回應結果').value=JSON.stringify(r,null,2)}catch(e){alert(e.message)}}async function 讀取週月統計(){try{const r=await 呼叫API('取得_v2_9_任務週月完成率統計');document.getElementById('週月統計區').innerHTML='<h3 class="font-black text-teal-200 mb-2">週統計</h3>'+表格(r.週統計||[])+'<h3 class="font-black text-teal-200 my-2">月統計</h3>'+表格(r.月統計||[]);document.getElementById('回應結果').value=JSON.stringify(r,null,2)}catch(e){alert(e.message)}}function val(id){return document.getElementById(id).value.trim()}function 表格(rows){if(!rows.length)return '<p class="text-slate-300">尚無資料</p>';const hs=Object.keys(rows[0]).filter(h=>h!=='__列號');return `<table class="w-full text-sm"><thead><tr>${hs.map(h=>`<th class="text-left p-2 text-teal-200">${h}</th>`).join('')}</tr></thead><tbody>${rows.map(r=>`<tr class="border-t border-slate-700">${hs.map(h=>`<td class="p-2">${r[h]??''}</td>`).join('')}</tr>`).join('')}</tbody></table>`}document.getElementById('GAS網址').value=GAS();載入設定();</script></body></html>
