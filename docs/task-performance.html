<!doctype html><html lang="zh-Hant"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>任務績效趨勢</title><script src="https://cdn.tailwindcss.com"></script><script src="https://cdn.jsdelivr.net/npm/chart.js"></script><style>body{font-family:-apple-system,BlinkMacSystemFont,'Noto Sans TC','Segoe UI',sans-serif;background:#07111f;color:#ecfeff}.玻璃{background:rgba(15,23,42,.78);border:1px solid rgba(148,163,184,.22);backdrop-filter:blur(18px)}.卡{border-radius:22px;box-shadow:0 18px 45px rgba(0,0,0,.28)}.按鈕{border-radius:16px;padding:.75rem .9rem;font-weight:900}input,select,textarea{background:#0f172a!important;border:1px solid #334155!important;color:#fff!important;border-radius:14px!important;padding:.75rem!important;width:100%}th,td{white-space:nowrap}.小字{font-size:.78rem;color:#94a3b8}</style></head><body><main class="max-w-7xl mx-auto p-4 pb-24"><section class="玻璃 卡 p-5 mb-4"><div class="flex flex-wrap justify-between items-center gap-3"><div><p class="text-teal-200 font-black text-sm">智慧製造中央作戰指揮中心 v2.8.0</p><h1 class="text-2xl md:text-4xl font-black">任務績效與完成率趨勢</h1><p id="狀態文字" class="text-slate-300 mt-1">追蹤負責人完成率、逾期數與每日完成率趨勢。</p></div><div class="flex gap-2"><a class="按鈕 bg-purple-200 text-slate-950" href="./task-dashboard.html">任務儀表板</a><a class="按鈕 bg-violet-300 text-slate-950" href="./task-board.html">三方待辦</a></div></div></section><section class="玻璃 卡 p-4 mb-4"><div class="grid md:grid-cols-[1fr_auto_auto] gap-2"><input id="GAS網址" placeholder="貼上 GAS Web App URL"><button class="按鈕 bg-teal-500 text-slate-950" onclick="儲存設定()">儲存</button><button class="按鈕 bg-cyan-300 text-slate-950" onclick="載入資料()">同步資料</button></div><div class="grid md:grid-cols-3 gap-2 mt-3"><button class="按鈕 bg-amber-300 text-slate-950" onclick="複製績效摘要()">複製績效摘要</button><button class="按鈕 bg-lime-300 text-slate-950" onclick="下載負責人CSV()">下載負責人CSV</button><button class="按鈕 bg-slate-600 text-white" onclick="下載趨勢CSV()">下載趨勢CSV</button></div></section><section class="grid lg:grid-cols-2 gap-4 mb-4"><div class="玻璃 卡 p-4"><h2 class="font-black text-xl mb-3">完成率趨勢</h2><canvas id="趨勢圖"></canvas></div><div class="玻璃 卡 p-4"><h2 class="font-black text-xl mb-3">逾期趨勢</h2><canvas id="逾期圖"></canvas></div></section><section class="玻璃 卡 p-4 mb-4"><h2 class="font-black text-xl mb-3">負責人績效統計</h2><div id="績效表" class="overflow-auto max-h-[46vh]"></div></section><section class="玻璃 卡 p-4"><h2 class="font-black text-xl mb-3">績效摘要</h2><textarea id="摘要" rows="10"></textarea></section></main><script>let 績效=[],趨勢=[],chart1=null,chart2=null;function GAS(){return localStorage.getItem('GAS網址')||''}function 儲存設定(){localStorage.setItem('GAS網址',document.getElementById('GAS網址').value.trim());alert('已儲存')}async function 呼叫API(action,data={}){const url=GAS();if(!url)throw new Error('請先貼上 GAS Web App URL');const r=await fetch(url,{method:'POST',headers:{'Content-Type':'text/plain;charset=utf-8'},body:JSON.stringify({action,...data})});return r.json()}async function 載入資料(){try{const [a,b]=await Promise.all([呼叫API('取得_v2_8_任務負責人績效統計'),呼叫API('取得_v2_8_任務完成率趨勢資料')]);績效=a.資料||[];趨勢=b.資料||[];document.getElementById('狀態文字').textContent=`已載入績效 ${績效.length} 筆，趨勢 ${趨勢.length} 筆`;渲染()}catch(e){alert('請確認 GAS 已加入 v2_8 工具並重新部署。\n'+e.message)}}function 渲染(){document.getElementById('績效表').innerHTML=表格(績效);畫圖();產生摘要()}function 畫圖(){const labels=趨勢.map(x=>x.日期);const rate=趨勢.map(x=>Number(x.完成率||0));const overdue=趨勢.map(x=>Number(x.逾期數||0));if(chart1)chart1.destroy();if(chart2)chart2.destroy();chart1=new Chart(document.getElementById('趨勢圖'),{type:'line',data:{labels,datasets:[{label:'完成率%',data:rate,tension:.25}]},options:{responsive:true,plugins:{legend:{labels:{color:'#fff'}}},scales:{x:{ticks:{color:'#cbd5e1'}},y:{ticks:{color:'#cbd5e1'},beginAtZero:true,max:100}}}});chart2=new Chart(document.getElementById('逾期圖'),{type:'bar',data:{labels,datasets:[{label:'逾期數',data:overdue}]},options:{responsive:true,plugins:{legend:{labels:{color:'#fff'}}},scales:{x:{ticks:{color:'#cbd5e1'}},y:{ticks:{color:'#cbd5e1'},beginAtZero:true}}}})}function 表格(rows){if(!rows.length)return '<p class="text-slate-300">尚無資料</p>';const hs=Object.keys(rows[0]);return `<table class="w-full text-sm"><thead><tr>${hs.map(h=>`<th class="text-left p-2 text-teal-200">${h}</th>`).join('')}</tr></thead><tbody>${rows.map(r=>`<tr class="border-t border-slate-700">${hs.map(h=>`<td class="p-2">${r[h]??''}</td>`).join('')}</tr>`).join('')}</tbody></table>`}function 產生摘要(){const top=績效.slice(0,8).map((x,i)=>`${i+1}. ${x.負責人}｜任務 ${x.任務總數}｜完成率 ${x.完成率}%｜逾期 ${x.逾期}`).join('\n')||'尚無資料';document.getElementById('摘要').value=`【任務績效摘要 v2.8.0】\n負責人數：${績效.length}\n趨勢天數：${趨勢.length}\n\n負責人績效：\n${top}`}async function 複製績效摘要(){const t=document.getElementById('摘要').value;if(!t.trim())return alert('尚未產生摘要');await navigator.clipboard.writeText(t);alert('已複製')}function 轉CSV(rows){if(!rows.length)return '';const hs=Object.keys(rows[0]);const esc=v=>`"${String(v??'').replace(/"/g,'""')}"`;return hs.join(',')+'\n'+rows.map(r=>hs.map(h=>esc(r[h])).join(',')).join('\n')}function 下載(name,rows){const blob=new Blob(['\ufeff'+轉CSV(rows)],{type:'text/csv;charset=utf-8'});const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=name;a.click();URL.revokeObjectURL(a.href)}function 下載負責人CSV(){下載('任務負責人績效.csv',績效)}function 下載趨勢CSV(){下載('任務完成率趨勢.csv',趨勢)}document.getElementById('GAS網址').value=GAS();載入資料();</script></body></html>
