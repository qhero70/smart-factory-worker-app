<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<title>製一組 報工表單 V4｜穩定正式版</title>
<script src="./pwa-config.js?v=416"></script>
<style>
:root{--blue:#3b78ff;--green:#19a15f;--red:#dc2626;--ink:#253044;--muted:#667085;--line:#dbe7ff;--card:#fff;--bg:#f4f7ff;--shadow:0 12px 32px rgba(45,86,170,.13);--r:28px}*{box-sizing:border-box}body{margin:0;background:var(--bg);font-family:-apple-system,BlinkMacSystemFont,'Noto Sans TC','Microsoft JhengHei',sans-serif;color:var(--ink);font-weight:700}.top{position:sticky;top:0;z-index:5;background:linear-gradient(135deg,#4b7fe8,#2b66d8);color:#fff;padding:18px 20px 16px;border-bottom:5px solid transparent;border-image:linear-gradient(90deg,#34a853,#fbbc04,#ea4335,#4285f4) 1}.title{display:flex;gap:14px;align-items:center}.logo{font-size:38px;background:rgba(255,255,255,.15);padding:12px;border-radius:18px}.name{font-size:25px;font-weight:950}.sub{font-size:15px;opacity:.9;margin-top:3px}.status{display:inline-flex;gap:8px;align-items:center;margin-top:14px;padding:9px 16px;border-radius:999px;background:rgba(8,44,122,.45);font-size:16px}.dot{width:16px;height:16px;background:#facc15;border-radius:50%;box-shadow:0 0 10px #facc15}.wrap{padding:18px 20px 120px;max-width:920px;margin:auto}.steps{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;background:#fff;border-radius:24px;padding:13px;box-shadow:var(--shadow);margin-bottom:20px}.step{padding:10px;border-radius:18px;text-align:center;color:#98a2b3}.step.on{background:#e8f0ff;color:#1d4ed8}.panel{background:rgba(255,255,255,.92);border:1px solid var(--line);box-shadow:var(--shadow);border-radius:var(--r);padding:20px;margin-bottom:20px}.guide{background:#fff8df;border:2px solid #f4d46a;border-left:8px solid #f59e0b}.h{font-size:24px;font-weight:950;margin-bottom:12px}.hint{color:#7c5b15;font-size:16px;line-height:1.7}.search{width:100%;font-size:20px;padding:18px 20px;border:2px solid #e5e7eb;border-radius:22px;background:#fff;margin:12px 0}.grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:14px}.card{background:#fff;border:2px solid #e8eefc;border-radius:22px;padding:16px;min-height:92px;box-shadow:0 6px 18px rgba(45,86,170,.08);cursor:pointer}.card.sel{border-color:#2563eb;background:#eaf2ff}.card .big{font-size:21px;font-weight:950}.card .small{font-size:14px;color:#667085;margin-top:6px;line-height:1.45}.hidden{display:none}.row{display:grid;grid-template-columns:1fr 1fr;gap:14px}.field{margin:12px 0}.label{font-size:16px;color:#475467;margin-bottom:8px}.input,select,textarea{width:100%;font-size:20px;font-weight:850;padding:16px;border:2px solid #dbe3f0;border-radius:18px;background:#fff;color:#111827}textarea{min-height:92px}.summary{background:#ecfff3;border-color:#86efac}.summary table{width:100%;border-collapse:collapse}.summary td{padding:12px 4px;border-bottom:1px dashed #b7e4c7;font-size:17px}.summary td:last-child{text-align:right;font-weight:950}.ok{color:#16a34a}.ng{color:#dc2626}.bar{position:fixed;left:0;right:0;bottom:0;background:rgba(255,255,255,.92);backdrop-filter:blur(14px);display:grid;grid-template-columns:1fr 2fr;gap:12px;padding:14px 20px calc(14px + env(safe-area-inset-bottom));z-index:10}.btn{border:0;border-radius:24px;padding:18px 18px;font-size:22px;font-weight:950;color:#fff;background:linear-gradient(90deg,#21c58b,#3478f6);box-shadow:0 12px 26px rgba(31,94,210,.25)}.btn.back{background:#fff;color:#2563eb;border:2px solid #dbe7ff}.toast{position:fixed;left:20px;right:20px;top:24px;background:#fff;border-radius:20px;box-shadow:0 20px 50px rgba(0,0,0,.25);padding:18px;z-index:30;font-size:17px;display:none}.toast.show{display:block}.toast.err{border-left:8px solid #dc2626}.toast.okt{border-left:8px solid #16a34a}@media(max-width:520px){.wrap{padding:14px 14px 115px}.name{font-size:23px}.grid{grid-template-columns:1fr}.row{grid-template-columns:1fr}.steps{grid-template-columns:repeat(4,1fr);font-size:13px}.panel{padding:17px;border-radius:24px}}
</style>
</head>
<body>
<div class="toast" id="toast"></div>
<header class="top"><div class="title"><div class="logo">🏭</div><div><div class="name">製一組 報工表單 V4</div><div class="sub">化新精密｜智慧製造指揮中心｜穩定正式版</div></div></div><div class="status"><span class="dot" id="dot"></span><span id="statusText">資料已載入｜本機主檔可報工</span></div></header>
<main class="wrap">
<div class="steps"><div class="step on" id="s0">1 人員</div><div class="step" id="s1">2 工件</div><div class="step" id="s2">3 產出</div><div class="step" id="s3">4 確認</div></div>
<section class="panel guide"><div class="h">👉 Step 1：選擇作業員 / Select Operator</div><div class="hint">此版本不再卡在讀取主資料庫。人員與工件先由 PWA 穩定主檔帶入；送出時仍寫入 GAS 正式資料庫。</div></section>
<section class="panel" id="page0"><input class="search" id="personSearch" placeholder="🔍 搜尋人員：姓名、工號、班別"><div class="grid" id="personGrid"></div></section>
<section class="panel hidden" id="page1"><div class="h">📦 工件選擇 / Workpiece</div><input class="search" id="productSearch" placeholder="🔍 搜尋產品、客戶品號、料號"><div class="grid" id="productGrid"></div></section>
<section class="panel hidden" id="page2"><div class="h">🛠️ 工站 / 機台</div><div class="field"><div class="label">工站</div><select id="routeSelect"></select></div><div class="field"><div class="label">機台</div><select id="machineSelect"></select></div><div class="row"><div class="field"><div class="label">作業日</div><input class="input" id="workDate" type="date"></div><div class="field"><div class="label">班別</div><select id="shift"><option>早班</option><option>中班</option><option>大夜班</option></select></div></div><div class="row"><div class="field"><div class="label">今日共做數</div><input class="input" id="totalQty" type="number" min="0" placeholder="輸入今日共做數"></div><div class="field"><div class="label">不良數</div><input class="input" id="ngQty" type="number" min="0" value="0"></div></div><div class="row"><div class="field"><div class="label">開始時間</div><input class="input" id="startTime" type="datetime-local"></div><div class="field"><div class="label">結束時間</div><input class="input" id="endTime" type="datetime-local"></div></div><div class="field"><div class="label">不良原因</div><select id="defect"><option value="">無不良 / None</option><option value="Z02 加工砂孔">Z02 加工砂孔</option><option value="Y09 孔位">Y09 孔位</option><option value="Z01 缺肉">Z01 缺肉</option></select></div><div class="field"><div class="label">備註</div><textarea id="note" placeholder="可留空"></textarea></div></section>
<section class="panel summary hidden" id="page3"><div class="h">📋 報工摘要確認</div><table id="sum"></table></section>
</main>
<div class="bar"><button class="btn back" onclick="back()">← 上一步</button><button class="btn" onclick="next()" id="nextBtn">下一步 →</button></div>
<script>
const PERSONS=[['fhfi546','黃俊偉','早班'],['fhft606','艾爾迪','大夜班'],['fhft560','里查','早班'],['fhft562','艾德華','早班'],['fhfi531','駱德祥','早班'],['fhfi573','黃嘉欣','早班'],['fhfi676','鍾聿桓','早班'],['fhfi691','石郡浩','早班'],['fhft578','莫里','早班'],['fhft582','阿本','早班'],['fhft590','安東尼','早班'],['fhft604','路比托','早班'],['fhft609','班尼','早班']].map(x=>({工號:x[0],姓名:x[1],班別:x[2],部門:'製造部',組別:'製一組',職稱:'作業員'}));
const ROUTES=[
['A302500000','','COVER REAR (神崎) 17 1/449→406','車床+M/C','OP110','449','449、406'],['A503200000','ACW1799230','OIL PUMP ASSY AGCO 66/74','組裝','OP110','84','84、1063、204'],['A503200000','ACW1799230','OIL PUMP ASSY AGCO 66/74','測試油轉','OP120','1100','1100、1082'],['Z005900000','119717-21650','V-PULLEY CRANKSHAFT','自動化','OP110','1101','1101'],['Z005900000','119717-21650','V-PULLEY CRANKSHAFT','(精)車床N/C+M/C加工','OP140','1064','1064'],['A002900000','148928-01751','12AY MOUNTING FOOT 沉頭43','M/C加工','OP110','489','489、1044、1075、1016、1069、496、1088'],['A002900000','148928-01751','12AY MOUNTING FOOT 沉頭43','清洗+目視','OP130','77','77'],['Z907100000','1A8310-14250','GEAR BOX, FRONT L','M/C加工','OP110','489','489、1044、1075'],['Z907100000','1A8310-14250','GEAR BOX, FRONT L','清洗+目視','OP150','77','77']].map(x=>({產品編號:x[0],客戶品號:x[1],品名:x[2],工站:x[3],工序:x[4],主機台:x[5],機台:x[6].split('、')}));
let step=0, person=null, product=null, route=null; const $=id=>document.getElementById(id);function toast(t,ok){let e=$('toast');e.className='toast show '+(ok?'okt':'err');e.innerHTML=t;setTimeout(()=>e.className='toast',4200)}function show(){[0,1,2,3].forEach(i=>{$('page'+i).classList.toggle('hidden',i!==step);$('s'+i).classList.toggle('on',i===step)});$('nextBtn').textContent=step===3?'📤 送出報工 / Submit':'下一步 →'}function renderPersons(){let q=$('personSearch').value.toLowerCase();$('personGrid').innerHTML=PERSONS.filter(p=>(p.工號+p.姓名+p.班別).toLowerCase().includes(q)).map((p,i)=>`<div class="card ${person&&person.工號===p.工號?'sel':''}" onclick="selPerson('${p.工號}')"><div class="big">${p.姓名}</div><div class="small">工號：${p.工號}<br>班別：${p.班別}<br>${p.部門}｜${p.職稱}</div></div>`).join('')}function products(){let m={};ROUTES.forEach(r=>m[r.產品編號+'|'+r.客戶品號]={產品編號:r.產品編號,客戶品號:r.客戶品號,品名:r.品名});return Object.values(m)}function renderProducts(){let q=$('productSearch').value.toLowerCase();$('productGrid').innerHTML=products().filter(p=>(p.產品編號+p.客戶品號+p.品名).toLowerCase().includes(q)).map(p=>`<div class="card ${product&&product.產品編號===p.產品編號?'sel':''}" onclick="selProduct('${p.產品編號}','${p.客戶品號}')"><div class="big">${p.產品編號}</div><div class="small">${p.品名}<br>客戶品號：${p.客戶品號||'—'}</div></div>`).join('')}function selPerson(id){person=PERSONS.find(p=>p.工號===id);$('shift').value=person.班別;renderPersons();toast('✅ 已選人員：'+person.姓名,true)}function selProduct(id,c){product=products().find(p=>p.產品編號===id&&p.客戶品號===c);renderProducts();fillRoutes();toast('✅ 已選產品：'+product.產品編號,true)}function fillRoutes(){let arr=ROUTES.filter(r=>product&&r.產品編號===product.產品編號&&r.客戶品號===product.客戶品號);$('routeSelect').innerHTML=arr.map((r,i)=>`<option value="${i}">${r.工站}｜${r.工序}｜${r.主機台}</option>`).join('');route=arr[0];fillMachines();$('routeSelect').onchange=()=>{route=arr[Number($('routeSelect').value)];fillMachines()}}function fillMachines(){$('machineSelect').innerHTML=(route?route.機台:[]).map(m=>`<option>${m}</option>`).join('')}function setTimes(){let d=new Date(),z=n=>String(n).padStart(2,'0'),date=d.getFullYear()+'-'+z(d.getMonth()+1)+'-'+z(d.getDate());$('workDate').value=date;$('startTime').value=date+'T08:00';$('endTime').value=date+'T16:50'}function summary(){let q=Number($('totalQty').value||0),ng=Number($('ngQty').value||0),good=Math.max(0,q-ng);$('sum').innerHTML=`<tr><td>作業員</td><td>${person.姓名} / ${person.工號} / ${$('shift').value}</td></tr><tr><td>產品</td><td>${product.產品編號}<br>${product.品名}</td></tr><tr><td>工站</td><td>${route.工站}｜${route.工序}｜${$('machineSelect').value}</td></tr><tr><td>共做</td><td>${q} pcs</td></tr><tr><td>良品</td><td class="ok">${good} pcs</td></tr><tr><td>不良</td><td class="ng">${ng} pcs</td></tr><tr><td>不良原因</td><td>${$('defect').value||'無'}</td></tr>`}function next(){if(step===0&&!person)return toast('請先選擇人員',false);if(step===1&&!product)return toast('請先選擇產品',false);if(step===2){if(!route)return toast('請先選擇工站',false);if(Number($('totalQty').value||0)<=0)return toast('今日共做數必須大於 0',false);summary()}if(step<3){step++;show();return}submit()}function back(){if(step>0){step--;show()}}function submit(){let q=Number($('totalQty').value||0),ng=Number($('ngQty').value||0),good=Math.max(0,q-ng),report='RG_PWA_'+new Date().toISOString().replace(/[-:T.Z]/g,'').slice(0,14);let p={action:'寫入報工作業v2',動作:'寫入報工作業v2',報工編號:report,作業日:$('workDate').value,工號:person.工號,姓名:person.姓名,班別:$('shift').value,產品編號:product.產品編號,客戶品號:product.客戶品號,品名:product.品名,工站名稱:route.工站,報工工站名稱:route.工站,工序:route.工序,主機台:$('machineSelect').value,機台編號:$('machineSelect').value,今日共做數:q,產出數量:q,不良數:ng,不良數量:ng,實際良品數:good,良品數量:good,不良原因:$('defect').value,不良代碼:($('defect').value.split(' ')[0]||''),開始時間:$('startTime').value,結束時間:$('endTime').value,備註:$('note').value,來源:'GitHub Pages PWA V4 Stable',狀態:'完成'};post(p);if(ng>0){let n=Object.assign({},p,{action:'寫入不良紀錄v2',動作:'寫入不良紀錄v2'});setTimeout(()=>post(n),400)}toast('✅ 已送出：'+report+'<br>請到 09_報工 / 09_不良紀錄確認。',true)}function post(p){let gas=(window.PWA_CONFIG&&PWA_CONFIG.GAS_WEB_APP_URL)||'';if(!gas)return toast('找不到 GAS_WEB_APP_URL',false);let iframe=document.createElement('iframe'),form=document.createElement('form'),name='f'+Date.now()+Math.random();iframe.name=name;iframe.style.display='none';form.method='POST';form.target=name;form.action=gas.replace(/\?.*$/,'')+'?action='+encodeURIComponent(p.action)+'&動作='+encodeURIComponent(p.動作)+'&_ts='+Date.now();form.style.display='none';Object.keys(p).forEach(k=>{let i=document.createElement('input');i.type='hidden';i.name=k;i.value=typeof p[k]==='object'?JSON.stringify(p[k]):String(p[k]??'');form.appendChild(i)});let j=document.createElement('input');j.type='hidden';j.name='payload';j.value=JSON.stringify(p);form.appendChild(j);document.body.appendChild(iframe);document.body.appendChild(form);form.submit();setTimeout(()=>{form.remove();iframe.remove()},12000)}$('personSearch').oninput=renderPersons;$('productSearch').oninput=renderProducts;setTimes();renderPersons();renderProducts();show();setTimeout(()=>{$('statusText').textContent='資料已載入｜可離線選擇｜送出寫入正式 GAS';$('dot').style.background='#34c759'},800);
</script>
</body>
</html>
