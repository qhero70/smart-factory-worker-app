<!doctype html><html lang="zh-Hant"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>共用素材鎖料模擬</title><script src="https://cdn.tailwindcss.com"></script><style>body{font-family:-apple-system,BlinkMacSystemFont,'Noto Sans TC','Segoe UI',sans-serif;background:#07111f;color:#ecfeff}.玻璃{background:rgba(15,23,42,.78);border:1px solid rgba(148,163,184,.22);backdrop-filter:blur(18px)}.卡{border-radius:22px;box-shadow:0 18px 45px rgba(0,0,0,.28)}.按鈕{border-radius:16px;padding:.75rem .9rem;font-weight:900}input,select,textarea{background:#0f172a!important;border:1px solid #334155!important;color:#fff!important;border-radius:14px!important;padding:.75rem!important;width:100%}th,td{white-space:nowrap}.小字{font-size:.78rem;color:#94a3b8}.紅{color:#fca5a5}.黃{color:#fde68a}.綠{color:#86efac}.需求卡{border-radius:18px;border:1px solid rgba(148,163,184,.25);background:rgba(2,6,23,.72);padding:12px;margin-bottom:10px}</style></head><body><main class="max-w-7xl mx-auto p-4 pb-24"><section class="玻璃 卡 p-5 mb-4"><div class="flex flex-wrap justify-between items-center gap-3"><div><p class="text-teal-200 font-black text-sm">智慧製造中央作戰指揮中心 v2.3.0</p><h1 class="text-2xl md:text-4xl font-black">共用素材鎖料模擬看板</h1><p id="狀態文字" class="text-slate-300 mt-1">輸入到貨數量後，依 Tier 1 → Tier 2 → Tier 3 → Tier 4 自動分配素材。</p></div><div class="flex gap-2"><a class="按鈕 bg-red-400 text-slate-950" href="./ctb.html">CTB缺料</a><a class="按鈕 bg-purple-300 text-slate-950" href="./schedule.html">排程看板</a></div></div></section><section class="玻璃 卡 p-4 mb-4"><div class="grid md:grid-cols-[1fr_auto_auto] gap-2"><input id="GAS網址" placeholder="貼上 GAS Web App URL"><button class="按鈕 bg-teal-500 text-slate-950" onclick="儲存設定()">儲存</button><button class="按鈕 bg-cyan-300 text-slate-950" onclick="載入需求池()">同步需求</button></div><div class="grid md:grid-cols-5 gap-2 mt-3"><select id="共用素材選單" onchange="帶入素材()"><option value="">選擇共用素材</option></select><input id="共用素材編號" placeholder="共用素材編號，例如 A801910008"><input id="到貨數量" type="number" placeholder="到貨數量"><button class="按鈕 bg-amber-300 text-slate-950" onclick="前端模擬()">前端模擬</button><button class="按鈕 bg-lime-300 text-slate-950" onclick="後端模擬()">GAS模擬</button></div><div class="grid md:grid-cols-2 gap-2 mt-3"><button class="按鈕 bg-orange-300 text-slate-950" onclick="套用分配()">套用分配到需求池</button><button class="按鈕 bg-slate-600 text-white" onclick="複製摘要()">複製摘要</button></div></section><section class="grid grid-cols-2 md:grid-cols-5 gap-3 mb-4" id="統計區"></section><section class="玻璃 卡 p-4 mb-4"><h2 class="font-black text-xl mb-3">分配結果</h2><div id="結果區" class="overflow-auto"></div></section><section class="玻璃 卡 p-4"><h2 class="font-black text-xl mb-3">鎖料摘要</h2><textarea id="摘要結果" rows="10"></textarea></section></main><script>let 需求=[],結果=[];function GAS(){return localStorage.getItem('GAS網址')||''}async function 呼叫API(action,data={}){const url=GAS();if(!url)throw new Error('請先貼上 GAS Web App URL');const r=await fetch(url,{method:'POST',headers:{'Content-Type':'text/plain;charset=utf-8'},body:JSON.stringify({action,...data})});return r.json()}function 儲存設定(){localStorage.setItem('GAS網址',document.getElementById('GAS網址').value.trim());alert('已儲存')}async function 載入需求池(){try{const r=await 呼叫API('取得主檔管理資料',{工作表名稱:'10_排程需求池'});if(!r.成功)throw new Error(r.訊息);需求=(r.資料||[]).filter(x=>(x.狀態||'待排程')!=='完成'&&x.共用素材編號);更新素材選單();document.getElementById('狀態文字').textContent=`已載入共用素材需求 ${需求.length} 筆`}catch(e){document.getElementById('狀態文字').textContent=e.message}}function 更新素材選單(){const map={};需求.forEach(x=>map[x.共用素材編號]=x.共用素材名稱||'');document.getElementById('共用素材選單').innerHTML='<option value="">選擇共用素材</option>'+Object.keys(map).map(k=>`<option value="${k}">${k} ${map[k]}</option>`).join('')}function 帶入素材(){document.getElementById('共用素材編號').value=document.getElementById('共用素材選單').value}function 日期差(d0){if(!d0)return 99999;const today=new Date();today.setHours(0,0,0,0);const d=new Date(d0);if(isNaN(d))return 99999;d.setHours(0,0,0,0);return Math.round((d-today)/86400000)}function Tier(x){if(x.Tier等級)return x.Tier等級;const d=日期差(x.交期||x.預計完工日);if(d<=7)return 'Tier 1';if(d<=14)return 'Tier 2';if(d<=21)return 'Tier 3';return 'Tier 4'}function tierNum(t){return String(t).includes('1')?1:String(t).includes('2')?2:String(t).includes('3')?3:4}function 前端模擬(){const part=document.getElementById('共用素材編號').value.trim();let qty=Number(document.getElementById('到貨數量').value||0);if(!part||qty<=0)return alert('請輸入共用素材編號與到貨數量');const list=需求.filter(x=>String(x.共用素材編號).trim()===part).sort((a,b)=>tierNum(Tier(a))-tierNum(Tier(b))||日期差(a.交期||a.預計完工日)-日期差(b.交期||b.預計完工日));結果=list.map(x=>{const 需求量=Number(x.需求量||0),已鎖=Number(x.已鎖定數量||0),尚缺=Number(x.尚缺數量||Math.max(需求量-已鎖,0));const 分配=Math.min(qty,Math.max(尚缺,0));qty-=分配;const 後缺=Math.max(尚缺-分配,0);return {需求編號:x.需求編號,產品編號:x.產品編號,品名:x.品名,交期:x.交期||x.預計完工日,Tier等級:Tier(x),原尚缺數量:尚缺,本次分配數量:分配,分配後尚缺數量:後缺,分配狀態:分配<=0?'未分配':後缺===0?'已滿足':'部分滿足',投產允許:後缺===0?'可投產':'禁止投產',剩餘可分配量:qty}});渲染結果('前端模擬',qty)}async function 後端模擬(){try{const part=document.getElementById('共用素材編號').value.trim();const qty=Number(document.getElementById('到貨數量').value||0);const r=await 呼叫API('模擬_v2_3_共用素材鎖料分配',{共用素材編號:part,到貨數量:qty});結果=r.結果||[];渲染結果('GAS模擬',r.剩餘未分配||0)}catch(e){alert('若此功能失敗，請確認 GAS 已加入 v2_3_共用素材鎖料模擬工具.gs。\n'+e.message)}}async function 套用分配(){if(!confirm('確定要把分配結果套用回 10_排程需求池？'))return;try{const part=document.getElementById('共用素材編號').value.trim();const qty=Number(document.getElementById('到貨數量').value||0);const r=await 呼叫API('套用_v2_3_共用素材鎖料分配',{共用素材編號:part,到貨數量:qty});alert(r.訊息||JSON.stringify(r));await 載入需求池()}catch(e){alert('套用失敗，請確認 GAS 已加入 v2_3 工具。\n'+e.message)}}function 渲染結果(mode,剩餘){const 滿足=結果.filter(x=>x.分配狀態==='已滿足').length,部分=結果.filter(x=>x.分配狀態==='部分滿足').length,未=結果.filter(x=>x.分配狀態==='未分配').length,分配=結果.reduce((s,x)=>s+Number(x.本次分配數量||0),0);document.getElementById('統計區').innerHTML=[['模式',mode],['已滿足',滿足],['部分滿足',部分],['未分配',未],['剩餘',剩餘]].map(x=>`<div class="玻璃 卡 p-4"><p class="小字">${x[0]}</p><p class="text-2xl font-black">${x[1]}</p></div>`).join('');document.getElementById('結果區').innerHTML=表格(結果);const top=結果.slice(0,10).map((x,i)=>`${i+1}. ${x.需求編號}｜${x.品名}｜${x.Tier等級}｜分配 ${x.本次分配數量}｜${x.分配狀態}`).join('\n');document.getElementById('摘要結果').value=`【共用素材鎖料模擬 v2.3.0】\n共用素材：${document.getElementById('共用素材編號').value}\n到貨數量：${document.getElementById('到貨數量').value}\n本次分配：${分配}\n剩餘未分配：${剩餘}\n已滿足：${滿足}\n部分滿足：${部分}\n未分配：${未}\n\n分配順序：\n${top}`}function 表格(rows){if(!rows.length)return '<p class="text-slate-300">尚無資料</p>';const hs=Object.keys(rows[0]);return `<table class="w-full text-sm"><thead><tr>${hs.map(h=>`<th class="text-left p-2 text-teal-200">${h}</th>`).join('')}</tr></thead><tbody>${rows.map(r=>`<tr class="border-t border-slate-700">${hs.map(h=>`<td class="p-2">${r[h]??''}</td>`).join('')}</tr>`).join('')}</tbody></table>`}async function 複製摘要(){const text=document.getElementById('摘要結果').value;if(!text.trim())return alert('尚未產生摘要');await navigator.clipboard.writeText(text);alert('已複製摘要')}document.getElementById('GAS網址').value=GAS();載入需求池();</script></body></html>
