<!doctype html><html lang="zh-Hant"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>正式資料缺漏匯總</title><script src="https://cdn.tailwindcss.com"></script><style>body{font-family:-apple-system,BlinkMacSystemFont,'Noto Sans TC','Segoe UI',sans-serif;background:#07111f;color:#ecfeff}.玻璃{background:rgba(15,23,42,.78);border:1px solid rgba(148,163,184,.22);backdrop-filter:blur(18px)}.卡{border-radius:22px;box-shadow:0 18px 45px rgba(0,0,0,.28)}.按鈕{border-radius:16px;padding:.75rem .9rem;font-weight:900}input,select,textarea{background:#0f172a!important;border:1px solid #334155!important;color:#fff!important;border-radius:14px!important;padding:.75rem!important;width:100%}th,td{white-space:nowrap}.高{color:#fca5a5}.中{color:#fde68a}.低{color:#86efac}.小字{font-size:.78rem;color:#94a3b8}</style></head><body><main class="max-w-7xl mx-auto p-4 pb-24"><section class="玻璃 卡 p-5 mb-4"><div class="flex flex-wrap justify-between items-center gap-3"><div><p class="text-teal-200 font-black text-sm">智慧製造中央作戰指揮中心 v2.4.0</p><h1 class="text-2xl md:text-4xl font-black">正式資料缺漏匯總頁</h1><p id="狀態文字" class="text-slate-300 mt-1">檢查正式上線必要工作表、欄位與資料列缺漏。</p></div><div class="flex gap-2"><a class="按鈕 bg-slate-700" href="./index.html">首頁</a><a class="按鈕 bg-amber-300 text-slate-950" href="./data.html">資料管理</a></div></div></section><section class="玻璃 卡 p-4 mb-4"><div class="grid md:grid-cols-[1fr_auto_auto] gap-2"><input id="GAS網址" placeholder="貼上 GAS Web App URL"><button class="按鈕 bg-teal-500 text-slate-950" onclick="儲存設定()">儲存</button><button class="按鈕 bg-cyan-300 text-slate-950" onclick="執行檢查()">執行缺漏檢查</button></div><div class="grid md:grid-cols-3 gap-2 mt-3"><select id="嚴重度篩選" onchange="渲染()"><option value="全部">全部嚴重度</option><option value="高">高</option><option value="中">中</option><option value="低">低</option></select><input id="搜尋字" placeholder="搜尋工作表 / 項目 / 建議" oninput="渲染()"><button class="按鈕 bg-amber-300 text-slate-950" onclick="複製報告()">複製報告</button></div></section><section class="grid grid-cols-2 md:grid-cols-4 gap-3 mb-4" id="統計區"></section><section class="玻璃 卡 p-4 mb-4"><h2 class="font-black text-xl mb-3">缺漏明細</h2><div id="結果區" class="overflow-auto"></div></section><section class="玻璃 卡 p-4"><h2 class="font-black text-xl mb-3">缺漏報告</h2><textarea id="報告" rows="12"></textarea></section></main><script>let 結果=[];function GAS(){return localStorage.getItem('GAS網址')||''}function 儲存設定(){localStorage.setItem('GAS網址',document.getElementById('GAS網址').value.trim());alert('已儲存')}async function 呼叫API(action,data={}){const url=GAS();if(!url)throw new Error('請先貼上 GAS Web App URL');const r=await fetch(url,{method:'POST',headers:{'Content-Type':'text/plain;charset=utf-8'},body:JSON.stringify({action,...data})});return r.json()}async function 執行檢查(){try{const r=await 呼叫API('取得_v2_4_正式資料缺漏匯總');if(!r.成功)throw new Error(r.訊息||'檢查失敗');結果=r.結果||[];document.getElementById('狀態文字').textContent=`缺漏檢查完成，共 ${結果.length} 項`;渲染()}catch(e){alert('請確認 GAS 已加入 v2_4 工具並重新部署。\n'+e.message)}}function 篩選(){const lv=document.getElementById('嚴重度篩選').value;const q=(document.getElementById('搜尋字').value||'').toLowerCase();return 結果.filter(x=>{if(lv!=='全部'&&x.嚴重度!==lv)return false;const t=`${x.類型||''} ${x.項目||''} ${x.狀態||''} ${x.建議||''}`.toLowerCase();return !q||t.includes(q)})}function 渲染(){const view=篩選();const 高=view.filter(x=>x.嚴重度==='高').length,中=view.filter(x=>x.嚴重度==='中').length,低=view.filter(x=>x.嚴重度==='低').length;document.getElementById('統計區').innerHTML=[['總缺漏',view.length],['高',高],['中',中],['低',低]].map(x=>`<div class="玻璃 卡 p-4"><p class="小字">${x[0]}</p><p class="text-3xl font-black">${x[1]}</p></div>`).join('');document.getElementById('結果區').innerHTML=表格(view);產生報告(view)}function 表格(rows){if(!rows.length)return '<p class="text-slate-300">目前無缺漏或尚未檢查</p>';const hs=Object.keys(rows[0]);return `<table class="w-full text-sm"><thead><tr>${hs.map(h=>`<th class="text-left p-2 text-teal-200">${h}</th>`).join('')}</tr></thead><tbody>${rows.map(r=>`<tr class="border-t border-slate-700">${hs.map(h=>`<td class="p-2 ${h==='嚴重度'?r[h]:''}">${r[h]??''}</td>`).join('')}</tr>`).join('')}</tbody></table>`}function 產生報告(rows){const lines=['【正式資料缺漏匯總報告 v2.4.0】','日期：'+new Date().toLocaleString('zh-TW'),''];if(!rows.length)lines.push('目前無缺漏或尚未檢查。');rows.forEach((x,i)=>lines.push(`${i+1}. ${x.類型}｜${x.項目}｜${x.狀態}｜嚴重度：${x.嚴重度}\n   建議：${x.建議}`));document.getElementById('報告').value=lines.join('\n')}async function 複製報告(){const t=document.getElementById('報告').value;if(!t.trim())return alert('尚未產生報告');await navigator.clipboard.writeText(t);alert('已複製報告')}document.getElementById('GAS網址').value=GAS();渲染();</script></body></html>
