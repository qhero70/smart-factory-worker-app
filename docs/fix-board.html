<!doctype html><html lang="zh-Hant"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>上線修補看板</title><script src="https://cdn.tailwindcss.com"></script><style>body{font-family:-apple-system,BlinkMacSystemFont,'Noto Sans TC','Segoe UI',sans-serif;background:#07111f;color:#ecfeff}.玻璃{background:rgba(15,23,42,.78);border:1px solid rgba(148,163,184,.22);backdrop-filter:blur(18px)}.卡{border-radius:22px;box-shadow:0 18px 45px rgba(0,0,0,.28)}.按鈕{border-radius:16px;padding:.75rem .9rem;font-weight:900}input,select,textarea{background:#0f172a!important;border:1px solid #334155!important;color:#fff!important;border-radius:14px!important;padding:.75rem!important;width:100%}th,td{white-space:nowrap}.小字{font-size:.78rem;color:#94a3b8}.高{color:#fca5a5}.中{color:#fde68a}.一般,.低{color:#86efac}.任務卡{border-radius:18px;border:1px solid rgba(148,163,184,.25);background:rgba(2,6,23,.72);padding:12px;margin-bottom:10px}</style></head><body><main class="max-w-7xl mx-auto p-4 pb-24"><section class="玻璃 卡 p-5 mb-4"><div class="flex flex-wrap justify-between items-center gap-3"><div><p class="text-teal-200 font-black text-sm">智慧製造中央作戰指揮中心 v3.3.0</p><h1 class="text-2xl md:text-4xl font-black">上線修補看板</h1><p id="狀態文字" class="text-slate-300 mt-1">追蹤錯誤、建立修補建議、正式建立 GitHub Issue、產生重測清單。</p></div><div class="flex gap-2"><a class="按鈕 bg-lime-200 text-slate-950" href="./system-test.html">全頁測試</a><a class="按鈕 bg-blue-200 text-slate-950" href="./fix-dashboard.html">完成率</a><a class="按鈕 bg-emerald-200 text-slate-950" href="./retest-board.html">重測</a><a class="按鈕 bg-slate-700" href="./index.html">首頁</a></div></div></section><section class="玻璃 卡 p-4 mb-4"><div class="grid md:grid-cols-[1fr_auto_auto_auto] gap-2"><input id="GAS網址" placeholder="貼上 GAS Web App URL"><button class="按鈕 bg-teal-500 text-slate-950" onclick="儲存設定()">儲存</button><button class="按鈕 bg-cyan-300 text-slate-950" onclick="載入總覽()">同步</button><button class="按鈕 bg-amber-300 text-slate-950" onclick="複製報告()">複製報告</button></div><div class="grid md:grid-cols-4 gap-2 mt-3"><input id="搜尋字" placeholder="搜尋錯誤 / 任務 / 類型" oninput="渲染()"><select id="狀態篩選" onchange="渲染()"><option value="全部">全部狀態</option><option>待處理</option><option>處理中</option><option>完成</option><option>暫停</option></select><select id="優先篩選" onchange="渲染()"><option value="全部">全部優先級</option><option>高</option><option>中</option><option>一般</option></select><select id="類型篩選" onchange="渲染()"><option value="全部">全部類型</option><option>GAS API</option><option>LINE Webhook</option><option>GitHub Pages</option><option>資料表欄位</option><option>一般修補</option></select></div></section><section class="grid grid-cols-2 md:grid-cols-8 gap-3 mb-4" id="統計區"></section><section class="grid lg:grid-cols-[1fr_1fr] gap-4"><div class="玻璃 卡 p-4"><h2 class="font-black text-xl mb-3">修補任務</h2><div id="任務區" class="max-h-[62vh] overflow-auto"></div></div><div class="space-y-4"><div class="玻璃 卡 p-4"><h2 class="font-black text-xl mb-3">錯誤回報</h2><div id="錯誤區" class="overflow-auto max-h-[22vh]"></div></div><div class="玻璃 卡 p-4"><h2 class="font-black text-xl mb-3">Issue / 建議 / 重測</h2><textarea id="報告" rows="18"></textarea></div></div></section></main><script>let 總覽={統計:{},錯誤回報:[],修補任務:[]};const 狀態清單=['待處理','處理中','完成','暫停'];function GAS(){return localStorage.getItem('GAS網址')||''}function 儲存設定(){localStorage.setItem('GAS網址',document.getElementById('GAS網址').value.trim());alert('已儲存')}async function 呼叫API(action,data={}){const url=GAS();if(!url)throw new Error('請先貼上 GAS Web App URL');const r=await fetch(url,{method:'POST',headers:{'Content-Type':'text/plain;charset=utf-8'},body:JSON.stringify({action,...data})});return r.json()}async function 載入總覽(){try{await 呼叫API('升級_v3_1_上線測試錯誤表');await 呼叫API('升級_v3_2_修補GitHub與重測表');const r=await 呼叫API('取得_v3_1_上線修補總覽');if(!r.成功)throw new Error(r.訊息||'讀取失敗');總覽=r;document.getElementById('狀態文字').textContent='修補總覽已同步';渲染()}catch(e){alert('請確認 GAS 已加入 v3_1 / v3_2 / v3_3 工具並重新部署。\n'+e.message)}}function 篩任務(){const q=(document.getElementById('搜尋字').value||'').toLowerCase();const st=document.getElementById('狀態篩選').value;const pr=document.getElementById('優先篩選').value;const ty=document.getElementById('類型篩選').value;return (總覽.修補任務||[]).filter(x=>{if(st!=='全部'&&x.修補狀態!==st)return false;if(pr!=='全部'&&x.優先級!==pr)return false;if(ty!=='全部'&&x.修補類型!==ty)return false;const t=`${x.修補編號||''} ${x.修補類型||''} ${x.問題摘要||''} ${x.建議處理||''} ${x.負責人||''}`.toLowerCase();return !q||t.includes(q)})}function 渲染(){const s=總覽.統計||{};document.getElementById('統計區').innerHTML=[['錯誤總數',s.錯誤總數],['高等級',s.高等級],['中等級',s.中等級],['低等級',s.低等級],['修補任務',s.修補任務總數],['待處理',s.待處理],['處理中',s.處理中],['完成',s.完成]].map(x=>`<div class="玻璃 卡 p-4"><p class="小字">${x[0]}</p><p class="text-2xl font-black">${x[1]||0}</p></div>`).join('');const tasks=篩任務();document.getElementById('任務區').innerHTML=tasks.map(任務卡).join('')||'<p class="text-slate-300">目前無修補任務</p>';document.getElementById('錯誤區').innerHTML=表格((總覽.錯誤回報||[]).slice(0,30));產生報告(tasks)}function 任務卡(x){return `<div class="任務卡"><div class="flex justify-between gap-2"><b>${x.修補編號||''}</b><span class="${x.優先級||''}">${x.優先級||''}</span></div><p class="font-bold mt-1">${x.修補類型||''}｜${x.修補狀態||''}</p><p class="小字">來源錯誤：${x.來源錯誤編號||''}</p><p class="小字">問題：${x.問題摘要||''}</p><p class="小字">建議：${x.建議處理||''}</p><p class="小字">負責人：${x.負責人||'未指派'}</p><div class="grid grid-cols-2 md:grid-cols-4 gap-2 mt-3">${狀態清單.map(s=>`<button class="按鈕 bg-slate-700 text-xs" onclick="更新任務('${x.修補編號}','${s}')">${s}</button>`).join('')}</div><div class="grid grid-cols-2 md:grid-cols-5 gap-2 mt-2"><button class="按鈕 bg-cyan-300 text-slate-950 text-xs" onclick="產生建議('${x.修補編號}')">修補建議</button><button class="按鈕 bg-indigo-300 text-slate-950 text-xs" onclick="Issue草稿('${x.修補編號}')">Issue草稿</button><button class="按鈕 bg-purple-300 text-slate-950 text-xs" onclick="正式Issue('${x.修補編號}')">正式Issue</button><button class="按鈕 bg-emerald-300 text-slate-950 text-xs" onclick="建立重測('${x.修補編號}')">建立重測</button><button class="按鈕 bg-orange-300 text-slate-950 text-xs" onclick="登記Commit('${x.修補編號}')">登記Commit</button></div></div>`}async function 更新任務(id,st){const note=prompt('處理紀錄，可留空','');const owner=prompt('負責人，可留空','');try{const r=await 呼叫API('更新_v3_1_修補任務狀態',{修補編號:id,新狀態:st,處理紀錄:note||'',負責人:owner||''});if(!r.成功)throw new Error(r.訊息);await 載入總覽()}catch(e){alert(e.message)}}async function 產生建議(id){try{const r=await 呼叫API('產生_v3_2_修補建議',{修補編號:id});document.getElementById('報告').value=JSON.stringify(r,null,2)}catch(e){alert(e.message)}}async function Issue草稿(id){try{const r=await 呼叫API('建立_v3_2_GitHubIssue草稿',{修補編號:id});document.getElementById('報告').value=JSON.stringify(r,null,2)}catch(e){alert(e.message)}}async function 正式Issue(id){if(!confirm('確定要正式建立 GitHub Issue？若未設定 GITHUB_TOKEN，系統會回傳草稿。'))return;try{const r=await 呼叫API('正式建立_v3_3_GitHubIssue',{修補編號:id});document.getElementById('報告').value=JSON.stringify(r,null,2)}catch(e){alert(e.message)}}async function 建立重測(id){try{const r=await 呼叫API('建立_v3_2_修補完成重測清單',{修補編號:id});document.getElementById('報告').value=JSON.stringify(r,null,2)}catch(e){alert(e.message)}}async function 登記Commit(id){const sha=prompt('請貼上 Commit SHA','');if(!sha)return;const note=prompt('備註，可留空','');try{const r=await 呼叫API('登記_v3_2_修補Commit',{修補編號:id,CommitSHA:sha,備註:note||''});document.getElementById('報告').value=JSON.stringify(r,null,2)}catch(e){alert(e.message)}}function 表格(rows){if(!rows.length)return '<p class="text-slate-300">尚無錯誤回報</p>';const hs=['錯誤編號','測試類型','測試項目','錯誤等級','錯誤狀態','錯誤訊息'];return `<table class="w-full text-sm"><thead><tr>${hs.map(h=>`<th class="text-left p-2 text-teal-200">${h}</th>`).join('')}</tr></thead><tbody>${rows.map(r=>`<tr class="border-t border-slate-700">${hs.map(h=>`<td class="p-2 ${r[h]||''}">${r[h]??''}</td>`).join('')}</tr>`).join('')}</tbody></table>`}async function 產生報告(tasks){try{const r=await 呼叫API('產生_v3_1_上線修補報告');document.getElementById('報告').value=typeof r==='string'?r:(r.文字||JSON.stringify(r,null,2))}catch(e){const top=tasks.filter(x=>x.修補狀態!=='完成').slice(0,10).map((x,i)=>`${i+1}. ${x.優先級}｜${x.修補類型}｜${x.修補狀態}｜${x.問題摘要}`).join('\n');document.getElementById('報告').value=`【v3.3.0 上線修補報告】\n未完成修補任務：\n${top||'無'}`}}async function 複製報告(){const t=document.getElementById('報告').value;if(!t.trim())return alert('尚未產生報告');await navigator.clipboard.writeText(t);alert('已複製報告')}document.getElementById('GAS網址').value=GAS();載入總覽();</script></body></html>
