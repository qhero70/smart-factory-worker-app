<!doctype html><html lang="zh-Hant"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>系統全頁連線測試</title><script src="https://cdn.tailwindcss.com"></script><style>body{font-family:-apple-system,BlinkMacSystemFont,'Noto Sans TC','Segoe UI',sans-serif;background:#07111f;color:#ecfeff}.玻璃{background:rgba(15,23,42,.78);border:1px solid rgba(148,163,184,.22);backdrop-filter:blur(18px)}.卡{border-radius:22px;box-shadow:0 18px 45px rgba(0,0,0,.28)}.按鈕{border-radius:16px;padding:.75rem .9rem;font-weight:900}input,textarea{background:#0f172a!important;border:1px solid #334155!important;color:#fff!important;border-radius:14px!important;padding:.75rem!important;width:100%}th,td{white-space:nowrap}.通過{color:#86efac}.失敗{color:#fca5a5}.待測{color:#fde68a}.小字{font-size:.78rem;color:#94a3b8}</style></head><body><main class="max-w-7xl mx-auto p-4 pb-24"><section class="玻璃 卡 p-5 mb-4"><div class="flex flex-wrap justify-between items-center gap-3"><div><p class="text-teal-200 font-black text-sm">智慧製造中央作戰指揮中心 v3.0.0</p><h1 class="text-2xl md:text-4xl font-black">系統全頁連線測試</h1><p id="狀態文字" class="text-slate-300 mt-1">測試 GitHub Pages 入口、GAS 健康檢查、核心 API 與上線總檢查。</p></div><div class="flex gap-2"><a class="按鈕 bg-slate-700" href="./index.html">首頁</a><a class="按鈕 bg-red-300 text-slate-950" href="./go-live.html">上線檢查</a></div></div></section><section class="玻璃 卡 p-4 mb-4"><div class="grid md:grid-cols-[1fr_auto_auto_auto] gap-2"><input id="GAS網址" placeholder="貼上 GAS Web App URL"><button class="按鈕 bg-teal-500 text-slate-950" onclick="儲存設定()">儲存</button><button class="按鈕 bg-cyan-300 text-slate-950" onclick="執行全部測試()">執行全部測試</button><button class="按鈕 bg-amber-300 text-slate-950" onclick="複製報告()">複製報告</button></div></section><section class="grid grid-cols-2 md:grid-cols-4 gap-3 mb-4" id="統計區"></section><section class="玻璃 卡 p-4 mb-4"><h2 class="font-black text-xl mb-3">測試結果</h2><div id="結果區" class="overflow-auto"></div></section><section class="玻璃 卡 p-4"><h2 class="font-black text-xl mb-3">測試報告</h2><textarea id="報告" rows="12"></textarea></section></main><script>const 頁面=['index.html','app.html','data.html','plan.html','schedule.html','ctb.html','material-lock.html','material-arrival.html','material-master.html','lock-history.html','task-board.html','task-dashboard.html','task-performance.html','task-auto-push.html','data-gap.html','repair.html','meeting.html','go-live.html','system-test.html'];const API=['健康檢查','系統總檢查_v3_0','取得KPI戰情','取得AI摘要','取得_v2_7_任務統計儀表板資料','取得_v2_8_任務負責人績效統計','取得_v2_9_任務週月完成率統計'];let 結果=[];function GAS(){return localStorage.getItem('GAS網址')||''}function 儲存設定(){localStorage.setItem('GAS網址',document.getElementById('GAS網址').value.trim());alert('已儲存')}async function 呼叫API(action,data={}){const url=GAS();if(!url)throw new Error('請先貼上 GAS Web App URL');const r=await fetch(url,{method:'POST',headers:{'Content-Type':'text/plain;charset=utf-8'},body:JSON.stringify({action,...data})});return r.json()}async function 測頁面(p){try{const r=await fetch('./'+p,{method:'GET',cache:'no-store'});return {類型:'頁面',項目:p,狀態:r.ok?'通過':'失敗',說明:r.status+' '+r.statusText}}catch(e){return {類型:'頁面',項目:p,狀態:'失敗',說明:e.message}}}async function 測API(a){try{const r=await 呼叫API(a);return {類型:'API',項目:a,狀態:r&&r.成功!==false?'通過':'失敗',說明:JSON.stringify(r).slice(0,220)}}catch(e){return {類型:'API',項目:a,狀態:'失敗',說明:e.message}}}async function 執行全部測試(){結果=[];document.getElementById('狀態文字').textContent='測試中...';for(const p of 頁面){結果.push(await 測頁面(p));渲染()}for(const a of API){結果.push(await 測API(a));渲染()}document.getElementById('狀態文字').textContent='測試完成'}function 渲染(){const ok=結果.filter(x=>x.狀態==='通過').length;const bad=結果.filter(x=>x.狀態==='失敗').length;document.getElementById('統計區').innerHTML=[['總項目',結果.length],['通過',ok],['失敗',bad],['完成率',結果.length?Math.round(ok/結果.length*100)+'%':'0%']].map(x=>`<div class="玻璃 卡 p-4"><p class="小字">${x[0]}</p><p class="text-2xl font-black">${x[1]}</p></div>`).join('');document.getElementById('結果區').innerHTML=表格(結果);產生報告()}function 表格(rows){if(!rows.length)return '<p class="text-slate-300">尚未測試</p>';const hs=['類型','項目','狀態','說明'];return `<table class="w-full text-sm"><thead><tr>${hs.map(h=>`<th class="text-left p-2 text-teal-200">${h}</th>`).join('')}</tr></thead><tbody>${rows.map(r=>`<tr class="border-t border-slate-700">${hs.map(h=>`<td class="p-2 ${r[h]||''}">${r[h]??''}</td>`).join('')}</tr>`).join('')}</tbody></table>`}function 產生報告(){const lines=['【v3.0.0 系統全頁連線測試報告】','時間：'+new Date().toLocaleString('zh-TW'),'GAS：'+GAS(),''];結果.forEach((x,i)=>lines.push(`${i+1}. [${x.狀態}] ${x.類型}｜${x.項目}｜${x.說明}`));document.getElementById('報告').value=lines.join('\n')}async function 複製報告(){const t=document.getElementById('報告').value;if(!t.trim())return alert('尚未產生報告');await navigator.clipboard.writeText(t);alert('已複製報告')}document.getElementById('GAS網址').value=GAS();渲染();</script></body></html>
