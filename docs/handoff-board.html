<!doctype html><html lang="zh-Hant"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>正式上線交接頁</title><script src="https://cdn.tailwindcss.com"></script><style>body{font-family:-apple-system,BlinkMacSystemFont,'Noto Sans TC','Segoe UI',sans-serif;background:#07111f;color:#ecfeff}.玻璃{background:rgba(15,23,42,.78);border:1px solid rgba(148,163,184,.22);backdrop-filter:blur(18px)}.卡{border-radius:22px;box-shadow:0 18px 45px rgba(0,0,0,.28)}.按鈕{border-radius:16px;padding:.75rem .9rem;font-weight:900}input,textarea,select{background:#0f172a!important;border:1px solid #334155!important;color:#fff!important;border-radius:14px!important;padding:.75rem!important;width:100%}th,td{white-space:nowrap}.小字{font-size:.78rem;color:#94a3b8}.完成{color:#86efac}.待確認{color:#fde68a}.異常{color:#fca5a5}</style></head><body><main class="max-w-7xl mx-auto p-4 pb-24"><section class="玻璃 卡 p-5 mb-4"><div class="flex flex-wrap justify-between items-center gap-3"><div><p class="text-teal-200 font-black text-sm">智慧製造中央作戰指揮中心 v3.5.0</p><h1 class="text-2xl md:text-4xl font-black">正式上線交接頁</h1><p id="狀態文字" class="text-slate-300 mt-1">產生部署手冊、匯出 PDF、鎖定版本、建立交接清單。</p></div><div class="flex gap-2"><a class="按鈕 bg-amber-200 text-slate-950" href="./release-board.html">封版報告</a><a class="按鈕 bg-lime-200 text-slate-950" href="./system-test.html">全頁測試</a><a class="按鈕 bg-slate-700" href="./index.html">首頁</a></div></div></section><section class="玻璃 卡 p-4 mb-4"><div class="grid md:grid-cols-[1fr_auto_auto] gap-2"><input id="GAS網址" placeholder="貼上 GAS Web App URL"><button class="按鈕 bg-teal-500 text-slate-950" onclick="儲存設定()">儲存</button><button class="按鈕 bg-cyan-300 text-slate-950" onclick="載入總覽()">同步</button></div><div class="grid md:grid-cols-4 gap-2 mt-3"><button class="按鈕 bg-lime-300 text-slate-950" onclick="產生手冊()">產生部署手冊</button><button class="按鈕 bg-orange-300 text-slate-950" onclick="匯出手冊PDF()">匯出手冊PDF</button><button class="按鈕 bg-red-300 text-slate-950" onclick="匯出封版PDF()">匯出封版PDF</button><button class="按鈕 bg-purple-300 text-slate-950" onclick="鎖定版本()">鎖定版本</button></div><div class="grid md:grid-cols-3 gap-2 mt-3"><button class="按鈕 bg-blue-300 text-slate-950" onclick="建立交接清單()">建立交接清單</button><button class="按鈕 bg-emerald-300 text-slate-950" onclick="全部完成()">顯示交接清單</button><button class="按鈕 bg-amber-300 text-slate-950" onclick="複製報告()">複製報告</button></div></section><section class="grid grid-cols-2 md:grid-cols-5 gap-3 mb-4" id="統計區"></section><section class="grid lg:grid-cols-2 gap-4 mb-4"><div class="玻璃 卡 p-4"><h2 class="font-black text-xl mb-3">交接清單</h2><div id="交接區" class="overflow-auto max-h-[44vh]"></div></div><div class="玻璃 卡 p-4"><h2 class="font-black text-xl mb-3">部署手冊 / 版本鎖定</h2><div id="紀錄區" class="overflow-auto max-h-[44vh]"></div></div></section><section class="玻璃 卡 p-4"><h2 class="font-black text-xl mb-3">報告 / 執行結果</h2><textarea id="報告" rows="16"></textarea></section></main><script>let 資料={統計:{},部署手冊:[],版本鎖定:[],交接清單:[]};function GAS(){return localStorage.getItem('GAS網址')||''}function 儲存設定(){localStorage.setItem('GAS網址',document.getElementById('GAS網址').value.trim());alert('已儲存')}async function 呼叫API(action,data={}){const url=GAS();if(!url)throw new Error('請先貼上 GAS Web App URL');const r=await fetch(url,{method:'POST',headers:{'Content-Type':'text/plain;charset=utf-8'},body:JSON.stringify({action,...data})});return r.json()}async function 載入總覽(){try{await 呼叫API('升級_v3_5_正式部署交接表');const r=await 呼叫API('取得_v3_5_正式交接總覽');if(!r.成功)throw new Error(r.訊息||'讀取失敗');資料=r;document.getElementById('狀態文字').textContent='正式交接總覽已同步';渲染()}catch(e){alert('請確認 GAS 已加入 v3_5 工具並重新部署。\n'+e.message)}}function 渲染(){const s=資料.統計||{};document.getElementById('統計區').innerHTML=[['手冊數',s.手冊數],['鎖定狀態',s.目前鎖定],['交接項目',s.交接項目數],['交接完成',s.交接完成數],['完成率',(s.交接完成率||0)+'%']].map(x=>`<div class="玻璃 卡 p-4"><p class="小字">${x[0]}</p><p class="text-2xl font-black">${x[1]||0}</p></div>`).join('');document.getElementById('交接區').innerHTML=交接表(資料.交接清單||[]);document.getElementById('紀錄區').innerHTML='<h3 class="font-black text-teal-200 mb-2">部署手冊</h3>'+表格(資料.部署手冊||[],['手冊編號','建立時間','系統版本','手冊狀態','PDF連結'])+'<h3 class="font-black text-teal-200 my-2">版本鎖定</h3>'+表格(資料.版本鎖定||[],['鎖定編號','鎖定時間','系統版本','鎖定狀態','封版狀態'])}function 表格(rows,hs){if(!rows.length)return '<p class="text-slate-300">尚無資料</p>';return `<table class="w-full text-sm"><thead><tr>${hs.map(h=>`<th class="text-left p-2 text-teal-200">${h}</th>`).join('')}</tr></thead><tbody>${rows.map(r=>`<tr class="border-t border-slate-700">${hs.map(h=>`<td class="p-2 ${r[h]||''}">${h==='PDF連結'&&r[h]?`<a class="text-cyan-300 underline" href="${r[h]}" target="_blank">開啟PDF</a>`:(r[h]??'')}</td>`).join('')}</tr>`).join('')}</tbody></table>`}function 交接表(rows){if(!rows.length)return '<p class="text-slate-300">尚未建立交接清單</p>';const hs=['交接編號','交接類別','交接項目','交接狀態','負責人','驗收標準'];return `<table class="w-full text-sm"><thead><tr>${hs.map(h=>`<th class="text-left p-2 text-teal-200">${h}</th>`).join('')}<th class="text-left p-2 text-teal-200">操作</th></tr></thead><tbody>${rows.map(r=>`<tr class="border-t border-slate-700">${hs.map(h=>`<td class="p-2 ${r[h]||''}">${r[h]??''}</td>`).join('')}<td class="p-2"><button class="按鈕 bg-emerald-300 text-slate-950 text-xs" onclick="更新交接('${r.交接編號}','完成')">完成</button> <button class="按鈕 bg-red-300 text-slate-950 text-xs" onclick="更新交接('${r.交接編號}','異常')">異常</button></td></tr>`).join('')}</tbody></table>`}async function 產生手冊(){try{const r=await 呼叫API('產生_v3_5_正式部署手冊');document.getElementById('報告').value=r.手冊||JSON.stringify(r,null,2);await 載入總覽()}catch(e){alert(e.message)}}async function 匯出手冊PDF(){try{const r=await 呼叫API('匯出_v3_5_正式部署手冊PDF');document.getElementById('報告').value=JSON.stringify(r,null,2);await 載入總覽()}catch(e){alert(e.message)}}async function 匯出封版PDF(){try{const r=await 呼叫API('匯出_v3_5_封版報告PDF');document.getElementById('報告').value=JSON.stringify(r,null,2)}catch(e){alert(e.message)}}async function 鎖定版本(){const name=prompt('鎖定人，可留空','');const sha=prompt('GitHub Commit SHA，可留空','');if(!confirm('確定要鎖定封版版本？鎖定後會留下正式紀錄。'))return;try{const r=await 呼叫API('鎖定_v3_5_封版版本',{資料:{鎖定人:name||'',GitHubCommitSHA:sha||'',鎖定原因:'正式上線封版鎖定'}});document.getElementById('報告').value=JSON.stringify(r,null,2);await 載入總覽()}catch(e){alert(e.message)}}async function 建立交接清單(){try{const r=await 呼叫API('建立_v3_5_正式上線交接清單');document.getElementById('報告').value=JSON.stringify(r,null,2);await 載入總覽()}catch(e){alert(e.message)}}async function 更新交接(id,st){const owner=prompt('負責人，可留空','');const note=prompt('處理紀錄，可留空','');try{const r=await 呼叫API('更新_v3_5_交接清單狀態',{交接編號:id,交接狀態:st,負責人:owner||'',處理紀錄:note||'',備註:''});if(!r.成功)throw new Error(r.訊息);await 載入總覽()}catch(e){alert(e.message)}}function 全部完成(){document.getElementById('報告').value=JSON.stringify(資料.交接清單||[],null,2)}async function 複製報告(){const t=document.getElementById('報告').value;if(!t.trim())return alert('尚未產生報告');await navigator.clipboard.writeText(t);alert('已複製')}document.getElementById('GAS網址').value=GAS();載入總覽();</script></body></html>
