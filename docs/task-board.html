<!doctype html><html lang="zh-Hant"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>三方待辦任務看板</title><script src="https://cdn.tailwindcss.com"></script><style>body{font-family:-apple-system,BlinkMacSystemFont,'Noto Sans TC','Segoe UI',sans-serif;background:#07111f;color:#ecfeff}.玻璃{background:rgba(15,23,42,.78);border:1px solid rgba(148,163,184,.22);backdrop-filter:blur(18px)}.卡{border-radius:22px;box-shadow:0 18px 45px rgba(0,0,0,.28)}.按鈕{border-radius:16px;padding:.75rem .9rem;font-weight:900}input,select,textarea{background:#0f172a!important;border:1px solid #334155!important;color:#fff!important;border-radius:14px!important;padding:.75rem!important;width:100%}.任務卡{border-radius:18px;border:1px solid rgba(148,163,184,.25);background:rgba(2,6,23,.72);padding:12px;margin-bottom:10px}.高{border-color:#f87171;background:rgba(127,29,29,.28)}.中{border-color:#facc15;background:rgba(113,63,18,.24)}.一般{border-color:#38bdf8;background:rgba(12,74,110,.18)}.小字{font-size:.78rem;color:#94a3b8}.紅{color:#fca5a5}.黃{color:#fde68a}.綠{color:#86efac}</style></head><body><main class="max-w-7xl mx-auto p-4 pb-24"><section class="玻璃 卡 p-5 mb-4"><div class="flex flex-wrap justify-between items-center gap-3"><div><p class="text-teal-200 font-black text-sm">智慧製造中央作戰指揮中心 v2.6.0</p><h1 class="text-2xl md:text-4xl font-black">生管 / 採購 / 製造 三方待辦看板</h1><p id="狀態文字" class="text-slate-300 mt-1">低庫存自動建任務，依負責單位分欄追蹤。</p></div><div class="flex gap-2"><a class="按鈕 bg-emerald-300 text-slate-950" href="./material-master.html">素材主檔</a><a class="按鈕 bg-slate-700" href="./index.html">首頁</a></div></div></section><section class="玻璃 卡 p-4 mb-4"><div class="grid md:grid-cols-[1fr_auto_auto_auto] gap-2"><input id="GAS網址" placeholder="貼上 GAS Web App URL"><button class="按鈕 bg-teal-500 text-slate-950" onclick="儲存設定()">儲存</button><button class="按鈕 bg-cyan-300 text-slate-950" onclick="載入任務()">同步</button><button class="按鈕 bg-amber-300 text-slate-950" onclick="掃描低庫存()">掃描低庫存建任務</button></div><div class="grid md:grid-cols-4 gap-2 mt-3"><input id="搜尋字" placeholder="搜尋任務 / 素材 / 建議 / 負責人" oninput="渲染()"><select id="狀態篩選" onchange="渲染()"><option value="全部">全部狀態</option><option>待處理</option><option>處理中</option><option>完成</option><option>暫停</option></select><select id="優先篩選" onchange="渲染()"><option value="全部">全部優先級</option><option>高</option><option>中</option><option>一般</option></select><button class="按鈕 bg-lime-300 text-slate-950" onclick="複製摘要()">複製摘要</button></div></section><section class="grid grid-cols-2 md:grid-cols-5 gap-3 mb-4" id="統計區"></section><section class="grid lg:grid-cols-3 gap-4" id="看板區"></section><section class="玻璃 卡 p-4 mt-4"><h2 class="font-black text-xl mb-3">任務摘要</h2><textarea id="摘要" rows="10"></textarea></section></main><script>const 單位=['生管','採購','製造'];const 狀態清單=['待處理','處理中','完成','暫停'];let 任務=[];function GAS(){return localStorage.getItem('GAS網址')||''}function 儲存設定(){localStorage.setItem('GAS網址',document.getElementById('GAS網址').value.trim());alert('已儲存')}async function 呼叫API(action,data={}){const url=GAS();if(!url)throw new Error('請先貼上 GAS Web App URL');const r=await fetch(url,{method:'POST',headers:{'Content-Type':'text/plain;charset=utf-8'},body:JSON.stringify({action,...data})});return r.json()}async function 載入任務(){try{const r=await 呼叫API('取得主檔管理資料',{工作表名稱:'10_跨部門待辦任務'});if(!r.成功)throw new Error(r.訊息);任務=(r.資料||[]).reverse();document.getElementById('狀態文字').textContent=`已載入 ${任務.length} 筆任務`;渲染()}catch(e){document.getElementById('狀態文字').textContent='若尚未建立，請先執行升級_v2_6_跨部門待辦任務表()。'+e.message}}async function 掃描低庫存(){try{const r=await 呼叫API('掃描_v2_6_低庫存自動建立任務');alert(r.訊息+'，新增 '+(r.建立數||0)+' 筆');await 載入任務()}catch(e){alert('請確認 GAS 已加入 v2_6 工具並重新部署。\n'+e.message)}}function 篩選(){const q=(document.getElementById('搜尋字').value||'').toLowerCase();const st=document.getElementById('狀態篩選').value;const pr=document.getElementById('優先篩選').value;return 任務.filter(x=>{if(st!=='全部'&&x.任務狀態!==st)return false;if(pr!=='全部'&&x.優先級!==pr)return false;const t=`${x.任務編號||''} ${x.共用素材編號||''} ${x.共用素材名稱||''} ${x.建議動作||''} ${x.負責人||''}`.toLowerCase();return !q||t.includes(q)})}function 渲染(){const view=篩選();const wait=view.filter(x=>x.任務狀態==='待處理').length;const doing=view.filter(x=>x.任務狀態==='處理中').length;const done=view.filter(x=>x.任務狀態==='完成').length;const high=view.filter(x=>x.優先級==='高').length;document.getElementById('統計區').innerHTML=[['顯示任務',view.length],['待處理',wait],['處理中',doing],['完成',done],['高優先',high]].map(x=>`<div class="玻璃 卡 p-4"><p class="小字">${x[0]}</p><p class="text-2xl font-black">${x[1]}</p></div>`).join('');document.getElementById('看板區').innerHTML=單位.map(u=>`<div class="玻璃 卡 p-3 min-h-[320px]"><h2 class="font-black text-xl mb-3">${u}</h2>${view.filter(x=>(x.負責單位||'採購')===u).map(任務卡).join('')||'<p class="text-slate-400 text-sm">目前無任務</p>'}</div>`).join('');產生摘要(view)}function 任務卡(x){const cls=x.優先級==='高'?'高':x.優先級==='中'?'中':'一般';return `<div class="任務卡 ${cls}"><div class="flex justify-between gap-2"><b>${x.任務編號||''}</b><span class="小字">${x.優先級||''}</span></div><p class="font-bold mt-1">${x.任務類型||''}｜${x.任務狀態||''}</p><p class="小字">素材：${x.共用素材編號||''} ${x.共用素材名稱||''}</p><p class="小字">庫存：${x.目前庫存||0}｜安全：${x.安全庫存||0}｜缺口：${x.缺口數量||0}</p><p class="小字">最近交期：${x.最近需求交期||''}｜最晚採購：${x.最晚採購日||''}</p><p class="小字">建議：${x.建議動作||''}</p><div class="grid grid-cols-2 gap-2 mt-3">${狀態清單.map(s=>`<button class="按鈕 bg-slate-700 text-xs" onclick="更新任務('${x.任務編號}','${s}')">${s}</button>`).join('')}</div></div>`}async function 更新任務(id,st){const note=prompt('處理紀錄，可留空','');const owner=prompt('負責人，可留空','');try{const r=await 呼叫API('更新_v2_6_待辦任務狀態',{任務編號:id,新狀態:st,處理紀錄:note||'',負責人:owner||''});if(!r.成功)throw new Error(r.訊息);await 載入任務()}catch(e){alert(e.message)}}function 產生摘要(view){const top=view.filter(x=>x.任務狀態!=='完成').slice(0,8).map((x,i)=>`${i+1}. ${x.負責單位}｜${x.優先級}｜${x.共用素材編號}｜${x.任務狀態}｜${x.最晚採購日||''}`).join('\n')||'目前無未完成任務';document.getElementById('摘要').value=`【三方待辦任務摘要 v2.6.0】\n任務數：${view.length}\n待處理：${view.filter(x=>x.任務狀態==='待處理').length}\n處理中：${view.filter(x=>x.任務狀態==='處理中').length}\n高優先：${view.filter(x=>x.優先級==='高').length}\n\n未完成重點：\n${top}`}async function 複製摘要(){const t=document.getElementById('摘要').value;if(!t.trim())return alert('尚未產生摘要');await navigator.clipboard.writeText(t);alert('已複製摘要')}document.getElementById('GAS網址').value=GAS();載入任務();</script></body></html>
