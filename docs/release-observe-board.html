<!doctype html><html lang="zh-Hant"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>Release 與7日觀察</title><script src="https://cdn.tailwindcss.com"></script><style>body{font-family:-apple-system,BlinkMacSystemFont,'Noto Sans TC','Segoe UI',sans-serif;background:#07111f;color:#ecfeff}.玻璃{background:rgba(15,23,42,.78);border:1px solid rgba(148,163,184,.22);backdrop-filter:blur(18px)}.卡{border-radius:22px;box-shadow:0 18px 45px rgba(0,0,0,.28)}.按鈕{border-radius:16px;padding:.75rem .9rem;font-weight:900}input,textarea{background:#0f172a!important;border:1px solid #334155!important;color:#fff!important;border-radius:14px!important;padding:.75rem!important;width:100%}th,td{white-space:nowrap}.小字{font-size:.78rem;color:#94a3b8}.已建立,.正常{color:#86efac}.建立失敗,.異常{color:#fca5a5}.草稿{color:#fde68a}</style></head><body><main class="max-w-7xl mx-auto p-4 pb-24"><section class="玻璃 卡 p-5 mb-4"><div class="flex flex-wrap justify-between items-center gap-3"><div><p class="text-teal-200 font-black text-sm">智慧製造中央作戰指揮中心 v3.7.0</p><h1 class="text-2xl md:text-4xl font-black">Release 與 7 日觀察</h1><p id="狀態文字" class="text-slate-300 mt-1">GitHub Release Tag、正式總包對照、部署後 7 日觀察報告、健康異常自動修補。</p></div><div class="flex gap-2"><a class="按鈕 bg-cyan-200 text-slate-950" href="./delivery-board.html">正式交付</a><a class="按鈕 bg-lime-200 text-slate-950" href="./system-test.html">全頁測試</a><a class="按鈕 bg-slate-700" href="./index.html">首頁</a></div></div></section><section class="玻璃 卡 p-4 mb-4"><div class="grid md:grid-cols-[1fr_auto_auto] gap-2"><input id="GAS網址" placeholder="貼上 GAS Web App URL"><button class="按鈕 bg-teal-500 text-slate-950" onclick="儲存設定()">儲存</button><button class="按鈕 bg-cyan-300 text-slate-950" onclick="載入總覽()">同步</button></div><div class="grid md:grid-cols-3 gap-2 mt-3"><input id="Tag名稱" placeholder="Tag 名稱，例如 v3.7.0" value="v3.7.0"><input id="Release名稱" placeholder="Release 名稱，可留空"><input id="目標CommitSHA" placeholder="目標 Commit SHA，可留空"></div><div class="grid md:grid-cols-4 gap-2 mt-3"><button class="按鈕 bg-purple-300 text-slate-950" onclick="建立Release()">建立Release</button><button class="按鈕 bg-amber-300 text-slate-950" onclick="觀察報告()">7日觀察報告</button><button class="按鈕 bg-red-300 text-slate-950" onclick="健康異常修補()">健康異常開修補</button><button class="按鈕 bg-emerald-300 text-slate-950" onclick="複製報告()">複製報告</button></div></section><section class="grid grid-cols-3 gap-3 mb-4" id="統計區"></section><section class="grid lg:grid-cols-3 gap-4 mb-4"><div class="玻璃 卡 p-4"><h2 class="font-black text-xl mb-3">Release 對照</h2><div id="Release區" class="overflow-auto max-h-[42vh]"></div></div><div class="玻璃 卡 p-4"><h2 class="font-black text-xl mb-3">7 日觀察報告</h2><div id="觀察區" class="overflow-auto max-h-[42vh]"></div></div><div class="玻璃 卡 p-4"><h2 class="font-black text-xl mb-3">健康異常修補</h2><div id="異常區" class="overflow-auto max-h-[42vh]"></div></div></section><section class="玻璃 卡 p-4"><h2 class="font-black text-xl mb-3">報告 / 執行結果</h2><textarea id="報告" rows="16"></textarea></section></main><script>let 資料={統計:{},Release對照:[],觀察報告:[],健康異常修補:[]};function GAS(){return localStorage.getItem('GAS網址')||''}function 儲存設定(){localStorage.setItem('GAS網址',document.getElementById('GAS網址').value.trim());alert('已儲存')}async function 呼叫API(action,data={}){const url=GAS();if(!url)throw new Error('請先貼上 GAS Web App URL');const r=await fetch(url,{method:'POST',headers:{'Content-Type':'text/plain;charset=utf-8'},body:JSON.stringify({action,...data})});return r.json()}async function 載入總覽(){try{await 呼叫API('升級_v3_7_Release觀察與異常修補表');const r=await 呼叫API('取得_v3_7_Release觀察總覽');if(!r.成功)throw new Error(r.訊息||'讀取失敗');資料=r;document.getElementById('狀態文字').textContent='Release 與觀察資料已同步';渲染()}catch(e){alert('請確認 GAS 已加入 v3_7 工具並重新部署。\n'+e.message)}}function 渲染(){const s=資料.統計||{};document.getElementById('統計區').innerHTML=[['Release數',s.Release數],['觀察報告',s.觀察報告數],['異常修補',s.健康異常修補數]].map(x=>`<div class="玻璃 卡 p-4"><p class="小字">${x[0]}</p><p class="text-2xl font-black">${x[1]||0}</p></div>`).join('');document.getElementById('Release區').innerHTML=表格(資料.Release對照||[],['Release編號','系統版本','Tag名稱','Release狀態','Release網址','正式總包檔案']);document.getElementById('觀察區').innerHTML=表格(資料.觀察報告||[],['觀察編號','觀察起日','觀察迄日','異常次數','未完成修補數','觀察結論']);document.getElementById('異常區').innerHTML=表格(資料.健康異常修補||[],['異常編號','來源健康紀錄編號','健康狀態','錯誤編號','修補編號','處理狀態'])}function 表格(rows,hs){if(!rows.length)return '<p class="text-slate-300">尚無資料</p>';return `<table class="w-full text-sm"><thead><tr>${hs.map(h=>`<th class="text-left p-2 text-teal-200">${h}</th>`).join('')}</tr></thead><tbody>${rows.map(r=>`<tr class="border-t border-slate-700">${hs.map(h=>`<td class="p-2 ${r[h]||''}">${h==='Release網址'&&r[h]?`<a class="text-cyan-300 underline" href="${r[h]}" target="_blank">開啟</a>`:(r[h]??'')}</td>`).join('')}</tr>`).join('')}</tbody></table>`}async function 建立Release(){try{const r=await 呼叫API('建立_v3_7_GitHubReleaseTag',{資料:{Tag名稱:document.getElementById('Tag名稱').value.trim()||'v3.7.0',Release名稱:document.getElementById('Release名稱').value.trim(),目標CommitSHA:document.getElementById('目標CommitSHA').value.trim()}});document.getElementById('報告').value=JSON.stringify(r,null,2);await 載入總覽()}catch(e){alert(e.message)}}async function 觀察報告(){await 執行('產生_v3_7_部署後7日觀察報告')}async function 健康異常修補(){await 執行('掃描_v3_7_健康異常自動建立修補任務')}async function 執行(action){try{const r=await 呼叫API(action);document.getElementById('報告').value=r.報告||JSON.stringify(r,null,2);await 載入總覽()}catch(e){alert(e.message)}}async function 複製報告(){const t=document.getElementById('報告').value;if(!t.trim())return alert('尚未產生報告');await navigator.clipboard.writeText(t);alert('已複製')}document.getElementById('GAS網址').value=GAS();載入總覽();</script></body></html>
