<style>
:root{--藍:#0b74ff;--深:#082f63;--青:#06b6d4;--綠:#16a34a;--黃:#f59e0b;--紅:#dc2626;--線:#dbeafe;--字:#172033;--淡:#64748b}*{box-sizing:border-box}body{margin:0;background:radial-gradient(circle at top left,#e0f7ff,#eef5ff 42%,#f8fbff);font-family:-apple-system,BlinkMacSystemFont,'Noto Sans TC','Microsoft JhengHei',system-ui,sans-serif;color:var(--字);padding-bottom:130px}.頁首{position:sticky;top:0;z-index:20;background:linear-gradient(135deg,var(--深),var(--藍),var(--青));color:#fff;box-shadow:0 10px 28px rgba(11,116,255,.26)}.頁首內,.外框,.底內{max-width:1280px;margin:auto}.頁首內{padding:14px}.品牌{display:flex;gap:10px;align-items:center}.標誌{width:46px;height:46px;border-radius:17px;background:rgba(255,255,255,.18);display:flex;align-items:center;justify-content:center;font-size:25px}h1{font-size:20px;margin:0;font-weight:1000}.副標{font-size:12px;opacity:.9}.狀態{margin-top:10px;border:1px solid rgba(255,255,255,.25);background:rgba(0,0,0,.22);border-radius:999px;padding:8px 12px;font-size:12px;font-weight:900;white-space:normal}.外框{padding:14px}.卡{background:rgba(255,255,255,.93);border:1px solid rgba(255,255,255,.9);border-radius:22px;padding:15px;margin:12px 0;box-shadow:0 12px 32px rgba(15,23,42,.1)}.導引{background:linear-gradient(135deg,#fff7d8,#fff);border-color:#fde68a}.卡 h2{font-size:17px;margin:0 0 8px;font-weight:1000}.導引 p{margin:5px 0;color:#76520a;line-height:1.6;font-size:13px}.上傳{border:2px dashed #7dd3fc;background:#f0f9ff;border-radius:20px;padding:14px}.工具{display:flex;gap:8px;flex-wrap:wrap;align-items:center}.主鈕,.鈕{border:none;border-radius:14px;padding:11px 13px;font-weight:1000;cursor:pointer}.主鈕{background:linear-gradient(135deg,var(--藍),var(--青));color:#fff}.鈕{background:#e8f0ff;color:#0b3a75}.輸入,select,input[type=file]{border:1px solid var(--線);border-radius:12px;padding:10px;background:#fff;font-weight:800;max-width:100%}.小字{font-size:12px;color:var(--淡);line-height:1.5}.訊息{background:#071225;color:#e0f2fe;border-radius:18px;padding:12px;white-space:pre-wrap;line-height:1.55;font-size:13px}.錯{background:#fff1f2;color:#991b1b;border:1px solid #fecdd3}.好{background:#ecfdf5;color:#166534;border:1px solid #bbf7d0}.指標{display:grid;grid-template-columns:repeat(8,minmax(0,1fr));gap:10px}.指標卡{background:#fff;border:1px solid var(--線);border-radius:18px;padding:12px}.指標名{font-size:12px;color:#64748b;font-weight:900}.指標值{font-size:22px;font-weight:1000;margin-top:4px;color:#0f2f5d}.表外{overflow:auto;max-height:64vh;border:1px solid var(--線);border-radius:18px;background:#fff}.表{border-collapse:collapse;width:100%;font-size:12px;min-width:1120px}.表 th{position:sticky;top:0;background:#0b3a75;color:#fff;padding:9px;white-space:nowrap}.表 td{border-bottom:1px solid #e5edf7;padding:7px 9px;vertical-align:top}.膠{display:inline-flex;border-radius:999px;padding:3px 8px;font-size:11px;font-weight:1000;white-space:nowrap}.綠{background:#dcfce7;color:#166534}.黃{background:#fef3c7;color:#92400e}.紅{background:#fee2e2;color:#991b1b}.藍{background:#dbeafe;color:#1d4ed8}.白{background:#f8fafc;color:#64748b;border:1px solid #cbd5e1}.底{position:fixed;left:0;right:0;bottom:0;background:rgba(255,255,255,.96);border-top:1px solid var(--線);padding:10px 14px;z-index:30}.底內{display:flex;gap:8px;align-items:center;justify-content:space-between}@media(max-width:900px){.指標{grid-template-columns:repeat(2,minmax(0,1fr))}.底內{display:block}body{padding-bottom:190px}.表{font-size:11px}.卡{padding:13px}}
</style>

<body>
<header class="頁首"><div class="頁首內"><div class="品牌"><div class="標誌">🏭</div><div><h1>生產計劃表清洗器 V2.4</h1><div class="副標">清洗 → BOM需求展開 → CTB → 10_排程需求池 → 自動排程 → 匯出中央資料庫</div></div></div><div class="狀態" id="狀態文字">🟡 已就緒：請先上傳每月生產計劃表，可再上傳 BOM 主檔。</div></div></header>
<main class="外框">
<section class="卡 導引"><h2>V2.4 主線已接回資料庫</h2><p>本頁會把生產計劃表清洗結果、BOM、需求池、BOM需求展開、CTB齊套、自動排程結果，整理成一份可匯出的「智慧製造中央作戰資料庫.xlsx」。</p><p>缺料紅燈不會直接排近期；自動排程會用需求日期倒推，並產生 PROD / PACK / LOAD 工單。</p></section>
<section class="卡"><h2>檔案輸入</h2><div class="工具"><div class="上傳"><b>① 生產計劃表 Excel</b><br><input id="計劃檔" type="file" accept=".xlsx,.xls,.xlsm,.csv"></div><div class="上傳"><b>② BOM 主檔 Excel/CSV</b><br><input id="BOM檔" type="file" accept=".xlsx,.xls,.csv"></div></div><div style="height:10px"></div><div class="工具"><label>每日班數 <input class="輸入" id="每日班數" type="number" value="2" min="1" max="4" style="width:70px"></label><label>OEE <input class="輸入" id="OEE" type="number" value="0.75" min="0.1" max="1" step="0.01" style="width:80px"></label><label><input type="checkbox" id="週末可生產" checked> 週末可生產</label><button class="主鈕" id="重新計算">重新計算資料庫</button></div></section>
<section class="卡"><h2>處理狀態</h2><div id="訊息區" class="訊息">等待上傳。</div></section>
<section class="卡" id="結果區" style="display:none"><div class="工具" id="切頁"></div><div class="指標" id="指標區" style="margin-top:12px"></div></section>
<section class="卡" id="視圖區" style="display:none"></section>
</main>
<div class="底"><div class="底內"><div class="工具"><button class="主鈕" onclick="匯出資料庫()">匯出中央資料庫 Excel</button><button class="鈕" onclick="儲存本機()">儲存本機資料庫快照</button><button class="鈕" onclick="下載JSON()">匯出 JSON</button></div><div class="小字" id="底部狀態">尚未清洗資料</div></div></div>
<script>
(function(){'use strict';
const $=id=>document.getElementById(id), 文=v=>String(v??'').trim(), 正=v=>文(v).replace(/\s+/g,'').toUpperCase(), 數=v=>{let n=Number(文(v).replace(/[,，]/g,''));return isFinite(n)?n:0}, 安全=s=>String(s??'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m])), 格式=n=>Number(n||0).toLocaleString('zh-TW');
function 日期字串(d){let z=n=>String(n).padStart(2,'0');return d.getFullYear()+'-'+z(d.getMonth()+1)+'-'+z(d.getDate())}function 今天(){return 日期字串(new Date())}
const 表名=['工作表報告','02_BOM明細主檔','05_計劃每日明細','06_本月彙總','07_出貨訂單','08_BOM需求展開','09_CTB齊套檢查','10_排程需求池','11_自動排程結果','13_拆工單結果','LINE摘要'];
let DB={工作表報告:[],BOM明細:[],每日明細:[],本月彙總:[],出貨訂單:[],BOM需求展開:[],CTB齊套檢查:[],排程需求池:[],自動排程結果:[],拆工單結果:[],庫存:{},目前:'工作表報告'};
function 訊息(t,kind=''){let e=$('訊息區');e.className='訊息 '+(kind==='錯'?'錯':kind==='好'?'好':'');e.textContent=t;$('狀態文字').textContent=t.split('\n')[0];$('底部狀態').textContent=t.split('\n')[0]}
function show結果(){ $('結果區').style.display='block';$('視圖區').style.display='block';渲染切頁();渲染指標();切換(DB.目前||'工作表報告') }
function 解析年月(s){let m=文(s).match(/(20\d{2})\D{0,5}(\d{1,2})/);return m?{y:+m[1],m:+m[2]}:{y:new Date().getFullYear(),m:new Date().getMonth()+1}}
function 解析日期(v,ym){if(v instanceof Date&&!isNaN(v))return 日期字串(v);if(typeof v==='number'&&v>25000&&v<80000){let d=XLSX.SSF.parse_date_code(v);return d?日期字串(new Date(d.y,d.m-1,d.d)):''}let s=文(v),d;if(!s)return'';if(/^\d{4}[-\/]\d{1,2}[-\/]\d{1,2}$/.test(s)){d=new Date(s.replace(/\//g,'-'));return isNaN(d)?'':日期字串(d)}if(/^\d{1,2}[\/\-]\d{1,2}$/.test(s)){let p=s.split(/[\/\-]/).map(Number);d=new Date(ym.y,p[0]-1,p[1]);return isNaN(d)?'':日期字串(d)}if(/^\d{1,2}$/.test(s)&&ym){d=new Date(ym.y,ym.m-1,+s);return isNaN(d)?'':日期字串(d)}return''}
function 找欄(row,names){let ns=names.map(正);for(let i=0;i<row.length;i++){let c=正(row[i]);if(ns.some(n=>c===n||c.includes(n)||n.includes(c)))return i}return-1}
function 類型(row,c){let keys=['訂單','供料','計畫','產出','訂單(出貨)','出貨'];let vals=[row[c],...row.slice(0,14)];for(let v of vals){let s=正(v);let k=keys.find(x=>s===正(x));if(k)return k==='訂單'?'訂單(出貨)':k}return''}
async function 讀檔(file){return new Promise((res,rej)=>{let r=new FileReader();r.onerror=()=>rej(new Error('讀檔失敗'));r.onload=e=>res(e.target.result);r.readAsArrayBuffer(file)})}
$('計劃檔').addEventListener('change',async e=>{let f=e.target.files[0];if(!f)return;訊息('📖 讀取生產計劃表：'+f.name);try{let data=await 讀檔(f);解析計劃(data,f.name);重算();訊息('✅ 生產計劃表清洗完成。\n每日明細 '+DB.每日明細.length+' 筆；需求池 '+DB.排程需求池.length+' 筆。','好');show結果()}catch(err){訊息('❌ 計劃表解析失敗：'+(err.message||err),'錯')}});
$('BOM檔').addEventListener('change',async e=>{let f=e.target.files[0];if(!f)return;訊息('📖 讀取 BOM：'+f.name);try{let data=await 讀檔(f);解析BOM檔(data,f.name);重算();訊息('✅ BOM 載入完成。\nBOM明細 '+DB.BOM明細.length+' 筆；BOM需求展開 '+DB.BOM需求展開.length+' 筆。','好');show結果()}catch(err){訊息('❌ BOM解析失敗：'+(err.message||err),'錯')}});
$('重新計算').addEventListener('click',()=>{重算();show結果();訊息('✅ 已重新計算資料庫。','好')});
function 解析計劃(data,fileName){DB.每日明細=[];DB.工作表報告=[];DB.庫存={};let ym=解析年月(fileName);let wb=XLSX.read(data,{type:'array',cellDates:true,raw:true});let names=wb.SheetNames||[];let targets=names.filter(n=>/(cxmr|A\d|B\d|C\d|YC|EEA|HEADER|訂單|庫存|入庫|在製|產能|供料|出貨)/i.test(n));if(!targets.length)targets=names.slice(0,12);for(let sn of targets){let rows=XLSX.utils.sheet_to_json(wb.Sheets[sn],{header:1,defval:'',raw:true,blankrows:false});if(!rows.length)continue;if(/庫存|在製|入庫/i.test(sn)){解析庫存(sn,rows);continue}清洗表(sn,rows,ym)} }
function 解析庫存(sn,rows){let h=-1;for(let r=0;r<Math.min(rows.length,30);r++){let t=rows[r].join('|');if(/料號|產品編號|品號/.test(t)&&/庫存|在製|入庫|數量/.test(t)){h=r;break}}if(h<0)return;let head=rows[h],i料=找欄(head,['料號','產品編號','品號','客戶品號']),i名=找欄(head,['品名','名稱']),i庫=找欄(head,['庫存','庫存量','數量']),i在=找欄(head,['在製']),i入=找欄(head,['入庫','預計入庫']);for(let r=h+1;r<rows.length;r++){let row=rows[r],id=文(row[i料]);if(!id)continue;let x=DB.庫存[id]||(DB.庫存[id]={料號:id,品名:文(row[i名]),庫存量:0,在製量:0,預計入庫量:0,已分配量:0});if(i庫>=0)x.庫存量+=數(row[i庫]);if(i在>=0)x.在製量+=數(row[i在]);if(i入>=0)x.預計入庫量+=數(row[i入])}}
function 清洗表(sn,rows,ym){let h=-1;for(let r=0;r<Math.min(rows.length,60);r++){let t=rows[r].join('|');if(/品名|客戶品號|產品編號|料號/.test(t)){h=r;break}}if(h<0){DB.工作表報告.push({工作表:sn,狀態:'略過',原因:'找不到標題列'});return}let dateR=-1,dateC=-1,dates=[];for(let r=0;r<Math.min(rows.length,90);r++){for(let c=0;c<rows[r].length;c++){if(文(rows[r][c])==='日期'){for(let x=c+1;x<rows[r].length;x++){let iso=解析日期(rows[r][x],ym);if(iso)dates.push({i:x,iso});else if(dates.length&&文(rows[r][x])==='')break}if(dates.length){dateR=r;dateC=c;break}}}if(dates.length)break}if(!dates.length){for(let r=0;r<Math.min(rows.length,90);r++){let ds=rows[r].map((v,i)=>({i,iso:解析日期(v,ym)})).filter(x=>x.iso);if(ds.length>=2){dates=ds;dateR=r;dateC=Math.max(0,ds[0].i-1);break}}}if(!dates.length){DB.工作表報告.push({工作表:sn,狀態:'略過',原因:'找不到日期列'});return}let head=rows[h],idx={產品編號:找欄(head,['產品編號','料號','品號','產品']),客戶品號:找欄(head,['客戶品號','客戶料號']),品名:找欄(head,['品名','產品名稱']),工單:找欄(head,['工單','製令']),期初庫存:找欄(head,['期初庫存','庫存']),產能8H:找欄(head,['產能8H','標準數/8H','產能'])};let last={},cnt=0;for(let r=h+1;r<rows.length;r++){let row=rows[r],tp=類型(row,dateC);Object.keys(idx).forEach(k=>{if(idx[k]>=0&&文(row[idx[k]])!=='')last[k]=文(row[idx[k]])});if(!last.產品編號&&!last.品名)continue;if(!tp)continue;dates.forEach(d=>{let q=數(row[d.i]);if(q===0)return;DB.每日明細.push({區域:sn,產品編號:last.產品編號||'',客戶品號:last.客戶品號||'',品名:last.品名||'',工單:last.工單||'',日期:d.iso,類型:tp,數量:q,期初庫存:數(last.期初庫存),產能8H:數(last.產能8H),CTB狀態:'待判定',來源工作表:sn,來源列號:r+1});cnt++})}DB.工作表報告.push({工作表:sn,狀態:cnt?'已解析':'無日資料',標題列:h+1,日期列:dateR+1,日期欄數:dates.length,每日筆數:cnt})}
function 解析BOM檔(data,fileName){let wb=XLSX.read(data,{type:'array',cellDates:true,raw:true});let rows=XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]],{defval:'',raw:true});DB.BOM明細=[];rows.forEach((r,i)=>{let main=文(r['主件料號']||r['主件ERP']||r['成品料號']||r['產品編號']||r['main_mat_no']);let comp=文(r['子件料號']||r['元件料號']||r['小料ERP']||r['下層產品編號_FK']||r['comp_erp_no']);if(!main||!comp)return;let cname=文(r['子件名稱']||r['元件品名']||r['小料名稱']||r['comp_name']);DB.BOM明細.push({BOM主鍵_PK:文(r['BOM主鍵_PK'])||'BOM_'+(i+1).toString().padStart(5,'0'),BOM版本:文(r['BOM版本']||r['BOM_ID'])||'BOM_UPLOAD',層級:文(r['層級(Lvl)']||r['層級'])||'1',上層產品編號_FK:文(r['上層產品編號_FK'])||main,主件料號:main,主件品名:文(r['主件品名']||r['成品品名']||r['品名']||r['main_name']),主件客戶品號:文(r['客戶品號']||r['主件客戶品號']),子件料號:comp,子件名稱:cname,子件類型:分類(comp,cname),來源:文(r['來源'])||'M',單位:文(r['單位'])||'PC',用量:數(r['用量'])||1,損耗率:數(r['損耗率%']||r['損耗率百分比']),啟用:'是',來源檔案:fileName})})}
function 分類(code,name){let s=(文(code)+' '+文(name)).toUpperCase();if(/O[- ]?RING|BUSH|BOLT|SCREW|SPRING|BALL|PLUG|NUT|WASHER|PIN|GASKET|SEAL/.test(s))return'採購件';if(/COVER|BODY|HOUSING|GEAR|SHAFT/.test(s))return'半成品';if(文(code).endsWith('0'))return'成品/組裝件';return'待判定'}
function 重算(){建彙總();建出貨();建需求池();建BOM展開();建CTB();建排程();建工單();}
function key(r){return [r.區域,r.產品編號,r.客戶品號,r.品名].join('|')}
function 建彙總(){let m={};DB.每日明細.forEach(r=>{let k=key(r);let x=m[k]||(m[k]={區域:r.區域,產品編號:r.產品編號,客戶品號:r.客戶品號,品名:r.品名,本月計畫量:0,本月產出量:0,本月需求量:0,供料量:0,可用量:0,還需加工量:0,達成率:1,訂單已滿足:'Y',最近出貨日:'',產能8H:r.產能8H||0,主機台:'待工站主檔對應',CTB狀態:'綠燈',Tier:'Tier 4',備註:''});if(r.類型.includes('計畫'))x.本月計畫量+=r.數量;if(r.類型.includes('產出'))x.本月產出量+=r.數量;if(r.類型.includes('供料'))x.供料量+=Math.max(0,r.數量);if(r.類型.includes('訂單')||r.類型.includes('出貨')){if(r.數量>0){x.本月需求量+=r.數量;if(!x.最近出貨日||r.日期<x.最近出貨日)x.最近出貨日=r.日期}}if(r.產能8H)x.產能8H=r.產能8H});DB.本月彙總=Object.values(m).map(x=>{let inv=DB.庫存[x.產品編號]||{};x.可用量=(數(inv.庫存量)||0)+(數(inv.在製量)||0)+(數(inv.預計入庫量)||0)+x.本月產出量+x.供料量;x.還需加工量=Math.max(0,x.本月需求量-x.可用量);x.達成率=x.本月計畫量?x.本月產出量/x.本月計畫量:1;x.訂單已滿足=x.還需加工量<=0?'Y':'N';x.Tier=Tier(x.最近出貨日);x.CTB狀態=x.還需加工量>0?'紅燈':'綠燈';return x}).filter(x=>x.本月計畫量||x.本月產出量||x.本月需求量||x.還需加工量)}
function Tier(d){if(!d)return'Tier 4';let diff=Math.ceil((new Date(d)-new Date(今天()))/86400000);if(diff<=7)return'Tier 1';if(diff<=14)return'Tier 2';if(diff<=21)return'Tier 3';return'Tier 4'}
function 建出貨(){let i=0;DB.出貨訂單=DB.每日明細.filter(r=>(r.類型.includes('訂單')||r.類型.includes('出貨'))&&r.數量>0&&r.日期>=今天()).sort((a,b)=>a.日期.localeCompare(b.日期)).map(r=>({訂單號:'ORD'+r.日期.replace(/-/g,'')+String(++i).padStart(5,'0'),區域:r.區域,產品編號:r.產品編號,客戶品號:r.客戶品號,品名:r.品名,需求日期:r.日期,需求數量:r.數量,產能8H:r.產能8H,狀態:'待確認',來源:'生產計劃表'}))}
function 建需求池(){let i=0;DB.排程需求池=DB.本月彙總.filter(x=>x.訂單已滿足==='N'||(['Tier 1','Tier 2'].includes(x.Tier)&&x.本月需求量>0)).map(x=>({需求編號:'REQ'+今天().replace(/-/g,'')+String(++i).padStart(4,'0'),來源:'生產計劃清洗',區域:x.區域,產品編號:x.產品編號,客戶品號:x.客戶品號,品名:x.品名,需求日期:x.最近出貨日||今天(),需求數量:x.本月需求量,期初庫存:0,本月產出量:x.本月產出量,供料量:x.供料量,可用量:x.可用量,還需加工量:Math.max(x.還需加工量,x.本月需求量-x.本月產出量,0),產能8H:x.產能8H,建議開工日:'',建議完工日:x.最近出貨日||今天(),主機台:x.主機台,急迫性:x.Tier,CTB狀態:x.CTB狀態,狀態:x.CTB狀態==='紅燈'?'待CTB':'待排程',備註:''}))}
function 建BOM展開(){let i=0;DB.BOM需求展開=[];DB.排程需求池.forEach(req=>{let list=DB.BOM明細.filter(b=>正(b.主件料號)===正(req.產品編號)||正(b.主件客戶品號)===正(req.客戶品號));list.forEach(b=>{let q=Math.ceil((req.需求數量||0)*(b.用量||1)*(1+(b.損耗率||0)/100));DB.BOM需求展開.push({需求編號:'BOMREQ'+String(++i).padStart(5,'0'),父需求編號:req.需求編號,階層:b.層級||'1',主件料號:b.主件料號,主件品名:b.主件品名,子件料號:b.子件料號,子件名稱:b.子件名稱,子件類型:b.子件類型,來源:b.來源,單位用量:b.用量,損耗率:b.損耗率||0,成品需求量:req.需求數量,子件需求量:q,需求日期:req.建議開工日||req.需求日期,來源BOM_PK:b.BOM主鍵_PK,狀態:'待CTB'})})})}
function 建CTB(){DB.CTB齊套檢查=DB.BOM需求展開.map(x=>{let inv=DB.庫存[x.子件料號]||{};let 可用=數(inv.庫存量)+數(inv.在製量)+數(inv.預計入庫量)-數(inv.已分配量);let 缺=Math.max(0,x.子件需求量-可用);let st=缺>0?'紅燈':'綠燈';return{需求編號:x.需求編號,料號:x.子件料號,品名:x.子件名稱,需求量:x.子件需求量,庫存量:數(inv.庫存量),在製量:數(inv.在製量),預計入庫量:數(inv.預計入庫量),已分配量:數(inv.已分配量),可用量:可用,缺口:缺,CTB狀態:st,處置建議:st==='紅燈'?(x.子件類型==='採購件'?'採購/倉庫確認':'產生子件製造需求'):'可排',最晚到料日:x.需求日期,備註:''}});let red=new Set(DB.CTB齊套檢查.filter(x=>x.CTB狀態==='紅燈').map(x=>x.需求編號));DB.BOM需求展開.forEach(x=>{let c=DB.CTB齊套檢查.find(c=>c.需求編號===x.需求編號);x.狀態=c&&c.CTB狀態==='紅燈'?'缺料':'齊套'})}
function 建排程(){let i=0,班=數($('每日班數').value)||2,oee=數($('OEE').value)||0.75;DB.自動排程結果=[];DB.排程需求池.forEach(req=>{let q=req.還需加工量||req.需求數量||0,per=(req.產能8H||0)*班*oee,days=per?Math.max(1,Math.ceil(q/per)):999;let start=往前(req.需求日期,days+2),end=往後(start,days-1);req.建議開工日=start;req.建議完工日=end;DB.自動排程結果.push({排程ID:'SCH'+String(++i).padStart(5,'0'),需求編號:req.需求編號,工單號:'MO-'+req.需求編號,工單類型:'PROD',產品編號:req.產品編號,品名:req.品名,需求數量:req.需求數量,排程數量:q,產能8H:req.產能8H,每日班數:班,OEE:oee,需天數:days,預計開始:start,預計完成:end,主機台:req.主機台,人員班別:'待派班',前置依賴:'CTB/BOM',CTB狀態:req.CTB狀態,排程狀態:req.CTB狀態==='紅燈'?'待料':'可排',備註:''});DB.自動排程結果.push({排程ID:'SCH'+String(++i).padStart(5,'0'),需求編號:req.需求編號,工單號:'PK-'+req.需求編號,工單類型:'PACK',產品編號:req.產品編號,品名:req.品名,需求數量:req.需求數量,排程數量:req.需求數量,產能8H:0,每日班數:班,OEE:oee,需天數:1,預計開始:往後(end,1),預計完成:往後(end,1),主機台:'包裝',人員班別:'待派班',前置依賴:'PROD',CTB狀態:req.CTB狀態,排程狀態:'待排',備註:''});DB.自動排程結果.push({排程ID:'SCH'+String(++i).padStart(5,'0'),需求編號:req.需求編號,工單號:'LD-'+req.需求編號,工單類型:'LOAD',產品編號:req.產品編號,品名:req.品名,需求數量:req.需求數量,排程數量:req.需求數量,產能8H:0,每日班數:班,OEE:oee,需天數:1,預計開始:req.需求日期,預計完成:req.需求日期,主機台:'出貨',人員班別:'待派班',前置依賴:'PACK',CTB狀態:req.CTB狀態,排程狀態:'待排',備註:''})});DB.BOM需求展開.filter(x=>x.狀態==='缺料'&&x.子件類型!=='採購件').forEach(x=>{DB.自動排程結果.push({排程ID:'SCH'+String(++i).padStart(5,'0'),需求編號:x.需求編號,工單號:'SUB-'+x.需求編號,工單類型:'SUB_PROD',產品編號:x.子件料號,品名:x.子件名稱,需求數量:x.子件需求量,排程數量:x.子件需求量,產能8H:0,每日班數:班,OEE:oee,需天數:999,預計開始:'待工站主檔',預計完成:x.需求日期,主機台:'待工站主檔對應',人員班別:'待派班',前置依賴:x.父需求編號,CTB狀態:'紅燈',排程狀態:'子件補工單',備註:'由BOM缺料自動產生'})})}
function 建工單(){DB.拆工單結果=DB.自動排程結果.map(x=>({工單號:x.工單號,來源需求編號:x.需求編號,工單類型:x.工單類型,父工單號:x.前置依賴,產品編號:x.產品編號,品名:x.品名,數量:x.排程數量,單位:'PC',預計開始:x.預計開始,預計完成:x.預計完成,最後工序:x.工單類型==='SUB_PROD'?'入庫':'完工',入庫觸發:x.工單類型==='SUB_PROD'?'是':'否',狀態:x.排程狀態,備註:x.備註}))}
function 往前(d,days){let x=new Date(d),n=0;while(n<days){x.setDate(x.getDate()-1);if($('週末可生產').checked||![0,6].includes(x.getDay()))n++}return 日期字串(x)}function 往後(d,days){let x=new Date(d),n=0;while(n<days){x.setDate(x.getDate()+1);if($('週末可生產').checked||![0,6].includes(x.getDay()))n++}return 日期字串(x)}
function 渲染切頁(){let html=表名.map(n=>'<button class="鈕" data-v="'+n+'">'+n+'</button>').join('');$('切頁').innerHTML=html;document.querySelectorAll('#切頁 button').forEach(b=>b.onclick=()=>切換(b.dataset.v))}
function 渲染指標(){let d=[['BOM',DB.BOM明細.length],['每日',DB.每日明細.length],['彙總',DB.本月彙總.length],['訂單',DB.出貨訂單.length],['BOM展開',DB.BOM需求展開.length],['CTB紅燈',DB.CTB齊套檢查.filter(x=>x.CTB狀態==='紅燈').length],['需求池',DB.排程需求池.length],['排程',DB.自動排程結果.length]];$('指標區').innerHTML=d.map(x=>'<div class="指標卡"><div class="指標名">'+x[0]+'</div><div class="指標值">'+格式(x[1])+'</div></div>').join('')}
function 資料(v){return {'工作表報告':DB.工作表報告,'02_BOM明細主檔':DB.BOM明細,'05_計劃每日明細':DB.每日明細,'06_本月彙總':DB.本月彙總,'07_出貨訂單':DB.出貨訂單,'08_BOM需求展開':DB.BOM需求展開,'09_CTB齊套檢查':DB.CTB齊套檢查,'10_排程需求池':DB.排程需求池,'11_自動排程結果':DB.自動排程結果,'13_拆工單結果':DB.拆工單結果}[v]||[]}
function 切換(v){DB.目前=v;document.querySelectorAll('#切頁 button').forEach(b=>b.classList.toggle('主鈕',b.dataset.v===v));if(v==='LINE摘要')return 顯示LINE();表格(v,資料(v))}
function 表格(title,rows){let cols=rows[0]?Object.keys(rows[0]):['尚無資料'];let body=rows.length?rows.map(r=>'<tr>'+cols.map(c=>'<td>'+顯示(r[c],c)+'</td>').join('')+'</tr>').join(''):'<tr><td>尚無資料</td></tr>';$('視圖區').style.display='block';$('視圖區').innerHTML='<h2>'+安全(title)+'｜'+rows.length+' 筆</h2><div class="表外"><table class="表"><thead><tr>'+cols.map(c=>'<th>'+安全(c)+'</th>').join('')+'</tr></thead><tbody>'+body+'</tbody></table></div>'}
function 顯示(v,c){if(c.includes('CTB'))return '<span class="膠 '+(v==='紅燈'?'紅':v==='黃燈'?'黃':'綠')+'">'+安全(v)+'</span>';if(c==='Tier'||c==='急迫性')return '<span class="膠 '+(v==='Tier 1'?'紅':v==='Tier 2'?'黃':v==='Tier 3'?'藍':'白')+'">'+安全(v)+'</span>';return 安全(v)}
function 顯示LINE(){let rows=DB.排程需求池.slice(0,12);let t='【製一組重點｜資料庫V2.4】\n';rows.forEach((r,i)=>{t+=(i+1)+'. '+(r.CTB狀態==='紅燈'?'⛔':'✅')+' '+r.品名+'｜欠:'+格式(r.還需加工量)+'｜開:'+r.建議開工日+'｜出:'+r.需求日期+'｜CTB:'+r.CTB狀態+'\n'});$('視圖區').style.display='block';$('視圖區').innerHTML='<h2>LINE摘要</h2><div class="訊息">'+安全(t)+'</div>'}
function sheets(){return {'02_BOM明細主檔':DB.BOM明細,'05_計劃每日明細':DB.每日明細,'06_本月彙總':DB.本月彙總,'07_出貨訂單':DB.出貨訂單,'08_BOM需求展開':DB.BOM需求展開,'09_CTB齊套檢查':DB.CTB齊套檢查,'10_排程需求池':DB.排程需求池,'11_自動排程結果':DB.自動排程結果,'13_拆工單結果':DB.拆工單結果}}
window.匯出資料庫=function(){let wb=XLSX.utils.book_new();Object.entries(sheets()).forEach(([name,rows])=>{let ws=XLSX.utils.json_to_sheet(rows.length?rows:[{提示:'尚無資料'}]);XLSX.utils.book_append_sheet(wb,ws,name.slice(0,31))});XLSX.writeFile(wb,'智慧製造中央作戰資料庫_清洗排程版.xlsx')}
window.儲存本機=function(){localStorage.setItem('智慧製造中央作戰資料庫V24',JSON.stringify({時間:new Date().toISOString(),DB}));訊息('✅ 已儲存本機資料庫快照。','好')}
window.下載JSON=function(){let a=document.createElement('a');a.href=URL.createObjectURL(new Blob([JSON.stringify(DB,null,2)],{type:'application/json'}));a.download='智慧製造中央作戰資料庫.json';a.click();setTimeout(()=>URL.revokeObjectURL(a.href),1000)}
訊息('🟡 V2.4 已就緒：上傳生產計劃表與 BOM 後，會自動產生需求池、CTB與排程。');
})();
</script>
</body></html>
