<!doctype html><html lang="zh-Hant"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>任務統計儀表板</title><script src="https://cdn.tailwindcss.com"></script><style>body{font-family:-apple-system,BlinkMacSystemFont,'Noto Sans TC','Segoe UI',sans-serif;background:#07111f;color:#ecfeff}.玻璃{background:rgba(15,23,42,.78);border:1px solid rgba(148,163,184,.22);backdrop-filter:blur(18px)}.卡{border-radius:22px;box-shadow:0 18px 45px rgba(0,0,0,.28)}.按鈕{border-radius:16px;padding:.75rem .9rem;font-weight:900}input,select,textarea{background:#0f172a!important;border:1px solid #334155!important;color:#fff!important;border-radius:14px!important;padding:.75rem!important;width:100%}th,td{white-space:nowrap}.小字{font-size:.78rem;color:#94a3b8}.紅{color:#fca5a5}.黃{color:#fde68a}.綠{color:#86efac}.橘{color:#fdba74}</style></head><body><main class="max-w-7xl mx-auto p-4 pb-24"><section class="玻璃 卡 p-5 mb-4"><div class="flex flex-wrap justify-between items-center gap-3"><div><p class="text-teal-200 font-black text-sm">智慧製造中央作戰指揮中心 v2.7.0</p><h1 class="text-2xl md:text-4xl font-black">任務統計儀表板</h1><p id="狀態文字" class="text-slate-300 mt-1">統計生管 / 採購 / 製造任務、逾期警示與高風險任務。</p></div><div class="flex gap-2"><a class="按鈕 bg-violet-300 text-slate-950" href="./task-board.html">三方待辦</a><a class="按鈕 bg-orange-300 text-slate-950" href="./meeting.html">主管摘要</a></div></div></section><section class="玻璃 卡 p-4 mb-4"><div class="grid md:grid-cols-[1fr_auto_auto] gap-2"><input id="GAS網址" placeholder="貼上 GAS Web App URL"><button class="按鈕 bg-teal-500 text-slate-950" onclick="儲存設定()">儲存</button><button class="按鈕 bg-cyan-300 text-slate-950" onclick="載入統計()">同步統計</button></div><div class="grid md:grid-cols-3 gap-2 mt-3"><button class="按鈕 bg-amber-300 text-slate-950" onclick="產生週報()">產生任務週報</button><button class="按鈕 bg-lime-300 text-slate-950" onclick="複製週報()">複製週報</button><button class="按鈕 bg-slate-600 text-white" onclick="下載高風險CSV()">下載高風險CSV</button></div></section><section class="grid grid-cols-2 md:grid-cols-6 gap-3 mb-4" id="統計區"></section><section class="grid lg:grid-cols-3 gap-4 mb-4"><div class="玻璃 卡 p-4"><h2 class="font-black text-xl mb-3">負責單位統計</h2><div id="單位統計"></div></div><div class="玻璃 卡 p-4"><h2 class="font-black text-xl mb-3">任務狀態統計</h2><div id="狀態統計"></div></div><div class="玻璃 卡 p-4"><h2 class="font-black text-xl mb-3">優先級統計</h2><div id="優先統計"></div></div></section><section class="玻璃 卡 p-4 mb-4"><h2 class="font-black text-xl mb-3">高風險任務</h2><div id="高風險區" class="overflow-auto max-h-[48vh]"></div></section><section class="玻璃 卡 p-4"><h2 class="font-black text-xl mb-3">任務週報</h2><textarea id="週報" rows="14"></textarea></section></main><script>let 統計=null;function GAS(){return localStorage.getItem('GAS網址')||''}function 儲存設定(){localStorage.setItem('GAS網址',document.getElementById('GAS網址').value.trim());alert('已儲存')}async function 呼叫API(action,data={}){const url=GAS();if(!url)throw new Error('請先貼上 GAS Web App URL');const r=await fetch(url,{method:'POST',headers:{'Content-Type':'text/plain;charset=utf-8'},body:JSON.stringify({action,...data})});return r.json()}async function 載入統計(){try{const r=await 呼叫API('取得_v2_7_任務統計儀表板資料');if(!r.成功)throw new Error(r.訊息||'讀取失敗');統計=r;document.getElementById('狀態文字').textContent='任務統計已同步';渲染()}catch(e){alert('請確認 GAS 已加入 v2_7 工具並重新部署。\n'+e.message)}}function 渲染(){if(!統計)return;const s=統計.統計||{};document.getElementById('統計區').innerHTML=[['任務總數',s.任務總數],['未完成',s.未完成],['已完成',s.已完成],['逾期',s.逾期],['2天內到期',s.即將逾期],['高優先',s.高優先]].map(x=>`<div class="玻璃 卡 p-4"><p class="小字">${x[0]}</p><p class="text-3xl font-black ${x[0]==='逾期'?'紅':x[0]==='2天內到期'?'橘':''}">${x[1]||0}</p></div>`).join('');document.getElementById('單位統計').innerHTML=統計表(統計.單位統計);document.getElementById('狀態統計').innerHTML=統計表(統計.狀態統計);document.getElementById('優先統計').innerHTML=統計表(統計.優先統計);document.getElementById('高風險區').innerHTML=表格(統計.高風險任務||[])}function 統計表(obj){const rows=Object.keys(obj||{}).map(k=>({項目:k,數量:obj[k]}));return 表格(rows)}function 表格(rows){if(!rows.length)return '<p class="text-slate-300">尚無資料</p>';const hs=Object.keys(rows[0]);return `<table class="w-full text-sm"><thead><tr>${hs.map(h=>`<th class="text-left p-2 text-teal-200">${h}</th>`).join('')}</tr></thead><tbody>${rows.map(r=>`<tr class="border-t border-slate-700">${hs.map(h=>`<td class="p-2">${r[h]??''}</td>`).join('')}</tr>`).join('')}</tbody></table>`}async function 產生週報(){try{const r=await 呼叫API('產生_v2_7_任務週報文字');document.getElementById('週報').value=typeof r==='string'?r:(r.文字||JSON.stringify(r,null,2))}catch(e){alert(e.message)}}async function 複製週報(){const t=document.getElementById('週報').value;if(!t.trim())return alert('尚未產生週報');await navigator.clipboard.writeText(t);alert('已複製週報')}function 轉CSV(rows){if(!rows.length)return '';const hs=Object.keys(rows[0]);const esc=v=>`"${String(v??'').replace(/"/g,'""')}"`;return hs.join(',')+'\n'+rows.map(r=>hs.map(h=>esc(r[h])).join(',')).join('\n')}function 下載高風險CSV(){const blob=new Blob(['\ufeff'+轉CSV((統計&&統計.高風險任務)||[])],{type:'text/csv;charset=utf-8'});const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='高風險任務.csv';a.click();URL.revokeObjectURL(a.href)}document.getElementById('GAS網址').value=GAS();載入統計();</script></body></html>
