<!doctype html><html lang="zh-Hant"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>正式上線封版報告</title><script src="https://cdn.tailwindcss.com"></script><style>body{font-family:-apple-system,BlinkMacSystemFont,'Noto Sans TC','Segoe UI',sans-serif;background:#07111f;color:#ecfeff}.玻璃{background:rgba(15,23,42,.78);border:1px solid rgba(148,163,184,.22);backdrop-filter:blur(18px)}.卡{border-radius:22px;box-shadow:0 18px 45px rgba(0,0,0,.28)}.按鈕{border-radius:16px;padding:.75rem .9rem;font-weight:900}input,textarea{background:#0f172a!important;border:1px solid #334155!important;color:#fff!important;border-radius:14px!important;padding:.75rem!important;width:100%}th,td{white-space:nowrap}.小字{font-size:.78rem;color:#94a3b8}</style></head><body><main class="max-w-7xl mx-auto p-4 pb-24"><section class="玻璃 卡 p-5 mb-4"><div class="flex flex-wrap justify-between items-center gap-3"><div><p class="text-teal-200 font-black text-sm">智慧製造中央作戰指揮中心 v3.4.0</p><h1 class="text-2xl md:text-4xl font-black">正式上線封版報告</h1><p id="狀態文字" class="text-slate-300 mt-1">重測失敗再開修補、GitHub Issue 狀態回寫、Commit 影響範圍比對與封版判斷。</p></div><div class="flex gap-2"><a class="按鈕 bg-blue-200 text-slate-950" href="./fix-dashboard.html">修補完成率</a><a class="按鈕 bg-lime-200 text-slate-950" href="./system-test.html">全頁測試</a><a class="按鈕 bg-slate-700" href="./index.html">首頁</a></div></div></section><section class="玻璃 卡 p-4 mb-4"><div class="grid md:grid-cols-[1fr_auto_auto_auto] gap-2"><input id="GAS網址" placeholder="貼上 GAS Web App URL"><button class="按鈕 bg-teal-500 text-slate-950" onclick="儲存設定()">儲存</button><button class="按鈕 bg-cyan-300 text-slate-950" onclick="載入總覽()">同步</button><button class="按鈕 bg-amber-300 text-slate-950" onclick="複製報告()">複製報告</button></div><div class="grid md:grid-cols-4 gap-2 mt-3"><button class="按鈕 bg-red-300 text-slate-950" onclick="掃描重測失敗()">重測失敗再開修補</button><button class="按鈕 bg-indigo-300 text-slate-950" onclick="同步Issue()">同步Issue狀態</button><button class="按鈕 bg-emerald-300 text-slate-950" onclick="比對Commit()">比對單一Commit</button><button class="按鈕 bg-orange-300 text-slate-950" onclick="產生封版報告()">產生封版報告</button></div><div class="grid md:grid-cols-2 gap-2 mt-3"><input id="CommitSHA" placeholder="貼上 Commit SHA，用於單一 Commit 影響範圍比對"><div class="grid grid-cols-2 gap-2"><input id="BaseSHA" placeholder="Base SHA"><input id="HeadSHA" placeholder="Head SHA"></div></div><button class="按鈕 bg-purple-300 text-slate-950 mt-2" onclick="比對區間Commit()">比對 Base...Head 影響範圍</button></section><section class="grid lg:grid-cols-2 gap-4 mb-4"><div class="玻璃 卡 p-4"><h2 class="font-black text-xl mb-3">封版報告紀錄</h2><div id="封版區" class="overflow-auto max-h-[36vh]"></div></div><div class="玻璃 卡 p-4"><h2 class="font-black text-xl mb-3">Commit 影響範圍</h2><div id="影響區" class="overflow-auto max-h-[36vh]"></div></div></section><section class="玻璃 卡 p-4"><h2 class="font-black text-xl mb-3">報告 / 執行結果</h2><textarea id="報告" rows="18"></textarea></section></main><script>let 資料={封版報告:[],Commit影響範圍:[]};function GAS(){return localStorage.getItem('GAS網址')||''}function 儲存設定(){localStorage.setItem('GAS網址',document.getElementById('GAS網址').value.trim());alert('已儲存')}async function 呼叫API(action,data={}){const url=GAS();if(!url)throw new Error('請先貼上 GAS Web App URL');const r=await fetch(url,{method:'POST',headers:{'Content-Type':'text/plain;charset=utf-8'},body:JSON.stringify({action,...data})});return r.json()}async function 載入總覽(){try{await 呼叫API('升級_v3_4_封版與影響範圍表');const r=await 呼叫API('取得_v3_4_封版總覽');if(!r.成功)throw new Error(r.訊息||'讀取失敗');資料=r;document.getElementById('狀態文字').textContent='封版總覽已同步';渲染()}catch(e){alert('請確認 GAS 已加入 v3_4 工具並重新部署。\n'+e.message)}}function 渲染(){document.getElementById('封版區').innerHTML=表格(資料.封版報告||[],['封版編號','建立時間','系統版本','封版狀態','修補完成率','重測通過率','未完成數','重測失敗數']);document.getElementById('影響區').innerHTML=表格(資料.Commit影響範圍||[],['影響編號','比對類型','CommitSHA','BaseSHA','HeadSHA','檔案路徑','變更狀態','變更行'])}function 表格(rows,hs){if(!rows.length)return '<p class="text-slate-300">尚無資料</p>';return `<table class="w-full text-sm"><thead><tr>${hs.map(h=>`<th class="text-left p-2 text-teal-200">${h}</th>`).join('')}</tr></thead><tbody>${rows.map(r=>`<tr class="border-t border-slate-700">${hs.map(h=>`<td class="p-2">${r[h]??''}</td>`).join('')}</tr>`).join('')}</tbody></table>`}async function 掃描重測失敗(){try{const r=await 呼叫API('掃描_v3_4_重測失敗自動再開修補任務');document.getElementById('報告').value=JSON.stringify(r,null,2)}catch(e){alert(e.message)}}async function 同步Issue(){try{const r=await 呼叫API('同步_v3_4_全部GitHubIssue狀態');document.getElementById('報告').value=JSON.stringify(r,null,2);await 載入總覽()}catch(e){alert(e.message)}}async function 比對Commit(){const sha=document.getElementById('CommitSHA').value.trim();if(!sha)return alert('請先貼上 Commit SHA');try{const r=await 呼叫API('比對_v3_4_單一Commit影響範圍',{CommitSHA:sha});document.getElementById('報告').value=JSON.stringify(r,null,2);await 載入總覽()}catch(e){alert(e.message)}}async function 比對區間Commit(){const base=document.getElementById('BaseSHA').value.trim();const head=document.getElementById('HeadSHA').value.trim();if(!base||!head)return alert('請輸入 BaseSHA 與 HeadSHA');try{const r=await 呼叫API('比對_v3_4_Commit影響範圍',{BaseSHA:base,HeadSHA:head});document.getElementById('報告').value=JSON.stringify(r,null,2);await 載入總覽()}catch(e){alert(e.message)}}async function 產生封版報告(){try{const r=await 呼叫API('產生_v3_4_正式上線封版報告');document.getElementById('報告').value=r.報告||JSON.stringify(r,null,2);await 載入總覽()}catch(e){alert(e.message)}}async function 複製報告(){const t=document.getElementById('報告').value;if(!t.trim())return alert('尚未產生報告');await navigator.clipboard.writeText(t);alert('已複製')}document.getElementById('GAS網址').value=GAS();載入總覽();</script></body></html>
