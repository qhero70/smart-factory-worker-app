<!doctype html><html lang="zh-Hant"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>生產計畫清洗與工單生成</title><script src="https://cdn.tailwindcss.com"></script><style>body{font-family:-apple-system,BlinkMacSystemFont,'Noto Sans TC','Segoe UI',sans-serif;background:#07111f;color:#ecfeff}.玻璃{background:rgba(15,23,42,.78);border:1px solid rgba(148,163,184,.22);backdrop-filter:blur(18px)}.卡{border-radius:22px;box-shadow:0 18px 45px rgba(0,0,0,.28)}.按鈕{border-radius:16px;padding:.8rem 1rem;font-weight:900}input,select,textarea{background:#0f172a!important;border:1px solid #334155!important;color:#fff!important;border-radius:14px!important;padding:.75rem!important;width:100%}th,td{white-space:nowrap;vertical-align:top}.紅{color:#fca5a5}.黃{color:#fde68a}.綠{color:#86efac}</style></head><body><main class="max-w-7xl mx-auto p-4 pb-24"><section class="玻璃 卡 p-5 mb-4"><div class="flex flex-wrap justify-between items-center gap-3"><div><p class="text-teal-200 font-black text-sm">智慧製造中央作戰指揮中心 v2.2.0</p><h1 class="text-2xl md:text-4xl font-black">生產計畫清洗與工單生成</h1><p id="狀態文字" class="text-slate-300 mt-1">支援 CTB 齊套率、缺料紅燈、共用素材、Tier 急迫度與禁止投產防呆欄位。</p></div><div class="flex gap-2"><a class="按鈕 bg-purple-300 text-slate-950" href="./ctb.html">CTB看板</a><a class="按鈕 bg-slate-700" href="./schedule.html">排程看板</a></div></div></section><section class="玻璃 卡 p-4 mb-4"><div class="grid md:grid-cols-[1fr_auto_auto_auto] gap-2"><input id="GAS網址" placeholder="貼上 GAS Web App URL"><button class="按鈕 bg-teal-500 text-slate-950" onclick="儲存設定()">儲存</button><button class="按鈕 bg-cyan-300 text-slate-950" onclick="測試連線()">測試</button><button class="按鈕 bg-amber-300 text-slate-950" onclick="欄位升級提示()">欄位升級</button></div></section><section class="grid lg:grid-cols-[450px_1fr] gap-4"><div class="玻璃 卡 p-4"><h2 class="font-black text-xl mb-3">標準計畫 CSV v2.2</h2><p class="text-slate-300 text-sm leading-7 mb-3">必填：產品編號、品名、計畫量、交期。CTB 欄位可空白，但要做紅黃綠白燈，需填齊套狀態、缺料原因、可用庫存、尚缺數量、Tier等級。</p><textarea id="CSV文字" rows="17"></textarea><div class="grid grid-cols-2 gap-2 mt-3"><button class="按鈕 bg-amber-300 text-slate-950" onclick="載入範例()">載入範例</button><button class="按鈕 bg-teal-400 text-slate-950" onclick="清洗計畫()">清洗計畫</button><button class="按鈕 bg-cyan-300 text-slate-950" onclick="下載模板()">下載模板</button><button class="按鈕 bg-lime-300 text-slate-950" onclick="檢查主檔缺漏()">檢查缺漏</button><button class="按鈕 bg-fuchsia-300 text-slate-950" onclick="寫入工單()">寫入工單</button><button class="按鈕 bg-orange-300 text-slate-950" onclick="寫入排程需求池()">寫入需求池</button></div><button class="按鈕 bg-slate-600 text-white w-full mt-2" onclick="下載排程需求CSV()">下載排程需求池 CSV</button></div><div class="space-y-4"><div class="grid grid-cols-2 md:grid-cols-4 gap-3" id="統計區"></div><div class="玻璃 卡 p-4 overflow-hidden"><h2 class="font-black text-xl mb-3">清洗結果｜工單</h2><div id="清洗結果" class="overflow-auto max-h-[32vh]"></div></div><div class="玻璃 卡 p-4 overflow-hidden"><h2 class="font-black text-xl mb-3">排程需求池 / CTB</h2><div id="排程結果" class="overflow-auto max-h-[30vh]"></div></div><div class="玻璃 卡 p-4"><h2 class="font-black text-xl mb-3">檢查訊息</h2><div id="檢查訊息" class="space-y-2"></div></div></div></section></main><script>const 欄位='產品編號,客戶品號,品名,計畫量,交期,訂單月份,月訂單,供料日,出貨日,訂單欠量,工站名稱,建議機台,需求人力,負責人,預計開工日,預計完工日,優先級,來源,共用素材編號,共用素材名稱,齊套狀態,供料狀態,缺料原因,可用庫存,已鎖定數量,尚缺數量,前置天數,Tier等級,交期急迫度,投產允許,素材鎖定狀態,委外廠商,委外交期,委外狀態,備註'.split(',');let 清洗資料=[],排程資料=[],最近缺漏=null;function GAS(){return localStorage.getItem('GAS網址')||''}async function 呼叫API(action,data={}){const url=GAS();if(!url)throw new Error('請先貼上 GAS Web App URL');const r=await fetch(url,{method:'POST',headers:{'Content-Type':'text/plain;charset=utf-8'},body:JSON.stringify({action,...data})});return r.json()}function 儲存設定(){localStorage.setItem('GAS網址',document.getElementById('GAS網址').value.trim());alert('已儲存')}async function 測試連線(){try{const r=await 呼叫API('健康檢查');document.getElementById('狀態文字').textContent='已連線｜'+r.版本;alert(JSON.stringify(r,null,2))}catch(e){alert(e.message)}}function 欄位升級提示(){alert('請在 Apps Script 依序執行：\n1. 升級_v2_1_欄位結構()\n2. 升級_v2_2_CTB齊套缺料欄位()\n完成後，10_排程需求池才會有 CTB / 缺料 / Tier 欄位。')}function 載入範例(){document.getElementById('CSV文字').value=欄位.join(',')+'\nA900200000,CUST-A9002,ASSY 測試成品,100,2026-06-05,202606,500,2026-06-02,2026-06-08,20,A5 精車站,1064,1,嘉欣,2026-06-03,2026-06-05,高,5月計畫表,A801910008,ACW4283460,缺料,待供料,缺棧板,80,0,20,3,Tier 1,當週出貨,禁止投產,素材鎖定,鑫光,2026-06-02,待回覆,測試';}function 解析CSV(text){const rows=[];let row=[],cur='',q=false;for(let i=0;i<text.length;i++){const c=text[i],n=text[i+1];if(c==='"'&&q&&n==='"'){cur+='"';i++;continue}if(c==='"'){q=!q;continue}if(c===','&&!q){row.push(cur);cur='';continue}if((c==='\n'||c==='\r')&&!q){if(c==='\r'&&n==='\n')i++;row.push(cur);if(row.some(v=>v.trim()!==''))rows.push(row);row=[];cur='';continue}cur+=c}row.push(cur);if(row.some(v=>v.trim()!==''))rows.push(row);return rows}function 取(o,k,d=''){return o[k]||d}function 數(o,k){return Number(o[k]||0)}function 日期碼(){const d=new Date();return d.getFullYear()+String(d.getMonth()+1).padStart(2,'0')+String(d.getDate()).padStart(2,'0')}function 今天(){return new Date().toISOString().slice(0,10)}function 自動Tier(o){if(o['Tier等級'])return {Tier等級:o['Tier等級'],交期急迫度:o['交期急迫度']||'',投產允許:o['投產允許']||''};const due=new Date(o['交期']);const t=new Date();t.setHours(0,0,0,0);if(isNaN(due))return {Tier等級:'Tier 4',交期急迫度:'未填交期',投產允許:'待確認'};due.setHours(0,0,0,0);const d=Math.round((due-t)/86400000);if(d<=7)return {Tier等級:'Tier 1',交期急迫度:d<0?'已逾期':'當週出貨',投產允許:'絕對優先'};if(d<=14)return {Tier等級:'Tier 2',交期急迫度:'下週出貨',投產允許:'優先排程'};if(d<=21)return {Tier等級:'Tier 3',交期急迫度:'兩週後',投產允許:'素材充足才允許'};return {Tier等級:'Tier 4',交期急迫度:'三週以上',投產允許:'禁止提前投產'}}function 清洗計畫(){const rows=解析CSV(document.getElementById('CSV文字').value.trim());清洗資料=[];排程資料=[];最近缺漏=null;const msg=[];if(rows.length<2){顯示訊息(['CSV 至少需要表頭與一筆資料'],true);return}const h=rows[0].map(x=>x.trim());['產品編號','品名','計畫量','交期'].forEach(x=>{if(!h.includes(x))msg.push('缺少必填欄位：'+x)});if(msg.length){顯示訊息(msg,true);return}rows.slice(1).forEach((r,i)=>{const o={};h.forEach((k,idx)=>o[k]=(r[idx]||'').trim());const qty=Number(o['計畫量']||0);if(!o['產品編號']||!o['品名']||!qty||!o['交期']){msg.push(`第 ${i+2} 列跳過：必填不足`);return}const 工單編號=o['工單編號']||`MO-${日期碼()}-${String(i+1).padStart(3,'0')}`;const tier=自動Tier(o);const 需求編號=`REQ-${工單編號}`;清洗資料.push({工單編號,產品編號:o['產品編號'],品名:o['品名'],計畫量:qty,已完成量:0,不良量:0,開始日:o['預計開工日']||今天(),預計完工日:o['預計完工日']||o['交期'],優先級:o['優先級']||tier.Tier等級,狀態:'待生產',備註:o['備註']||'',供料日:取(o,'供料日'),出貨日:取(o,'出貨日'),訂單欠量:數(o,'訂單欠量'),來源需求編號:需求編號});排程資料.push({需求編號,來源:o['來源']||'計畫清洗',產品編號:o['產品編號'],客戶品號:取(o,'客戶品號'),品名:o['品名'],需求量:qty,交期:o['交期'],訂單月份:取(o,'訂單月份'),月訂單:數(o,'月訂單'),建議工站:取(o,'工站名稱'),建議機台:取(o,'建議機台'),需求人力:取(o,'需求人力'),負責人:取(o,'負責人'),預計開工日:取(o,'預計開工日'),預計完工日:o['預計完工日']||o['交期'],供料日:取(o,'供料日'),出貨日:取(o,'出貨日'),訂單欠量:數(o,'訂單欠量'),共用素材編號:取(o,'共用素材編號'),共用素材名稱:取(o,'共用素材名稱'),齊套狀態:取(o,'齊套狀態'),供料狀態:取(o,'供料狀態'),缺料原因:取(o,'缺料原因'),可用庫存:數(o,'可用庫存'),已鎖定數量:數(o,'已鎖定數量'),尚缺數量:數(o,'尚缺數量'),前置天數:數(o,'前置天數'),Tier等級:tier.Tier等級,交期急迫度:tier.交期急迫度,投產允許:tier.投產允許,素材鎖定狀態:取(o,'素材鎖定狀態'),委外廠商:取(o,'委外廠商'),委外交期:取(o,'委外交期'),委外狀態:取(o,'委外狀態'),狀態:'待排程',排程備註:o['備註']||'',更新時間:new Date().toISOString()});});顯示結果();顯示訊息(msg.length?msg:['清洗完成：CTB / 缺料 / Tier 欄位已保留，請寫入需求池後到 CTB 看板查看。'],!!msg.length)}function 顯示結果(){document.getElementById('統計區').innerHTML=[['工單筆數',清洗資料.length],['需求池筆數',排程資料.length],['紅燈候選',排程資料.filter(x=>x.齊套狀態.includes('缺')||x.尚缺數量>0||x.缺料原因).length],['Tier1',排程資料.filter(x=>x.Tier等級==='Tier 1').length]].map(x=>`<div class="玻璃 卡 p-4"><p class="text-slate-400 text-xs">${x[0]}</p><p class="text-2xl font-black">${x[1]}</p></div>`).join('');document.getElementById('清洗結果').innerHTML=表格(清洗資料);document.getElementById('排程結果').innerHTML=表格(排程資料)}function 顯示訊息(list,warning){document.getElementById('檢查訊息').innerHTML=list.map(x=>`<div class="${warning?'bg-amber-500/20 border-amber-300':'bg-emerald-500/20 border-emerald-300'} border rounded-2xl p-3 whitespace-pre-wrap">${x}</div>`).join('')}function 表格(rows){if(!rows.length)return '<p class="text-slate-300">尚無資料</p>';const hs=Object.keys(rows[0]);return `<table class="w-full text-sm"><thead><tr>${hs.map(h=>`<th class="text-left p-2 text-teal-200">${h}</th>`).join('')}</tr></thead><tbody>${rows.map(r=>`<tr class="border-t border-slate-700">${hs.map(h=>`<td class="p-2">${r[h]??''}</td>`).join('')}</tr>`).join('')}</tbody></table>`}async function 檢查主檔缺漏(){if(!排程資料.length)return alert('請先清洗計畫');try{const r=await 呼叫API('檢查計畫主檔缺漏',{排程資料});最近缺漏=r;const msg=[];if(r.缺產品?.length)msg.push('缺產品主檔：'+r.缺產品.join('、'));if(r.缺工站?.length)msg.push('缺工站主檔：'+r.缺工站.join('、'));if(r.缺機台?.length)msg.push('缺機台主檔：'+r.缺機台.join('、'));if(!msg.length)msg.push('主檔檢查完成。');顯示訊息(msg,!r.是否可排程)}catch(e){顯示訊息([e.message],true)}}async function 寫入工單(){if(!清洗資料.length)return alert('請先清洗計畫');if(!confirm(`確定寫入 ${清洗資料.length} 筆工單？`))return;let ok=0,fail=0;for(const x of 清洗資料){try{const r=await 呼叫API('新增或更新主檔',{工作表名稱:'10_工單主檔',資料:x});r.成功?ok++:fail++}catch(e){fail++}}alert(`工單寫入完成：成功 ${ok}，失敗 ${fail}`)}async function 寫入排程需求池(){if(!排程資料.length)return alert('請先清洗計畫');if(!confirm(`確定逐筆寫入 ${排程資料.length} 筆排程需求？\n請先確認已執行 v2.1 與 v2.2 欄位升級。`))return;let ok=0,fail=0;for(const x of 排程資料){try{const r=await 呼叫API('新增或更新主檔',{工作表名稱:'10_排程需求池',資料:x});r.成功?ok++:fail++}catch(e){fail++}}alert(`需求池寫入完成：成功 ${ok}，失敗 ${fail}`)}function 轉CSV(rows){if(!rows.length)return '';const hs=Object.keys(rows[0]);const esc=v=>`"${String(v??'').replace(/"/g,'""')}"`;return hs.join(',')+'\n'+rows.map(r=>hs.map(h=>esc(r[h])).join(',')).join('\n')}function 下載模板(){下載('生產計畫標準匯入模板_v2_2.csv',欄位.join(',')+'\n')}function 下載排程需求CSV(){if(!排程資料.length)return alert('請先清洗計畫');下載('10_排程需求池_匯入資料_v2_2.csv',轉CSV(排程資料))}function 下載(name,text){const blob=new Blob(['\ufeff'+text],{type:'text/csv;charset=utf-8'});const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=name;a.click();URL.revokeObjectURL(a.href)}document.getElementById('GAS網址').value=GAS();載入範例();</script></body></html>
