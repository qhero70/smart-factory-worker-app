<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="theme-color" content="#05050a">
<title>製造部・報工作業 V3 正式穩定版</title>
<script src="./pwa-config.js?v=269"></script>
<script src="./gas-bridge.js?v=213"></script>
<style>
:root{--底:#05050a;--卡:#111827;--卡2:#0b1220;--線:#243244;--藍:#22d3ee;--綠:#22c55e;--紅:#fb7185;--金:#fde68a;--字:#e5f7ff;--淡:#94a3b8;--底安:env(safe-area-inset-bottom,12px)}
*{box-sizing:border-box}html,body{margin:0;min-height:100%;background:var(--底);color:var(--字);font-family:-apple-system,BlinkMacSystemFont,'Noto Sans TC','Microsoft JhengHei',system-ui,sans-serif}body{background:radial-gradient(circle at top,rgba(34,211,238,.12),transparent 45%),radial-gradient(circle at bottom,rgba(236,72,153,.08),transparent 55%),#05050a;overflow-x:hidden}.wrap{max-width:760px;margin:0 auto;padding:12px 12px 132px}.head{position:sticky;top:0;z-index:30;background:rgba(5,5,10,.94);backdrop-filter:blur(18px);border-bottom:1px solid var(--線);margin:0 -12px 10px;padding:12px}.title{font-size:24px;font-weight:1000;line-height:1.15;color:#c8f7ff}.sub{font-size:12px;color:#ff3b93;font-weight:900;margin-top:4px}.status{margin-top:10px;border:1px solid rgba(34,211,238,.55);background:rgba(34,211,238,.08);color:var(--藍);border-radius:12px;padding:8px 10px;font-size:13px;font-weight:900;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.tabs{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-top:12px}.tab{border:1px solid var(--線);background:rgba(255,255,255,.05);color:var(--淡);border-radius:14px;padding:12px 4px;font-size:13px;font-weight:1000}.tab.on{border-color:var(--藍);background:rgba(34,211,238,.13);color:var(--藍)}.bar{display:flex;gap:8px;margin-top:12px}.scan{width:52px;border:1px solid var(--藍);background:rgba(34,211,238,.1);color:var(--藍);border-radius:14px;font-size:26px;font-weight:1000}.input,.select,.textarea{width:100%;border:1px solid var(--線);background:rgba(255,255,255,.06);color:var(--字);border-radius:14px;padding:14px 14px;font-size:16px;font-weight:800;outline:none}.input:focus,.select:focus,.textarea:focus{border-color:var(--藍);box-shadow:0 0 0 3px rgba(34,211,238,.12)}.chips{display:flex;gap:8px;overflow-x:auto;padding:10px 0 2px}.chip{flex:0 0 auto;border:1px solid var(--線);background:rgba(255,255,255,.05);color:white;border-radius:999px;padding:7px 14px;font-size:13px;font-weight:900}.card{border:1px solid var(--線);background:rgba(17,24,39,.86);border-radius:20px;padding:16px;margin:14px 0;box-shadow:0 12px 32px rgba(0,0,0,.28)}.section-title{font-size:20px;font-weight:1000;margin-bottom:12px;color:white}.grid{display:grid;grid-template-columns:1fr;gap:12px;max-height:58vh;overflow:auto;padding-right:2px;-webkit-overflow-scrolling:touch}.item{border:1px solid var(--線);background:rgba(255,255,255,.045);border-radius:18px;padding:10px;display:grid;grid-template-columns:82px 1fr;gap:12px;align-items:center;min-height:104px}.item.on{border-color:var(--藍);box-shadow:0 0 0 3px rgba(34,211,238,.13)}.photo{width:82px;height:82px;border-radius:16px;overflow:hidden;background:#07101c;border:1px solid rgba(255,255,255,.08);display:flex;align-items:center;justify-content:center;color:var(--淡);font-size:12px;font-weight:900;text-align:center}.photo img{width:100%;height:100%;object-fit:cover;display:block}.item h3{margin:0 0 6px;font-size:20px;line-height:1.2}.meta{color:var(--淡);font-size:13px;font-weight:800;line-height:1.45}.pill{display:inline-block;margin-top:6px;border:1px solid rgba(34,211,238,.45);background:rgba(34,211,238,.1);color:#8ff4ff;border-radius:999px;padding:3px 9px;font-size:12px;font-weight:900}.selected-only .item:not(.on){display:none}.selected-only{max-height:140px;overflow:visible}.row{display:grid;grid-template-columns:1fr 1fr;gap:10px}.label{font-size:13px;color:var(--淡);font-weight:900;margin:10px 0 6px}.required:after{content:' *';color:var(--紅)}.machine{border:1px solid var(--線);background:rgba(255,255,255,.045);border-radius:18px;padding:10px;text-align:center}.machine .machine-photo{width:100%;height:128px;border-radius:14px;background:#0b1220;overflow:hidden;display:flex;align-items:center;justify-content:center;color:var(--淡);font-weight:900}.machine img{width:100%;height:100%;object-fit:cover}.machine b{display:block;color:var(--藍);font-size:22px;margin-top:8px}.summary{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-top:12px}.num{background:rgba(0,0,0,.28);border:1px solid var(--線);border-radius:16px;padding:14px 6px;text-align:center}.num span{display:block;color:var(--淡);font-size:12px;font-weight:900}.num b{display:block;font-size:24px;margin-top:4px}.bad-row{display:grid;grid-template-columns:1.5fr .8fr 42px;gap:8px;margin-bottom:8px}.btn{border:1px solid var(--線);background:rgba(255,255,255,.06);color:white;border-radius:14px;padding:12px;font-weight:1000;font-size:15px}.btn.primary{border:0;background:linear-gradient(135deg,#22c55e,#06b6d4,#2563eb)}.btn.blue{border:0;background:#2389ff}.btn.danger{background:rgba(244,63,94,.15);border-color:rgba(244,63,94,.35);color:#fecdd3}.bottom{position:fixed;left:0;right:0;bottom:0;z-index:40;background:linear-gradient(to top,#05050a 74%,rgba(5,5,10,0));padding:18px 12px calc(12px + var(--底安));display:grid;grid-template-columns:.9fr 2fr 1fr;gap:10px;max-width:760px;margin:0 auto}.msg{border:1px solid rgba(34,211,238,.3);background:rgba(34,211,238,.07);border-radius:16px;padding:12px;color:#cffafe;font-size:14px;font-weight:800;white-space:pre-wrap}.msg.err{border-color:rgba(251,113,133,.45);background:rgba(251,113,133,.11);color:#fecdd3}.hidden{display:none!important}pre{white-space:pre-wrap;word-break:break-word}.loading{position:fixed;inset:0;background:rgba(5,5,10,.86);z-index:99;display:none;align-items:center;justify-content:center;font-size:20px;font-weight:1000}.loading.show{display:flex}@media(max-width:520px){.wrap{padding-left:10px;padding-right:10px}.row{grid-template-columns:1fr}.summary{grid-template-columns:1fr}.bottom{grid-template-columns:.9fr 1.9fr 1fr}.title{font-size:22px}.item{grid-template-columns:76px 1fr}.photo{width:76px;height:76px}}
</style>
</head>
<body>
<div id="loading" class="loading">處理中...</div>
<div class="wrap">
  <header class="head">
    <div class="title">🏭 製造部・報工作業 V3</div>
    <div class="sub">乾淨正式版｜不載入 V2 補丁｜主線報工扣工單</div>
    <div id="status" class="status">🟡 初始化中...</div>
    <div class="bar"><button id="scanBtn" class="scan" type="button">#</button><input id="search" class="input" placeholder="搜尋工號、姓名、產品、料號..."></div>
    <div id="chips" class="chips"></div>
    <nav class="tabs">
      <button class="tab on" data-tab="operator">人員<br>Operator</button>
      <button class="tab" data-tab="workpiece">工件<br>Workpiece</button>
      <button class="tab" data-tab="output">產出<br>Output</button>
      <button class="tab" data-tab="quality">品質<br>Quality</button>
    </nav>
  </header>

  <section id="operator" class="page">
    <div class="card"><div class="section-title">👥 作業員選擇</div><div id="peopleList" class="grid"></div></div>
    <div class="card"><div class="section-title">✅ 已選人員</div><div id="selectedPerson" class="msg">尚未選定人員。</div></div>
  </section>

  <section id="workpiece" class="page hidden">
    <div class="card"><div class="section-title">📦 工件選擇</div><div id="productList" class="grid"></div></div>
    <div class="card"><div class="section-title">🛠 工站 / 機台</div><div class="label required">工站</div><select id="stationSelect" class="select"><option value="">請先選擇產品</option></select><div id="stationHint" class="msg" style="margin-top:10px">選產品後列出可報工工站。</div><div id="machineBox" style="margin-top:12px"></div></div>
  </section>

  <section id="output" class="page hidden">
    <div class="card"><div class="section-title">🧾 產出數量</div>
      <div class="row"><div><div class="label required">作業日</div><input id="workDate" class="input" type="date"></div><div><div class="label required">班別</div><select id="shift" class="select"></select></div></div>
      <div class="label required">今日共做數</div><input id="totalQty" class="input" type="number" min="0" inputmode="numeric" placeholder="輸入今日共做數">
      <div class="row"><div><div class="label">開始時間</div><input id="startTime" class="input" type="datetime-local"></div><div><div class="label">結束時間</div><input id="endTime" class="input" type="datetime-local"></div></div>
      <div class="row"><div><div class="label">實際工時</div><input id="workMinutes" class="input" readonly></div><div><div class="label">實際良品數</div><input id="goodQty" class="input" readonly></div></div>
      <div class="row"><div><div class="label">是否加班</div><select id="overtime" class="select"><option>否</option><option>是</option></select></div><div><div class="label">加班類型</div><select id="overtimeType" class="select"><option value="">無</option><option>平日加班</option><option>假日加班</option></select></div></div>
      <div class="summary"><div class="num"><span>產出</span><b id="nTotal">—</b></div><div class="num"><span>不良</span><b id="nBad">—</b></div><div class="num"><span>良品</span><b id="nGood">—</b></div></div>
    </div>
  </section>

  <section id="quality" class="page hidden">
    <div class="card"><div class="section-title">🔎 不良與異常</div>
      <div class="label">沒有不良可留空</div><input id="quickBad" class="input" type="number" min="0" inputmode="numeric" placeholder="不良總數">
      <div id="badList" style="margin-top:10px"></div><button id="addBad" class="btn" type="button">＋ 新增不良分配</button>
      <div class="row"><div><div class="label">異常類型</div><select id="abnormalType" class="select"><option value="">無</option><option>設備異常</option><option>品質異常</option><option>物料異常</option><option>人員異常</option></select></div><div><div class="label">責任歸屬</div><select id="responsibility" class="select"><option>無</option><option>Y</option><option>Z</option><option>設備</option><option>製程</option></select></div></div>
      <div class="row"><div><div class="label">異常開始</div><input id="abStart" class="input" type="datetime-local"></div><div><div class="label">異常結束</div><input id="abEnd" class="input" type="datetime-local"></div></div>
    </div>
    <div class="card"><div class="section-title">📷 現場照片</div><input id="photoInput" type="file" accept="image/*" capture="environment" class="hidden"><input id="fileInput" type="file" accept="image/*" multiple class="hidden"><div class="row"><button id="takePhoto" class="btn" type="button">拍照</button><button id="pickPhoto" class="btn" type="button">選圖</button></div><div class="label">照片備註</div><textarea id="photoNote" class="textarea" placeholder="可留空"></textarea><div id="photoCount" class="meta">0 / 12 張照片</div></div>
    <div class="card"><div class="section-title">📤 報工預覽</div><pre id="preview" class="msg"></pre></div>
  </section>
</div>
<div class="bottom"><button id="prevBtn" class="btn" type="button">← 上一步</button><button id="submitBtn" class="btn primary" type="button">確認送出</button><button id="nextBtn" class="btn blue" type="button">下一步 →</button></div>

<script>
(function(){
'use strict';
const VERSION='v3.0.0_clean_mainline';
const PHOTO={產品:{A503203008:'https://drive.google.com/thumbnail?id=1I6O1zGcDkqxGo4lP65OI0o4GnlXBV9_B&sz=w900',A401800000:'https://drive.google.com/thumbnail?id=12JgM6j8_KipUKdz_nhXIV_rbfYJ21hCC&sz=w900',A402301020:'https://drive.google.com/thumbnail?id=1ZEqwxEZmZuu5ZNv-pCvO_8nf7mM0tMjw&sz=w900',A402300020:'https://drive.google.com/thumbnail?id=1l0BaMP7WyiEi9s1XjyzaZHJTXFd2KVJ5&sz=w900',Z907403008:'https://drive.google.com/thumbnail?id=1je6tB0_pnYDxxoXaawlt_1U-H4_tkJai&sz=w900',Z907500010:'https://drive.google.com/thumbnail?id=17rcFPqGjO0WN1m4SrFddMoeXuMqLZiS9&sz=w900',Z916300000:'https://drive.google.com/thumbnail?id=1N_LadssPxVwlUqJ7TLMosSvUbsDuxR0O&sz=w900',Z005300000:'https://drive.google.com/thumbnail?id=1H1HaUy0gDyW6Cv7oyp4z0xuBgI452Yqq&sz=w900',Z004400000:'https://drive.google.com/thumbnail?id=1anfvWzMKyBiBnIYpJEm4XIzYJ3S1IHBm&sz=w900'},機台:{77:'https://drive.google.com/thumbnail?id=1Q6V44wBAFkXcUXbfX2Xk-6g5lPmSgf0F&sz=w900',1072:'https://drive.google.com/thumbnail?id=1tswECGJpdkfjHzHfaXy79bBGhMEDrLZB&sz=w900',390:'https://drive.google.com/thumbnail?id=1fbQZs1DCfLNz64ENo_TwOKndpTdg1o9k&sz=w900',4:'https://drive.google.com/thumbnail?id=1rh0YulvyD_YnDMdh6EZT3tpFxfT-r5Dz&sz=w900',397:'https://drive.google.com/thumbnail?id=1VVjF1PZ6XOIBeTiLLRWa6eJTB1VNagFT&sz=w900',424:'https://drive.google.com/thumbnail?id=1d4onFkHXAKSBGoZlx-dwbREgvl0D4cJF&sz=w900',1061:'https://drive.google.com/thumbnail?id=1fwkelwLkr4ogG0wbbBzutBkIIvMT0Fy6&sz=w900',129:'https://drive.google.com/thumbnail?id=1r7gX_ZBKSAigsnBC1nJ648mzm2eIArZB&sz=w900',447:'https://drive.google.com/thumbnail?id=13Eq4rl5V8jgO1wKCLr1EsDt3qnu49mlN&sz=w900',7:'https://drive.google.com/thumbnail?id=1nDKK1sePd1FMPWK40vNXyiJxs-y_66pE&sz=w900',334:'https://drive.google.com/thumbnail?id=1AVgs69xyXSLuWPM29g9fKSMcQDRomchL&sz=w900',1071:'https://drive.google.com/thumbnail?id=1rknzLeQ69kfKRIjShWMWm-V7VSQ26CQW&sz=w900',387:'https://drive.google.com/thumbnail?id=1YGs9Z3k2LCVJ1sEdNVTr27r2YpXm69NY&sz=w900',204:'https://drive.google.com/thumbnail?id=1DApcuqdreyehEEHsAJaB45Qp8aPrRD69&sz=w900'}};
const $=id=>document.getElementById(id); const $$=s=>Array.from(document.querySelectorAll(s));
const st={raw:null,people:[],products:[],stations:[],machines:[],shifts:['早班','中班','大夜班'],badCodes:[],photos:[],tab:'operator',person:null,product:null,station:null,machine:null,task:null};
function text(v){if(v==null)return''; if(typeof v==='object'){for(const k of ['文字','text','value','name','名稱','姓名','產品編號','工號','機台編號']){if(v[k])return String(v[k]).trim()} return ''} return String(v).trim()}
function norm(v){return text(v).replace(/[^A-Za-z0-9]/g,'').toUpperCase()}
function pick(o,keys){if(!o)return''; for(const k of keys){const v=text(o[k]); if(v)return v} return''}
function esc(s){return text(s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]))}
function dateStr(d=new Date()){const z=n=>String(n).padStart(2,'0');return d.getFullYear()+'-'+z(d.getMonth()+1)+'-'+z(d.getDate())}
function dtLocal(d=new Date()){const z=n=>String(n).padStart(2,'0');return d.getFullYear()+'-'+z(d.getMonth()+1)+'-'+z(d.getDate())+'T'+z(d.getHours())+':'+z(d.getMinutes())}
function setMsg(msg,err=false){$('status').textContent=(err?'🔴 ':'🟢 ')+msg; $('status').style.borderColor=err?'rgba(251,113,133,.55)':'rgba(34,211,238,.55)'}
function loading(on,msg='處理中...'){$('loading').textContent=msg;$('loading').classList.toggle('show',!!on)}
function arr(x){if(Array.isArray(x))return x; if(!x||typeof x!=='object')return[]; for(const k of ['資料','data','rows','items','人員','產品','工站群組','機台']) if(Array.isArray(x[k])) return x[k]; return []}
function img(url,label){return url?`<img src="${esc(url)}" loading="eager" referrerpolicy="no-referrer" onerror="this.outerHTML='<div class=\'photo\'>照片載入失敗</div>'">`:`<span>${esc(label||'尚無照片')}</span>`}
function personPhoto(p){return pick(p,['照片網址','照片','人員照片','頭像','圖片網址'])}
function productPhoto(p){const code=norm(pick(p,['產品編號','料號','品名']));return pick(p,['照片網址','產品照片','照片','圖片網址'])||PHOTO.產品[code]||''}
function machinePhoto(id,m){return PHOTO.機台[norm(id)]||pick(m,['照片網址','機台照片','照片','圖片網址'])}
function machineName(id){if(String(id)==='489')return'臥式綜合加工機｜HB-630 / 024977'; return '機台'+id}
function normalizeData(raw){st.raw=raw||{}; st.people=arr(raw.人員||raw.people||raw.staff||raw.人員主檔); st.products=arr(raw.產品||raw.products||raw.產品主檔); st.stations=arr(raw.工站群組||raw.stations||raw.工站||raw.途程); st.machines=arr(raw.機台||raw.machines||raw.機台主檔); st.badCodes=arr(raw.不良代號||raw.badCodes||raw.不良); if(Array.isArray(raw.班別))st.shifts=raw.班別.map(text).filter(Boolean);}
function loadTask(){try{const keys=['NEXUS_OS_今日報工任務','智慧製造_今日報工任務','今日報工任務'];for(const k of keys){const v=localStorage.getItem(k); if(v){st.task=JSON.parse(v);break}}}catch(e){}}
function renderChips(){const people=st.people.slice(0,8);$('chips').innerHTML=people.map(p=>`<button class="chip" type="button" data-emp="${esc(pick(p,['工號']))}">${esc(pick(p,['姓名'])||pick(p,['工號']))}</button>`).join('')}
function renderPeople(){const q=norm($('search').value);let rows=st.people.filter(p=>!q||norm(JSON.stringify(p)).includes(q)); if(st.person) rows=[st.person]; $('peopleList').classList.toggle('selected-only',!!st.person); $('peopleList').innerHTML=rows.map((p,i)=>{const id=pick(p,['工號','員工編號']);const name=pick(p,['姓名','名稱']);const photo=personPhoto(p);return `<div class="item ${st.person&&pick(st.person,['工號'])===id?'on':''}" data-person="${i}" data-emp="${esc(id)}"><div class="photo">${img(photo,'人員照片')}</div><div><h3>${esc(name||id)}</h3><div class="meta">工號：${esc(id)}<br>${esc(pick(p,['部門']))}｜${esc(pick(p,['組別']))}｜${esc(pick(p,['職稱']))}</div><span class="pill">${esc(pick(p,['班別'])||'早班')}</span></div></div>`}).join('')||'<div class="msg err">沒有符合的人員。</div>'; $('selectedPerson').textContent=st.person?`已選：${pick(st.person,['姓名'])}｜${pick(st.person,['工號'])}`:'尚未選定人員。';}
function productKey(p){return pick(p,['產品編號','料號','品名'])+'|'+pick(p,['客戶品號','客戶料號'])}
function renderProducts(){const q=norm($('search').value);let rows=st.products.filter(p=>!q||norm(JSON.stringify(p)).includes(q)); if(st.product) rows=[st.product]; $('productList').classList.toggle('selected-only',!!st.product); $('productList').innerHTML=rows.map((p,i)=>{const code=pick(p,['產品編號','料號','品名']);const cust=pick(p,['客戶品號','客戶料號']);const name=pick(p,['品名','產品名稱'])||code;const photo=productPhoto(p);return `<div class="item ${st.product&&productKey(st.product)===productKey(p)?'on':''}" data-product="${i}"><div class="photo">${img(photo,'產品照片')}</div><div><h3>${esc(name)}</h3><div class="meta">產品：${esc(code)}<br>客戶品號：${esc(cust)}</div><span class="pill">選擇產品</span></div></div>`}).join('')||'<div class="msg err">沒有符合的產品。</div>'; renderStations();}
function relatedStations(){if(!st.product)return[]; const code=norm(pick(st.product,['產品編號','料號','品名'])); const cust=norm(pick(st.product,['客戶品號','客戶料號'])); return st.stations.filter(s=>norm(pick(s,['產品編號','料號','品名'])).includes(code)||norm(pick(s,['客戶品號','客戶料號'])).includes(cust)||norm(JSON.stringify(s)).includes(code)||norm(JSON.stringify(s)).includes(cust));}
function machineIdsFrom(s){let ids=[]; const src=[pick(s,['主機台','機台編號','機台','設備編號']), text(s && s.機台清單), text(s && s.工站名稱), text(s && s.工序)].join(' '); ids=(src.match(/\b\d{1,5}\b/g)||[]).filter(x=>!/^(110|120|130|140|150|160|170|180)$/.test(x)); return [...new Set(ids)].slice(0,1)}
function renderStations(){const sel=$('stationSelect'); const list=relatedStations(); if(!st.product){sel.innerHTML='<option value="">請先選擇產品</option>';$('stationHint').textContent='選產品後會列出此產品可報工工站。';$('machineBox').innerHTML='';return} if(!list.length){sel.innerHTML='<option value="">無途程資料</option>';$('stationHint').className='msg err';$('stationHint').textContent='此產品尚未建立工站途程，請先補 08_工站途程機台主檔。';$('machineBox').innerHTML='';return} $('stationHint').className='msg';$('stationHint').textContent=`此產品可選工站：${list.length} 筆`; sel.innerHTML='<option value="">請選擇工站</option>'+list.map((s,i)=>{const name=pick(s,['工站名稱','工站']);const op=pick(s,['工序','OP','製程']);const ids=machineIdsFrom(s).join('、');return `<option value="${i}">${esc(name)}${op?'｜'+esc(op):''}${ids?'｜'+esc(ids):''}</option>`}).join(''); if(st.station){const idx=list.indexOf(st.station);if(idx>=0)sel.value=String(idx)} renderMachine();}
function renderMachine(){const list=relatedStations(); const idx=Number($('stationSelect').value); st.station=list[idx]||null; if(!st.station){$('machineBox').innerHTML='<div class="machine"><div class="machine-photo">請先選擇工站</div></div>';st.machine=null;return} const ids=machineIdsFrom(st.station); const id=ids[0]||pick(st.station,['主機台','機台編號','機台']); const m=st.machines.find(x=>norm(pick(x,['機台編號','設備編號','主機台']))===norm(id))||{}; st.machine={id:id,name:pick(m,['機台名稱','設備名稱','名稱'])||machineName(id),photo:machinePhoto(id,m)}; $('machineBox').innerHTML=`<div class="machine"><div class="machine-photo">${img(st.machine.photo,'機台照片尚未回填<br>'+id)}</div><b>${esc(id)}</b><div class="meta">${esc(st.machine.name)}</div></div>`; updatePreview();}
function renderShift(){const s=$('shift');s.innerHTML=st.shifts.map(x=>`<option>${esc(x)}</option>`).join('')||'<option>早班</option>'}
function addBadRow(){const row=document.createElement('div');row.className='bad-row';row.innerHTML=`<select class="select bad-code"><option value="">— 選擇不良原因 —</option>${st.badCodes.map(b=>`<option>${esc(pick(b,['不良代號','代號','名稱','不良原因'])||text(b))}</option>`).join('')}</select><input class="input bad-qty" type="number" min="0" inputmode="numeric" placeholder="數量"><button class="btn danger bad-del" type="button">×</button>`;$('badList').appendChild(row)}
function badQty(){let n=Number($('quickBad').value||0); $$('.bad-qty').forEach(x=>n+=Number(x.value||0)); return n}
function calc(){const total=Number($('totalQty').value||0); const bad=badQty(); const good=Math.max(0,total-bad); $('goodQty').value=total?good:''; $('nTotal').textContent=total||'—'; $('nBad').textContent=bad||'—'; $('nGood').textContent=total?good:'—'; const a=$('startTime').value,b=$('endTime').value; if(a&&b){const m=Math.max(0,Math.round((new Date(b)-new Date(a))/60000));$('workMinutes').value=m||''} updatePreview();}
function payload(){const total=Number($('totalQty').value||0),bad=badQty();return {來源:'GitHub Pages PWA 報工作業V3',版本:VERSION,作業日:$('workDate').value,工號:pick(st.person,['工號']),姓名:pick(st.person,['姓名']),班別:$('shift').value,產品編號:pick(st.product,['產品編號','料號','品名']),客戶品號:pick(st.product,['客戶品號','客戶料號']),品名:pick(st.product,['品名','產品名稱'])||pick(st.product,['產品編號','料號']),工站名稱:pick(st.station,['工站名稱','工站']),機台編號:st.machine&&st.machine.id,今日共做數:total,產出數量:total,不良數量:bad,實際良品數:Math.max(0,total-bad),開始時間:$('startTime').value,結束時間:$('endTime').value,實際工時:Number($('workMinutes').value||0),是否加班:$('overtime').value,加班類型:$('overtimeType').value,異常類型:$('abnormalType').value,責任歸屬:$('responsibility').value,異常開始時間:$('abStart').value,異常結束時間:$('abEnd').value,照片備註:$('photoNote').value,來源派班編號:pick(st.task,['派班編號']),來源需求編號:pick(st.task,['來源需求編號']),工單編號:pick(st.task,['工單編號','來源工單編號'])};}
function updatePreview(){$('preview').textContent=JSON.stringify(payload(),null,2)}
function showTab(t){st.tab=t;$$('.page').forEach(p=>p.classList.toggle('hidden',p.id!==t));$$('.tab').forEach(b=>b.classList.toggle('on',b.dataset.tab===t)); if(t==='operator')renderPeople(); if(t==='workpiece')renderProducts(); updatePreview()}
function validate(){if(!st.person)return'請先選人員'; if(!st.product)return'請先選產品'; if(!st.station)return'請先選工站'; if(!Number($('totalQty').value||0))return'請輸入今日共做數'; return''}
async function submit(){const err=validate(); if(err){setMsg(err,true);showTab(!st.person?'operator':!st.product||!st.station?'workpiece':'output');return} loading(true,'寫入報工中...'); try{const res=await GAS橋接器.寫入報工(payload()); const ok=res&&(res.成功!==false&&res.success!==false&&res.ok!==false); setMsg(ok?'報工送出完成':'報工送出可能失敗',!ok); alert(JSON.stringify(res,null,2).slice(0,900)); }catch(e){setMsg(e.message,true); alert(e.message)} finally{loading(false)}}
async function init(){try{$('workDate').value=dateStr();$('startTime').value=dtLocal(new Date(new Date().setHours(8,0,0,0)));$('endTime').value=dtLocal(new Date(new Date().setHours(16,50,0,0)));loadTask();setMsg('讀取主檔中...'); const raw=await GAS橋接器.取得報工初始資料(); normalizeData(raw); renderShift(); renderChips(); renderPeople(); renderProducts(); calc(); setMsg(`PWA 已連線｜人員:${st.people.length}｜產品:${st.products.length}｜工站:${st.stations.length}｜${VERSION}`); }catch(e){setMsg('讀取失敗：'+e.message,true); $('peopleList').innerHTML='<div class="msg err">主檔讀取失敗：'+esc(e.message)+'</div>'}}
$('peopleList').addEventListener('click',e=>{const card=e.target.closest('.item'); if(!card)return; const emp=card.dataset.emp; st.person=st.people.find(p=>pick(p,['工號'])===emp)||st.people[Number(card.dataset.person)]; renderPeople(); showTab('workpiece')});
$('productList').addEventListener('click',e=>{const card=e.target.closest('.item'); if(!card)return; const idx=Number(card.dataset.product); const rows=st.product?[st.product]:st.products.filter(p=>!$('search').value||norm(JSON.stringify(p)).includes(norm($('search').value))); st.product=rows[idx]||st.products[idx]; renderProducts();});
$('stationSelect').addEventListener('change',renderMachine);$('search').addEventListener('input',()=>{if(st.tab==='operator'){st.person=null;renderPeople()} if(st.tab==='workpiece'){st.product=null;renderProducts()}});$('chips').addEventListener('click',e=>{const b=e.target.closest('[data-emp]');if(!b)return;$('search').value=b.textContent.trim();st.person=st.people.find(p=>pick(p,['工號'])===b.dataset.emp);renderPeople();showTab('workpiece')});$$('.tab').forEach(b=>b.addEventListener('click',()=>showTab(b.dataset.tab)));$('nextBtn').onclick=()=>showTab(st.tab==='operator'?'workpiece':st.tab==='workpiece'?'output':st.tab==='output'?'quality':'quality');$('prevBtn').onclick=()=>showTab(st.tab==='quality'?'output':st.tab==='output'?'workpiece':st.tab==='workpiece'?'operator':'operator');$('submitBtn').onclick=submit;['totalQty','quickBad','startTime','endTime'].forEach(id=>$(id).addEventListener('input',calc));$('addBad').onclick=()=>{addBadRow();calc()};$('badList').addEventListener('input',calc);$('badList').addEventListener('click',e=>{if(e.target.classList.contains('bad-del')){e.target.closest('.bad-row').remove();calc()}});$('takePhoto').onclick=()=>$('photoInput').click();$('pickPhoto').onclick=()=>$('fileInput').click();
init();
})();
</script>
</body>
</html>
