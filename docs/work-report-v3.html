function renderChips(){$('chips').innerHTML=st.people.slice(0,8).map(p=>`<button class="chip" data-emp="${esc(pick(p,['工號']))}">${esc(pick(p,['姓名'])||pick(p,['工號']))}</button>`).join('')}
function renderPeople(){const q=norm($('search').value);let rows=st.people.filter(p=>!q||norm(JSON.stringify(p)).includes(q));if(st.person)rows=[st.person];$('peopleList').classList.toggle('selected-only',!!st.person);$('peopleList').innerHTML=rows.map((p,i)=>{const id=pick(p,['工號','員工編號']),name=pick(p,['姓名','名稱']),photo=pick(p,['照片網址','照片','人員照片','頭像']);return `<div class="item ${st.person&&pick(st.person,['工號'])===id?'on':''}" data-emp="${esc(id)}"><div class="photo">${img(photo,'人員照片')}</div><div><h3>${esc(name||id)}</h3><div class="meta">工號：${esc(id)}<br>${esc(pick(p,['部門']))}｜${esc(pick(p,['組別']))}｜${esc(pick(p,['職稱']))}</div><span class="pill">${esc(pick(p,['班別'])||'早班')}</span></div></div>`}).join('')||'<div class="msg err">沒有符合人員。</div>';$('selectedPerson').textContent=st.person?`已選：${pick(st.person,['姓名'])}｜${pick(st.person,['工號'])}`:'尚未選定人員。'}
function renderProducts(){const q=norm($('search').value);let rows=st.products.filter(p=>!q||norm(JSON.stringify(p)).includes(q));if(st.product)rows=[st.product];$('productList').classList.toggle('selected-only',!!st.product);$('productList').innerHTML=rows.map((p,i)=>{const code=pick(p,['產品編號','料號','品名']),cust=pick(p,['客戶品號','客戶料號']),name=pick(p,['品名','產品名稱'])||code;return `<div class="item ${st.product&&st.product.產品編號===p.產品編號?'on':''}" data-code="${esc(code)}"><div class="photo">${img(PHOTO.產品[norm(code)],'產品照片')}</div><div><h3>${esc(name)}</h3><div class="meta">產品：${esc(code)}<br>客戶品號：${esc(cust)}</div><span class="pill">選擇產品</span></div></div>`}).join('')||'<div class="msg err">沒有符合產品。</div>';renderStations()}
function related(){if(!st.product)return[];const c=norm(st.product.產品編號),u=norm(st.product.客戶品號);return st.routes.filter(r=>norm(r.產品編號)===c||norm(r.客戶品號)===u)} function mid(r){let s=text(r.主機台)||text(r.機台編號)||text(r.機台清單);let m=s.match(/\d{1,5}/);return m?m[0]:s} function renderStations(){const list=related(),sel=$('stationSelect');if(!st.product){sel.innerHTML='<option>請先選擇產品</option>';$('stationHint').textContent='選產品後會列出此產品可報工工站。';$('machineBox').innerHTML='';return} if(!list.length){sel.innerHTML='<option>無途程資料</option>';$('stationHint').className='msg err';$('stationHint').textContent='此產品尚未建立途程。';return}$('stationHint').className='msg';$('stationHint').textContent=`此產品可選工站：${list.length} 筆`;sel.innerHTML='<option value="">請選擇工站</option>'+list.map((r,i)=>`<option value="${i}">${esc(r.工站名稱)}｜${esc(r.工序)}｜${esc(mid(r))}</option>`).join('');renderMachine()}
function renderMachine(){const list=related(),r=list[Number($('stationSelect').value)];st.station=r||null;if(!r){$('machineBox').innerHTML='<div class="machine"><div class="machine-photo">請先選擇工站</div></div>';return}const id=mid(r);st.machine={id:id};$('machineBox').innerHTML=`<div class="machine"><div class="machine-photo">${img(PHOTO.機台[norm(id)],'機台照片尚未回填\n'+id)}</div><b>${esc(id)}</b><div class="meta">${esc(id==='489'?'臥式綜合加工機｜HB-630 / 024977':'機台'+id)}</div></div>`;preview()}
function renderShift(){$('shift').innerHTML=st.shifts.map(x=>`<option>${esc(x)}</option>`).join('')||'<option>早班</option>'} function calc(){const total=Number($('totalQty').value||0),bad=Number($('quickBad').value||0);$('goodQty').value=total?Math.max(0,total-bad):'';$('nTotal').textContent=total||'—';$('nBad').textContent=bad||'—';$('nGood').textContent=total?Math.max(0,total-bad):'—';const a=$('startTime').value,b=$('endTime').value;if(a&&b)$('workMinutes').value=Math.max(0,Math.round((new Date(b)-new Date(a))/60000))||'';preview()}
function payload(){const total=Number($('totalQty').value||0),bad=Number($('quickBad').value||0);return{來源:'GitHub Pages PWA 報工作業V3.1',版本:VERSION,作業日:$('workDate').value,工號:pick(st.person,['工號']),姓名:pick(st.person,['姓名']),班別:$('shift').value,產品編號:st.product&&st.product.產品編號,客戶品號:st.product&&st.product.客戶品號,品名:st.product&&st.product.品名,工站名稱:st.station&&st.station.工站名稱,機台編號:st.machine&&st.machine.id,今日共做數:total,產出數量:total,不良數量:bad,實際良品數:Math.max(0,total-bad),開始時間:$('startTime').value,結束時間:$('endTime').value,實際工時:Number($('workMinutes').value||0),是否加班:$('overtime').value,加班類型:$('overtimeType').value,異常類型:$('abnormalType').value,責任歸屬:$('responsibility').value,異常開始時間:$('abStart').value,異常結束時間:$('abEnd').value,照片備註:$('photoNote').value}} function preview(){$('preview').textContent=JSON.stringify(payload(),null,2)}
function tab(t){$$('.page').forEach(p=>p.classList.toggle('hidden',p.id!==t));$$('.tab').forEach(b=>b.classList.toggle('on',b.dataset.tab===t));if(t==='operator')renderPeople();if(t==='workpiece')renderProducts();preview()} async function submit(){if(!st.person)return status('請先選人員',true),tab('operator');if(!st.product)return status('請先選產品',true),tab('workpiece');if(!st.station)return status('請先選工站',true),tab('workpiece');if(!Number($('totalQty').value||0))return status('請輸入今日共做數',true),tab('output');loading(true);try{const res=await GAS橋接器.寫入報工(payload());alert(JSON.stringify(res,null,2).slice(0,900));status('報工送出完成')}catch(e){alert(e.message);status(e.message,true)}finally{loading(false)}}
$('peopleList').onclick=e=>{const card=e.target.closest('.item');if(!card)return;st.person=st.people.find(p=>pick(p,['工號'])===card.dataset.emp);renderPeople();tab('workpiece')};$('productList').onclick=e=>{const card=e.target.closest('.item');if(!card)return;st.product=st.products.find(p=>p.產品編號===card.dataset.code);renderProducts()};$('stationSelect').onchange=renderMachine;['search','totalQty','quickBad','startTime','endTime'].forEach(id=>$(id).addEventListener('input',()=>{if(id==='search'){if(document.querySelector('.tab.on').dataset.tab==='operator'){st.person=null;renderPeople()}else{st.product=null;renderProducts()}}else calc()}));$$('.tab').forEach(b=>b.onclick=()=>tab(b.dataset.tab));$('nextBtn').onclick=()=>{const t=document.querySelector('.tab.on').dataset.tab;tab(t==='operator'?'workpiece':t==='workpiece'?'output':t==='output'?'quality':'quality')};$('prevBtn').onclick=()=>{const t=document.querySelector('.tab.on').dataset.tab;tab(t==='quality'?'output':t==='output'?'workpiece':t==='workpiece'?'operator':'operator')};$('submitBtn').onclick=submit;
async function init(){try{$('workDate').value=dstr();$('startTime').value=dt(new Date(new Date().setHours(8,0,0,0)));$('endTime').value=dt(new Date(new Date().setHours(16,50,0,0)));status('讀取主檔中...');const raw=await GAS橋接器.取得報工初始資料();normalize(raw||{});renderShift();renderChips();renderPeople();renderProducts();calc();status(`PWA已連線｜人員:${st.people.length}｜工件:${st.products.length}｜途程:${st.routes.length}｜${VERSION}`)}catch(e){normalize({});renderShift();renderPeople();renderProducts();calc();status(`API讀取失敗，已啟用途程備援｜工件:${st.products.length}｜途程:${st.routes.length}`,true)}}init();
})();
</script>
</body>
