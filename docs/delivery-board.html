<!doctype html><html lang="zh-Hant"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>正式交付總包</title><script src="https://cdn.tailwindcss.com"></script><style>body{font-family:-apple-system,BlinkMacSystemFont,'Noto Sans TC','Segoe UI',sans-serif;background:#07111f;color:#ecfeff}.玻璃{background:rgba(15,23,42,.78);border:1px solid rgba(148,163,184,.22);backdrop-filter:blur(18px)}.卡{border-radius:22px;box-shadow:0 18px 45px rgba(0,0,0,.28)}.按鈕{border-radius:16px;padding:.75rem .9rem;font-weight:900}input,textarea{background:#0f172a!important;border:1px solid #334155!important;color:#fff!important;border-radius:14px!important;padding:.75rem!important;width:100%}th,td{white-space:nowrap}.小字{font-size:.78rem;color:#94a3b8}.正常{color:#86efac}.異常{color:#fca5a5}</style></head><body><main class="max-w-7xl mx-auto p-4 pb-24"><section class="玻璃 卡 p-5 mb-4"><div class="flex flex-wrap justify-between items-center gap-3"><div><p class="text-teal-200 font-black text-sm">智慧製造中央作戰指揮中心 v3.6.0</p><h1 class="text-2xl md:text-4xl font-black">正式交付總包</h1><p id="狀態文字" class="text-slate-300 mt-1">合併 PDF、交接清單 PDF、正式上線總包 ZIP、部署後每日健康檢查排程。</p></div><div class="flex gap-2"><a class="按鈕 bg-purple-200 text-slate-950" href="./handoff-board.html">正式交接</a><a class="按鈕 bg-amber-200 text-slate-950" href="./release-board.html">封版報告</a><a class="按鈕 bg-slate-700" href="./index.html">首頁</a></div></div></section><section class="玻璃 卡 p-4 mb-4"><div class="grid md:grid-cols-[1fr_auto_auto] gap-2"><input id="GAS網址" placeholder="貼上 GAS Web App URL"><button class="按鈕 bg-teal-500 text-slate-950" onclick="儲存設定()">儲存</button><button class="按鈕 bg-cyan-300 text-slate-950" onclick="載入總覽()">同步</button></div><div class="grid md:grid-cols-4 gap-2 mt-3"><button class="按鈕 bg-lime-300 text-slate-950" onclick="合併PDF()">合併PDF</button><button class="按鈕 bg-orange-300 text-slate-950" onclick="交接PDF()">交接清單PDF</button><button class="按鈕 bg-purple-300 text-slate-950" onclick="總包ZIP()">總包ZIP</button><button class="按鈕 bg-emerald-300 text-slate-950" onclick="健康檢查()">立即健康檢查</button></div><div class="grid md:grid-cols-3 gap-2 mt-3"><button class="按鈕 bg-blue-300 text-slate-950" onclick="建立排程()">建立每日健康排程</button><button class="按鈕 bg-red-300 text-slate-950" onclick="停用排程()">停用健康排程</button><button class="按鈕 bg-amber-300 text-slate-950" onclick="複製報告()">複製報告</button></div></section><section class="grid grid-cols-2 md:grid-cols-4 gap-3 mb-4" id="統計區"></section><section class="grid lg:grid-cols-2 gap-4 mb-4"><div class="玻璃 卡 p-4"><h2 class="font-black text-xl mb-3">正式交付檔案</h2><div id="交付區" class="overflow-auto max-h-[40vh]"></div></div><div class="玻璃 卡 p-4"><h2 class="font-black text-xl mb-3">健康檢查紀錄</h2><div id="健康區" class="overflow-auto max-h-[40vh]"></div></div></section><section class="玻璃 卡 p-4"><h2 class="font-black text-xl mb-3">報告 / 執行結果</h2><textarea id="報告" rows="16"></textarea></section></main><script>let 資料={統計:{},正式交付總包:[],健康檢查紀錄:[],健康檢查排程:[]};function GAS(){return localStorage.getItem('GAS網址')||''}function 儲存設定(){localStorage.setItem('GAS網址',document.getElementById('GAS網址').value.trim());alert('已儲存')}async function 呼叫API(action,data={}){const url=GAS();if(!url)throw new Error('請先貼上 GAS Web App URL');const r=await fetch(url,{method:'POST',headers:{'Content-Type':'text/plain;charset=utf-8'},body:JSON.stringify({action,...data})});return r.json()}async function 載入總覽(){try{await 呼叫API('升級_v3_6_正式交付總包表');const r=await 呼叫API('取得_v3_6_正式交付總包總覽');if(!r.成功)throw new Error(r.訊息||'讀取失敗');資料=r;document.getElementById('狀態文字').textContent='正式交付總包已同步';渲染()}catch(e){alert('請確認 GAS 已加入 v3_6 工具並重新部署。\n'+e.message)}}function 渲染(){const s=資料.統計||{};document.getElementById('統計區').innerHTML=[['交付檔案',s.交付檔案數],['健康排程',s.健康排程紀錄數],['健康紀錄',s.健康檢查紀錄數],['最近狀態',s.最近健康狀態]].map(x=>`<div class="玻璃 卡 p-4"><p class="小字">${x[0]}</p><p class="text-2xl font-black ${x[1]||''}">${x[1]||0}</p></div>`).join('');document.getElementById('交付區').innerHTML=表格(資料.正式交付總包||[],['總包編號','建立時間','總包類型','總包狀態','檔名','檔案連結']);document.getElementById('健康區').innerHTML=表格(資料.健康檢查紀錄||[],['紀錄編號','執行時間','系統版本','健康狀態','缺少工作表數','缺少函數數','錯誤訊息'])}function 表格(rows,hs){if(!rows.length)return '<p class="text-slate-300">尚無資料</p>';return `<table class="w-full text-sm"><thead><tr>${hs.map(h=>`<th class="text-left p-2 text-teal-200">${h}</th>`).join('')}</tr></thead><tbody>${rows.map(r=>`<tr class="border-t border-slate-700">${hs.map(h=>`<td class="p-2 ${r[h]||''}">${h==='檔案連結'&&r[h]?`<a class="text-cyan-300 underline" href="${r[h]}" target="_blank">開啟</a>`:(r[h]??'')}</td>`).join('')}</tr>`).join('')}</tbody></table>`}async function 合併PDF(){await 執行('匯出_v3_6_正式部署手冊與封版報告合併PDF')}async function 交接PDF(){await 執行('匯出_v3_6_交接清單PDF')}async function 總包ZIP(){await 執行('產生_v3_6_正式上線總包ZIP')}async function 健康檢查(){await 執行('執行_v3_6_部署後每日健康檢查')}async function 建立排程(){await 執行('建立_v3_6_部署後每日健康檢查排程')}async function 停用排程(){await 執行('停用_v3_6_部署後每日健康檢查排程')}async function 執行(action){try{const r=await 呼叫API(action);document.getElementById('報告').value=JSON.stringify(r,null,2);await 載入總覽()}catch(e){alert(e.message)}}async function 複製報告(){const t=document.getElementById('報告').value;if(!t.trim())return alert('尚未產生報告');await navigator.clipboard.writeText(t);alert('已複製')}document.getElementById('GAS網址').value=GAS();載入總覽();</script></body></html>
