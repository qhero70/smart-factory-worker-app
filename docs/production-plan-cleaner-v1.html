<!doctype html><html lang=zh-Hant><head><meta charset=utf-8><meta name=viewport content='width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no'><meta name=theme-color content=#06111f><title>生產計畫表清洗器｜10_排程需求池</title><style>:root{--b:#06111f;--c:#10253d;--d:#173553;--l:#2f6f9f;--t:#eef7ff;--m:#91a8bd;--a:#38bdf8;--g:#22c55e;--r:#fb7185;--y:#fbbf24}*{box-sizing:border-box}body{margin:0;background:radial-gradient(circle at 10% 0%,#123b5c,transparent 38%),linear-gradient(180deg,var(--b),#081827);color:var(--t);font-family:system-ui,-apple-system,'Microsoft JhengHei',sans-serif}.wrap{max-width:1280px;margin:auto;padding:14px 12px 70px}.head{position:sticky;top:0;z-index:5;background:#06111fe6;backdrop-filter:blur(14px);margin:0 -12px 12px;padding:14px;border-bottom:1px solid #31506d}.title{font-size:30px;font-weight:1000;margin:0;color:#dff6ff}.sub{color:var(--m);font-size:13px;margin-top:4px}.box{background:#ffffff12;border:1px solid #ffffff22;border-radius:20px;padding:15px;margin:12px 0;box-shadow:0 20px 50px #0006}.grid{display:grid;grid-template-columns:1.1fr .9fr;gap:12px}.kpis{display:grid;grid-template-columns:repeat(5,1fr);gap:9px}.kpi{background:#ffffff14;border:1px solid #ffffff1e;border-radius:16px;padding:12px}.kpi span{display:block;color:var(--m);font-size:11px;font-weight:900}.kpi b{font-size:28px}.warn b{color:var(--r)}input,button{font:inherit}input{width:100%;border:1px solid #ffffff28;background:#0005;color:var(--t);border-radius:14px;padding:12px;margin-top:8px}button{border:1px solid #ffffff26;background:#ffffff14;color:var(--t);border-radius:999px;padding:10px 13px;font-weight:1000}button.on,.main{background:linear-gradient(135deg,var(--a),#60a5fa);color:#03111f;border:0}.bar{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px}.tabs{display:flex;gap:8px;overflow:auto;padding-bottom:8px}.view{display:none}.view.on{display:block}.table{overflow:auto;max-height:65vh;border:1px solid #ffffff22;border-radius:16px}table{width:100%;border-collapse:collapse;min-width:880px;background:#0004}th,td{padding:9px 10px;border-bottom:1px solid #ffffff16;text-align:left;white-space:nowrap;font-size:12px}th{position:sticky;top:0;background:#102a43;color:#c9f2ff}.cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:10px}.card{border:1px solid #ffffff22;border-radius:18px;padding:13px;background:#ffffff10}.card.bad{border-color:#fb718588}.card h3{font-size:15px;margin:0 0 5px}.muted{color:var(--m);font-size:12px;line-height:1.7}.nums{display:grid;grid-template-columns:repeat(3,1fr);gap:7px;margin-top:9px}.nums p{margin:0;background:#0004;border-radius:12px;padding:7px}.nums span{display:block;color:var(--m);font-size:10px}.nums b{font-size:17px}.empty{padding:25px;text-align:center;color:var(--m);border:1px dashed #ffffff33;border-radius:16px}.log{white-space:pre-wrap;background:#0005;border:1px solid #ffffff22;border-radius:14px;padding:10px;color:#dbeafe;font-size:12px;margin-top:9px}@media(max-width:850px){.grid{grid-template-columns:1fr}.kpis{grid-template-columns:repeat(2,1fr)}.title{font-size:24px}}</style></head><body><div class=wrap><div class=head><h1 class=title>生產計畫表清洗器</h1><div class=sub>第六階段｜生管 Excel → 每日明細 → 出貨訂單 → 10_排程需求池｜不動報工穩定版</div></div><section class='box grid'><div><h2>① 上傳生產計畫 Excel</h2><div class=muted>支援多工作表、橫向日期、計畫/產出/訂單/供料辨識、向下補產品資料、需求池 CSV 匯出與 GAS 寫入。</div><input id=file type=file accept='.xlsx,.xls,.csv'><input id=gas value='https://script.google.com/macros/s/AKfycbweSKwcREbv-5R5E1ZIj_XOZDGQzRPCdoOAy2uTkhMwZTZoIv-GtpQi0PF8ahdb6KEJ/exec'><div class=bar><button class=main id=send>寫入 10_排程需求池</button><button id=csv>匯出需求池CSV</button><button id=dailycsv>匯出每日明細CSV</button><button id=json>匯出JSON</button><button id=line>複製LINE摘要</button></div><div class=log id=msg>等待上傳。</div></div><div><h2>② 完成標準</h2><div class=muted>1. 解析每日明細。<br>2. 今天以後出貨轉訂單。<br>3. 計算欠量、建議開工日、交期風險。<br>4. 建立唯一鍵防止重複。<br>5. 送出 GAS 動作：寫入排程需求池。</div><div class=muted id=batch>批次：尚未匯入</div></div></section><section class=box><div class=kpis><div class=kpi><span>每日明細</span><b id=k1>0</b></div><div class=kpi><span>出貨訂單</span><b id=k2>0</b></div><div class=kpi><span>需求池</span><b id=k3>0</b></div><div class='kpi warn'><span>錯誤</span><b id=k4>0</b></div><div class='kpi warn'><span>風險/欠量</span><b id=k5>0</b></div></div></section><section class=box><div class=tabs><button class=on data-v=day>每日明細</button><button data-v=sum>本月彙總</button><button data-v=ship>出貨訂單</button><button data-v=req>10_排程需求池</button><button data-v=err>錯誤清單</button></div><div id=day class='view on'></div><div id=sum class=view></div><div id=ship class=view></div><div id=req class=view></div><div id=err class=view></div></section></div><script src='https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js'></script><script>const st={file:'',batch:'',day:[],sum:[],ship:[],req:[],err:[]};const dayH=['區域','產品編號','客戶品號','品名','工單','日期','類型','數量','期初庫存','產能_8H','備註'];const reqH=['需求編號','批次編號','來源檔名','來源工作表','產品編號','客戶品號','品名','工單','類型','需求日期','數量','期初庫存','產能_8H','本月計畫量','本月產出量','本月出貨量','欠量','每日班數','OEE','所需工作天','建議開工日','預計完工日','交期風險','狀態','唯一鍵','備註','建立時間','更新時間'];const $=id=>document.getElementById(id);const pad=n=>String(n).padStart(2,'0');const ds=d=>d instanceof Date&&!isNaN(d)?d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate()):'';const today=()=>ds(new Date);const now=()=>{let d=new Date;return ds(d)+' '+pad(d.getHours())+':'+pad(d.getMinutes())+':'+pad(d.getSeconds())};function clean(v){return String(v??'').trim()}function num(v){if(typeof v=='number')return isFinite(v)?v:0;let s=clean(v).replaceAll(',','').replaceAll('，','');let n=Number(s);return isFinite(n)?n:0}function excel(n){let d=new Date(Date.UTC(1899,11,30));d.setUTCDate(d.getUTCDate()+Number(n));return new Date(d.getUTCFullYear(),d.getUTCMonth(),d.getUTCDate())}function date(v){if(v instanceof Date)return ds(v);if(typeof v=='number'&&v>59)return ds(excel(v));let s=clean(v).replaceAll('年','/').replaceAll('月','/').replaceAll('日','').replaceAll('-','/');if(!s)return '';let p=s.split('/').filter(Boolean);let y=new Date().getFullYear(),m=new Date().getMonth()+1,d=0;if(p.length==3){y=Number(p[0]);m=Number(p[1]);d=Number(p[2])}else if(p.length==2){m=Number(p[0]);d=Number(p[1])}else if(p.length==1&&Number(p[0])>0&&Number(p[0])<32){d=Number(p[0])}else return '';let x=new Date(y,m-1,d);return isNaN(x)?'':ds(x)}function type(v){let s=clean(v);if(s.includes('訂單')||s.includes('出貨'))return '訂單(出貨)';if(s.includes('供料'))return '供料';if(s.includes('計畫')||s.includes('計劃'))return '計畫';if(s.includes('產出')||s.includes('實績'))return '產出';return ''}function find(row,arr){for(let i=0;i<row.length;i++){let s=clean(row[i]).toLowerCase();for(let a of arr){if(s.includes(a.toLowerCase()))return i}}return -1}function head(rows){let bi=-1,bs=0;rows.forEach((r,i)=>{let t=r.map(clean).join('|');let s=0;if(t.includes('品名')||t.includes('產品'))s+=2;if(t.includes('產品編號')||t.includes('料號')||t.includes('品號'))s+=2;if(t.includes('客戶'))s++;if(t.includes('工單'))s++;if(t.includes('產能')||t.includes('8H'))s++;if(s>bs){bs=s;bi=i}});return bs>=3?bi:-1}function daterow(rows){let best={i:-1,d:[]};rows.forEach((r,i)=>{let a=[];r.forEach((c,j)=>{let x=date(c);if(x)a.push({c:j,d:x})});if(a.length>best.d.length)best={i,d:a}});return best.d.length>=2?best:{i:-1,d:[]}}function target(n){return !(n.includes('BOM')||n.includes('圖')||n.includes('說明'))}function parseSheet(name,rows){let hi=head(rows),di=daterow(rows);if(hi<0||di.i<0){st.err.push({工作表:name,列:'',錯誤:'找不到標題列或日期列',原始資料:''});return}let h=rows[hi],c={產品編號:find(h,['產品編號','產品料號','料號','品號','Part']),客戶品號:find(h,['客戶品號','客戶料號','Customer']),品名:find(h,['品名','產品','Product','機種']),工單:find(h,['工單','工令','WO']),期初庫存:find(h,['期初庫存','庫存','期初']),產能_8H:find(h,['標準數/8H','產能8H','產能/8H','8H產能','產能']),備註:find(h,['備註','說明','Remark'])};let last={產品編號:'',客戶品號:'',品名:'',工單:'',期初庫存:0,產能_8H:0,備註:''};for(let r=Math.max(hi,di.i)+1;r<rows.length;r++){let row=rows[r];let tp=row.map(type).find(Boolean);['產品編號','客戶品號','品名','工單','備註'].forEach(k=>{if(c[k]>=0&&clean(row[c[k]]))last[k]=clean(row[c[k]])});if(c.期初庫存>=0&&clean(row[c.期初庫存]))last.期初庫存=num(row[c.期初庫存]);if(c.產能_8H>=0&&num(row[c.產能_8H])>0)last.產能_8H=num(row[c.產能_8H]);if(!tp)continue;di.d.forEach(x=>{let q=num(row[x.c]);if(!q)return;if(!last.品名){st.err.push({工作表:name,列:r+1,錯誤:'缺品名',原始資料:row.join('|')});return}st.day.push({區域:name,產品編號:last.產品編號,客戶品號:last.客戶品號,品名:last.品名,工單:last.工單,日期:x.d,類型:tp,數量:q,期初庫存:last.期初庫存,產能_8H:last.產能_8H,備註:last.備註})})}}function isWork(d){let x=d.getDay();return x!=0&&x!=6}function back(s,n){let d=new Date(s+'T00:00:00'),c=0;while(c<n){d.setDate(d.getDate()-1);if(isWork(d))c++}return ds(d)}function forward(s,n){let d=new Date(s+'T00:00:00'),c=1;while(c<Math.max(1,n)){d.setDate(d.getDate()+1);if(isWork(d))c++}return ds(d)}function key(r){return [r.區域,r.產品編號,r.客戶品號,r.品名].join('｜')}function build(){let m=new Map;st.day.forEach(r=>{let k=key(r);if(!m.has(k))m.set(k,{品名:r.品名,區域:r.區域,產品編號:r.產品編號,客戶品號:r.客戶品號,本月計畫量:0,本月產出量:0,本月出貨量:0,供料:0,期初庫存:r.期初庫存,產能_8H:r.產能_8H,出貨日期:[],備註:r.備註});let g=m.get(k);if(!g.產能_8H&&r.產能_8H)g.產能_8H=r.產能_8H;if(r.類型=='計畫')g.本月計畫量+=r.數量;if(r.類型=='產出')g.本月產出量+=r.數量;if(r.類型=='供料'&&r.數量>0)g.供料+=r.數量;if(r.類型.includes('出貨')&&r.數量>0){g.本月出貨量+=r.數量;g.出貨日期.push({日期:r.日期,數量:r.數量})}});st.sum=[...m.values()].map(g=>{g.可用量=g.期初庫存+g.本月產出量+g.供料;g.欠量=Math.max(0,g.本月出貨量-g.可用量);g.達成率=g.本月計畫量?Math.round(g.本月產出量/g.本月計畫量*1000)/10:0;g.出貨日期.sort((a,b)=>a.日期.localeCompare(b.日期));let first=g.出貨日期[0]?.日期||'';let cap=g.產能_8H*2;g.所需工作天=g.欠量&&cap?Math.ceil(g.欠量/cap):0;g.建議開工日=first&&g.所需工作天?back(first,g.所需工作天):'';g.預計完工日=g.建議開工日?forward(g.建議開工日,g.所需工作天):'';g.交期風險=!g.產能_8H&&g.本月出貨量?'缺產能':(g.建議開工日&&g.建議開工日<today()?'晚':'準');g.狀態=g.欠量?'未滿足':'已滿足';return g}).sort((a,b)=>b.欠量-a.欠量);let seq={};st.ship=st.day.filter(r=>r.類型.includes('出貨')&&r.數量>0&&r.日期>=today()).sort((a,b)=>a.日期.localeCompare(b.日期)).map(r=>{seq[r.日期]=(seq[r.日期]||0)+1;let g=st.sum.find(x=>key(x)==key(r))||{};return{訂單號:'ORD'+r.日期.replaceAll('-','')+String(seq[r.日期]).padStart(5,'0'),客戶:r.客戶品號,產品:r.品名,產品編號:r.產品編號,客戶品號:r.客戶品號,工單:r.工單,區域:r.區域,日期:r.日期,數量:r.數量,狀態:'待確認',產能_8H:g.產能_8H||r.產能_8H,建議開工日:g.建議開工日,交期風險:g.交期風險,欠量:g.欠量}});let seen=new Set;st.req=[];st.ship.forEach((o,i)=>{let g=st.sum.find(x=>x.區域==o.區域&&x.產品編號==o.產品編號&&x.客戶品號==o.客戶品號&&x.品名==o.產品)||{};let u=[o.區域,o.產品編號,o.客戶品號,o.產品,o.日期,'訂單(出貨)',o.數量].join('｜');if(seen.has(u))return;seen.add(u);let oee=.931,days=o.產能_8H?Math.ceil(Math.ceil(o.數量/.97)/(o.產能_8H*.98*.98*2))+1:0;let s=days?back(o.日期,Math.ceil(days*1.15)):'';let risk=!o.產能_8H?'缺產能':(s&&s<today()?'晚':'準');st.req.push({需求編號:'REQ-'+st.batch+'-'+String(i+1).padStart(4,'0'),批次編號:st.batch,來源檔名:st.file,來源工作表:o.區域,產品編號:o.產品編號,客戶品號:o.客戶品號,品名:o.產品,工單:o.工單,類型:'訂單(出貨)',需求日期:o.日期,數量:o.數量,期初庫存:g.期初庫存||0,產能_8H:o.產能_8H||0,本月計畫量:g.本月計畫量||0,本月產出量:g.本月產出量||0,本月出貨量:g.本月出貨量||0,欠量:g.欠量||0,每日班數:2,OEE:oee,所需工作天:days,建議開工日:s,預計完工日:s?forward(s,days):'',交期風險:risk,狀態:'待確認',唯一鍵:u,備註:g.備註||'',建立時間:now(),更新時間:now()})})}function table(id,heads,rows){$(id).innerHTML=rows.length?'<div class=table><table><thead><tr>'+heads.map(h=>'<th>'+h+'</th>').join('')+'</tr></thead><tbody>'+rows.slice(0,500).map(r=>'<tr>'+heads.map(h=>'<td>'+clean(r[h])+'</td>').join('')+'</tr>').join('')+'</tbody></table></div>':'<div class=empty>尚無資料</div>'}function render(){$('k1').textContent=st.day.length;$('k2').textContent=st.ship.length;$('k3').textContent=st.req.length;$('k4').textContent=st.err.length;$('k5').textContent=st.req.filter(x=>x.交期風險!='準'||x.欠量>0).length;$('batch').textContent='批次：'+(st.batch||'尚未匯入');table('day',dayH,st.day);table('ship',['訂單號','客戶','產品','產品編號','日期','數量','狀態','產能_8H','建議開工日','交期風險'],st.ship);table('req',reqH,st.req);table('err',['工作表','列','錯誤','原始資料'],st.err);$('sum').innerHTML=st.sum.length?'<div class=cards>'+st.sum.slice(0,180).map(g=>'<div class=card><h3>'+g.品名+'</h3><div class=muted>'+g.區域+'｜'+g.產品編號+'｜'+g.客戶品號+'</div><div class=nums><p><span>計畫</span><b>'+g.本月計畫量+'</b></p><p><span>產出</span><b>'+g.本月產出量+'</b></p><p><span>出貨</span><b>'+g.本月出貨量+'</b></p><p><span>欠量</span><b>'+g.欠量+'</b></p><p><span>產能8H</span><b>'+(g.產能_8H||'-')+'</b></p><p><span>達成</span><b>'+g.達成率+'%</b></p></div><div class=muted>開工：'+(g.建議開工日||'免排')+'｜風險：'+g.交期風險+'｜狀態：'+g.狀態+'</div></div>').join('')+'</div>':'<div class=empty>尚無資料</div>'}async function load(file){if(!file||!window.XLSX)return alert('找不到 Excel 解析套件');st.file=file.name;st.batch='PLAN-'+today().replaceAll('-','')+'-'+Date.now().toString().slice(-6);st.day=[];st.sum=[];st.ship=[];st.req=[];st.err=[];$('msg').textContent='讀取中：'+file.name;let wb=XLSX.read(await file.arrayBuffer(),{type:'array',cellDates:true,raw:true});wb.SheetNames.filter(target).forEach(n=>parseSheet(n,XLSX.utils.sheet_to_json(wb.Sheets[n],{header:1,defval:'',raw:true})));build();render();$('msg').textContent='完成：工作表 '+wb.SheetNames.length+' 張｜每日明細 '+st.day.length+' 筆｜需求池 '+st.req.length+' 筆'}function csv(rows,heads){let q=String.fromCharCode(34),nl=String.fromCharCode(10);let safe=v=>{let s=clean(v).replaceAll(q,q+q);return s.includes(',')||s.includes(nl)?q+s+q:s};return String.fromCharCode(65279)+[heads.join(','),...rows.map(r=>heads.map(h=>safe(r[h])).join(','))].join(nl)}function dl(name,text,type){let a=document.createElement('a');a.href=URL.createObjectURL(new Blob([text],{type:type||'text/plain;charset=utf-8'}));a.download=name;document.body.appendChild(a);a.click();setTimeout(()=>{URL.revokeObjectURL(a.href);a.remove()},300)}$('file').onchange=e=>load(e.target.files[0]);$('csv').onclick=()=>st.req.length?dl('10_排程需求池_'+st.batch+'.csv',csv(st.req,reqH),'text/csv;charset=utf-8'):alert('沒有需求池資料');$('dailycsv').onclick=()=>st.day.length?dl('每日明細_'+st.batch+'.csv',csv(st.day,dayH),'text/csv;charset=utf-8'):alert('沒有每日明細資料');$('json').onclick=()=>dl('生產計畫清洗_'+st.batch+'.json',JSON.stringify(st,null,2),'application/json');$('line').onclick=async()=>{let rows=st.sum.filter(g=>g.欠量||g.交期風險!='準').slice(0,12);let txt=['【製一組生產計畫重點】'+now(),'批次：'+st.batch,...rows.map((g,i)=>(i+1)+'. ⚠️ '+g.品名+'｜區:'+g.區域
