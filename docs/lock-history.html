<!doctype html><html lang="zh-Hant"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>鎖料歷史查詢</title><script src="https://cdn.tailwindcss.com"></script><style>body{font-family:-apple-system,BlinkMacSystemFont,'Noto Sans TC','Segoe UI',sans-serif;background:#07111f;color:#ecfeff}.玻璃{background:rgba(15,23,42,.78);border:1px solid rgba(148,163,184,.22);backdrop-filter:blur(18px)}.卡{border-radius:22px;box-shadow:0 18px 45px rgba(0,0,0,.28)}.按鈕{border-radius:16px;padding:.75rem .9rem;font-weight:900}input,select,textarea{background:#0f172a!important;border:1px solid #334155!important;color:#fff!important;border-radius:14px!important;padding:.75rem!important;width:100%}th,td{white-space:nowrap}.小字{font-size:.78rem;color:#94a3b8}.紅{color:#fca5a5}.黃{color:#fde68a}.綠{color:#86efac}</style></head><body><main class="max-w-7xl mx-auto p-4 pb-24"><section class="玻璃 卡 p-5 mb-4"><div class="flex flex-wrap justify-between items-center gap-3"><div><p class="text-teal-200 font-black text-sm">智慧製造中央作戰指揮中心 v2.5.0</p><h1 class="text-2xl md:text-4xl font-black">鎖料分配歷史查詢頁</h1><p id="狀態文字" class="text-slate-300 mt-1">查詢分配批號、到貨編號、共用素材、需求編號與產品鎖料歷史。</p></div><div class="flex gap-2"><a class="按鈕 bg-pink-300 text-slate-950" href="./material-arrival.html">到貨鎖料</a><a class="按鈕 bg-rose-300 text-slate-950" href="./material-lock.html">鎖料模擬</a></div></div></section><section class="玻璃 卡 p-4 mb-4"><div class="grid md:grid-cols-[1fr_auto_auto] gap-2"><input id="GAS網址" placeholder="貼上 GAS Web App URL"><button class="按鈕 bg-teal-500 text-slate-950" onclick="儲存設定()">儲存</button><button class="按鈕 bg-cyan-300 text-slate-950" onclick="載入資料()">同步</button></div><div class="grid md:grid-cols-5 gap-2 mt-3"><input id="搜尋字" placeholder="搜尋批號 / 素材 / 需求 / 產品 / 經辦人" oninput="渲染()"><input id="起日" type="date" onchange="渲染()"><input id="迄日" type="date" onchange="渲染()"><select id="狀態篩選" onchange="渲染()"><option value="全部">全部狀態</option><option>已滿足</option><option>部分滿足</option><option>未分配</option></select><button class="按鈕 bg-amber-300 text-slate-950" onclick="下載CSV()">下載CSV</button></div></section><section class="grid grid-cols-2 md:grid-cols-5 gap-3 mb-4" id="統計區"></section><section class="玻璃 卡 p-4 mb-4"><h2 class="font-black text-xl mb-3">鎖料歷史明細</h2><div id="表格區" class="overflow-auto max-h-[66vh]"></div></section><section class="玻璃 卡 p-4"><h2 class="font-black text-xl mb-3">歷史摘要</h2><textarea id="摘要" rows="10"></textarea><button class="按鈕 bg-amber-300 text-slate-950 mt-3" onclick="複製摘要()">複製摘要</button></section></main><script>let 資料=[];let 顯示資料=[];const 欄=['分配批號','分配時間','共用素材編號','共用素材名稱','到貨編號','到貨數量','需求編號','產品編號','品名','Tier等級','交期','原尚缺數量','本次分配數量','分配後尚缺數量','分配狀態','投產允許','經辦人','備註'];function GAS(){return localStorage.getItem('GAS網址')||''}function 儲存設定(){localStorage.setItem('GAS網址',document.getElementById('GAS網址').value.trim());alert('已儲存')}async function 呼叫API(action,data={}){const url=GAS();if(!url)throw new Error('請先貼上 GAS Web App URL');const r=await fetch(url,{method:'POST',headers:{'Content-Type':'text/plain;charset=utf-8'},body:JSON.stringify({action,...data})});return r.json()}async function 載入資料(){try{const r=await 呼叫API('取得主檔管理資料',{工作表名稱:'10_鎖料分配歷史'});if(!r.成功)throw new Error(r.訊息);資料=(r.資料||[]).reverse();document.getElementById('狀態文字').textContent=`已載入 ${資料.length} 筆鎖料歷史`;渲染()}catch(e){document.getElementById('狀態文字').textContent='若尚未建立，請先執行升級_v2_4_共用素材主檔與紀錄表()。'+e.message}}function 日期內(x){const t=x.分配時間||'';if(!t)return true;const d=new Date(t);if(isNaN(d))return true;const a=document.getElementById('起日').value;const b=document.getElementById('迄日').value;if(a&&d<new Date(a))return false;if(b){const end=new Date(b);end.setHours(23,59,59,999);if(d>end)return false}return true}function 篩選(){const q=(document.getElementById('搜尋字').value||'').toLowerCase();const st=document.getElementById('狀態篩選').value;return 資料.filter(x=>{if(!日期內(x))return false;if(st!=='全部'&&x.分配狀態!==st)return false;const t=`${x.分配批號||''} ${x.共用素材編號||''} ${x.共用素材名稱||''} ${x.需求編號||''} ${x.產品編號||''} ${x.品名||''} ${x.經辦人||''}`.toLowerCase();return !q||t.includes(q)})}function 渲染(){顯示資料=篩選();const 分配=顯示資料.reduce((s,x)=>s+Number(x.本次分配數量||0),0);const 滿=顯示資料.filter(x=>x.分配狀態==='已滿足').length;const 部分=顯示資料.filter(x=>x.分配狀態==='部分滿足').length;const 未=顯示資料.filter(x=>x.分配狀態==='未分配').length;document.getElementById('統計區').innerHTML=[['顯示筆數',顯示資料.length],['分配量',分配],['已滿足',滿],['部分滿足',部分],['未分配',未]].map(x=>`<div class="玻璃 卡 p-4"><p class="小字">${x[0]}</p><p class="text-2xl font-black">${x[1]}</p></div>`).join('');document.getElementById('表格區').innerHTML=表格(顯示資料);產生摘要()}function 表格(rows){if(!rows.length)return '<p class="text-slate-300">尚無資料</p>';return `<table class="w-full text-sm"><thead><tr>${欄.map(h=>`<th class="text-left p-2 text-teal-200">${h}</th>`).join('')}</tr></thead><tbody>${rows.map(r=>`<tr class="border-t border-slate-700">${欄.map(h=>`<td class="p-2">${r[h]??''}</td>`).join('')}</tr>`).join('')}</tbody></table>`}function 產生摘要(){const 分配=顯示資料.reduce((s,x)=>s+Number(x.本次分配數量||0),0);const top=顯示資料.slice(0,8).map((x,i)=>`${i+1}. ${x.分配批號}｜${x.共用素材編號}｜${x.需求編號}｜分配 ${x.本次分配數量}｜${x.分配狀態}`).join('\n')||'尚無資料';document.getElementById('摘要').value=`【鎖料分配歷史摘要 v2.5.0】\n筆數：${顯示資料.length}\n分配量合計：${分配}\n\n最近明細：\n${top}`}async function 複製摘要(){const t=document.getElementById('摘要').value;if(!t.trim())return alert('尚未產生摘要');await navigator.clipboard.writeText(t);alert('已複製摘要')}function 轉CSV(rows){const esc=v=>`"${String(v??'').replace(/"/g,'""')}"`;return 欄.join(',')+'\n'+rows.map(r=>欄.map(h=>esc(r[h])).join(',')).join('\n')}function 下載CSV(){const blob=new Blob(['\ufeff'+轉CSV(顯示資料)],{type:'text/csv;charset=utf-8'});const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='10_鎖料分配歷史.csv';a.click();URL.revokeObjectURL(a.href)}document.getElementById('GAS網址').value=GAS();載入資料();</script></body></html>
