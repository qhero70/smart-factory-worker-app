<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="theme-color" content="#080d18">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>報工作業 V4｜黑底正式版</title>
<link rel="manifest" href="./work-report-v4.webmanifest?v=490">
<style>
html,body{margin:0;width:100%;height:100%;overflow:hidden;background:#080d18;color:#e8ecf2;font-family:-apple-system,BlinkMacSystemFont,'Noto Sans TC',sans-serif}
iframe{width:100%;height:100%;border:0;background:#080d18}.boot{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;background:#080d18;color:#4da3ff;font-weight:900;z-index:9}.boot.hide{display:none}
</style>
</head>
<body>
<div id="boot" class="boot">報工作業 V4 載入中...</div>
<iframe id="f" src="./work-report-v4.html?v=490&base=490"></iframe>
<script>
(function(){
var V='490';
var f=document.getElementById('f');
var boot=document.getElementById('boot');
function addJS(d,src,id,cb){if(d.getElementById(id)){cb&&cb();return}var s=d.createElement('script');s.id=id;s.src=src;s.onload=function(){cb&&cb()};s.onerror=function(){cb&&cb()};d.head.appendChild(s)}
function hideBoot(){setTimeout(function(){boot.classList.add('hide')},900)}
f.addEventListener('load',function(){
  try{
    var w=f.contentWindow,d=w.document;
    addJS(d,'./pwa-config.js?v='+V,'cfg490',function(){
      addJS(d,'./gas-bridge.js?v='+V,'bridge490',function(){
        addJS(d,'./work-report-v4-dark-488.js?v='+V,'dark490',function(){
          addJS(d,'./work-report-v4-rules-470.js?v='+V,'rules490',function(){
            addJS(d,'./work-report-v4-overtime-489.js?v='+V,'overtime490',function(){
              addJS(d,'./work-report-v4-route-strict-490.js?v='+V,'routeStrict490',function(){
                addJS(d,'./work-report-v4-submit-482.js?v='+V,'submit490',function(){
                  try{if(w.V4Dark488&&w.V4Dark488.install)w.V4Dark488.install()}catch(e){}
                  try{if(w.V4Rules&&w.V4Rules.boot)w.V4Rules.boot()}catch(e){}
                  try{if(w.V4Overtime489&&w.V4Overtime489.boot)w.V4Overtime489.boot()}catch(e){}
                  try{if(w.V4RouteStrict490&&w.V4RouteStrict490.boot)w.V4RouteStrict490.boot()}catch(e){}
                  try{if(typeof w.reloadData==='function')w.reloadData()}catch(e){}
                  hideBoot();
                });
              });
            });
          });
        });
      });
    });
  }catch(e){boot.textContent='報工作業載入失敗，請重新整理';}
});
try{if('serviceWorker'in navigator)navigator.serviceWorker.register('./sw.js?v='+V).catch(function(){})}catch(e){}
})();
</script>
</body>
</html>
