<html lang="zh-Hant">
<head>

<style>
:root{--底:#08111f;--面:#101a2b;--面2:#162238;--線:rgba(255,255,255,.13);--字:#f2f7ff;--淡:#9eacbf;--藍:#2f8cff;--綠:#22c55e;--紅:#ef4444;--金:#f6c85f;--safeT:env(safe-area-inset-top,0px);--safeB:env(safe-area-inset-bottom,0px)}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}html,body{margin:0;width:100%;height:100dvh;max-height:100dvh;overflow:hidden;background:var(--底);color:var(--字);font-family:-apple-system,BlinkMacSystemFont,'Noto Sans TC','Microsoft JhengHei',Arial,sans-serif}button,input,select,textarea{font:inherit}.應用{width:100%;max-width:430px;height:100dvh;margin:0 auto;display:grid;grid-template-rows:auto 38px 39px 44px minmax(0,1fr) auto;overflow:hidden;background:radial-gradient(circle at 50% -12%,rgba(57,142,255,.18),transparent 36%),linear-gradient(180deg,#08111f,#090d18)}
.頂列{height:calc(60px + var(--safeT));padding:calc(6px + var(--safeT)) 12px 6px;background:rgba(10,18,33,.96);border-bottom:1px solid var(--線)}.品牌{display:flex;align-items:center;gap:8px;min-width:0}.圖示{width:31px;height:31px;border-radius:11px;background:rgba(255,255,255,.1);display:grid;place-items:center;font-size:18px;flex:0 0 auto}.標題{min-width:0}.標題 h1{margin:0;font-size:17px;line-height:1.05;font-weight:1000;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.副標{display:none}.狀態{height:18px;margin-top:5px;padding:0 8px;border-radius:999px;border:1px solid var(--線);background:rgba(255,255,255,.055);display:flex;align-items:center;gap:6px;font-size:10.5px;font-weight:1000;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.燈{width:7px;height:7px;border-radius:50%;background:var(--綠);box-shadow:0 0 10px var(--綠);flex:0 0 auto}
.步驟列{display:grid;grid-template-columns:repeat(5,1fr);gap:8px;padding:5px 13px;background:rgba(8,17,31,.96)}.步驟{height:28px;border-radius:999px;border:1px solid var(--線);background:rgba(255,255,255,.075);color:#cbd5e1;font-weight:1000;display:grid;place-items:center}.步驟.啟用{background:linear-gradient(135deg,#4da3ff,#1967d2);color:#fff;box-shadow:0 0 0 2px rgba(255,255,255,.16) inset}.步驟.完成{background:rgba(34,197,94,.18);color:#bbf7d0}.提示{margin:0 13px 4px;padding:7px 10px;border-radius:15px;border:1px solid rgba(246,200,95,.42);border-left:6px solid var(--金);background:rgba(246,200,95,.075);color:#ffe4a3;font-size:14px;font-weight:1000;line-height:1.05;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.搜尋列{padding:0 13px 6px;position:relative}.搜尋列 input{width:100%;height:38px;border:2px solid rgba(255,255,255,.15);border-radius:15px;background:rgba(255,255,255,.065);color:#fff;padding:0 48px 0 14px;font-weight:900;outline:0}.搜尋列 input::placeholder{color:#b7c0cf}.掃碼鈕{position:absolute;right:18px;top:3px;width:32px;height:32px;border-radius:12px;border:1px solid rgba(77,163,255,.45);background:rgba(77,163,255,.18);color:#fff;font-size:16px}.內容{min-height:0;overflow:auto;-webkit-overflow-scrolling:touch;padding:0 13px 8px}.頁{display:none}.頁.啟用{display:block}
.人員格,.產品格,.機台格{display:grid;gap:8px}.人員格{grid-template-columns:repeat(3,minmax(0,1fr))}.產品格,.機台格{grid-template-columns:repeat(2,minmax(0,1fr))}.卡{position:relative;height:114px;overflow:hidden;border-radius:14px;border:2px solid rgba(40,86,160,.55);background:#111827;box-shadow:0 8px 22px rgba(0,0,0,.22);touch-action:pan-y}.產品格 .卡,.機台格 .卡{height:118px}.卡.選取{border-color:#38a0ff;box-shadow:0 0 0 2px rgba(56,160,255,.30),0 8px 22px rgba(0,0,0,.22)}.卡.選取:before{content:'✓';position:absolute;left:6px;top:6px;z-index:4;width:22px;height:22px;border-radius:50%;display:grid;place-items:center;background:#38a0ff;color:#fff;font-size:13px;font-weight:1000}.卡 img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;object-position:center 30%;display:block}.佔位{position:absolute;inset:0;display:grid;place-items:center;background:linear-gradient(160deg,#172033,#0f172a);color:#64748b;font-size:22px}.班別{position:absolute;right:5px;top:5px;z-index:3;padding:2px 6px;border-radius:999px;background:rgba(0,0,0,.66);font-size:9px;font-weight:1000}.字罩{position:absolute;left:0;right:0;bottom:0;z-index:2;text-align:center;padding:24px 5px 6px;background:linear-gradient(180deg,rgba(0,0,0,0),rgba(0,0,0,.9))}.名稱{font-size:15px;font-weight:1000;line-height:1.05;color:#fff;text-shadow:0 2px 5px #000}.編號{margin-top:3px;font-size:12px;font-weight:1000;line-height:1;color:#dbeafe;text-shadow:0 2px 5px #000}.小佔位{height:44px;border-radius:12px;background:rgba(255,255,255,.06);border:1px dashed rgba(160,190,255,.45);display:grid;place-items:center;font-size:12px;font-weight:1000;color:#93b7ff}
.面板{background:rgba(255,255,255,.065);border:1px solid var(--線);border-radius:16px;padding:11px;margin-bottom:9px}.面板 h3{margin:0 0 8px;font-size:16px;font-weight:1000}.欄名{font-size:12px;color:#b8c3d4;font-weight:1000;margin:7px 0 4px}.欄位{width:100%;height:40px;border:2px solid rgba(255,255,255,.15);border-radius:14px;background:rgba(255,255,255,.06);color:#fff;padding:0 11px;font-weight:900;outline:0}.唯讀{background:rgba(255,255,255,.04);color:#cbd5e1}.雙欄{display:grid;grid-template-columns:1fr 1fr;gap:8px}.三欄{display:grid;grid-template-columns:1fr 1fr 1fr;gap:7px}.數字列{display:grid;grid-template-columns:repeat(3,1fr);gap:7px;margin-top:8px}.數字卡{border-radius:14px;background:rgba(255,255,255,.07);padding:7px 4px;text-align:center;font-size:11px;font-weight:900}.數字卡 b{display:block;font-size:20px;margin-top:2px}.不良列{display:grid;grid-template-columns:1fr 68px 34px;gap:7px;margin-bottom:7px}.工具鈕{border:0;border-radius:14px;background:rgba(255,255,255,.09);color:#fff;font-weight:1000;min-height:40px;padding:0 10px}.照片列{display:grid;grid-template-columns:repeat(3,1fr);gap:7px;margin-top:8px}.照片列 img{width:100%;height:76px;object-fit:cover;border-radius:12px}.摘要列{display:grid;grid-template-columns:92px 1fr;gap:8px;padding:7px 0;border-bottom:1px dashed rgba(255,255,255,.16);font-weight:900}.摘要列 div:last-child{text-align:right;color:#dbeafe}.底列{height:calc(58px + var(--safeB));padding:6px 10px calc(6px + var(--safeB));background:rgba(8,17,31,.98);border-top:1px solid var(--線)}.下一步{width:100%;height:46px;border:0;border-radius:16px;background:linear-gradient(135deg,#4c95ff,#1967d2);color:#fff;font-size:18px;font-weight:1000;box-shadow:0 10px 26px rgba(49,130,246,.28)}.返回{display:none}.提示泡泡{position:fixed;left:50%;top:calc(10px + var(--safeT));transform:translateX(-50%);z-index:999;width:calc(100% - 28px);max-width:402px;background:#fff;color:#14243a;border-left:6px solid var(--綠);border-radius:14px;padding:9px 12px;font-weight:1000;box-shadow:0 14px 40px rgba(0,0,0,.25);display:none}.提示泡泡 small{display:block;color:#475569;margin-top:3px}.選定浮層{position:fixed;left:50%;top:50%;transform:translate(-50%,-50%) scale(.96);z-index:300;width:calc(100% - 32px);max-width:390px;background:rgba(17,27,44,.96);border:1px solid rgba(255,255,255,.16);border-radius:24px;padding:14px;box-shadow:0 24px 80px rgba(0,0,0,.45);display:none}.選定浮層.顯示{display:block;animation:pop .16s ease-out forwards}.選定列{display:flex;align-items:center;gap:12px}.選定列 img,.選定頭像{width:66px;height:66px;border-radius:18px;object-fit:cover;background:#1f2b42;display:grid;place-items:center;font-weight:1000}@keyframes pop{to{transform:translate(-50%,-50%) scale(1)}}.掃描遮罩{position:fixed;inset:0;z-index:800;background:rgba(5,10,20,.94);display:none;align-items:center;justify-content:center;padding:18px}.掃描盒{width:100%;max-width:410px;background:#101a2b;border-radius:24px;padding:14px}.掃描盒 video{width:100%;max-height:58vh;object-fit:cover;border-radius:18px;background:#000}.掃描提示{text-align:center;color:#dbeafe;font-weight:900;margin:10px 0;font-size:13px}@media(max-width:360px){.人員格{gap:6px}.卡{height:106px}.名稱{font-size:14px}.編號{font-size:11px}.標題 h1{font-size:15px}.提示{font-size:13px}.雙欄,.三欄{grid-template-columns:1fr}}
</style>
<script src="./pwa-config.js?v=483"></script>
<script src="./gas-bridge.js?v=483"></script>
</head>
<body>
<div class="應用">
  <header class="頂列">
    <div class="品牌"><div class="圖示">🏭</div><div class="標題"><h1>製一組 報工作業 V4</h1><div class="副標">化新精密｜智慧製造指揮中心</div></div></div>
    <div class="狀態"><span class="燈" id="狀態燈"></span><span id="狀態文字">正在連線主資料庫...</span></div>
  </header>
  <nav class="步驟列" id="步驟列"></nav>
  <div class="提示" id="提示文字">👆 Step 1：選擇作業員 / Select Operator</div>
  <div class="搜尋列" id="搜尋列"><input id="搜尋框" placeholder="🔍 搜尋人員 / 姓名、工號、班別"><button class="掃碼鈕" id="掃碼鈕" type="button">📷</button></div>
  <main class="內容" id="內容區">
    <section class="頁 啟用" id="頁0"><div class="人員格" id="人員清單"></div><div id="selectedPersonArea" class="面板" style="display:none"></div></section>
    <section class="頁" id="頁1"><div class="產品格" id="產品清單"></div><div id="selectedProductArea" class="面板" style="display:none"><h3>已選產品 / Product</h3><div id="產品摘要"></div><input id="productCode" class="欄位 唯讀" readonly style="margin-top:7px"><input id="productName" class="欄位 唯讀" readonly style="margin-top:7px"><div class="欄名">報工工站 / Workstation</div><select id="workstationSelect" class="欄位"></select><div id="routeFieldsArea" style="display:none"><div class="三欄"><div><div class="欄名">工序</div><input id="processRange" class="欄位 唯讀" readonly></div><div><div class="欄名">產能</div><input id="stdCapacity" class="欄位 唯讀" readonly></div><div><div class="欄名">秒</div><input id="stdTimeSec" class="欄位 唯讀" readonly></div></div><div class="欄名">主機台</div><select id="mainMachineSelect" class="欄位"></select><div class="機台格" id="machineListGrid" style="margin-top:8px"></div></div></div></section>
    <section class="頁" id="頁2"><div class="面板"><h3>產出數量 / Output</h3><div class="雙欄"><div><div class="欄名">今日共做數 *</div><input id="totalQty" inputmode="numeric" class="欄位" placeholder="請輸入"></div><div><div class="欄名">不良數</div><input id="ngQty" inputmode="numeric" class="欄位" placeholder="可留空"></div></div><div class="數字列"><div class="數字卡">總數<b id="sumTotal">—</b></div><div class="數字卡">不良<b id="sumNg">—</b></div><div class="數字卡">良品<b id="sumGood">—</b></div></div><div class="雙欄"><div><div class="欄名">開始時間</div><input id="startTime" class="欄位"></div><div><div class="欄名">結束時間</div><input id="endTime" class="欄位"></div></div><input id="workingHours" class="欄位 唯讀" value="8 hrs" readonly style="margin-top:8px"></div></section>
    <section class="頁" id="頁3"><div class="面板"><h3>不良原因 / Defect</h3><div id="defectRows"></div><button class="工具鈕" id="新增不良" type="button">＋ 新增不良</button></div><div class="面板"><h3>現場照片 / Photos</h3><div class="雙欄"><button class="工具鈕" id="拍照鈕" type="button">📸 拍照</button><button class="工具鈕" id="清照片鈕" type="button">清除</button></div><input id="photoInput" type="file" accept="image/*" multiple hidden><div id="photoCount" style="text-align:center;margin-top:7px;font-weight:900;color:#aeb8c7">0 / 12 張照片</div><div class="照片列" id="照片預覽"></div></div><div class="面板"><h3>備註 / Remarks</h3><textarea id="remarks" class="欄位" style="height:74px;padding:10px" placeholder="可留空"></textarea></div></section>
    <section class="頁" id="頁4"><div class="面板"><h3>確認送出 / Confirm</h3><div id="summaryRows"></div><pre id="fullPreview" style="display:none"></pre></div></section>
  </main>
  <footer class="底列"><button class="下一步" id="nextBtn" type="button">下一步 → / Next</button><button class="返回" id="backBtn" type="button">上一步</button></footer>
</div>
<div class="提示泡泡" id="提示泡泡"></div>
<div class="選定浮層" id="選定浮層"></div>
<div class="掃描遮罩" id="掃描遮罩"><div class="掃描盒"><video id="scanVideo" autoplay playsinline muted></video><div class="掃描提示">將條碼 / QR Code 對準鏡頭，自動偵測</div><button class="下一步" id="關閉掃描" type="button">取消</button></div></div>
<script>
(function(){
'use strict';
const 步驟=[['人員','Operator'],['工件','Workpiece'],['產出','Output'],['品質','Quality'],['確認','Confirm']];
window.V4_STATE={step:0,db:null,operator:null,product:null,route:null,machine:null,defectMap:{}};window.V4_PHOTOS=[];
const $=id=>document.getElementById(id);const S=v=>String(v==null?'':v).trim();const N=v=>{const x=Number(S(v).replace(/,/g,''));return isFinite(x)?x:0};const esc=s=>S(s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
function 提示(t,m,type){const e=$('提示泡泡');e.style.borderLeftColor=type==='error'?'#ef4444':type==='warn'?'#f59e0b':'#22c55e';e.innerHTML=esc(t)+(m?'<small>'+esc(m)+'</small>':'');e.style.display='block';clearTimeout(e._t);e._t=setTimeout(()=>e.style.display='none',2400)}
window.v4Toast=提示;function 圖片(u,icon){u=S(u);return u.startsWith('http')?'<img src="'+esc(u)+'" loading="lazy" alt="">':'<div class="佔位">'+esc(icon||'👤')+'</div>'}
function 設狀態(t,ok=true){$('狀態文字').textContent=t;$('狀態燈').style.background=ok?'#22c55e':'#f59e0b'}
function 畫步驟(){$('步驟列').innerHTML=步驟.map((s,i)=>'<div class="步驟 '+(i===V4_STATE.step?'啟用':i<V4_STATE.step?'完成':'')+'">'+(i<V4_STATE.step?'✓':i+1)+'</div>').join('')}
function 到步驟(i){V4_STATE.step=Math.max(0,Math.min(4,i));document.querySelectorAll('.頁').forEach((p,idx)=>p.classList.toggle('啟用',idx===V4_STATE.step));畫步驟();$('提示文字').textContent=['👆 Step 1：選擇作業員 / Select Operator','📦 Step 2：選擇產品與工站 / Product & Route','📊 Step 3：輸入產出數量 / Output','🧪 Step 4：品質與照片 / Quality','✅ Step 5：確認並送出 / Confirm'][V4_STATE.step];$('搜尋列').style.display=V4_STATE.step<=1?'block':'none';$('搜尋框').value='';$('搜尋框').placeholder=V4_STATE.step===0?'🔍 搜尋人員 / 姓名、工號、班別':'🔍 搜尋產品 / 品名、產品編號、客戶品號';$('nextBtn').textContent=V4_STATE.step===4?'📥 送出報工 / Submit':'下一步 → / Next';$('內容區').scrollTop=0;if(V4_STATE.step===4)renderSummary();}
function 防誤觸(grid,handler){let sx=0,sy=0,moved=false;grid.addEventListener('pointerdown',e=>{sx=e.clientX;sy=e.clientY;moved=false},{passive:true});grid.addEventListener('pointermove',e=>{if(Math.abs(e.clientX-sx)>10||Math.abs(e.clientY-sy)>10)moved=true},{passive:true});grid.addEventListener('pointerup',e=>{if(moved)return;const c=e.target.closest('.卡');if(c)handler(c)},true)}
function renderPeople(){const q=S($('搜尋框').value).toLowerCase(),rows=((V4_STATE.db&&V4_STATE.db.人員)||[]).filter(p=>!q||[p.姓名,p.工號,p.班別].join(' ').toLowerCase().includes(q)).slice(0,90);$('人員清單').innerHTML=rows.map(p=>'<div class="卡 '+(V4_STATE.operator&&V4_STATE.operator.工號===p.工號?'選取':'')+'" data-id="'+esc(p.工號)+'"><span class="班別">'+esc(p.班別||'早班')+'</span>'+圖片(p.照片網址||p.縮圖網址,'👤')+'<div class="字罩"><div class="名稱">'+esc(p.姓名)+'</div><div class="編號">'+esc(p.工號)+'</div></div></div>').join('')||'<div class="面板">尚無人員資料</div>'}
function selectPerson(id){const p=((V4_STATE.db&&V4_STATE.db.人員)||[]).find(x=>x.工號===id);if(!p)return;V4_STATE.operator=p;$('selectedPersonArea').style.display='none';$('selectedPersonArea').innerHTML='<input id="personId" value="'+esc(p.工號)+'"><input id="personName" value="'+esc(p.姓名)+'"><input id="shift" value="'+esc(p.班別||'早班')+'">';renderPeople();彈選定('👤 已選定人員',p.姓名,p.工號,p.照片網址||p.縮圖網址)}
function 彈選定(title,name,code,photo){const box=$('選定浮層');box.innerHTML='<div class="選定列">'+(S(photo).startsWith('http')?'<img src="'+esc(photo)+'">':'<div class="選定頭像">'+esc(S(name).slice(0,1))+'</div>')+'<div><div class="名稱" style="font-size:20px">'+esc(title)+'</div><div class="名稱">'+esc(name)+'</div><div class="編號">'+esc(code)+'</div></div></div>';box.classList.add('顯示');clearTimeout(box._t);box._t=setTimeout(()=>box.classList.remove('顯示'),1200)}
function renderProducts(){const db=V4_STATE.db;if(!db)return;const q=S($('搜尋框').value).toLowerCase();const routePids={};(db.routes||db.報工工站群組||[]).forEach(r=>routePids[r.產品編號]=1);let rows=(db.產品||[]).filter(p=>routePids[p.產品編號]);if(!rows.length)rows=db.產品||[];rows=rows.filter(p=>!q||[p.品名,p.產品編號,p.客戶品號].join(' ').toLowerCase().includes(q)).slice(0,90);$('產品清單').innerHTML=rows.map(p=>'<div class="卡 '+(V4_STATE.product&&V4_STATE.product.產品編號===p.產品編號?'選取':'')+'" data-id="'+esc(p.產品編號)+'">'+圖片(p.照片網址||p.縮圖網址,'📦')+'<div class="字罩"><div class="名稱">'+esc(p.品名||p.產品編號)+'</div><div class="編號">'+esc(p.產品編號)+'</div></div></div>').join('')||'<div class="面板">尚無產品資料</div>'}
function selectProduct(pid){const p=((V4_STATE.db&&V4_STATE.db.產品)||[]).find(x=>x.產品編號===pid);if(!p)return;V4_STATE.product=p;V4_STATE.route=null;V4_STATE.machine=null;$('selectedProductArea').style.display='block';$('產品摘要').innerHTML='<b>'+esc(p.品名||'')+'</b><br><span class="編號">'+esc(p.產品編號)+'</span>';$('productCode').value=p.產品編號;$('productName').value=p.品名||'';renderProducts();renderRoutes();彈選定('📦 已選定產品',p.品名||p.產品編號,p.產品編號,p.照片網址||p.縮圖網址)}
function renderRoutes(){const routes=((V4_STATE.db&&(V4_STATE.db.routes||V4_STATE.db.報工工站群組))||[]).filter(r=>r.產品編號===V4_STATE.product.產品編號);window._routesView=routes;$('workstationSelect').innerHTML='<option value="">請選擇工站</option>'+routes.map((r,i)=>'<option value="'+i+'">'+esc(r.工站名稱||r.報工工站名稱)+'｜'+esc(r.工序範圍||r.工序||'')+'｜'+esc((r.機台清單||[]).map(m=>m.機台編號).join('、'))+'</option>').join('');clearRouteFields()}
function clearRouteFields(){$('routeFieldsArea').style.display='none';$('processRange').value='';$('stdCapacity').value='';$('stdTimeSec').value='';$('mainMachineSelect').innerHTML='';$('machineListGrid').innerHTML=''}
function selectRouteByIndex(v){const r=(window._routesView||[])[Number(v)];if(!r){V4_STATE.route=null;clearRouteFields();return}V4_STATE.route=r;$('routeFieldsArea').style.display='block';$('processRange').value=r.工序範圍||r.工序||'';$('stdCapacity').value=r['標準產能']||r['8H產能']||r['工站8H產能_件']||'';$('stdTimeSec').value=r['標準工時_秒']||r['標準工時(秒)']||'';const ms=Array.isArray(r.機台清單)?r.機台清單:[];$('mainMachineSelect').innerHTML=ms.map(m=>'<option value="'+esc(m.機台編號)+'">'+esc(m.機台編號)+'｜'+esc(m.機台名稱||m.設備名稱||'')+'</option>').join('');renderMachines(ms);if(ms[0])selectMachineById(ms[0].機台編號)}
function renderMachines(ms){$('machineListGrid').innerHTML=(ms||[]).map(m=>'<div class="卡 '+(V4_STATE.machine&&V4_STATE.machine.機台編號===m.機台編號?'選取':'')+'" data-id="'+esc(m.機台編號)+'">'+圖片(m.照片網址||m.縮圖網址,'⚙️')+'<div class="字罩"><div class="名稱">'+esc(m.機台編號)+'</div><div class="編號">'+esc(m.機台名稱||m.設備名稱||'機台')+'</div></div></div>').join('')||'<div class="小佔位">此工站未設定機台清單</div>'}
function selectMachineById(id){const ms=(V4_STATE.route&&V4_STATE.route.機台清單)||[];V4_STATE.machine=ms.find(x=>x.機台編號===id)||ms[0]||null;if($('mainMachineSelect'))$('mainMachineSelect').value=(V4_STATE.machine&&V4_STATE.machine.機台編號)||'';renderMachines(ms)}
function calcQty(){const t=N($('totalQty').value),ng=N($('ngQty').value);$('sumTotal').textContent=t||'—';$('sumNg').textContent=ng||'—';$('sumGood').textContent=(t||ng)?Math.max(0,t-ng):'—';validateDefects(true)}
function allDefects(){const d=(V4_STATE.db&&V4_STATE.db.不良原因)||{Z:[],Y:[]};return [...(d.Z||[]),...(d.Y||[])]}
function renderDefectRows(){V4_STATE.defectMap={};allDefects().forEach(d=>V4_STATE.defectMap[d.代碼]=d);$('defectRows').innerHTML='';addDefectRow()}
function addDefectRow(){const row=document.createElement('div');row.className='不良列';const list=allDefects();row.innerHTML='<select class="欄位">'+['<option value="">不良原因</option>'].concat(list.map(d=>'<option value="'+esc(d.代碼)+'">'+esc((d.分類||String(d.代碼).slice(0,1))+'類 '+d.代碼+' '+(d.英文名稱||'')+' / '+(d.名稱||''))+'</option>')).join('')+'</select><input class="欄位 qty-input" inputmode="numeric" placeholder="數量"><button class="工具鈕" type="button">刪</button>';row.querySelector('button').onclick=()=>{row.remove();validateDefects(true)};row.querySelector('input').oninput=()=>validateDefects(true);row.querySelector('select').onchange=()=>validateDefects(true);$('defectRows').appendChild(row)}
function validateDefects(silent){const ng=N($('ngQty').value);let sum=0;document.querySelectorAll('.qty-input').forEach(i=>sum+=N(i.value));if(sum>ng){if(!silent)提示('不良分配超過上限','分配數量不可超過 Step 3 的不良數','warn');return false}return true}
function readDefects(){const arr=[];document.querySelectorAll('.不良列').forEach(row=>{const code=row.querySelector('select').value,qty=N(row.querySelector('input').value),d=V4_STATE.defectMap[code]||{};if(code&&qty>0)arr.push({不良代碼:code,不良名稱:d.名稱||'',英文名稱:d.英文名稱||'',不良數量:qty,分類:d.分類||String(code).slice(0,1),責任歸屬:d.責任歸屬||''})});return arr}
function takePhoto(){$('photoInput').click()}function handleFiles(files){const arr=Array.from(files||[]).slice(0,12-window.V4_PHOTOS.length);arr.forEach(f=>window.V4_PHOTOS.push({name:f.name,size:f.size,type:f.type,preview:URL.createObjectURL(f)}));$('photoCount').textContent=window.V4_PHOTOS.length+' / 12 張照片';$('照片預覽').innerHTML=window.V4_PHOTOS.map(p=>'<img src="'+p.preview+'">').join('')}function clearPhotos(){window.V4_PHOTOS.forEach(p=>{try{URL.revokeObjectURL(p.preview)}catch(e){}});window.V4_PHOTOS=[];$('photoCount').textContent='0 / 12 張照片';$('照片預覽').innerHTML=''}
function renderSummary(){const t=N($('totalQty').value),ng=N($('ngQty').value),good=Math.max(0,t-ng),def=readDefects();const rows=[['人員',`${V4_STATE.operator?.姓名||''}｜${V4_STATE.operator?.工號||''}`],['產品',`${V4_STATE.product?.產品編號||''}｜${V4_STATE.product?.品名||''}`],['工站',V4_STATE.route?.工站名稱||V4_STATE.route?.報工工站名稱||''],['機台',V4_STATE.machine?.機台編號||''],['共做',t+' pcs'],['良品',good+' pcs'],['不良',ng+' pcs'],['不良原因',def.map(d=>`${d.不良代碼} ${d.不良名稱} × ${d.不良數量}`).join('；')||'無'],['照片',window.V4_PHOTOS.length+' 張']];$('summaryRows').innerHTML=rows.map(r=>'<div class="摘要列"><div>'+esc(r[0])+'</div><div>'+esc(r[1])+'</div></div>').join('')}
function validateStep(){if(V4_STATE.step===0&&!V4_STATE.operator){提示('尚未選擇人員','請先選擇作業員','warn');return false}if(V4_STATE.step===1&&!V4_STATE.product){提示('尚未選擇產品','請先選擇產品','warn');return false}if(V4_STATE.step===1&&!V4_STATE.route){提示('尚未選擇工站','請先選擇報工工站','warn');return false}if(V4_STATE.step===2&&N($('totalQty').value)<=0){提示('尚未輸入產出','請輸入今日共做數','warn');return false}if(V4_STATE.step===3&&!validateDefects(false))return false;return true}
function buildPayload(){const t=N($('totalQty').value),ng=N($('ngQty').value),good=Math.max(0,t-ng),def=readDefects();const id='RPT-'+new Date().toISOString().replace(/[-:.TZ]/g,'')+'-'+(V4_STATE.operator?.工號||'NA')+'-'+(V4_STATE.product?.產品編號||'NA');return{reportId:id,報工編號:id,workDate:window.V4Bridge?.today?.()||'',作業日:window.V4Bridge?.today?.()||'',operator:{employeeId:V4_STATE.operator?.工號,operatorName:V4_STATE.operator?.姓名,shift:V4_STATE.operator?.班別||'早班'},product:{productCode:V4_STATE.product?.產品編號,customerPartNo:V4_STATE.product?.客戶品號,productName:V4_STATE.product?.品名},workstation:{workstationName:V4_STATE.route?.工站名稱||V4_STATE.route?.報工工站名稱,processRange:V4_STATE.route?.工序範圍||V4_STATE.route?.工序,machineList:((V4_STATE.route?.機台清單)||[]).map(m=>m.機台編號).join(','),mainMachine:V4_STATE.machine?.機台編號},output:{totalQty:t,ngQty:ng,goodQty:good,startTime:$('startTime').value,endTime:$('endTime').value,workingHours:$('workingHours').value||'8 hrs'},quality:{defects:def,defectSummary:def.map(d=>`${d.分類||''}類 ${d.不良代碼} ${d.不良名稱} × ${d.不良數量} pcs`).join('；')},photos:window.V4_PHOTOS.map(p=>({name:p.name,size:p.size,type:p.type})),remarks:$('remarks').value,source:'PWA_V4_正式基準_483_FIXED_UI'}}
async function submitReport(){const p=buildPayload();document.body.classList.add('submitting');try{const res=await window.V4Bridge.submitReport(p);提示('報工已送出',res?.報工編號||res?.reportId||p.reportId);到步驟(0)}catch(e){提示('寫入失敗',e.message||e,'error')}finally{document.body.classList.remove('submitting')}}
async function reloadData(){設狀態('正在連線主資料庫...',false);try{const db=await window.V4Bridge.loadInit();V4_STATE.db=db;設狀態(`資料已載入｜人員：${db.筆數?.人員||db.人員?.length||0}｜工站：${db.筆數?.報工工站群組||db.routes?.length||0}`);renderPeople();renderProducts();renderDefectRows();提示('資料已載入','報工作業 V4 正式基準完成')}catch(e){設狀態('讀取失敗',false);提示('讀取失敗',e.message||e,'error')}}
let scanStream=null,scanTimer=null;async function openScan(){if(!('BarcodeDetector'in window)){提示('掃描器不支援','請改用手動輸入或實體掃碼器','warn');$('搜尋框').focus();return}try{scanStream=await navigator.mediaDevices.getUserMedia({video:{facingMode:'environment'}});$('scanVideo').srcObject=scanStream;$('掃描遮罩').style.display='flex';const detector=new BarcodeDetector({formats:['qr_code','code_128','code_39','ean_13','ean_8']});scanTimer=setInterval(async()=>{try{const c=await detector.detect($('scanVideo'));if(c&&c[0]){$('搜尋框').value=c[0].rawValue;$('搜尋框').dispatchEvent(new Event('input'));closeScan();提示('掃描成功',c[0].rawValue)}}catch(e){}},350)}catch(e){提示('無法啟用相機','請確認權限','error')}}function closeScan(){if(scanTimer){clearInterval(scanTimer);scanTimer=null}if(scanStream){scanStream.getTracks().forEach(t=>t.stop());scanStream=null}$('掃描遮罩').style.display='none'}
$('搜尋框').addEventListener('input',()=>{if(V4_STATE.step===0)renderPeople();if(V4_STATE.step===1)renderProducts()});防誤觸($('人員清單'),c=>selectPerson(c.dataset.id));防誤觸($('產品清單'),c=>selectProduct(c.dataset.id));防誤觸($('machineListGrid'),c=>selectMachineById(c.dataset.id));$('workstationSelect').addEventListener('change',e=>selectRouteByIndex(e.target.value));$('mainMachineSelect').addEventListener('change',e=>selectMachineById(e.target.value));$('totalQty').addEventListener('input',calcQty);$('ngQty').addEventListener('input',calcQty);$('新增不良').addEventListener('click',addDefectRow);$('拍照鈕').addEventListener('click',takePhoto);$('清照片鈕').addEventListener('click',clearPhotos);$('photoInput').addEventListener('change',e=>{handleFiles(e.target.files);e.target.value=''});$('掃碼鈕').addEventListener('click',openScan);$('關閉掃描').addEventListener('click',closeScan);$('nextBtn').addEventListener('click',()=>{if(V4_STATE.step===4)return submitReport();if(!validateStep())return;到步驟(V4_STATE.step+1);if(V4_STATE.step===1)renderProducts()});document.addEventListener('DOMContentLoaded',()=>{});畫步驟();const now=new Date();$('startTime').value=now.toLocaleString('zh-TW',{hour12:false});reloadData();try{if('serviceWorker'in navigator)navigator.serviceWorker.register('./sw.js?v=483').catch(()=>{})}catch(e){}
})();
</script>
