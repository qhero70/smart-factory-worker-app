<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="theme-color" content="#080d18">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="manifest" href="./work-report-v4.webmanifest?v=503">
<title>製一組 報工表單 V4</title>
<style>
:root{--bg:#080d18;--card:#111827;--line:rgba(255,255,255,.13);--text:#eef4ff;--muted:#9ca8ba;--blue:#3388ff;--green:#22c55e;--gold:#f6c85f;--safe-top:env(safe-area-inset-top,0px);--safe-bottom:env(safe-area-inset-bottom,0px)}*{box-sizing:border-box}html,body{margin:0;width:100%;height:100dvh;max-height:100dvh;overflow:hidden;background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Noto Sans TC','Microsoft JhengHei',sans-serif}button,input,select,textarea{font:inherit}.app{width:100%;max-width:430px;height:100dvh;max-height:100dvh;margin:0 auto;display:grid;grid-template-rows:auto 38px 38px 44px minmax(0,1fr) auto;overflow:hidden;background:radial-gradient(circle at 50% -20%,rgba(77,163,255,.16),transparent 42%),#080d18}.top{height:calc(62px + var(--safe-top));padding:calc(6px + var(--safe-top)) 12px 6px;border-bottom:1px solid var(--line);background:rgba(10,17,30,.92)}.brand{display:flex;gap:8px;align-items:center}.logo{width:32px;height:32px;border-radius:11px;background:rgba(255,255,255,.1);display:grid;place-items:center;font-size:19px}.brand h1{margin:0;font-size:17px;line-height:1.05;font-weight:1000;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.status{margin-top:5px;height:18px;display:flex;align-items:center;gap:6px;padding:0 8px;border:1px solid var(--line);border-radius:999px;background:rgba(255,255,255,.055);font-size:10.5px;font-weight:1000;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.dot{width:7px;height:7px;border-radius:50%;background:var(--green);box-shadow:0 0 10px var(--green);flex:0 0 auto}.steps{display:grid;grid-template-columns:repeat(5,1fr);gap:8px;padding:5px 14px;background:rgba(8,13,24,.98)}.step{height:28px;border-radius:999px;border:1px solid var(--line);background:rgba(255,255,255,.08);color:#cbd5e1;font-weight:1000;display:grid;place-items:center}.step.active{background:linear-gradient(135deg,#4da3ff,#1f73e8);color:#fff;box-shadow:0 0 0 2px rgba(255,255,255,.16) inset}.hint{margin:0 14px 4px;padding:8px 10px;border-radius:15px;border:1px solid rgba(246,200,95,.45);border-left:6px solid var(--gold);background:rgba(246,200,95,.08);color:#ffe3a3;font-size:14px;font-weight:1000;line-height:1.1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.searchbar{padding:0 14px 6px;position:relative}.searchbar input{width:100%;height:38px;border:2px solid rgba(255,255,255,.15);border-radius:15px;background:rgba(255,255,255,.065);color:#fff;padding:0 48px 0 14px;font-weight:900;outline:0}.camera{position:absolute;right:19px;top:3px;width:32px;height:32px;border-radius:12px;border:1px solid rgba(77,163,255,.4);background:rgba(77,163,255,.16);color:#fff}.body{min-height:0;overflow:auto;-webkit-overflow-scrolling:touch;padding:0 14px 8px}.grid-people{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:8px}.card{position:relative;height:114px;border:2px solid rgba(31,75,150,.55);border-radius:14px;overflow:hidden;background:#111827;box-shadow:0 8px 22px rgba(0,0,0,.22)}.card.selected{border-color:#39a0ff;box-shadow:0 0 0 2px rgba(57,160,255,.3),0 8px 22px rgba(0,0,0,.24)}.card.selected:before{content:'✓';position:absolute;left:6px;top:6px;z-index:4;width:22px;height:22px;border-radius:50%;background:#39a0ff;color:white;display:grid;place-items:center;font-size:13px;font-weight:1000}.card img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;object-position:center 28%;display:block}.fallback{position:absolute;inset:0;display:grid;place-items:center;color:#64748b;font-size:24px;background:linear-gradient(160deg,#172033,#0f172a)}.badge{position:absolute;right:5px;top:5px;z-index:3;padding:2px 6px;border-radius:999px;background:rgba(0,0,0,.65);font-size:9px;font-weight:1000}.cap{position:absolute;left:0;right:0;bottom:0;z-index:2;padding:24px 5px 6px;text-align:center;background:linear-gradient(180deg,rgba(0,0,0,0),rgba(0,0,0,.9))}.name{font-size:15px;font-weight:1000;line-height:1.05;color:white;text-shadow:0 2px 5px #000}.code{margin-top:3px;font-size:12px;font-weight:1000;line-height:1;color:#dbeafe;text-shadow:0 2px 5px #000}.page{display:none}.page.active{display:block}.grid-products,.grid-machines{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:9px}.grid-products .card,.grid-machines .card{height:118px}.panel{background:rgba(255,255,255,.065);border:1px solid var(--line);border-radius:16px;padding:12px;margin-bottom:10px}.panel h3{margin:0 0 8px;font-size:16px}.field{width:100%;height:42px;border:2px solid rgba(255,255,255,.15);border-radius:14px;background:rgba(255,255,255,.06);color:#fff;padding:0 12px;font-weight:900;outline:0}.label{font-size:12px;color:#b8c3d4;font-weight:1000;margin:8px 0 4px}.row2{display:grid;grid-template-columns:1fr 1fr;gap:8px}.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin:10px 0}.stat{border-radius:14px;background:rgba(255,255,255,.07);padding:8px;text-align:center}.stat b{display:block;font-size:20px}.defrow{display:grid;grid-template-columns:1fr 70px;gap:8px;margin-bottom:8px}.photo-preview{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:8px}.photo-preview img{width:100%;height:78px;object-fit:cover;border-radius:12px}.bottom{height:calc(58px + var(--safe-bottom));padding:6px 10px calc(6px + var(--safe-bottom));background:rgba(8,13,24,.98);border-top:1px solid var(--line)}.next{width:100%;height:46px;border:0;border-radius:16px;background:linear-gradient(135deg,#4c95ff,#1967d2);color:#fff;font-size:18px;font-weight:1000;box-shadow:0 10px 26px rgba(49,130,246,.28)}.toast{position:fixed;left:50%;top:calc(10px + var(--safe-top));transform:translateX(-50%);z-index:999;width:calc(100% - 28px);max-width:402px;background:#fff;color:#14243a;border-left:6px solid var(--green);border-radius:14px;padding:9px 12px;font-weight:1000;box-shadow:0 14px 40px rgba(0,0,0,.25);display:none}.toast small{display:block;color:#475569;margin-top:3px}@media(max-width:360px){.grid-people{grid-template-columns:repeat(3,1fr);gap:6px}.card{height:106px}.name{font-size:14px}.code{font-size:11px}.brand h1{font-size:15px}.hint{font-size:13px}}
</style>
<script src="./pwa-config.js?v=503"></script>
<script src="./gas-bridge.js?v=503"></script>
</head>
<body>
<div class="app">
  <header class="top"><div class="brand"><div class="logo">🏭</div><h1>製一組 報工表單 V4</h1></div><div class="status"><span class="dot"></span><span id="狀態文字">資料讀取中...</span></div></header>
  <nav class="steps" id="步驟列"></nav>
  <div class="hint" id="提示文字">👆 Step 1：選擇作業員 / Select Operator</div>
  <div class="searchbar"><input id="搜尋框" placeholder="🔍 搜尋人員 / Search: 姓名、工號、班別..."><button class="camera" id="相機鈕">📷</button></div>
  <main class="body">
    <section class="page active" id="頁0"><div class="grid-people" id="人員清單"></div></section>
    <section class="page" id="頁1"><div class="grid-products" id="產品清單"></div><div class="panel" id="工站面板" style="display:none"><h3>工站 / Workstation</h3><select class="field" id="工站選擇"></select><div class="grid-machines" id="機台清單" style="margin-top:8px"></div></div></section>
    <section class="page" id="頁2"><div class="panel"><h3>產出數量 / Output</h3><div class="row2"><div><div class="label">共做數</div><input class="field" id="共做數" inputmode="numeric"></div><div><div class="label">不良數</div><input class="field" id="不良數" inputmode="numeric" value="0"></div></div><div class="stats"><div class="stat">總數<b id="顯示總數">0</b></div><div class="stat">不良<b id="顯示不良">0</b></div><div class="stat">良品<b id="顯示良品">0</b></div></div></div></section>
    <section class="page" id="頁3"><div class="panel"><h3>不良原因 / Defects</h3><div id="不良列"></div><button class="next" style="height:42px" id="新增不良">＋ 新增不良</button></div><div class="panel"><h3>照片 / Photos</h3><input type="file" id="照片輸入" accept="image/*" multiple hidden><button class="next" style="height:42px" id="選照片">拍照 / 選圖</button><div class="photo-preview" id="照片預覽"></div></div></section>
    <section class="page" id="頁4"><div class="panel"><h3>確認 / Confirm</h3><div id="摘要"></div></div></section>
  </main>
  <footer class="bottom"><button class="next" id="下一步">下一步 → / Next</button></footer>
</div>
<div class="toast" id="提示泡泡"></div>
<script>
(function(){
'use strict';
const $=id=>document.getElementById(id);const S=v=>String(v==null?'':v).trim();const N=v=>{const x=Number(S(v).replace(/,/g,''));return isFinite(x)?x:0};
const 狀態={步驟:0,db:null,人員:null,產品:null,工站:null,機台:null,照片:[]};
const 標題=['👆 Step 1：選擇作業員 / Select Operator','📦 Step 2：選擇工件 / Select Workpiece','📊 Step 3：輸入產出 / Output','🧪 Step 4：品質照片 / Quality','✅ Step 5：確認送出 / Confirm'];
function html(s){return S(s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]))}
function toast(t,m){const e=$('提示泡泡');e.innerHTML=html(t)+(m?'<small>'+html(m)+'</small>':'');e.style.display='block';clearTimeout(e._t);e._t=setTimeout(()=>e.style.display='none',1800)}
function img(u){u=S(u);return u.startsWith('http')?'<img src="'+html(u)+'" loading="lazy" onerror="this.remove()">':'<div class="fallback">👤</div>'}
function setStep(i){狀態.步驟=Math.max(0,Math.min(4,i));document.querySelectorAll('.page').forEach((p,idx)=>p.classList.toggle('active',idx===狀態.步驟));$('提示文字').textContent=標題[狀態.步驟];畫步驟();更新搜尋提示();if(狀態.步驟===4)畫摘要();$('下一步').textContent=狀態.步驟===4?'送出報工 / Submit':'下一步 → / Next'}
function 畫步驟(){$('步驟列').innerHTML=[1,2,3,4,5].map((n,i)=>'<button class="step '+(i===狀態.步驟?'active':'')+'" type="button">'+n+'</button>').join('')}
function 更新搜尋提示(){const p=['🔍 搜尋人員 / Search: 姓名、工號、班別...','🔍 搜尋產品 / Search Product...','','',''][狀態.步驟];$('搜尋框').style.display=p?'block':'none';$('相機鈕').style.display=p?'block':'none';$('搜尋框').placeholder=p;$('搜尋框').value=''}
function 人員列(){return (狀態.db&&狀態.db.人員)||[]}function 產品列(){return (狀態.db&&狀態.db.產品)||[]}function 工站列(){return (狀態.db&&(狀態.db.routes||狀態.db.報工工站群組))||[]}
function 畫人員(){const q=S($('搜尋框').value).toLowerCase();const rows=人員列().filter(p=>!q||[p.姓名,p.工號,p.班別].join(' ').toLowerCase().includes(q)).slice(0,90);$('人員清單').innerHTML=rows.map(p=>'<div class="card '+(狀態.人員&&狀態.人員.工號===p.工號?'selected':'')+'" data-id="'+html(p.工號)+'"><span class="badge">'+html(p.班別||'早班')+'</span>'+img(p.照片網址||p.縮圖網址)+'<div class="cap"><div class="name">'+html(p.姓名)+'</div><div class="code">'+html(p.工號)+'</div></div></div>').join('')}
function 畫產品(){const q=S($('搜尋框').value).toLowerCase();const rows=產品列().filter(p=>!q||[p.品名,p.產品編號,p.客戶品號].join(' ').toLowerCase().includes(q)).slice(0,90);$('產品清單').innerHTML=rows.map(p=>'<div class="card '+(狀態.產品&&狀態.產品.產品編號===p.產品編號?'selected':'')+'" data-pid="'+html(p.產品編號)+'">'+img(p.照片網址||p.縮圖網址)+'<div class="cap"><div class="name">'+html(p.品名||p.產品編號)+'</div><div class="code">'+html(p.產品編號)+'</div></div></div>').join('')}
function 選產品(pid){狀態.產品=產品列().find(p=>p.產品編號===pid);狀態.工站=null;狀態.機台=null;畫產品();const routes=工站列().filter(r=>r.產品編號===pid);$('工站面板').style.display='block';$('工站選擇').innerHTML='<option value="">請選擇工站</option>'+routes.map((r,i)=>'<option value="'+i+'">'+html(r.工站名稱||r.報工工站名稱||'工站')+'</option>').join('');window._routes=routes;$('機台清單').innerHTML=''}
function 選工站(idx){const r=(window._routes||[])[Number(idx)];狀態.工站=r;const ms=(r&&r.機台清單)||[];$('機台清單').innerHTML=ms.map(m=>'<div class="card" data-mid="'+html(m.機台編號)+'">'+img(m.照片網址||m.縮圖網址)+'<div class="cap"><div class="name">'+html(m.機台編號)+'</div><div class="code">'+html(m.機台名稱||m.設備名稱||'')+'</div></div></div>').join('');狀態.機台=ms[0]||null}
function 算數(){const t=N($('共做數').value),ng=N($('不良數').value);$('顯示總數').textContent=t;$('顯示不良').textContent=ng;$('顯示良品').textContent=Math.max(0,t-ng)}
function 缺陷資料(){const d=(狀態.db&&狀態.db.不良原因)||{Z:[],Y:[]};return [].concat(d.Z||[],d.Y||[])}
function 加不良(){const row=document.createElement('div');row.className='defrow';const ds=缺陷資料();row.innerHTML='<select class="field">'+ds.map(d=>'<option value="'+html(d.代碼)+'">'+html(d.代碼+' '+(d.英文名稱||'')+' '+(d.名稱||''))+'</option>').join('')+'</select><input class="field" inputmode="numeric" placeholder="數量">';$('不良列').appendChild(row)}
function 畫照片(files){Array.from(files||[]).slice(0,12-狀態.照片.length).forEach(f=>{狀態.照片.push({name:f.name,size:f.size,url:URL.createObjectURL(f)})});$('照片預覽').innerHTML=狀態.照片.map(p=>'<img src="'+p.url+'">').join('')}
function 畫摘要(){const t=N($('共做數').value),ng=N($('不良數').value);$('摘要').innerHTML='<p><b>人員：</b>'+html(狀態.人員?.姓名||'')+' '+html(狀態.人員?.工號||'')+'</p><p><b>產品：</b>'+html(狀態.產品?.產品編號||'')+'</p><p><b>工站：</b>'+html(狀態.工站?.工站名稱||狀態.工站?.報工工站名稱||'')+'</p><p><b>良品：</b>'+Math.max(0,t-ng)+' / <b>不良：</b>'+ng+'</p>'}
async function 送出(){const t=N($('共做數').value),ng=N($('不良數').value);const reportId='RPT-'+Date.now();const p={reportId,報工編號:reportId,operator:{employeeId:狀態.人員?.工號,operatorName:狀態.人員?.姓名,shift:狀態.人員?.班別||'早班'},product:{productCode:狀態.產品?.產品編號,customerPartNo:狀態.產品?.客戶品號,productName:狀態.產品?.品名},workstation:{workstationName:狀態.工站?.工站名稱||狀態.工站?.報工工站名稱,processRange:狀態.工站?.工序範圍||狀態.工站?.工序,mainMachine:狀態.機台?.機台編號},output:{totalQty:t,ngQty:ng,goodQty:Math.max(0,t-ng),workingHours:'8 hrs'},quality:{defects:[]},photos:狀態.照片.map(x=>({name:x.name,size:x.size})),remarks:'',source:'PWA_FIXED_503'};const r=await V4Bridge.submitReport(p);toast('報工已送出',r.報工編號||r.reportId||reportId)}
async function 啟動(){畫步驟();try{狀態.db=await V4Bridge.loadInit();$('狀態文字').textContent='資料已載入｜人員：'+(狀態.db.人員||[]).length+'｜工站：'+(狀態.db.routes||狀態.db.報工工站群組||[]).length;畫人員();toast('資料已載入','畫面已固定，上中下不會跑版')}catch(e){$('狀態文字').textContent='讀取失敗';toast('讀取失敗',e.message||e)}}
$('搜尋框').addEventListener('input',()=>{if(狀態.步驟===0)畫人員();if(狀態.步驟===1)畫產品()});$('人員清單').addEventListener('click',e=>{const c=e.target.closest('.card');if(!c)return;狀態.人員=人員列().find(p=>p.工號===c.dataset.id);畫人員()});$('產品清單').addEventListener('click',e=>{const c=e.target.closest('.card');if(c)選產品(c.dataset.pid)});$('工站選擇').addEventListener('change',e=>選工站(e.target.value));$('共做數').addEventListener('input',算數);$('不良數').addEventListener('input',算數);$('新增不良').addEventListener('click',加不良);$('選照片').addEventListener('click',()=>$('照片輸入').click());$('照片輸入').addEventListener('change',e=>畫照片(e.target.files));$('下一步').addEventListener('click',async()=>{if(狀態.步驟===0&&!狀態.人員)return toast('請先選人員');if(狀態.步驟===1&&!狀態.產品)return toast('請先選產品');if(狀態.步驟===1&&!狀態.工站)return toast('請先選工站');if(狀態.步驟===2&&N($('共做數').value)<=0)return toast('請輸入共做數');if(狀態.步驟<4){setStep(狀態.步驟+1);if(狀態.步驟===1)畫產品();return}try{await 送出()}catch(e){toast('送出失敗',e.message||e)}});啟動();try{if('serviceWorker'in navigator)navigator.serviceWorker.register('./sw.js?v=503').catch(()=>{})}catch(e){}
})();
</script>
</body>
</html>
