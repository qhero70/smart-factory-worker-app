<script>
(function(){
var V='497';
var f=document.getElementById('f');
var boot=document.getElementById('boot');
function addJS(d,src,id,cb){if(d.getElementById(id)){cb&&cb();return}var s=d.createElement('script');s.id=id;s.src=src;s.onload=function(){cb&&cb()};s.onerror=function(){cb&&cb()};d.head.appendChild(s)}
function injectLayoutFix(w,d){try{var old=d.getElementById('safe497');if(old)old.remove();var s=d.createElement('style');s.id='safe497';s.textContent='html,body{overflow-y:auto!important;overflow-x:hidden!important;text-align:center!important}.app{width:100%!important;max-width:430px!important;margin-left:auto!important;margin-right:auto!important;text-align:left!important;padding-bottom:170px!important}.topbar{top:0!important;padding-top:54px!important;z-index:80!important}.top-title{justify-content:flex-start!important}.title h1{font-size:18px!important;line-height:1.15!important}.title p{font-size:11px!important}.status-pill{width:100%!important;justify-content:center!important;line-height:1.25!important}.stepper{position:sticky!important;top:148px!important;z-index:70!important;margin:12px 14px!important}.step .circle{width:34px!important;height:34px!important}.guide-card{position:relative!important;top:auto!important;z-index:1!important;margin:12px 14px 16px!important}.page{padding-left:14px!important;padding-right:14px!important}.person-grid,.product-grid,.machine-grid{grid-template-columns:repeat(2,minmax(0,1fr))!important;gap:10px!important}.person-card,.product-card{min-height:168px!important}.machine-card{min-height:124px!important}.toast-stack{position:fixed!important;left:50%!important;right:auto!important;top:118px!important;transform:translateX(-50%)!important;width:calc(100vw - 32px)!important;max-width:430px!important;z-index:120!important;pointer-events:none!important}.toast{background:#ffffff!important;color:#14243a!important;border:1px solid #d7e2f2!important;border-left:6px solid #22c55e!important;box-shadow:0 14px 40px rgba(0,0,0,.24)!important;text-align:left!important}.toast.warn{border-left-color:#f59e0b!important}.toast.error{border-left-color:#ef4444!important}.toast small{color:#475569!important}.bottom-bar{left:50%!important;right:auto!important;transform:translateX(-50%)!important;width:100%!important;max-width:430px!important;z-index:90!important}.btn{height:58px!important}@media(max-width:430px){.app{max-width:100%!important}.topbar{padding-left:16px!important;padding-right:16px!important}.page{padding-left:14px!important;padding-right:14px!important}.bottom-bar{width:100%!important}.toast-stack{width:calc(100vw - 28px)!important}.person-card,.product-card{min-height:160px!important}}';d.head.appendChild(s);setTimeout(function(){var t=d.querySelector('.topbar'),p=d.querySelector('.stepper');if(t&&p)p.style.top=Math.ceil(t.getBoundingClientRect().height+8)+'px'},260)}catch(e){}}
function hideBoot(){setTimeout(function(){boot.classList.add('hide')},900)}
f.addEventListener('load',function(){
  try{
    var w=f.contentWindow,d=w.document;
    injectLayoutFix(w,d);
    addJS(d,'./pwa-config.js?v='+V,'cfg497',function(){
      addJS(d,'./gas-bridge.js?v='+V,'bridge497',function(){
        addJS(d,'./work-report-v4-dark-488.js?v='+V,'dark497',function(){
          addJS(d,'./work-report-v4-rules-470.js?v='+V,'rules497',function(){
            addJS(d,'./work-report-v4-overtime-489.js?v='+V,'overtime497',function(){
              addJS(d,'./work-report-v4-route-strict-490.js?v='+V,'routeStrict497',function(){
                addJS(d,'./work-report-v4-submit-482.js?v='+V,'submit497',function(){
                  addJS(d,'./work-report-v4-hotfix-494.js?v='+V,'hotfix497',function(){
                    injectLayoutFix(w,d);
                    try{if(w.V4Dark488&&w.V4Dark488.install)w.V4Dark488.install()}catch(e){}
                    injectLayoutFix(w,d);
                    try{if(w.V4Rules&&w.V4Rules.boot)w.V4Rules.boot()}catch(e){}
                    try{if(w.V4Overtime489&&w.V4Overtime489.boot)w.V4Overtime489.boot()}catch(e){}
                    try{if(w.V4RouteStrict490&&w.V4RouteStrict490.boot)w.V4RouteStrict490.boot()}catch(e){}
                    try{if(w.V4Hotfix494&&w.V4Hotfix494.boot)w.V4Hotfix494.boot()}catch(e){}
                    try{if(typeof w.reloadData==='function')w.reloadData()}catch(e){}
                    setTimeout(function(){injectLayoutFix(w,d)},700);
                    setTimeout(function(){injectLayoutFix(w,d)},1500);
                    hideBoot();
                  });
                });
              });
            });
          });
        });
      });
    });
  }catch(e){boot.textContent='報工作業載入失敗，請重新整理';}
});
try{if('serviceWorker'in navigator)navigator.serviceWorker.register('./sw.js?v='+V).catch(function(){})}catch(e){}
})();
</script>
