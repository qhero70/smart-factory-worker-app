const M=Object.fromEntries(MODULES.map((x,i)=>[x[0],{name:x[0],icon:x[1],sheet:x[2],key:x[3],photo:x[4],rel:x[5],grad:gradients[i%gradients.length]}]));let state={spec:null,headers:[],rows:[],changed:{}};function $(id){return document.getElementById(id)}function esc(v){return String(v??'').replace(/[&<>'"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[c]))}function toast(m){$('toast').innerText=m;$('toast').classList.add('show');setTimeout(()=>$('toast').classList.remove('show'),2200)}function login(){$('login').style.display='none';$('app').classList.add('active');render('home')}function logout(){$('app').classList.remove('active');$('login').style.display='flex'}document.querySelectorAll('.nav').forEach(n=>n.onclick=()=>{document.querySelectorAll('.nav').forEach(x=>x.classList.remove('active'));document.querySelectorAll(`[data-tab="${n.dataset.tab}"]`).forEach(x=>x.classList.add('active'));render(n.dataset.tab)});function theme(){document.body.dataset.theme=document.body.dataset.theme==='dark'?'':'dark'}
function apiReady(){return /^https?:\/\//.test(CFG.apiUrl)}function params(a,o={}){return{action:a,spreadsheetId:CFG.spreadsheetId,token:CFG.apiToken,...o}}function parse(t){t=t.trim().replace(/^\uFEFF/,'');try{return JSON.parse(t)}catch(e){let m=t.match(/^[\w$]+\((.*)\);?$/s);if(m)return JSON.parse(m[1]);throw new Error('API 回傳不是 JSON')}}async function apiGet(a,o={}){if(!apiReady())throw new Error('尚未設定 GAS Web App URL');let u=new URL(CFG.apiUrl);Object.entries(params(a,o)).forEach(([k,v])=>v!==undefined&&u.searchParams.set(k,v));let r=await fetch(u,{cache:'no-store',redirect:'follow'}),j=parse(await r.text());if(j.ok===false)throw new Error(j.error||'API錯誤');return j}async function apiPost(a,o={}){if(!apiReady())throw new Error('尚未設定 GAS Web App URL');let r=await fetch(CFG.apiUrl,{method:'POST',headers:{'Content-Type':'text/plain;charset=utf-8'},body:JSON.stringify(params(a,o)),redirect:'follow'}),j=parse(await r.text());if(j.ok===false)throw new Error(j.error||'API錯誤');return j}function setApi(){CFG.apiUrl=$('apiUrl').value.trim();CFG.apiToken=$('apiToken').value.trim();localStorage.setItem('SMART_FACTORY_GAS_URL',CFG.apiUrl);localStorage.setItem('SMART_FACTORY_API_TOKEN',CFG.apiToken);toast('API 設定已儲存')}async function testApi(){try{let r=await apiGet('listSheets');toast('API 正常：'+(r.sheets?.length||0)+' 分頁')}catch(e){toast(e.message)}}function apiBlock(){return `<div class="api-card"><b><i class="fa-solid fa-plug"></i> GAS API 對接</b><p class="note">PWA 透過 Apps Script Web App 讀寫智慧工廠主資料庫。</p><div class="toolbar"><input id="apiUrl" class="input" placeholder="GAS Web App URL /exec" value="${esc(CFG.apiUrl)}"><input id="apiToken" class="input" style="max-width:220px" placeholder="API Token，可空白" value="${esc(CFG.apiToken)}"><button class="btn primary" onclick="setApi()">儲存</button><button class="btn" onclick="testApi()">測試</button></div></div>`}
function render(t){let titles={home:['化新精密｜智慧製造中央作戰總部','HUAXIN PRECISION · NEXUS OS COMMAND CENTER'],modules:['功能模塊總覽','主檔 / 工站 / 關聯分頁可編輯'],schedule:['行事曆','製造部排程事件'],ai:['AI 決策','戰情摘要與異常提示'],settings:['系統設定','PWA / GAS / 主題']};$('title').innerHTML=titles[t][0].replace('化新精密','<span class="company">化新精密</span>');$('subtitle').innerText=titles[t][1];$('content').innerHTML={home:home(),modules:modules(),schedule:schedule(),ai:ai(),settings:settings()}[t];if(t==='home')refreshKpi()}function home(){let q=['今日派班','主管追蹤','主線驗收','主線修復','報工管理V2','生產計畫','排程管理','人員管理','主檔總覽'].map(n=>tile(n)).join('');return `<div class="neu hero"><h2>⚡ 主線快速模組</h2><p>已換成多彩 NEXUS OS 版本首頁，PWA 啟用，所有主檔、工站、途程、BOM、排程、報工與照片欄位透過 GAS 對接試算表。</p><div class="grid" style="margin-top:18px">${q}</div></div><div class="kpis"><div class="neu kpi"><span>今日派班</span><b data-kpi="todaySchedule">0</b></div><div class="neu kpi"><span>報工回寫</span><b data-kpi="todayReport" class="ok">0</b></div><div class="neu kpi"><span>工單追蹤</span><b data-kpi="notReported" class="warn">0</b></div><div class="neu kpi"><span>警示總數</span><b data-kpi="warnings" class="danger">0</b></div></div>`}function tile(n){let m=M[n]||{icon:'fa-cube',sheet:'功能入口',grad:gradients[0]};return `<div class="neu tile" onclick="openModule('${n}')"><div class="i" style="--grad:${m.grad}"><i class="fa-solid ${m.icon}"></i></div><b>${n}</b><small>${m.sheet||'功能入口'}</small></div>`}function modules(){return `<div class="grid">${MODULES.map(x=>tile(x[0])).join('')}</div>`}function schedule(){return `<div class="neu hero"><h2>行事曆</h2><p>行事曆資料請由「行事曆」模組讀取 24_行事曆。</p>${tile('行事曆')}</div>`}function ai(){return `<div class="neu hero"><h2>AI 決策</h2><p>AI 決策區保留戰情摘要、排程警示、派班警示與每日摘要入口。</p></div>`}function settings(){return apiBlock()+`<div class="neu hero"><h2>系統設定</h2><p>正式主資料庫：<b>${CFG.spreadsheetId}</b></p><div class="toolbar"><button class="btn" onclick="theme()">切換主題</button><button class="btn" onclick="openModule('系統設定')">編輯 00_系統設定</button><button class="btn" onclick="openModule('主檔總覽')">主檔總覽</button></div></div>`}async function refreshKpi(){if(!apiReady())return;try{let r=await apiGet('dashboard'),d=r.data||{};for(let k of ['todaySchedule','todayReport','notReported','warnings']){let e=document.querySelector(`[data-kpi=${k}]`);if(e)e.innerText=d[k]||0}}catch(e){}}
function openModule(n){let spec=M[n]||Object.values(M).find(x=>x.sheet===n)||{name:n,sheet:n,key:'',photo:[],rel:[],grad:gradients[0]};state={spec,headers:[],rows:[],changed:{}};$('panelTitle').innerText=n;$('panelBody').innerHTML=editor(spec,n);$('panel').classList.add('show');setTimeout(()=>loadSheet(),80)}function closePanel(){$('panel').classList.remove('show')}function editor(s,n){let rel=(s.rel||[]).map(x=>`<div onclick="openModule('${esc(x)}')"><b>${esc(x)}</b><small class="mono">關聯分頁</small></div>`).join('');return apiBlock()+`<div class="sync"><span class="pill">模組：${esc(n)}</span><span class="pill">分頁：${esc(s.sheet)}</span><span class="pill">主鍵：${esc(s.key||'列號')}</span></div><div class="rel">${rel||'<p class="note">無關聯分頁設定</p>'}</div><div class="toolbar"><input id="q" class="input" placeholder="搜尋目前分頁" onkeydown="if(event.key==='Enter')loadSheet()"><button class="btn primary" onclick="loadSheet()">讀取</button><button class="btn" onclick="appendRow()">新增列</button><button class="btn" onclick="saveAll()">儲存全部</button></div><div id="sheetMount"><p class="note">讀取中...</p></div>`}async function loadSheet(){let m=$('sheetMount');try{m.innerHTML='<p class="note">讀取試算表資料中...</p>';let r=await apiGet('sheetData',{sheet:state.spec.sheet,limit:CFG.limit,query:$('q')?.value||''});state.headers=r.headers||[];state.rows=r.rows||[];state.changed={};drawTable()}catch(e){m.innerHTML=`<div class="err"><b>無法讀取</b><br>${esc(e.message)}<br><br>請確認 GAS Web App URL 已設定。</div>`}}function isPhoto(h){return /照片|圖片|影像|photo|image|thumbnail|url|網址/i.test(String(h||''))}function img(v){let s=String(v||'').trim();if(!s)return'';let m=s.match(/(?:id=|\/d\/)([-\w]{20,})/);if(m)return`https://drive.google.com/thumbnail?id=${m[1]}&sz=w300`;return/^https?:\/\//.test(s)?s:''}function drawTable(){let h=state.headers,r=state.rows;let head=h.map(x=>`<th>${esc(x)}</th>`).join('');let body=r.map((row,ri)=>`<tr><td class="rowop"><button class="mini save" onclick="saveRow(${ri})">儲存</button>R${row.rowNumber||''}</td>${h.map((x,ci)=>cell(row.values?.[ci]||'',ri,ci,x)).join('')}</tr>`).join('');$('sheetMount').innerHTML=`<div class="sync"><span class="pill">載入 ${r.length} 列</span><span class="pill">${h.length} 欄</span></div><div class="table-wrap"><table><thead><tr><th class="rowop">操作</th>${head}</tr></thead><tbody>${body||`<tr><td colspan="${h.length+1}">無資料</td></tr>`}</tbody></table></div><p class="note" style="margin-top:10px;color:#aeb8c4">照片欄位會自動顯示縮圖；修改後按「儲存」會回寫正式試算表。</p>`}function cell(v,ri,ci,h){let im=img(v);return `<td>${isPhoto(h)?`<div class="photo">${im?`<img class="thumb" src="${esc(im)}" loading="lazy">`:'<div class="empty-photo"><i class="fa-regular fa-image"></i></div>'}<textarea class="cell" oninput="chg(${ri},${ci},this.value)">${esc(v)}</textarea></div>`:`<textarea class="cell" oninput="chg(${ri},${ci},this.value)">${esc(v)}</textarea>`}</td>`}function chg(ri,ci,v){state.rows[ri].values[ci]=v;state.changed[ri]=true}async function saveRow(ri){let row=state.rows[ri];try{await apiPost('updateRow',{sheet:state.spec.sheet,rowNumber:row.rowNumber,headers:state.headers,values:row.values});delete state.changed[ri];toast('已回寫第 '+row.rowNumber+' 列')}catch(e){toast(e.message)}}async function saveAll(){let a=Object.keys(state.changed).map(Number);if(!a.length)return toast('沒有修改');for(let i of a)await saveRow(i);toast('全部修改已儲存')}async function appendRow(){try{await apiPost('appendRow',{sheet:state.spec.sheet,headers:state.headers,values:state.headers.map(()=> '')});toast('已新增空白列');loadSheet()}catch(e){toast(e.message)}}
if('serviceWorker'in navigator){window.addEventListener('load',()=>navigator.serviceWorker.register('./sw.js?v=20260703-final').catch(()=>{}))}render('home');
</script></body></html>
