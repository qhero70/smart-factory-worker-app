<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
  <meta name="theme-color" content="#0f172a">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="化新精密">
  <title>NEXUS OS｜工業 5.0 智慧製造矩陣</title>
  <link rel="manifest" href="./manifest.webmanifest">
  <link rel="icon" href="./assets/icons/nexus-os.svg" type="image/svg+xml">
  <style>
    :root{--底1:#eef7ff;--底2:#e7fff6;--墨:#172033;--淡:#516173;--卡:rgba(255,255,255,.72);--線:rgba(15,23,42,.12);--藍:#4f46e5;--青:#06b6d4;--綠:#10b981;--粉:#ff3b75;--黃:#f59e0b;--陰:0 24px 70px rgba(15,23,42,.16)}
    *{box-sizing:border-box}body{margin:0;min-height:100vh;background:radial-gradient(circle at 20% 0%,#dfe7ff 0,#f7fbff 32%,#e9fff7 72%,#dff6ff 100%);color:var(--墨);font-family:-apple-system,BlinkMacSystemFont,'Noto Sans TC','Microsoft JhengHei',sans-serif}.頁面{max-width:820px;margin:0 auto;padding:22px 18px 110px}.徽章{display:inline-flex;gap:8px;align-items:center;border-radius:999px;background:rgba(255,255,255,.76);box-shadow:0 12px 34px rgba(79,70,229,.12);padding:8px 14px;color:var(--藍);font-weight:1000}.點{width:11px;height:11px;background:var(--綠);border-radius:50%;box-shadow:0 0 18px var(--綠)}.標題{font-size:44px;line-height:1.05;margin:12px 0 8px;letter-spacing:-2px;font-weight:1000}.副標{font-size:18px;line-height:1.6;color:var(--淡);font-weight:900;margin:0 0 18px}.卡{background:var(--卡);border:1px solid rgba(255,255,255,.75);border-radius:28px;box-shadow:var(--陰);backdrop-filter:blur(18px);padding:18px;margin:14px 0}.卡 h2{margin:0 0 10px;font-size:20px}.指標格{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}.指標{background:rgba(255,255,255,.72);border:1px solid var(--線);border-radius:22px;padding:16px}.指標 b{font-size:14px;color:var(--淡)}.指標 strong{display:block;font-size:36px;margin-top:8px}.綠字{color:var(--綠)}.粉字{color:var(--粉)}.藍字{color:var(--藍)}.按鈕格{display:grid;grid-template-columns:1fr 1fr;gap:10px}.按鈕{border:0;border-radius:19px;padding:15px 12px;font-weight:1000;font-size:15px;text-align:center;text-decoration:none;color:white;background:#1f2937;box-shadow:0 10px 24px rgba(15,23,42,.12)}.按鈕.藍{background:linear-gradient(135deg,var(--藍),var(--青))}.按鈕.綠{background:linear-gradient(135deg,#059669,#34d399)}.按鈕.粉{background:linear-gradient(135deg,#e11d48,#fb7185)}.按鈕.黃{background:linear-gradient(135deg,#d97706,#fbbf24);color:#1f1300}.輸入{width:100%;border:1px solid var(--線);border-radius:18px;background:rgba(255,255,255,.8);font-size:16px;padding:14px;margin:6px 0;color:var(--墨);font-weight:800}.任務{border:1px solid var(--線);border-radius:20px;background:rgba(255,255,255,.72);padding:14px;margin:10px 0}.任務 b{font-size:17px}.任務 small{display:block;color:var(--淡);line-height:1.5;margin-top:4px}.任務操作{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:10px}.任務操作 button,.任務操作 a{border:0;border-radius:14px;padding:10px 8px;font-weight:1000;text-align:center;text-decoration:none;font-size:13px}.任務操作 button{background:var(--藍);color:white}.任務操作 a{background:var(--綠);color:white}.底部{position:fixed;left:50%;bottom:18px;transform:translateX(-50%);width:min(760px,calc(100% - 28px));display:grid;grid-template-columns:repeat(5,1fr);gap:6px;background:rgba(255,255,255,.82);backdrop-filter:blur(22px);border:1px solid rgba(255,255,255,.88);box-shadow:var(--陰);border-radius:28px;padding:10px}.底部 button,.底部 a{border:0;background:transparent;text-decoration:none;color:#334155;font-weight:1000;font-size:13px;text-align:center;padding:8px 2px}.底部 .active{color:var(--藍)}pre{white-space:pre-wrap;background:#0f172a;color:#dff7ff;border-radius:22px;padding:14px;line-height:1.55;min-height:88px;overflow:auto}.提示{font-size:13px;color:var(--淡);line-height:1.7}@media(max-width:620px){.標題{font-size:38px}.指標格{grid-template-columns:1fr}.按鈕格{grid-template-columns:1fr}.頁面{padding:18px 14px 108px}}
  </style>
</head>
<body>
  <main class="頁面">
    <section>
      <div class="徽章"><span class="點"></span><span id="版本徽章">Huaxin Smart Manufacturing HS</span></div>
      <h1 class="標題">NEXUS OS<br>工業 5.0 智慧製造矩陣</h1>
      <p class="副標">製造部製一組｜智慧製造中央作戰指揮中心｜PWA 正式主入口</p>
    </section>

    <section class="卡">
      <h2>今日主線</h2>
      <div class="指標格">
        <div class="指標"><b>今日派班</b><strong class="藍字" id="今日派班數">--</strong></div>
        <div class="指標"><b>已報工</b><strong class="綠字" id="已報工數">--</strong></div>
        <div class="指標"><b>未報工</b><strong class="粉字" id="未報工數">--</strong></div>
      </div>
      <p class="提示" id="主線狀態">等待後端主線資料。</p>
    </section>

    <section class="卡">
      <h2>我的今日任務</h2>
      <input class="輸入" id="工號" placeholder="輸入工號，例如 fhft528；留空則看全部派班">
      <div class="按鈕格">
        <button class="按鈕 藍" onclick="讀取今日任務()">讀取今日任務</button>
        <a class="按鈕 綠" href="./work-report-v2.html">開啟報工作業</a>
      </div>
      <div id="任務列表" class="提示">尚未讀取。</div>
    </section>

    <section class="卡">
      <h2>主線優化操作</h2>
      <div class="按鈕格">
        <button class="按鈕 綠" onclick="初始化主線()">初始化 38.7</button>
        <button class="按鈕 藍" onclick="鎖定資料庫()">鎖定唯一資料庫</button>
        <button class="按鈕 黃" onclick="清洗計劃()">清洗生產計劃表</button>
        <button class="按鈕 粉" onclick="自動排程()">自動排程派班</button>
      </div>
      <p class="提示">主線順序：生產計劃表清洗 → 10_排程需求池 → 自動排程 → 今日派班 → 作業員報工。</p>
    </section>

    <section class="卡">
      <h2>系統檢查</h2>
      <div class="按鈕格">
        <button class="按鈕 藍" onclick="健康檢查()">後端健康檢查</button>
        <button class="按鈕 綠" onclick="主檔檢查()">主檔檢查</button>
        <button class="按鈕 黃" onclick="測試主線()">測試 38.7</button>
        <a class="按鈕" href="./index.html">中央入口</a>
      </div>
      <pre id="結果">NEXUS OS 啟動中...</pre>
    </section>
  </main>

  <nav class="底部">
    <button class="active" onclick="window.scrollTo({top:0,behavior:'smooth'})">🏠<br>首頁</button>
    <button onclick="讀取儀表板()">📊<br>戰情</button>
    <a href="./work-report-v2.html">✅<br>報工</a>
    <button onclick="清洗計劃()">🧹<br>清洗</button>
    <button onclick="自動排程()">🗓️<br>排程</button>
  </nav>

  <script src="./pwa-config.js"></script>
  <script src="./gas-bridge.js"></script>
  <script>
    const $ = id => document.getElementById(id);
    const 輸出 = 資料 => { $('結果').textContent = typeof 資料 === 'string' ? 資料 : JSON.stringify(資料,null,2); };
    const A = () => (window.PWA_CONFIG && window.PWA_CONFIG.API_ACTIONS) || {};
    const 任務KEY = 'NEXUS_OS_今日報工任務';
    function 記住工號(){ localStorage.setItem('NEXUS_OS_工號', $('工號').value.trim()); }
    function esc(v){return String(v??'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));}
    async function 呼叫(action, payload){ return window.GAS橋接器.呼叫(action, Object.assign({}, payload || {}, { action }), { method:'POST', timeoutMs:12000 }); }

    function 開啟任務報工(index){
      const task = (window.NEXUS_OS_任務列表 || [])[index];
      if(!task){ 輸出('找不到任務'); return; }
      localStorage.setItem(任務KEY, JSON.stringify(task));
      location.href = './work-report-v2.html?dispatch=' + encodeURIComponent(JSON.stringify(task));
    }
    window.開啟任務報工 = 開啟任務報工;

    async function 讀取儀表板(){
      try{
        const data = await 呼叫(A().取得主線儀表板38_7 || '取得主線儀表板38_7');
        $('今日派班數').textContent = data.今日派班數 ?? '--';
        $('已報工數').textContent = data.已報工 ?? '--';
        $('未報工數').textContent = data.未報工 ?? '--';
        $('主線狀態').textContent = `作業日：${data.作業日 || '-'}｜版本：${data.版本 || '-'}`;
        輸出(data);
      }catch(e){ $('主線狀態').textContent='主線資料讀取失敗：'+e.message; 輸出('❌ '+e.message); }
    }
    async function 讀取今日任務(){
      try{
        記住工號();
        const data = await 呼叫(A().取得今日任務38_7 || '取得今日任務38_7', { 工號:$('工號').value.trim() });
        const list = data.任務 || [];
        window.NEXUS_OS_任務列表 = list;
        $('任務列表').innerHTML = list.length ? list.map((x,i) => `<div class="任務"><b>${esc(x.姓名)}｜${esc(x.品名 || x.產品編號 || '未命名產品')}</b><small>派班：${esc(x.派班編號 || '-')}｜工號：${esc(x.工號 || '-')}｜工站：${esc(x.工站名稱 || '-')}｜機台：${esc(x.機台編號 || '-')}｜數量：${esc(x.預計數量 || x.需求量 || '-')}｜狀態：${esc(x.狀態 || '-')}</small><div class="任務操作"><button onclick="開啟任務報工(${i})">帶入報工</button><a href="./work-report-v2.html">手動報工</a></div></div>`).join('') : '目前沒有今日任務。';
        輸出(data);
      }catch(e){ $('任務列表').textContent='讀取失敗：'+e.message; 輸出('❌ '+e.message); }
    }
    async function 初始化主線(){ try{輸出('初始化 38.7 中...'); 輸出(await 呼叫(A().初始化_主線優化38_7 || '初始化_主線優化38_7')); await 讀取儀表板();}catch(e){輸出('❌ '+e.message);} }
    async function 鎖定資料庫(){ try{輸出('鎖定唯一資料庫中...'); 輸出(await 呼叫(A().初始化_唯一資料庫鎖定38_7 || '初始化_唯一資料庫鎖定38_7'));}catch(e){輸出('❌ '+e.message);} }
    async function 清洗計劃(){ try{輸出('清洗生產計劃表中...'); 輸出(await 呼叫(A().清洗生產計劃表38_7 || '清洗生產計劃表38_7')); await 讀取儀表板();}catch(e){輸出('❌ '+e.message);} }
    async function 自動排程(){ try{輸出('自動排程中...'); 輸出(await 呼叫(A().自動排程38_7 || '自動排程38_7')); await 讀取儀表板(); await 讀取今日任務();}catch(e){輸出('❌ '+e.message);} }
    async function 健康檢查(){ try{輸出('健康檢查中...'); 輸出(await window.GAS橋接器.呼叫(A().健康檢查 || '健康檢查'));}catch(e){輸出('❌ '+e.message);} }
    async function 主檔檢查(){ try{輸出('主檔檢查中...'); 輸出(await window.GAS橋接器.呼叫(A().主檔檢查 || '主檔檢查'));}catch(e){輸出('❌ '+e.message);} }
    async function 測試主線(){ try{輸出('測試 38.7 中...'); 輸出(await 呼叫(A().測試_主線優化38_7 || '測試_主線優化38_7'));}catch(e){輸出('❌ '+e.message);} }

    window.addEventListener('load', async () => {
      const cfg = window.PWA_CONFIG || {};
      $('版本徽章').textContent = cfg.VERSION || 'Huaxin Smart Manufacturing HS';
      $('工號').value = localStorage.getItem('NEXUS_OS_工號') || '';
      if('serviceWorker' in navigator){ try{ await navigator.serviceWorker.register('./service-worker.js'); }catch(e){} }
      輸出('✅ NEXUS OS 已載入。先按「初始化 38.7」，再按「清洗生產計劃表」與「自動排程派班」。');
      讀取儀表板();
    });
  </script>
</body>
</html>
