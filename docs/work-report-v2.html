<body>
<div class="boot">
  <h1>🏭 製造部・報工作業 V4</h1>
  <div>正在開啟 <b>正式主庫直讀 V4 報工版本</b>，保留原完整 V4 功能...</div>
  <div class="err">若沒有自動跳轉，請點：<br><a href="./work-report-v4-436.html?v=436&sheets=direct">開啟 V4 正式主庫直讀報工版本</a></div>
</div>
<script>
(async function(){
  var target='./work-report-v4-436.html?v=436&sheets=direct&ts='+Date.now();
  try{
    if('serviceWorker' in navigator){
      var regs=await navigator.serviceWorker.getRegistrations();
      await Promise.all(regs.map(function(r){return r.unregister();}));
    }
    if(window.caches && caches.keys){
      var keys=await caches.keys();
      await Promise.all(keys.map(function(k){return caches.delete(k);}));
    }
  }catch(e){}
  location.replace(target);
})();
</script>
