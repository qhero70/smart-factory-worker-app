<!doctype html>
<html lang="zh-Hant" class="dark">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="theme-color" content="#05050a">
<link rel="manifest" href="./manifest.webmanifest">
<link rel="stylesheet" href="./work-report-v2-ui.css?v=223">
<title>製造部．報工系統</title>
<style>
:root{--藍:#00D2FF;--底:#05050a;--卡:rgba(15,20,35,.78);--線:rgba(255,255,255,.16);--字:#e2e8f0;--淡:#8b9cb0;--紅:#ff4d4f;--粉:#ff007f;--底安:env(safe-area-inset-bottom,12px)}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}html,body{min-height:100%;background:var(--底);color:var(--字);font-family:'Noto Sans TC','Microsoft JhengHei',system-ui,-apple-system,sans-serif}body{overflow-x:hidden;background-image:radial-gradient(circle at 50% 0%,rgba(0,210,255,.13),transparent 58%),radial-gradient(circle at 50% 100%,rgba(255,0,127,.08),transparent 62%)}.外框{max-width:720px;margin:0 auto;padding:0 12px 148px}.頁首{position:sticky;top:0;z-index:200;margin:0 -12px;background:rgba(5,5,10,.94);backdrop-filter:blur(20px);border-bottom:1px solid var(--線);padding:10px 12px}.標題列{display:flex;justify-content:space-between;align-items:center;gap:10px;margin-bottom:8px}.標題{font-size:20px;font-weight:1000;color:#bff5ff}.副標{font-size:11px;color:var(--粉);font-weight:1000}.狀態卡{display:block;background:rgba(0,210,255,.1);border:1px solid rgba(0,210,255,.55);color:var(--藍);border-radius:10px;padding:5px 8px;font-size:11px;font-weight:900;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.圓鈕{width:40px;height:40px;border:1px solid var(--線);border-radius:13px;background:rgba(255,255,255,.06);color:#fff;font-size:18px;font-weight:900}.搜尋列整合{display:flex;gap:10px;align-items:center;margin-top:10px}.掃碼鈕{flex:0 0 45px;height:45px;border:1px solid var(--藍);background:rgba(0,210,255,.1);border-radius:12px;color:var(--藍);font-size:22px;font-weight:1000}.搜尋框,input,select,textarea{background:rgba(255,255,255,.06);border:1px solid var(--線);border-radius:12px;padding:12px 14px;color:#fff;font-size:15px;width:100%;font:inherit;font-weight:800}.搜尋框{height:45px}.常用列{display:flex;gap:8px;overflow-x:auto;padding:10px 0 4px;scrollbar-width:none}.常用人員{flex-shrink:0;border:1px solid rgba(255,255,255,.18);background:rgba(255,255,255,.06);border-radius:999px;padding:7px 13px;color:#fff;font-size:12px;font-weight:900}.分頁{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;padding:10px 0}.分頁 button{border:1px solid var(--線);background:rgba(255,255,255,.06);color:var(--淡);border-radius:14px;padding:10px 4px;font-weight:900;font-size:12px}.分頁 button.active{background:rgba(0,210,255,.16);color:var(--藍);border-color:var(--藍)}.隱藏{display:none!important}.卡片{background:var(--卡);border:1px solid var(--線);border-radius:20px;padding:18px;margin:14px 0}.區標{font-size:16px;font-weight:900;margin-bottom:14px;color:#fff}.小字,.小提示{font-size:12px;color:var(--淡);font-weight:800}.必填:after{content:' *';color:var(--紅)}label{font-size:12px;color:var(--淡);font-weight:900;margin:10px 0 6px;display:block}.兩欄{display:grid;grid-template-columns:1fr 1fr;gap:12px}.摘要{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-top:15px}.數字卡{background:rgba(0,0,0,.3);border:1px solid var(--線);border-radius:16px;text-align:center;padding:14px 10px}.數字卡 span{font-size:11px;color:var(--淡);font-weight:800}.數字卡 b{font-size:24px;display:block;margin-top:5px}.機台格{display:grid;grid-template-columns:1fr;gap:12px}.機台卡{background:rgba(0,0,0,.3);border:1px solid var(--線);border-radius:16px;padding:8px;text-align:center;overflow:hidden}.機台卡 img,.無圖{width:100%;height:118px;border-radius:10px;object-fit:cover;display:flex;align-items:center;justify-content:center;background:rgba(255,255,255,.04);font-size:13px;color:var(--淡);font-weight:900}.機台號{font-weight:900;color:var(--藍);margin-top:8px;font-size:16px}.底部操作{position:fixed;bottom:0;left:0;right:0;z-index:260;background:linear-gradient(to top,#05050a 72%,rgba(5,5,10,0));padding:18px 12px calc(12px + var(--底安));display:grid;grid-template-columns:.8fr 2.2fr 1fr;gap:10px;max-width:720px;margin:0 auto}.底部操作 button{border:1px solid var(--線);border-radius:16px;padding:14px 8px;color:#fff;font-weight:1000;font-size:15px;background:rgba(255,255,255,.06)}.底部操作 .送出{background:linear-gradient(135deg,#22c55e,#0ea5e9,#2563eb);border:0}.底部操作 .下一步{background:#2389ff;border:0}.錯誤{color:#ffd1d1;background:rgba(255,77,79,.12);border:1px solid rgba(255,77,79,.34);border-radius:14px;padding:12px;margin:12px 0;font-weight:800}.空狀態{color:var(--淡);font-weight:900;padding:18px;border:1px dashed var(--線);border-radius:16px;text-align:center}.照片工具{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}.照片工具 button{background:rgba(255,255,255,.06);border:1px solid var(--線);color:#fff;padding:12px;border-radius:12px;font-weight:900}.照片格{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-top:15px}.照片項{aspect-ratio:1;border-radius:12px;overflow:hidden;position:relative;border:1px solid var(--線)}.照片項 img{width:100%;height:100%;object-fit:cover}.不良行{display:grid;grid-template-columns:1.6fr .7fr 44px;gap:8px;margin:8px 0}.刪除鈕{border:1px solid var(--線);background:rgba(255,77,79,.14);color:#ffd1d1;border-radius:12px;font-weight:1000}#載入遮罩{position:fixed;inset:0;z-index:1000;background:rgba(5,5,10,.86);display:none;align-items:center;justify-content:center;color:#fff;font-size:18px;font-weight:1000}#載入遮罩.顯示{display:flex}@media(max-width:480px){.機台格,.摘要{grid-template-columns:1fr}.底部操作{grid-template-columns:.9fr 2fr 1fr}}
</style>
<script src="./pwa-config.js?v=268"></script>
<script src="./gas-bridge.js?v=212"></script>
</head>
<body>
<div id="載入遮罩"><div id="載入文字">處理中...</div></div>
<div class="外框">
  <header class="頁首">
    <div class="標題列"><div><div class="標題">🏭 製造部・報工系統 / Manufacturing Work Report</div><div class="副標">化新智慧製造HS / Huaxin Smart Manufacturing HS</div></div><div style="display:flex;gap:8px"><button id="全螢幕鈕" class="圓鈕" type="button">⛶</button><button id="重整鈕" class="圓鈕" type="button">⟳</button></div></div>
    <div id="狀態卡" class="狀態卡">🟡 載入 v2.2.3 正式核心中...</div>
    <div id="搜尋區_人員" class="搜尋列整合"><button class="掃碼鈕" type="button" data-scan="人員">#</button><input id="搜尋人員" class="搜尋框" placeholder="搜尋工號、姓名..."></div>
    <div id="搜尋區_工件" class="搜尋列整合 隱藏"><button class="掃碼鈕" type="button" data-scan="產品">#</button><input id="搜尋工件" class="搜尋框" placeholder="搜尋工件品名、料號..."></div>
    <div id="常用列" class="常用列"></div>
    <nav class="分頁"><button type="button" data-tab="人員" class="active">人員</button><button type="button" data-tab="工件">工件</button><button type="button" data-tab="產出">產出</button><button type="button" data-tab="品質">品質</button></nav>
  </header>
  <section class="頁面" data-page="人員"><div class="卡片"><div class="區標">👥 作業員選擇</div><div id="人員列表" class="人員網格"></div></div><div class="卡片"><div class="區標">✅ 已選人員</div><div id="選定人員資訊"></div></div></section>
  <section class="頁面 隱藏" data-page="工件"><div class="卡片"><div class="區標">📦 工件選擇</div><div id="產品列表" class="產品網格"></div></div><div id="工站固定區" class="卡片"><div class="區標">🛠 工站選擇 / Station Select</div><label class="必填" for="工站選擇">工站</label><select id="工站選擇"></select><div id="工站提示" class="小提示"></div><div id="機台清單" class="機台格" style="margin-top:14px"></div></div></section>
  <section class="頁面 隱藏" data-page="產出"><div class="卡片"><div class="區標">🧾 產出數量</div><div class="兩欄"><div><label class="必填">作業日</label><input id="作業日" type="date"></div><div><label class="必填">班別</label><select id="班別"></select></div></div><label class="必填">今日共做數</label><input id="今日共做數" class="數量大" type="number" min="0" inputmode="numeric" placeholder="輸入今日共做數"><div class="兩欄"><div><label>開始時間</label><input id="開始時間" type="datetime-local"></div><div><label>結束時間</label><input id="結束時間" type="datetime-local"></div></div><div class="兩欄"><div><label>實際工時</label><input id="實際工時" readonly></div><div><label>實際良品數</label><input id="實際良品數" readonly></div></div><div class="兩欄"><div><label>是否加班</label><select id="是否加班"><option>否</option><option>是</option></select></div><div><label>加班類型</label><select id="加班類型"><option value="">無</option><option>平日加班</option><option>假日加班</option></select></div></div><div class="摘要"><div class="數字卡"><span>產出</span><b id="卡產出">—</b></div><div class="數字卡"><span>不良</span><b id="卡不良">—</b></div><div class="數字卡"><span>良品</span><b id="卡良品">—</b></div></div></div></section>
  <section class="頁面 隱藏" data-page="品質"><div class="卡片"><div class="區標">⚠️ 不良與異常</div><label>快速不良數</label><input id="快速不良數" type="number" min="0" inputmode="numeric" placeholder="沒有不良可留空"><div id="不良分配區"></div><button id="新增不良" type="button" style="margin-top:8px;width:100%;padding:12px;border-radius:12px;background:rgba(255,255,255,.07);color:#fff;border:1px solid var(--線);font-weight:900">＋ 新增不良分配</button><div class="兩欄"><div><label>異常類型</label><select id="異常類型"><option value="">無</option><option>設備異常</option><option>品質異常</option><option>物料異常</option><option>人員異常</option></select></div><div><label>責任歸屬</label><select id="責任歸屬"><option>無</option><option>Y</option><option>Z</option><option>設備</option><option>製程</option></select></div></div><div class="兩欄"><div><label>異常開始</label><input id="異常開始時間" type="datetime-local"></div><div><label>異常結束</label><input id="異常結束時間" type="datetime-local"></div></div></div><div class="卡片"><div class="區標">📷 現場照片</div><input id="照片拍照" type="file" accept="image/*" capture="environment" class="隱藏"><input id="照片選檔" type="file" accept="image/*" multiple class="隱藏"><div class="照片工具"><button id="拍照鈕" type="button">拍照</button><button id="選圖鈕" type="button">選圖</button><button id="清除照片鈕" type="button">清除</button></div><label>照片備註 / 備註</label><textarea id="照片備註" placeholder="輸入備註，可留空"></textarea><div id="照片計數" class="小提示">0 / 12 張照片</div><div id="照片格" class="照片格"></div></div><div class="卡片"><div class="區標">📤 報工預覽</div><pre id="報工預覽" class="小字" style="white-space:pre-wrap;overflow:auto;max-height:280px"></pre></div></section>
  <div id="系統訊息" class="錯誤">系統初始化中...</div>
</div>
<div class="底部操作"><button id="上一步" type="button">← 上一步</button><button id="送出報工" class="送出" type="button">送出預覽</button><button id="下一步" class="下一步" type="button">下一步 →</button></div>
<script src="./work-report-v2-core.js?v=223"></script>
</body>
</html>
