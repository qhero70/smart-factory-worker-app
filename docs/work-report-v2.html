<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="theme-color" content="#0b74ff">
<link rel="manifest" href="./manifest.webmanifest">
<title>07_報工作業 V2 PWA｜正式整合版</title>
<style>
:root{--藍:#0b74ff;--底:#eef4fb;--卡:#fff;--線:#d4e0f0;--字:#14243a;--淡:#6b7f98;--紅:#d93025;--綠:#168a3a;--早:#1a6fdb;--夜:#5a3fb5;--底安:env(safe-area-inset-bottom,12px)}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--底);color:var(--字);font-family:'Noto Sans TC','Microsoft JhengHei',system-ui,-apple-system,sans-serif;font-size:15px;line-height:1.55}
.外框{max-width:720px;margin:0 auto;padding:4px 12px 128px}
.頁首{position:sticky;top:0;z-index:30;margin:-4px -12px 8px;padding:8px 12px 9px;background:linear-gradient(135deg,#004fc4,#0b74ff 55%,#35b8ff);color:#fff;border-radius:0 0 18px 18px;box-shadow:0 10px 28px rgba(16,42,82,.14)}
.標題列{display:flex;justify-content:space-between;align-items:center;gap:10px}.標題{font-size:18px;font-weight:900;line-height:1.15;letter-spacing:-.3px}.副標{font-size:10px;opacity:.9;margin-top:2px;line-height:1.35}.狀態卡{margin-top:6px;background:rgba(0,0,0,.25);border-radius:12px;padding:6px 10px;font-size:11px;font-weight:900;line-height:1.45}.圓鈕{width:34px;height:34px;border:0;border-radius:12px;background:rgba(255,255,255,.22);color:#fff;font-size:16px;font-weight:900}
.分頁{display:grid;grid-template-columns:repeat(4,1fr);gap:7px;margin:8px 0}.分頁 button{border:1.5px solid var(--線);background:#fff;color:#384e6e;border-radius:15px;padding:8px 4px;font-weight:900;font-size:12px;line-height:1.25}.分頁 button.active{background:var(--藍);color:#fff;border-color:var(--藍)}.隱藏{display:none!important}
.卡片{background:var(--卡);border:1px solid var(--線);border-radius:24px;padding:16px;margin:10px 0;box-shadow:0 4px 18px rgba(16,34,72,.07)}.區標{font-size:18px;font-weight:900;margin-bottom:12px}.小字{font-size:11px;color:var(--淡);font-weight:700}label{display:block;font-weight:900;margin:11px 0 5px;color:#253650}.必填:after{content:' *';color:var(--紅)}
input,select,textarea{width:100%;border:1.5px solid #c4d4e8;border-radius:13px;padding:12px 14px;background:#fff;color:var(--字);font:inherit;font-weight:700}textarea{min-height:88px}
.兩欄{display:grid;grid-template-columns:1fr 1fr;gap:10px}.三欄{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}.掃碼鈕{width:100%;border:2px dashed #9ec6f8;background:#f5faff;border-radius:17px;padding:11px;font-weight:900;color:#075bd6}.搜尋框{margin:7px 0;border-radius:24px;padding:11px 14px}.常用列{display:flex;gap:8px;flex-wrap:wrap;margin:8px 0}.常用人員{border:1px solid #cbdcf1;background:#fff;border-radius:999px;padding:7px 11px;color:#0b57d0;font-weight:900}
.人員網格{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;max-height:520px;overflow:auto;padding:4px}.人員卡片{position:relative;border:3px solid #dce8f6;border-radius:18px;background:#f9fcff;color:#0b1f36;min-height:218px;padding:14px 8px 13px;text-align:center;font-weight:900}.班早{border-color:#3a8ef0!important;background:linear-gradient(145deg,#edf5ff,#fff)!important}.班早 .班標{background:#1a6fdb}.班夜{border-color:#8b6cf5!important;background:linear-gradient(145deg,#f4efff,#fff)!important}.班夜 .班標{background:#5a3fb5}.班標{position:absolute;right:8px;top:8px;color:#fff;border-radius:10px;padding:4px 9px;font-size:12px;font-weight:900}
.人員卡片.選中{background:linear-gradient(145deg,#eaf4ff,#fff)!important;color:#0b1f36!important;border-color:#0b74ff!important;box-shadow:0 0 0 4px rgba(11,116,255,.25),0 14px 26px rgba(11,116,255,.22)!important}
.人員卡片.選中,.產品卡片.選中{border-color:#0b74ff!important}.產品卡片.選中{background:#eaf4ff!important;color:#0b1f36!important;box-shadow:0 0 0 4px rgba(11,116,255,.18)!important}
.頭像圈{width:128px;height:128px;border-radius:50%;margin:10px auto 9px;background:#dcecff;color:#193654;display:flex;align-items:center;justify-content:center;font-size:46px;font-weight:1000;border:4px solid #c7d9ef;overflow:hidden;box-shadow:0 8px 18px rgba(20,45,75,.16)}.頭像圈 img{display:block;width:100%;height:100%;object-fit:cover;opacity:1;filter:none;mix-blend-mode:normal}.人名{font-size:20px;line-height:1.18;color:#052b53;font-weight:1000;text-shadow:0 1px 0 rgba(255,255,255,.8)}.人工號{font-size:15px;color:#34506d;font-weight:1000;margin-top:2px}
.選定人員卡{display:grid;grid-template-columns:118px 1fr;gap:14px;align-items:center;margin-bottom:12px;padding:12px;border:1.5px solid #b9d7ff;border-radius:20px;background:linear-gradient(135deg,#eef7ff,#fff)}.選定人員照片{width:112px;height:112px;border-radius:22px;overflow:hidden;background:#dcecff;border:3px solid #9cc9ff;display:flex;align-items:center;justify-content:center;font-size:42px;font-weight:1000;color:#193654}.選定人員照片 img{width:100%;height:100%;object-fit:cover;display:block}.選定人員姓名{font-size:24px;font-weight:1000;color:#052b53;line-height:1.2}.選定人員資料{font-size:14px;font-weight:900;color:#304a68;margin-top:6px;line-height:1.6}
.產品網格{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;max-height:400px;overflow:auto}.產品卡片{border:2px solid #dce8f6;border-radius:18px;background:#fff;overflow:hidden;text-align:center;font-weight:900}.產品圖{height:122px;background:#edf4fb;display:flex;align-items:center;justify-content:center;color:#7890aa}.產品圖 img{width:100%;height:100%;object-fit:cover}.產品資訊{padding:10px}.產品名{font-size:14px}.產品副{font-size:11px;color:var(--淡);margin-top:4px}
.機台格{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-top:10px}.機台卡{border:1px solid var(--線);border-radius:16px;background:#fbfdff;padding:9px}.機台卡 img,.無圖{width:100%;height:112px;border-radius:12px;object-fit:cover;background:#edf4fb}.無圖{display:flex;align-items:center;justify-content:center;color:#7890aa;font-weight:900}.機台號{font-size:18px;color:#0b57d0;font-weight:900;margin-top:6px}
.數量大{font-size:28px!important;text-align:center!important;font-weight:900!important}.摘要{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:10px}.數字卡{border:1px solid var(--線);border-radius:16px;background:#f7fbff;text-align:center;padding:12px}.數字卡 b{font-size:28px}.不良行{display:grid;grid-template-columns:1fr 82px 42px;gap:7px;margin-bottom:8px;padding:8px;border:1px solid #efc16d;background:#fff9ef;border-radius:14px}.不良行 input{text-align:center}.刪除鈕{border:0;border-radius:10px;background:#fee2e2;color:var(--紅);font-size:18px;font-weight:900}.新增鈕{width:100%;border:1.5px dashed #d18100;border-radius:14px;padding:12px;background:#fffaf0;color:#a15b00;font-weight:900}
.照片工具{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}.照片工具 button{border:1px solid var(--線);border-radius:14px;background:#f7fbff;color:#0b57d0;font-weight:900;padding:12px}.照片格{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:9px}.照片項{position:relative;border-radius:14px;overflow:hidden;background:#edf4fb;aspect-ratio:1/1}.照片項 img{width:100%;height:100%;object-fit:cover}.照片項 button{position:absolute;right:5px;top:5px;background:rgba(0,0,0,.65);color:#fff;border:0;border-radius:9px;width:28px;height:28px}
.預覽,.訊息{white-space:pre-wrap;background:#061120;color:#dff7ff;border-radius:16px;padding:13px;max-height:300px;overflow:auto;font-size:12px}.底部{position:fixed;left:0;right:0;bottom:0;z-index:40;background:rgba(245,249,255,.94);border-top:1px solid var(--線);padding:10px 12px calc(10px + var(--底安));display:grid;grid-template-columns:1fr 1.25fr 1fr;gap:10px}.主按鈕,.次按鈕{border:0;border-radius:18px;padding:15px 10px;font-size:17px;font-weight:900}.主按鈕{background:var(--藍);color:#fff}.次按鈕{background:#fff;color:#1d3a5d;border:1px solid var(--線)}.送出鈕{background:linear-gradient(135deg,#159946,#0b74ff)}.載入遮罩{position:fixed;inset:0;z-index:999;background:rgba(5,13,26,.78);display:none;align-items:center;justify-content:center;color:#fff}.載入遮罩.顯示{display:flex}.載入盒{background:#12203a;border-radius:22px;padding:24px;text-align:center}.空狀態{text-align:center;color:var(--淡);font-weight:900;padding:20px}
@media(max-width:560px){.副標{display:none}.人員卡片{min-height:210px}.頭像圈{width:122px;height:122px}.選定人員卡{grid-template-columns:104px 1fr;padding:10px}.選定人員照片{width:100px;height:100px;border-radius:18px}.選定人員姓名{font-size:21px}.兩欄,.三欄,.摘要,.機台格{grid-template-columns:1fr}.底部{grid-template-columns:82px 1fr 82px}}
@media(prefers-color-scheme:dark){:root{--底:#06101f;--卡:#0f172a;--線:#283b55;--字:#e5edf8;--淡:#9fb1c8}input,select,textarea,.卡片{background:#101827;color:var(--字)}label{color:#e5edf8}.人員卡片,.人員卡片.選中{background:linear-gradient(145deg,#f4f9ff,#fff)!important;color:#0b1f36!important}.選定人員卡{background:linear-gradient(135deg,#f4f9ff,#fff)!important}.產品卡片{background:#101827;color:var(--字)}.產品圖,.無圖{background:#17243a}.底部{background:rgba(6,16,31,.94)}}
</style>
</head>
<body>
<div id="載入遮罩" class="載入遮罩"><div class="載入盒"><div style="font-size:32px">🏭</div><b id="載入文字">處理中...</b></div></div>
<main class="外框">
<header class="頁首"><div class="標題列"><div><div class="標題">🏭 07_報工作業 V2 PWA</div><div class="副標">智慧製造中央作戰指揮中心｜正式整合版｜09_報工 / 09_不良紀錄</div></div><div><button id="全螢幕鈕" class="圓鈕">⛶</button> <button id="重整鈕" class="圓鈕">↻</button></div></div><div id="狀態卡" class="狀態卡">🟡 啟動中...</div></header>
<nav class="分頁"><button data-tab="人員" class="active">👤<br>人員<br><small>Step 1</small></button><button data-tab="工件">🔧<br>工件<br><small>Step 2</small></button><button data-tab="產出">📊<br>產出<br><small>Step 3</small></button><button data-tab="品質">🔍<br>品質<br><small>Step 4</small></button></nav>
<section class="頁面" data-page="人員"><button class="掃碼鈕" data-scan="人員">🔎 搜尋 / 掃碼輸入工號</button><input id="搜尋人員" class="搜尋框" placeholder="搜尋姓名、工號、班別..."><div id="常用列" class="常用列"></div><div id="人員列表" class="人員網格"></div><div class="卡片"><div class="區標">👤 選定人員 <span class="小字">Operator Info</span></div><div id="選定人員資訊"><div class="小字" style="margin-bottom:10px">尚未選定人員。請點選上方人員卡片。</div></div><div class="兩欄"><div><label>班別 / Shift</label><select id="班別"><option>早班</option><option>大夜班</option></select></div><div><label>作業日 / Work Date</label><input id="作業日" readonly></div></div></div></section>
<section class="頁面 隱藏" data-page="工件"><div class="卡片"><div class="區標">🔧 工件與工站 <span class="小字">Product / Station</span></div><button class="掃碼鈕" data-scan="工件">🔎 搜尋 / 掃碼輸入產品</button><input id="搜尋工件" class="搜尋框" placeholder="搜尋品名、產品編號、客戶品號..."><label>產品選擇 / Product Select</label><div id="產品列表" class="產品網格"></div><label>工站選擇 / Station Select</label><select id="工站選擇"><option value="">請先選擇產品</option></select><div id="工站提示" class="小字" style="margin-top:6px">選產品後會列出此產品可報工工站。</div><label>機台照片 / Machine Photos</label><div id="機台清單" class="機台格"></div></div></section>
<section class="頁面 隱藏" data-page="產出"><div class="卡片"><div class="區標">📊 產出與工時 <span class="小字">Production Output</span></div><label class="必填">今日共做數</label><input id="今日共做數" class="數量大" type="number" inputmode="numeric" min="0"><div class="兩欄"><div><label>不良數量</label><input id="快速不良數" class="數量大" type="number" inputmode="numeric" min="0" value="0"></div><div><label>實際良品數</label><input id="實際良品數" class="數量大" readonly value="0"></div></div><div class="兩欄"><div><label>開始時間</label><input id="開始時間" type="datetime-local"></div><div><label>結束時間</label><input id="結束時間" type="datetime-local"></div></div><div class="三欄"><div><label>實際工時_分</label><input id="實際工時" readonly></div><div><label>是否加班</label><select id="是否加班"><option>否</option><option>是</option></select></div><div><label>加班類型</label><select id="加班類型"><option>無</option><option>平日加班</option><option>假日加班</option><option>臨時加班</option></select></div></div><div class="摘要"><div class="數字卡"><span>📦 今日共做</span><br><b id="卡產出">0</b></div><div class="數字卡"><span>❌ 不良數</span><br><b id="卡不良" style="color:var(--紅)">0</b></div><div class="數字卡"><span>✅ 實際良品</span><br><b id="卡良品" style="color:var(--綠)">0</b></div></div></div></section>
<section class="頁面 隱藏" data-page="品質"><div class="卡片"><div class="區標">🔍 品質與不良 <span class="小字">Quality & Defects</span></div><label>不良原因數量分配</label><div id="不良分配區"></div><button id="新增不良" class="新增鈕" type="button">＋ 新增不良分配項目</button><div class="兩欄"><div><label>異常類型</label><select id="異常類型"><option>無異常 / Normal</option><option>設備異常</option><option>機台停機 / Machine Down</option><option>待料 / Waiting Material</option><option>換刀 / Tool Change</option><option>品質確認 / Quality Check</option><option>其他 / Others</option></select></div><div><label>責任歸屬</label><select id="責任歸屬"><option>無</option><option>製造</option><option>素材</option><option>外包</option><option>設備</option><option>生技</option><option>其他</option></select></div></div><div class="兩欄"><div><label>異常開始時間</label><input id="異常開始時間" type="datetime-local"></div><div><label>異常結束時間</label><input id="異常結束時間" type="datetime-local"></div></div><label>照片備註</label><textarea id="照片備註" placeholder="輸入異常描述、照片說明、現場備註..."></textarea><label>現場照片</label><div class="照片工具"><button type="button" id="拍照鈕">📸 拍照</button><button type="button" id="選圖鈕">🖼 選圖</button><button type="button" id="清除照片鈕">🗑 清除</button></div><input id="照片拍照" type="file" accept="image/*" capture="environment" multiple hidden><input id="照片選檔" type="file" accept="image/*" multiple hidden><div id="照片格" class="照片格"></div><div id="照片計數" class="小字" style="text-align:center;margin-top:8px">0 / 12 張照片</div><label>報工預覽</label><pre id="報工預覽" class="預覽">尚未產生預覽...</pre></div><div class="卡片"><div class="區標">🧾 系統訊息</div><pre id="系統訊息" class="訊息">初始化中...</pre></div></section>
</main>
<div class="底部"><button id="上一步" class="次按鈕">← 上一步</button><button id="送出報工" class="主按鈕 送出鈕">送出預覽</button><button id="下一步" class="主按鈕">下一步 →</button></div>
<script src="./pwa-config.js"></script>
<script src="./gas-bridge.js"></script>
<script src="./work-report-v2-core.js?v=203"></script>
<script>
(() => {
  const 合法班別 = new Set(['早班', '大夜班']);
  function 修正班別選單() {
    const select = document.getElementById('班別');
    if (!select) return;
    Array.from(select.options).forEach(option => {
      const value = (option.value || option.textContent || '').trim();
      if (!合法班別.has(value)) option.remove();
    });
    if (!合法班別.has(select.value)) select.value = '早班';
  }
  document.addEventListener('DOMContentLoaded', 修正班別選單);
  window.addEventListener('load',修正班別選單);
  new MutationObserver(修正班別選單).observe(document.documentElement,{childList:true,subtree:true});
})();
</script>
</body>
</html>
