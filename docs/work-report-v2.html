function next(){const o=['人員','工件','產出','品質'];switchTab(o[Math.min(o.indexOf(狀態.頁)+1,o.length-1)])}function prev(){const o=['人員','工件','產出','品質'];switchTab(o[Math.max(o.indexOf(狀態.頁)-1,0)])}
function showLoading(t){$('載入文字').textContent=t;$('載入遮罩').classList.add('顯示')}function hideLoading(){$('載入遮罩').classList.remove('顯示')}
async function submit(){const p=payload();const errs=[];if(!p.工號)errs.push('請選擇作業員');if(!p.產品編號&&!p.品名)errs.push('請選擇工件');if(!p.報工工站名稱)errs.push('請選擇工站');if(!p.今日共做數||p.今日共做數<=0)errs.push('今日共做數必須大於 0');if(p.不良數>p.今日共做數)errs.push('不良數不可大於今日共做數');if(errs.length){setMsg('❌ '+errs.join('；'));switchTab('品質');return}showLoading('送出報工中...');try{const res=await window.GAS橋接器.寫入報工(p);setMsg('✅ 報工成功，已送出 09_報工 / 09_不良紀錄',res);setStatus('🟢 報工成功｜'+版本)}catch(e){setMsg('❌ 報工失敗：'+e.message,p);setStatus('🔴 報工失敗｜'+e.message)}finally{hideLoading()}}
function readPhotos(files,source){Array.from(files||[]).slice(0,12-狀態.照片.length).forEach(f=>{const r=new FileReader();r.onload=e=>{狀態.照片.push({base64:e.target.result,mime:f.type||'image/jpeg',檔名:f.name||source+'_'+Date.now()+'.jpg',來源:source,備註:$('照片備註').value,時間戳:new Date().toISOString()});renderPhotos();updatePreview()};r.readAsDataURL(f)})}
function renderPhotos(){$('照片格').innerHTML=狀態.照片.map((p,i)=>`<div class="照片項"><img src="${p.base64}"><button data-i="${i}" type="button">×</button><span>${esc(p.備註||p.檔名||'現場照片')}</span></div>`).join('');$('照片格').querySelectorAll('button').forEach(b=>b.onclick=()=>{狀態.照片.splice(Number(b.dataset.i),1);renderPhotos();updatePreview()});$('照片計數').textContent=狀態.照片.length+' / 12 張照片'}
let stream=null,scanStop=false;function closeScan(){scanStop=true;if(stream){stream.getTracks().forEach(t=>t.stop());stream=null}$('掃碼遮罩').classList.remove('顯示')}async function openScan(target){$('掃碼遮罩').classList.add('顯示');$('掃碼說明').textContent=target==='人員'?'請掃描工號條碼 / QR Code。':'請掃描產品編號 / 客戶品號 / QR Code。';$('掃碼手動').onclick=()=>{const v=prompt(target==='人員'?'請輸入工號或姓名':'請輸入產品編號、品名或客戶品號','');if(v){const input=target==='人員'?'搜尋人員':'搜尋工件';$(input).value=v;$(input).dispatchEvent(new Event('input'));setTimeout(()=>{const card=target==='人員'?$$('.人員卡片')[0]:$$('.產品卡片')[0];if(card)card.click()},100)}closeScan()};scanStop=false;if(!navigator.mediaDevices){$('掃碼手動').click();return}try{stream=await navigator.mediaDevices.getUserMedia({video:{facingMode:{ideal:'environment'}},audio:false});$('掃碼影片').srcObject=stream;await $('掃碼影片').play();if('BarcodeDetector'in window){const detector=new BarcodeDetector({formats:['qr_code','code_128','code_39','ean_13','ean_8','upc_a','upc_e']});const loop=async()=>{if(scanStop)return;try{const codes=await detector.detect($('掃碼影片'));if(codes.length){const v=codes[0].rawValue||codes[0].displayValue;const input=target==='人員'?'搜尋人員':'搜尋工件';$(input).value=v;$(input).dispatchEvent(new Event('input'));closeScan();return}}catch(e){}requestAnimationFrame(loop)};loop()}else{$('掃碼說明').textContent='此瀏覽器不支援即時辨識，請使用手動輸入。'}}catch(e){$('掃碼說明').textContent='相機開啟失敗，請確認權限或手動輸入。'}}
function bind(){['搜尋人員','搜尋工件','今日共做數','快速不良數','開始時間','結束時間','班別','是否加班','加班類型','異常類型','責任歸屬','異常開始時間','異常結束時間','照片備註'].forEach(id=>$(id)?.addEventListener('input',()=>{if(id==='搜尋人員')renderPersons();else if(id==='搜尋工件')renderProducts();else updatePreview()}));$('新增不良').onclick=()=>{addDefectRow();updatePreview()};$('拍照鈕').onclick=()=>$('照片拍照').click();$('選圖鈕').onclick=()=>$('照片選檔').click();$('清除照片鈕').onclick=()=>{狀態.照片=[];renderPhotos();updatePreview()};$('照片拍照').onchange=e=>{readPhotos(e.target.files,'拍照');e.target.value=''};$('照片選檔').onchange=e=>{readPhotos(e.target.files,'選圖');e.target.value=''};$('下一步').onclick=next;$('上一步').onclick=prev;$('送出報工').onclick=()=>{if(狀態.頁!=='品質')next();else submit()};$('重整鈕').onclick=loadData;$('全螢幕鈕').onclick=()=>document.documentElement.requestFullscreen&&document.documentElement.requestFullscreen();$('掃碼關閉').onclick=closeScan;$$('.掃碼鈕').forEach(b=>b.onclick=()=>openScan(b.dataset.scan))}
function init(){bind();$('開始時間').value=localDT();$('結束時間').value=localDT();$('作業日').value=workDate();switchTab('人員');loadData();if('serviceWorker'in navigator)navigator.serviceWorker.register('./service-worker.js').catch(()=>{})}
window.addEventListener('load',init);
})();
</script>
