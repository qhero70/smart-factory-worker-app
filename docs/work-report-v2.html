<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<title>報工作業 V4｜完整正式版入口</title>
<style>
html,body{margin:0;min-height:100vh;background:#05050a;color:#e5f7ff;font-family:-apple-system,BlinkMacSystemFont,'Noto Sans TC','Microsoft JhengHei',system-ui,sans-serif}.boot{padding:28px;line-height:1.8}.boot h1{margin:0 0 8px;color:#c8f7ff}.boot b{color:#22d3ee}.err{color:#fecdd3;background:rgba(251,113,133,.12);border:1px solid rgba(251,113,133,.45);border-radius:16px;padding:16px;margin-top:16px;white-space:pre-wrap}</style>
</head>
<body>
<div class="boot" id="boot"><h1>🏭 製造部・報工作業 V4</h1><div>正在載入 <b>完整 V4 報工畫面</b>｜保留原 HTML / CSS / JS，只接資料橋接...</div></div>
<script>
(function(){
  'use strict';
  var ver='422';
  var target='./work-report-v4.html?v='+ver;
  function inject(html){
    var beforeOriginalScript='\n<script src="./pwa-config.js?v='+ver+'"><\\/script>\n<script src="./gas-bridge.js?v='+ver+'"><\\/script>\n<script src="./work-report-v4-early-fetch-guard.js?v='+ver+'"><\\/script>\n';
    var afterOriginalScript='\n<script src="./work-report-v4-pwa-bridge.js?v='+ver+'"><\\/script>\n<script src="./work-report-v4-safari-fix.js?v='+ver+'"><\\/script>\n';
    var forceScript='\n<script src="./work-report-v4-force-small-420.js?v='+ver+'"><\\/script>\n<script>setTimeout(function(){try{if(typeof reloadData===\'function\')reloadData();}catch(e){}try{if(window.V4_FORCE_SMALL)V4_FORCE_SMALL();}catch(e){}},1800);setTimeout(function(){try{if(window.V4_FORCE_SMALL)V4_FORCE_SMALL();}catch(e){}},4200);<\\/script>\n';
    if(html.indexOf('work-report-v4-early-fetch-guard.js')<0) html=html.replace(/<script/i, beforeOriginalScript+'<script');
    if(html.indexOf('work-report-v4-pwa-bridge.js')<0) html=html.replace(/<\/body>/i, afterOriginalScript+'</body>');
    html=html.replace(/<\/body>/i, forceScript+'</body>');
    return html;
  }
  fetch(target,{cache:'no-store'})
    .then(function(r){if(!r.ok)throw new Error('讀取 work-report-v4.html 失敗：HTTP '+r.status);return r.text();})
    .then(function(html){document.open();document.write(inject(html));document.close();})
    .catch(function(e){document.getElementById('boot').innerHTML='<h1>🔴 完整 V4 載入失敗</h1><div class="err">'+String(e&&e.message||e)+'</div>';});
})();
</script>
</body>
</html>
