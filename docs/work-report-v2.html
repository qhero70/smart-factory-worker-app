<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<title>報工作業 V4｜完整正式版入口</title>
<style>
html,body{margin:0;min-height:100vh;background:#05050a;color:#e5f7ff;font-family:-apple-system,BlinkMacSystemFont,'Noto Sans TC','Microsoft JhengHei',system-ui,sans-serif}.boot{padding:28px;line-height:1.8}.boot h1{margin:0 0 8px;color:#c8f7ff}.boot b{color:#22d3ee}.err{color:#fecdd3;background:rgba(251,113,133,.12);border:1px solid rgba(251,113,133,.45);border-radius:16px;padding:16px;margin-top:16px;white-space:pre-wrap}</style>
</head>
<body>
<div class="boot" id="boot"><h1>🏭 製造部・報工作業 V4</h1><div>正在載入 <b>完整 V4 報工畫面</b>｜保留原 HTML / CSS / JS，只載入正式資料橋接與 UX 防呆...</div></div>
<script>
(function(){
  'use strict';
  var ver='429';
  var GAS='https://script.google.com/macros/s/AKfycbwOi-xjKoMD9jVq4HrHBvh7k1DCn70lAPAJiqaWJhvH70PbuRo4ciopCjYcytIalaW4/exec';
  var target='./work-report-v4.html?v='+ver;

  function inject(html){
    var config='\n<script>window.PWA_CONFIG=Object.assign(window.PWA_CONFIG||{},{GAS_WEB_APP_URL:"'+GAS+'",API_TIMEOUT_MS:12000,VERSION:"v4.2.9_完整V4入口_強制橋接"});<\\/script>\n';
    var pwa='\n<script src="./pwa-config.js?v='+ver+'"><\\/script>\n';
    var bridge='\n<script src="./gas-bridge.js?v='+ver+'"><\\/script>\n';
    var early='\n<script src="./work-report-v4-early-fetch-guard.js?v='+ver+'"><\\/script>\n';
    var ux='\n<script src="./work-report-v4-ux-427.js?v='+ver+'"><\\/script>\n';
    var bundle=config+pwa+bridge+early;

    html = html.replace(/\.\/pwa-config\.js\?v=\d+/g,'./pwa-config.js?v='+ver);
    html = html.replace(/\.\/gas-bridge\.js\?v=\d+/g,'./gas-bridge.js?v='+ver);

    if(html.indexOf('work-report-v4-bridge-bundle-429')<0){
      bundle='\n<!-- work-report-v4-bridge-bundle-429 -->\n'+bundle;
      html = html.replace(/<script>\s*['"]use strict['"];?/i, bundle + '$&');
      if(html.indexOf('work-report-v4-bridge-bundle-429')<0){
        html = html.replace(/<\/head>/i, bundle + '</head>');
      }
    }
    if(html.indexOf('work-report-v4-ux-427.js')<0){
      html = html.replace(/<\/body>/i, ux + '</body>');
    }
    return html;
  }

  fetch(target,{cache:'no-store'})
    .then(function(r){if(!r.ok)throw new Error('讀取 work-report-v4.html 失敗：HTTP '+r.status);return r.text();})
    .then(function(html){document.open();document.write(inject(html));document.close();})
    .catch(function(e){document.getElementById('boot').innerHTML='<h1>🔴 V4 載入失敗</h1><div class="err">'+String(e&&e.message||e)+'</div>';});
})();
</script>
</body>
</html>
