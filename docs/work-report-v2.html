<style>
:root{--藍:#00D2FF;--紫:#0066FF;--金:#D4AF37;--底:#05050a;--卡:rgba(15,20,35,.72);--線:rgba(255,255,255,.16);--字:#e2e8f0;--淡:#8b9cb0;--紅:#ff4d4f;--綠:#22c55e;--粉:#ff007f;--底安:env(safe-area-inset-bottom,12px)}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}html,body{min-height:100%;background:var(--底);color:var(--字)}body{background-image:radial-gradient(circle at 50% 0%,rgba(0,210,255,.13) 0%,transparent 58%),radial-gradient(circle at 50% 100%,rgba(255,0,127,.08) 0%,transparent 62%);font-family:'Noto Sans TC','Microsoft JhengHei',system-ui,-apple-system,sans-serif;font-size:15px;line-height:1.55;overflow-x:hidden;-webkit-font-smoothing:antialiased}.外框{max-width:720px;margin:0 auto;padding:0 12px 148px}.頁首{position:sticky;top:0;z-index:200;margin:0 -12px;background:rgba(5,5,10,.93);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-bottom:1px solid var(--線);padding:10px 12px;box-shadow:0 12px 35px rgba(0,0,0,.52)}.標題列{display:flex;justify-content:space-between;align-items:center;gap:10px;margin-bottom:8px}.標題{font-size:20px;font-weight:1000;background:linear-gradient(90deg,#fff,var(--藍));-webkit-background-clip:text;background-clip:text;color:transparent}.副標{font-size:11px;color:var(--粉);font-weight:1000;letter-spacing:.8px;text-shadow:0 0 12px rgba(255,0,127,.28)}.狀態卡{display:block;background:rgba(0,210,255,.1);border:1px solid rgba(0,210,255,.55);color:var(--藍);border-radius:10px;padding:5px 8px;font-size:11px;font-weight:900;max-width:100%;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.圓鈕{width:34px;height:34px;border:1px solid var(--線);border-radius:10px;background:rgba(255,255,255,.06);color:#fff;font-size:16px;font-weight:900}.搜尋列整合{display:flex;gap:10px;align-items:center;margin-top:10px}.掃碼鈕{flex:0 0 45px;height:45px;border:1px solid var(--藍);background:rgba(0,210,255,.1);border-radius:12px;color:var(--藍);font-size:22px;display:flex;align-items:center;justify-content:center;box-shadow:0 0 18px rgba(0,210,255,.18)}.搜尋框{flex:1;height:45px;border-radius:12px;padding:0 15px;background:rgba(255,255,255,.06);border:1px solid var(--線);color:#fff;font-size:15px;font-weight:800}.搜尋框:focus,input:focus,select:focus,textarea:focus{border-color:var(--藍);box-shadow:0 0 10px rgba(0,210,255,.22);outline:none}.常用列{display:flex;gap:8px;overflow-x:auto;padding:10px 0 4px;scrollbar-width:none}.常用列::-webkit-scrollbar{display:none}.常用人員{flex-shrink:0;border:1px solid rgba(255,255,255,.18);background:rgba(255,255,255,.06);border-radius:999px;padding:7px 13px;color:#fff;font-size:12px;font-weight:900}.分頁{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;padding:10px 0}.分頁 button{border:1px solid var(--線);background:rgba(255,255,255,.06);color:var(--淡);border-radius:14px;padding:10px 4px;font-weight:900;font-size:12px}.分頁 button.active{background:rgba(0,210,255,.16);color:var(--藍);border-color:var(--藍);box-shadow:0 0 18px rgba(0,210,255,.28)}.頁面{animation:fadeIn .25s ease}.隱藏{display:none!important}@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.人員網格{position:relative!important;height:58vh!important;min-height:405px!important;margin:10px -12px 14px!important;overflow:hidden!important;perspective:1500px!important;display:flex!important;align-items:center!important;justify-content:center!important}.人員卡片{position:absolute!important;width:42vw!important;max-width:320px!important;height:65vw!important;max-height:420px!important;min-height:auto!important;background:var(--卡)!important;backdrop-filter:blur(15px);-webkit-backdrop-filter:blur(15px);border:2px solid var(--線)!important;border-radius:44px!important;transition:transform .5s cubic-bezier(.2,.8,.2,1),opacity .5s,z-index 1.5s!important;display:flex!important;flex-direction:column!important;justify-content:center!important;align-items:center!important;-webkit-box-reflect:below 8px linear-gradient(transparent,transparent 65%,rgba(255,255,255,.25));cursor:pointer!important;overflow:hidden!important;color:#fff!important;box-shadow:0 24px 58px rgba(0,0,0,.5)!important;text-align:center!important}.人員卡片.選中{border-color:var(--藍)!important;box-shadow:0 0 55px rgba(0,210,255,.4),inset 0 0 15px rgba(0,210,255,.2)!important;background:linear-gradient(145deg,rgba(0,210,255,.1),rgba(15,20,35,.9))!important}.人員卡片 .頭像圈{position:absolute!important;inset:0!important;width:100%!important;height:100%!important;border-radius:0!important;border:0!important;margin:0!important;background:#0a0a15!important;box-shadow:none!important;overflow:hidden!important;display:flex!important;align-items:center!important;justify-content:center!important;z-index:1!important}.人員卡片 .頭像圈 img{width:100%!important;height:100%!important;object-fit:cover!important;display:block!important;filter:saturate(1.06) contrast(1.03)!important}.頭像佔位{width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:70px;font-weight:900;color:rgba(255,255,255,.35);background:linear-gradient(135deg,#111122,#1a1a35)}.人員卡片:after{content:'';position:absolute;left:0;right:0;bottom:0;height:48%;z-index:2;background:linear-gradient(to top,rgba(0,0,0,.9),rgba(0,0,0,.55),rgba(0,0,0,0));pointer-events:none}.人員卡片 .人名{position:absolute!important;left:12px!important;right:12px!important;bottom:58px!important;z-index:5!important;display:block!important;max-width:calc(100% - 24px)!important;font-size:22px!important;line-height:1.08!important;color:#fff!important;font-weight:1000!important;text-shadow:0 3px 12px #000,0 0 3px #000!important;letter-spacing:.5px!important;text-align:center!important;white-space:nowrap!important;overflow:hidden!important;text-overflow:ellipsis!important}.人員卡片 .人工號{position:absolute!important;left:50%!important;bottom:24px!important;transform:translateX(-50%)!important;z-index:5!important;display:inline-flex!important;align-items:center!important;justify-content:center!important;min-width:92px!important;padding:4px 10px!important;border-radius:999px!important;background:rgba(0,210,255,.18)!important;border:1px solid rgba(0,210,255,.58)!important;color:#7ae9ff!important;font-size:14px!important;line-height:1.1!important;font-weight:1000!important;text-shadow:0 2px 8px #000!important;box-shadow:0 0 16px rgba(0,210,255,.2)!important}.班標{position:absolute!important;top:13px!important;right:13px!important;background:rgba(0,0,0,.72)!important;color:#fff!important;border:1px solid rgba(255,255,255,.32)!important;padding:5px 12px!important;border-radius:999px!important;font-size:12px!important;font-weight:900!important;z-index:6!important;backdrop-filter:blur(8px)!important}.導航箭頭{position:absolute!important;top:50%!important;transform:translateY(-50%)!important;z-index:190!important;width:46px!important;height:46px!important;border-radius:50%!important;background:rgba(0,0,0,.68)!important;border:1px solid rgba(255,255,255,.36)!important;color:#fff!important;font-size:32px!important;line-height:1!important;display:flex!important;align-items:center!important;justify-content:center!important;box-shadow:0 8px 24px rgba(0,0,0,.4)!important;backdrop-filter:blur(10px)!important;-webkit-backdrop-filter:blur(10px)!important}.導航左{left:10px!important}.導航右{right:10px!important}
.產品網格{display:grid!important;grid-template-columns:1fr!important;gap:12px!important;min-height:0!important;height:auto!important;margin:12px 0 16px!important;overflow:visible!important;perspective:none!important}.產品卡片{position:relative!important;width:100%!important;max-width:none!important;height:auto!important;min-height:112px!important;padding:10px!important;border-radius:22px!important;border:1px solid var(--線)!important;background:rgba(15,20,35,.78)!important;color:#fff!important;box-shadow:0 10px 28px rgba(0,0,0,.28)!important;display:grid!important;grid-template-columns:96px 1fr!important;gap:12px!important;align-items:center!important;text-align:left!important;overflow:hidden!important;transform:none!important;opacity:1!important;z-index:auto!important;pointer-events:auto!important;-webkit-box-reflect:none!important;backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px)}.產品卡片.選中{border-color:var(--藍)!important;box-shadow:0 0 0 3px rgba(0,210,255,.18),0 0 28px rgba(0,210,255,.28)!important;background:linear-gradient(135deg,rgba(0,210,255,.16),rgba(15,20,35,.88))!important}.產品圖{width:96px!important;height:96px!important;border-radius:18px!important;overflow:hidden!important;background:#0a0a15!important;border:1px solid rgba(255,255,255,.12)!important;display:flex!important;align-items:center!important;justify-content:center!important}.產品圖 img{width:100%!important;height:100%!important;object-fit:cover!important;display:block!important}.產品佔位{width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:38px;color:rgba(255,255,255,.4);background:linear-gradient(135deg,#111122,#1a1a35)}.產品資訊{position:static!important;min-height:auto!important;padding:0!important;background:transparent!important;border:0!important;box-shadow:none!important;backdrop-filter:none!important;-webkit-backdrop-filter:none!important}.產品名{display:block!important;color:#fff!important;font-size:18px!important;line-height:1.25!important;font-weight:1000!important;text-align:left!important}.產品副{display:inline-flex!important;align-items:center!important;justify-content:center!important;margin-top:8px!important;padding:4px 10px!important;border-radius:999px!important;background:rgba(212,175,55,.16)!important;border:1px solid rgba(212,175,55,.5)!important;color:#ffe08a!important;font-size:13px!important;font-weight:1000!important}
.卡片{background:var(--卡);backdrop-filter:blur(10px);border:1px solid var(--線);border-radius:20px;padding:18px;margin:14px 0;box-shadow:0 10px 30px rgba(0,0,0,.32)}.區標{font-size:16px;font-weight:900;margin-bottom:14px;color:#fff;display:flex;align-items:center;gap:8px}.區標 .小字{color:var(--藍);font-size:10px;font-family:monospace;margin-left:auto}.小字{font-size:12px;color:var(--淡);font-weight:800}label{font-size:12px;color:var(--淡);font-weight:900;margin:10px 0 6px;display:block}.必填:after{content:' *';color:var(--紅)}input,select,textarea{background:rgba(0,0,0,.32);border:1px solid var(--線);border-radius:12px;padding:12px 14px;color:#fff;font-size:15px;width:100%;font:inherit;font-weight:800}textarea{min-height:92px}.數量大{font-size:28px!important;text-align:center!important;font-weight:900!important;color:var(--藍)!important}.兩欄{display:grid;grid-template-columns:1fr 1fr;gap:12px}.三欄{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}.摘要{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-top:15px}.數字卡{background:rgba(0,0,0,.3);border:1px solid var(--線);border-radius:16px;text-align:center;padding:14px 10px}.數字卡 span{font-size:11px;color:var(--淡);font-weight:800}.數字卡 b{font-size:24px;display:block;margin-top:5px;color:#fff}.機台格{display:grid;grid-template-columns:repeat(2,1fr);gap:12px}.機台卡{background:rgba(0,0,0,.3);border:1px solid var(--線);border-radius:16px;padding:8px;text-align:center;overflow:hidden}.機台卡 img,.無圖{width:100%;height:150px;border-radius:10px;object-fit:cover;display:flex;align-items:center;justify-content:center;background:rgba(255,255,255,.04);font-size:13px;color:var(--淡);font-weight:900}.機台號{font-weight:900;color:var(--藍);margin-top:8px;font-size:16px}.照片工具{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}.照片工具 button{background:rgba(255,255,255,.06);border:1px solid var(--線);color:#fff;padding:12px;border-radius:12px;font-weight:900;font-size:13px}.照片格{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-top:15px}.照片項{aspect-ratio:1;border-radius:12px;overflow:hidden;position:relative;border:1px solid var(--線)}.照片項 img{width:100%;height:100%;object-fit:cover}.底部操作{position:fixed;bottom:0;left:0;right:0;z-index:260;background:linear-gradient(to top,#05050a 72%,rgba(5,5,10,0));padding:18px 12px calc(12px + var(--底安));display:grid;grid-template-columns:.8fr 2.2fr 1fr;gap:10px;max-width:720px;margin:0 auto}.底部操作 button{border:1px solid var(--線);border-radius:16px;padding:14px 8px;color:#fff;font-weight:1000;font-size:15px;background:rgba(255,255,255,.06)}.底部操作 .送出{background:linear-gradient(135deg,#22c55e,#0ea5e9,#2563eb);box-shadow:0 0 22px rgba(0,210,255,.28);border:0}.底部操作 .下一步{background:#2389ff;border:0}.錯誤{color:#ffd1d1;background:rgba(255,77,79,.12);border:1px solid rgba(255,77,79,.34);border-radius:14px;padding:12px;margin:12px 0;font-weight:800}.掃碼視窗{position:fixed;inset:0;z-index:900;background:rgba(0,0,0,.92);display:none;align-items:center;justify-content:center;padding:18px}.掃碼視窗.顯示{display:flex}.掃碼盒{width:min(620px,100%);background:#0b1020;border:1px solid var(--線);border-radius:22px;padding:16px;box-shadow:0 20px 70px #000}.掃碼盒 h3{margin-bottom:10px}.掃碼盒 video{width:100%;max-height:52vh;background:#000;border-radius:16px;border:1px solid var(--線);object-fit:cover}.掃碼盒 .工具{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-top:12px}.掃碼盒 button{border:1px solid var(--線);background:rgba(255,255,255,.07);color:#fff;border-radius:12px;padding:12px;font-weight:900}.掃碼盒 .主{background:linear-gradient(135deg,#22c55e,#0ea5e9);border:0}.小提示{color:var(--淡);font-size:12px;margin-top:8px;font-weight:800}@media(max-width:480px){.外框{padding-left:10px;padding-right:10px}.標題{font-size:19px}.狀態卡{font-size:10px}.人員卡片{width:50vw!important;height:74vw!important;border-radius:40px!important}.人員卡片 .人名{font-size:21px!important}.產品卡片{min-height:108px!important}.機台格,.摘要{grid-template-columns:1fr}.底部操作{grid-template-columns:.9fr 2fr 1fr}.底部操作 button{font-size:14px}}
