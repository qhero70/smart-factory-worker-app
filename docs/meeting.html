<!doctype html><html lang="zh-Hant"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>主管會議摘要</title><script src="https://cdn.tailwindcss.com"></script><style>body{font-family:-apple-system,BlinkMacSystemFont,'Noto Sans TC','Segoe UI',sans-serif;background:#07111f;color:#ecfeff}.玻璃{background:rgba(15,23,42,.78);border:1px solid rgba(148,163,184,.22);backdrop-filter:blur(18px)}.卡{border-radius:22px;box-shadow:0 18px 45px rgba(0,0,0,.28)}.按鈕{border-radius:16px;padding:.8rem 1rem;font-weight:900}input,select,textarea{background:#0f172a!important;border:1px solid #334155!important;color:#fff!important;border-radius:14px!important;padding:.75rem!important;width:100%}label{font-size:.82rem;color:#a7f3d0;font-weight:800}</style></head><body><main class="max-w-6xl mx-auto p-4 pb-24"><section class="玻璃 卡 p-5 mb-4"><div class="flex flex-wrap justify-between items-center gap-3"><div><p class="text-teal-200 font-black text-sm">智慧製造中央作戰指揮中心 v2.1.0</p><h1 class="text-2xl md:text-4xl font-black">主管會議摘要</h1><p id="狀態文字" class="text-slate-300 mt-1">合併 KPI、AI 摘要與排程需求池風險摘要。</p></div><div class="flex gap-2"><a class="按鈕 bg-slate-700" href="./app.html">回戰情室</a><a class="按鈕 bg-purple-300 text-slate-950" href="./schedule.html">排程看板</a></div></div></section><section class="玻璃 卡 p-4 mb-4"><label>GAS Web App URL</label><div class="grid md:grid-cols-[1fr_auto_auto] gap-2 mt-1"><input id="GAS網址" placeholder="貼上 https://script.google.com/macros/s/.../exec"><button class="按鈕 bg-teal-500 text-slate-950" onclick="儲存設定()">儲存</button><button class="按鈕 bg-cyan-300 text-slate-950" onclick="產生摘要()">產生摘要</button></div></section><section class="grid md:grid-cols-2 gap-4"><div class="玻璃 卡 p-4"><h2 class="font-black text-xl mb-3">摘要設定</h2><label>摘要模式</label><select id="摘要模式"><option>日報</option><option>週報</option><option>月報</option></select><label class="mt-3 block">會議對象</label><input id="會議對象" value="執行長 / 副總經理"><label class="mt-3 block">報告人</label><input id="報告人" value="製造部"><label class="mt-3 block">本期重點</label><textarea id="本期重點" rows="5" placeholder="例如：本週重點處理逾期工單、供料未到、訂單欠量"></textarea><label class="mt-3 block">補充說明</label><textarea id="補充說明" rows="7" placeholder="可填今日現場補充，例如待料、設備、品質狀況"></textarea><button class="按鈕 bg-amber-300 text-slate-950 w-full mt-3" onclick="複製摘要()">複製摘要</button></div><div class="玻璃 卡 p-4"><h2 class="font-black text-xl mb-3">主管會議摘要</h2><textarea id="摘要結果" rows="31" placeholder="按產生摘要後會出現在這裡"></textarea></div></section></main><script>function GAS(){return localStorage.getItem('GAS網址')||''}async function 呼叫API(action,data={}){const url=GAS();if(!url)throw new Error('請先貼上 GAS Web App URL');const r=await fetch(url,{method:'POST',headers:{'Content-Type':'text/plain;charset=utf-8'},body:JSON.stringify({action,...data})});return r.json()}function 儲存設定(){localStorage.setItem('GAS網址',document.getElementById('GAS網址').value.trim());alert('已儲存')}function 今天(){return new Date().toISOString().slice(0,10)}function 模式標題(mode){if(mode==='週報')return '週報摘要';if(mode==='月報')return '月報摘要';return '日報摘要'}function 模式說明(mode){if(mode==='週報')return '本摘要聚焦本週累積風險、待排程需求、交期與跨部門協調事項。';if(mode==='月報')return '本摘要聚焦本月整體達成率、交期風險、停機與品質改善方向。';return '本摘要聚焦今日產出、停機、不良、排程與逾期風險。'}function 日期差(d0){if(!d0)return 99999;const today=new Date();today.setHours(0,0,0,0);const d=new Date(d0);if(isNaN(d))return 99999;d.setHours(0,0,0,0);return Math.round((d-today)/86400000)}function 排程風險(x){if((x.狀態||'待排程')==='完成')return '完成';const diff=日期差(x.交期||x.預計完工日);if(diff<0)return '逾期';if(diff<=3)return '即將到期';return '正常'}async function 取得排程摘要(){try{const r=await 呼叫API('取得主檔管理資料',{工作表名稱:'10_排程需求池'});const list=r.資料||[];const 未完成=list.filter(x=>(x.狀態||'待排程')!=='完成');const 逾期=未完成.filter(x=>排程風險(x)==='逾期');const 到期=未完成.filter(x=>排程風險(x)==='即將到期');const 欠量=未完成.reduce((s,x)=>s+Number(x.訂單欠量||0),0);const 待排=未完成.filter(x=>(x.狀態||'待排程')==='待排程').length;const 生產中=未完成.filter(x=>(x.狀態||'待排程')==='生產中').length;const 高風險=逾期.concat(到期).sort((a,b)=>日期差(a.交期||a.預計完工日)-日期差(b.交期||b.預計完工日)).slice(0,8).map((x,i)=>`${i+1}. ${x.需求編號}｜${x.品名}｜負責 ${x.負責人||'未填'}｜交期 ${x.交期||x.預計完工日||'未填'}｜欠量 ${x.訂單欠量||0}`).join('\n')||'目前無高風險排程需求。';return `總需求：${list.length}\n未完成：${未完成.length}\n待排程：${待排}\n生產中：${生產中}\n逾期：${逾期.length}\n3天內到期：${到期.length}\n訂單欠量合計：${欠量}\n\n高風險排程需求：\n${高風險}`;}catch(e){return '排程需求池摘要讀取失敗：'+e.message}}async function 產生摘要(){try{const k=await 呼叫API('取得KPI戰情');const ai=await 呼叫API('取得AI摘要');const 排程摘要=await 取得排程摘要();const x=k.KPI||{};const mode=document.getElementById('摘要模式').value;const 補充=document.getElementById('補充說明').value.trim();const 重點=document.getElementById('本期重點').value.trim();const text=`【智慧製造中央作戰指揮中心｜${模式標題(mode)}】\n\n日期：${k.作業日||今天()}\n會議對象：${document.getElementById('會議對象').value}\n報告單位：${document.getElementById('報告人').value}\n摘要模式：${mode}\n\n一、摘要定位\n${模式說明(mode)}\n\n二、整體戰情\n1. 總計畫量：${x.總計畫 ?? 0}\n2. 總完成量：${x.總完成 ?? 0}\n3. 總達成率：${x.達成率 ?? 0}%\n4. 今日良品：${x.今日良品 ?? 0}\n5. 今日不良：${x.今日不良 ?? 0}\n6. 今日不良率：${x.不良率 ?? 0}%\n7. 今日停機分鐘：${x.今日停機分鐘 ?? 0}\n8. 逾期工單數：${x.逾期工單數 ?? 0}\n\n三、排程需求池摘要\n${排程摘要}\n\n四、AI 風險判斷\n風險等級：${ai.風險等級 || '未產生'}\n摘要：${ai.摘要 || ''}\n\n五、建議動作\n${(ai.建議||[]).map((v,i)=>`${i+1}. ${v}`).join('\n')}\n\n六、本期重點\n${重點 || '尚未填寫本期重點。'}\n\n七、現場補充\n${補充 || '無補充。'}\n\n八、請主管協助事項\n1. 若有逾期工單或逾期排程需求，請協助確認交期優先順序。\n2. 若供料日未到位或訂單欠量偏高，請協助採購 / 生管 / 業務確認。\n3. 若停機偏高，請協助設備 / 生技 / 製造跨部門處理。\n4. 若不良率偏高，請協助品質與製程共同追蹤。`;document.getElementById('摘要結果').value=text;document.getElementById('狀態文字').textContent=mode+'已產生，已合併排程摘要'}catch(e){alert(e.message)}}async function 複製摘要(){const text=document.getElementById('摘要結果').value;if(!text.trim())return alert('尚未產生摘要');await navigator.clipboard.writeText(text);alert('已複製摘要')}document.getElementById('GAS網址').value=GAS();</script></body></html>
