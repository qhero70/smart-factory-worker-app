<!doctype html><html lang="zh-Hant"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>修補重測狀態頁</title><script src="https://cdn.tailwindcss.com"></script><style>body{font-family:-apple-system,BlinkMacSystemFont,'Noto Sans TC','Segoe UI',sans-serif;background:#07111f;color:#ecfeff}.玻璃{background:rgba(15,23,42,.78);border:1px solid rgba(148,163,184,.22);backdrop-filter:blur(18px)}.卡{border-radius:22px;box-shadow:0 18px 45px rgba(0,0,0,.28)}.按鈕{border-radius:16px;padding:.75rem .9rem;font-weight:900}input,select,textarea{background:#0f172a!important;border:1px solid #334155!important;color:#fff!important;border-radius:14px!important;padding:.75rem!important;width:100%}th,td{white-space:nowrap}.小字{font-size:.78rem;color:#94a3b8}.通過{color:#86efac}.失敗{color:#fca5a5}.待重測{color:#fde68a}</style></head><body><main class="max-w-7xl mx-auto p-4 pb-24"><section class="玻璃 卡 p-5 mb-4"><div class="flex flex-wrap justify-between items-center gap-3"><div><p class="text-teal-200 font-black text-sm">智慧製造中央作戰指揮中心 v3.3.0</p><h1 class="text-2xl md:text-4xl font-black">修補重測狀態頁</h1><p id="狀態文字" class="text-slate-300 mt-1">追蹤修補完成後的重測清單、通過、失敗與待重測項目。</p></div><div class="flex gap-2"><a class="按鈕 bg-rose-200 text-slate-950" href="./fix-board.html">上線修補</a><a class="按鈕 bg-blue-200 text-slate-950" href="./fix-dashboard.html">完成率儀表板</a></div></div></section><section class="玻璃 卡 p-4 mb-4"><div class="grid md:grid-cols-[1fr_auto_auto] gap-2"><input id="GAS網址" placeholder="貼上 GAS Web App URL"><button class="按鈕 bg-teal-500 text-slate-950" onclick="儲存設定()">儲存</button><button class="按鈕 bg-cyan-300 text-slate-950" onclick="載入資料()">同步</button></div><div class="grid md:grid-cols-3 gap-2 mt-3"><input id="搜尋字" placeholder="搜尋修補編號 / 重測項目" oninput="渲染()"><select id="狀態篩選" onchange="渲染()"><option value="全部">全部狀態</option><option>待重測</option><option>通過</option><option>失敗</option><option>免測</option></select><button class="按鈕 bg-amber-300 text-slate-950" onclick="複製報告()">複製重測報告</button></div></section><section class="grid grid-cols-2 md:grid-cols-5 gap-3 mb-4" id="統計區"></section><section class="玻璃 卡 p-4 mb-4"><h2 class="font-black text-xl mb-3">重測清單</h2><div id="重測區" class="overflow-auto max-h-[58vh]"></div></section><section class="玻璃 卡 p-4"><h2 class="font-black text-xl mb-3">重測報告</h2><textarea id="報告" rows="10"></textarea></section></main><script>let 資料={重測清單:[],統計:{}};function GAS(){return localStorage.getItem('GAS網址')||''}function 儲存設定(){localStorage.setItem('GAS網址',document.getElementById('GAS網址').value.trim());alert('已儲存')}async function 呼叫API(action,data={}){const url=GAS();if(!url)throw new Error('請先貼上 GAS Web App URL');const r=await fetch(url,{method:'POST',headers:{'Content-Type':'text/plain;charset=utf-8'},body:JSON.stringify({action,...data})});return r.json()}async function 載入資料(){try{const r=await 呼叫API('取得_v3_3_修補完成率儀表板資料');if(!r.成功)throw new Error(r.訊息||'讀取失敗');資料=r;document.getElementById('狀態文字').textContent='重測資料已同步';渲染()}catch(e){alert('請確認 GAS 已加入 v3_3 工具並重新部署。\n'+e.message)}}function 篩選(){const q=(document.getElementById('搜尋字').value||'').toLowerCase();const st=document.getElementById('狀態篩選').value;return (資料.重測清單||[]).filter(x=>{if(st!=='全部'&&(x.重測狀態||'待重測')!==st)return false;const t=`${x.重測編號||''} ${x.修補編號||''} ${x.重測項目||''} ${x.重測類型||''}`.toLowerCase();return !q||t.includes(q)})}function 渲染(){const rows=篩選();const s=資料.統計||{};document.getElementById('統計區').innerHTML=[['重測總數',s.重測總數],['通過',s.重測通過],['失敗',s.重測失敗],['待測',s.重測待測],['通過率',(s.重測通過率||0)+'%']].map(x=>`<div class="玻璃 卡 p-4"><p class="小字">${x[0]}</p><p class="text-2xl font-black">${x[1]||0}</p></div>`).join('');document.getElementById('重測區').innerHTML=表格(rows);產生報告(rows)}function 表格(rows){if(!rows.length)return '<p class="text-slate-300">目前無重測項目</p>';const hs=['重測編號','修補編號','重測項目','重測類型','重測狀態','重測結果','重測時間'];return `<table class="w-full text-sm"><thead><tr>${hs.map(h=>`<th class="text-left p-2 text-teal-200">${h}</th>`).join('')}<th class="text-left p-2 text-teal-200">操作</th></tr></thead><tbody>${rows.map(r=>`<tr class="border-t border-slate-700">${hs.map(h=>`<td class="p-2 ${r[h]||''}">${r[h]??''}</td>`).join('')}<td class="p-2"><button class="按鈕 bg-emerald-300 text-slate-950 text-xs" onclick="更新('${r.重測編號}','通過')">通過</button> <button class="按鈕 bg-red-300 text-slate-950 text-xs" onclick="更新('${r.重測編號}','失敗')">失敗</button> <button class="按鈕 bg-slate-600 text-white text-xs" onclick="更新('${r.重測編號}','免測')">免測</button></td></tr>`).join('')}</tbody></table>`}async function 更新(id,st){const result=prompt('重測結果說明，可留空','');const note=prompt('備註，可留空','');try{const r=await 呼叫API('更新_v3_3_重測狀態',{重測編號:id,重測狀態:st,重測結果:result||'',備註:note||''});if(!r.成功)throw new Error(r.訊息);await 載入資料()}catch(e){alert(e.message)}}function 產生報告(rows){const top=rows.slice(0,12).map((x,i)=>`${i+1}. ${x.重測狀態||'待重測'}｜${x.修補編號}｜${x.重測項目}`).join('\n')||'無';document.getElementById('報告').value=`【v3.3.0 修補重測報告】\n顯示項目：${rows.length}\n\n重測項目：\n${top}`}async function 複製報告(){const t=document.getElementById('報告').value;if(!t.trim())return alert('尚未產生報告');await navigator.clipboard.writeText(t);alert('已複製')}document.getElementById('GAS網址').value=GAS();載入資料();</script></body></html>
