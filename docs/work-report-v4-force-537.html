<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="theme-color" content="#1967D2">
<title>化新報工 V4｜強制載入 v537</title>
<style>
html,body{height:100%;margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:linear-gradient(135deg,#0f172a,#1d4ed8);color:#fff;display:grid;place-items:center}.card{width:min(92vw,420px);border-radius:28px;background:rgba(255,255,255,.12);box-shadow:0 24px 80px rgba(0,0,0,.35);padding:28px 24px;text-align:center;backdrop-filter:blur(18px)}.logo{font-size:54px;margin-bottom:10px}.title{font-weight:950;font-size:22px}.sub{margin-top:10px;opacity:.88;line-height:1.55;font-size:14px}.bar{height:8px;border-radius:99px;background:rgba(255,255,255,.22);overflow:hidden;margin-top:22px}.bar i{display:block;height:100%;width:40%;border-radius:inherit;background:#93c5fd;animation:run 1s ease-in-out infinite alternate}@keyframes run{from{transform:translateX(-20%)}to{transform:translateX(180%)}}.small{font-size:12px;opacity:.72;margin-top:14px;word-break:break-all}
</style>
</head>
<body>
<div class="card"><div class="logo">🏭</div><div class="title">強制載入 v537</div><div class="sub">清除 Safari / PWA 舊快取，重新載入完整途程比對版。</div><div class="bar"><i></i></div><div class="small" id="status">初始化...</div></div>
<script>
(function(){
  'use strict';
  var status=document.getElementById('status');
  function set(t){if(status)status.textContent=t;}
  async function clearAll(){
    try{localStorage.setItem('HX_FORCE_ROUTE_MATCH_VERSION','537');}catch(e){}
    try{sessionStorage.setItem('HX_FORCE_ROUTE_MATCH_VERSION','537');}catch(e){}
    try{if('caches'in window){var ks=await caches.keys();await Promise.all(ks.map(function(k){return caches.delete(k)}));}}catch(e){}
    try{if('serviceWorker'in navigator){var rs=await navigator.serviceWorker.getRegistrations();await Promise.all(rs.map(function(r){return r.unregister()}));}}catch(e){}
  }
  async function boot(){
    set('清除舊快取...');
    await clearAll();
    set('載入報工 v537...');
    location.replace('./work-report-v4-477.html?v=537&fix=route-match-fix&force=537&_ts='+Date.now());
  }
  boot();
})();
</script>
</body>
</html>
