<!doctype html><html lang="zh-Hant"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>共用素材到貨與鎖料</title><script src="https://cdn.tailwindcss.com"></script><style>body{font-family:-apple-system,BlinkMacSystemFont,'Noto Sans TC','Segoe UI',sans-serif;background:#07111f;color:#ecfeff}.玻璃{background:rgba(15,23,42,.78);border:1px solid rgba(148,163,184,.22);backdrop-filter:blur(18px)}.卡{border-radius:22px;box-shadow:0 18px 45px rgba(0,0,0,.28)}.按鈕{border-radius:16px;padding:.75rem .9rem;font-weight:900}input,select,textarea{background:#0f172a!important;border:1px solid #334155!important;color:#fff!important;border-radius:14px!important;padding:.75rem!important;width:100%}label{font-size:.82rem;color:#a7f3d0;font-weight:800}th,td{white-space:nowrap}.小字{font-size:.78rem;color:#94a3b8}</style></head><body><main class="max-w-7xl mx-auto p-4 pb-24"><section class="玻璃 卡 p-5 mb-4"><div class="flex flex-wrap justify-between items-center gap-3"><div><p class="text-teal-200 font-black text-sm">智慧製造中央作戰指揮中心 v2.4.0</p><h1 class="text-2xl md:text-4xl font-black">共用素材到貨與鎖料套用</h1><p id="狀態文字" class="text-slate-300 mt-1">登記到貨 → 更新共用素材主檔庫存 → 依 Tier 分配 → 寫入鎖料分配歷史。</p></div><div class="flex gap-2"><a class="按鈕 bg-rose-300 text-slate-950" href="./material-lock.html">鎖料模擬</a><a class="按鈕 bg-red-400 text-slate-950" href="./ctb.html">CTB缺料</a></div></div></section><section class="玻璃 卡 p-4 mb-4"><div class="grid md:grid-cols-[1fr_auto_auto] gap-2"><input id="GAS網址" placeholder="貼上 GAS Web App URL"><button class="按鈕 bg-teal-500 text-slate-950" onclick="儲存設定()">儲存</button><button class="按鈕 bg-cyan-300 text-slate-950" onclick="載入資料()">同步資料</button></div></section><section class="grid lg:grid-cols-[420px_1fr] gap-4"><div class="玻璃 卡 p-4"><h2 class="font-black text-xl mb-3">到貨登記</h2><div class="grid gap-3"><div><label>共用素材編號</label><input id="共用素材編號" placeholder="例如 A801910008"></div><div><label>共用素材名稱</label><input id="共用素材名稱" placeholder="例如 ACW4283460"></div><div><label>到貨數量</label><input id="到貨數量" type="number" placeholder="例如 500"></div><div><label>到貨日期</label><input id="到貨日期" type="date"></div><div><label>供應商</label><input id="供應商" placeholder="供應商名稱"></div><div><label>來源單號</label><input id="來源單號" placeholder="採購單 / 送貨單"></div><div><label>驗收狀態</label><select id="驗收狀態"><option>已驗收</option><option>待驗收</option><option>異常待處理</option></select></div><div><label>經辦人</label><input id="經辦人" placeholder="例如 嘉欣"></div><div><label>備註</label><textarea id="備註" rows="4"></textarea></div></div><div class="grid grid-cols-2 gap-2 mt-4"><button class="按鈕 bg-amber-300 text-slate-950" onclick="只登記到貨()">只登記到貨</button><button class="按鈕 bg-lime-300 text-slate-950" onclick="到貨並鎖料()">到貨並鎖料</button></div></div><div class="space-y-4"><div class="玻璃 卡 p-4"><h2 class="font-black text-xl mb-3">共用素材主檔</h2><div id="主檔區" class="overflow-auto max-h-[32vh]"></div></div><div class="玻璃 卡 p-4"><h2 class="font-black text-xl mb-3">最近到貨紀錄</h2><div id="到貨區" class="overflow-auto max-h-[24vh]"></div></div><div class="玻璃 卡 p-4"><h2 class="font-black text-xl mb-3">最近鎖料歷史</h2><div id="歷史區" class="overflow-auto max-h-[28vh]"></div></div></div></section></main><script>let 主檔=[],到貨=[],歷史=[];function GAS(){return localStorage.getItem('GAS網址')||''}function 儲存設定(){localStorage.setItem('GAS網址',document.getElementById('GAS網址').value.trim());alert('已儲存')}async function 呼叫API(action,data={}){const url=GAS();if(!url)throw new Error('請先貼上 GAS Web App URL');const r=await fetch(url,{method:'POST',headers:{'Content-Type':'text/plain;charset=utf-8'},body:JSON.stringify({action,...data})});return r.json()}function 資料(){return {共用素材編號:val('共用素材編號'),共用素材名稱:val('共用素材名稱'),到貨數量:Number(val('到貨數量')||0),到貨日期:val('到貨日期'),供應商:val('供應商'),來源單號:val('來源單號'),驗收狀態:val('驗收狀態'),經辦人:val('經辦人'),備註:val('備註')}}function val(id){return document.getElementById(id).value.trim()}async function 只登記到貨(){const d=資料();if(!d.共用素材編號||d.到貨數量<=0)return alert('請填共用素材編號與到貨數量');try{const r=await 呼叫API('登記_v2_4_共用素材到貨',{資料:d});alert(r.訊息||JSON.stringify(r));載入資料()}catch(e){alert('請確認 GAS 已加入 v2_4 工具並重新部署。\n'+e.message)}}async function 到貨並鎖料(){const d=資料();if(!d.共用素材編號||d.到貨數量<=0)return alert('請填共用素材編號與到貨數量');if(!confirm('確定登記到貨並套用鎖料分配？'))return;try{const r=await 呼叫API('套用_v2_4_到貨並鎖料分配',{資料:d});alert(r.訊息||JSON.stringify(r));載入資料()}catch(e){alert('請確認 GAS 已加入 v2_3 與 v2_4 工具並重新部署。\n'+e.message)}}async function 載入資料(){try{const [a,b,c]=await Promise.all([呼叫API('取得主檔管理資料',{工作表名稱:'10_共用素材主檔'}),呼叫API('取得主檔管理資料',{工作表名稱:'10_共用素材到貨紀錄'}),呼叫API('取得主檔管理資料',{工作表名稱:'10_鎖料分配歷史'})]);主檔=a.資料||[];到貨=(b.資料||[]).slice(-30).reverse();歷史=(c.資料||[]).slice(-40).reverse();渲染();document.getElementById('狀態文字').textContent='已同步共用素材資料'}catch(e){document.getElementById('狀態文字').textContent='若尚未建立資料表，請先執行升級_v2_4_共用素材主檔與紀錄表()。'+e.message}}function 渲染(){document.getElementById('主檔區').innerHTML=表格(主檔);document.getElementById('到貨區').innerHTML=表格(到貨);document.getElementById('歷史區').innerHTML=表格(歷史)}function 表格(rows){if(!rows.length)return '<p class="text-slate-300">尚無資料</p>';const hs=Object.keys(rows[0]).filter(h=>h!=='__列號');return `<table class="w-full text-sm"><thead><tr>${hs.map(h=>`<th class="text-left p-2 text-teal-200">${h}</th>`).join('')}</tr></thead><tbody>${rows.map(r=>`<tr class="border-t border-slate-700">${hs.map(h=>`<td class="p-2">${r[h]??''}</td>`).join('')}</tr>`).join('')}</tbody></table>`}document.getElementById('GAS網址').value=GAS();document.getElementById('到貨日期').value=new Date().toISOString().slice(0,10);載入資料();</script></body></html>
