<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>共用素材主檔維護</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
body{font-family:-apple-system,BlinkMacSystemFont,'Noto Sans TC','Segoe UI',sans-serif;background:#07111f;color:#ecfeff}.玻璃{background:rgba(15,23,42,.78);border:1px solid rgba(148,163,184,.22);backdrop-filter:blur(18px)}.卡{border-radius:22px;box-shadow:0 18px 45px rgba(0,0,0,.28)}.按鈕{border-radius:16px;padding:.75rem .9rem;font-weight:900}input,select,textarea{background:#0f172a!important;border:1px solid #334155!important;color:#fff!important;border-radius:14px!important;padding:.75rem!important;width:100%}label{font-size:.82rem;color:#a7f3d0;font-weight:800}th,td{white-space:nowrap}.小字{font-size:.78rem;color:#94a3b8}.紅{color:#fca5a5}.黃{color:#fde68a}.綠{color:#86efac}
</style>
</head>
<body>
<main class="max-w-7xl mx-auto p-4 pb-24">
<section class="玻璃 卡 p-5 mb-4">
  <div class="flex flex-wrap justify-between items-center gap-3">
    <div>
      <p class="text-teal-200 font-black text-sm">智慧製造中央作戰指揮中心 v2.5.0</p>
      <h1 class="text-2xl md:text-4xl font-black">共用素材主檔維護頁</h1>
      <p id="狀態文字" class="text-slate-300 mt-1">維護安全庫存、供應商、可分配量與低庫存狀態。</p>
    </div>
    <div class="flex gap-2"><a class="按鈕 bg-pink-300 text-slate-950" href="./material-arrival.html">到貨鎖料</a><a class="按鈕 bg-slate-700" href="./index.html">首頁</a></div>
  </div>
</section>
<section class="玻璃 卡 p-4 mb-4">
  <div class="grid md:grid-cols-[1fr_auto_auto] gap-2">
    <input id="GAS網址" placeholder="貼上 GAS Web App URL">
    <button class="按鈕 bg-teal-500 text-slate-950" onclick="儲存設定()">儲存</button>
    <button class="按鈕 bg-cyan-300 text-slate-950" onclick="載入資料()">同步</button>
  </div>
  <div class="grid md:grid-cols-4 gap-2 mt-3">
    <input id="搜尋字" placeholder="搜尋素材編號 / 名稱 / 供應商" oninput="渲染()">
    <select id="狀態篩選" onchange="渲染()"><option value="全部">全部</option><option value="低庫存">低庫存</option><option value="可分配不足">可分配不足</option><option value="啟用">啟用</option><option value="停用">停用</option></select>
    <button class="按鈕 bg-amber-300 text-slate-950" onclick="下載CSV()">下載CSV</button>
    <button class="按鈕 bg-lime-300 text-slate-950" onclick="儲存素材()">新增/更新素材</button>
  </div>
</section>
<section class="grid lg:grid-cols-[420px_1fr] gap-4">
  <div class="玻璃 卡 p-4">
    <h2 class="font-black text-xl mb-3">素材資料</h2>
    <div class="grid gap-3">
      <div><label>共用素材編號</label><input id="共用素材編號"></div>
      <div><label>共用素材名稱</label><input id="共用素材名稱"></div>
      <div><label>素材分類</label><input id="素材分類" placeholder="包材 / 鑄件 / 共用半成品"></div>
      <div><label>適用產品清單</label><textarea id="適用產品清單" rows="3"></textarea></div>
      <div class="grid grid-cols-2 gap-2"><div><label>目前庫存</label><input id="目前庫存" type="number"></div><div><label>安全庫存</label><input id="安全庫存" type="number"></div></div>
      <div class="grid grid-cols-2 gap-2"><div><label>已鎖定數量</label><input id="已鎖定數量" type="number"></div><div><label>可分配數量</label><input id="可分配數量" type="number"></div></div>
      <div><label>主要供應商</label><input id="主要供應商"></div>
      <div><label>採購前置天數</label><input id="採購前置天數" type="number"></div>
      <div><label>狀態</label><select id="狀態"><option>啟用</option><option>停用</option></select></div>
      <div><label>備註</label><textarea id="備註" rows="3"></textarea></div>
    </div>
  </div>
  <div class="space-y-4">
    <div class="grid grid-cols-2 md:grid-cols-4 gap-3" id="統計區"></div>
    <div class="玻璃 卡 p-4 overflow-auto"><h2 class="font-black text-xl mb-3">素材清單</h2><div id="表格區" class="overflow-auto max-h-[62vh]"></div></div>
  </div>
</section>
</main>
<script>
let 資料=[];let 顯示資料=[];
const 欄=['共用素材編號','共用素材名稱','素材分類','適用產品清單','目前庫存','安全庫存','已鎖定數量','可分配數量','主要供應商','採購前置天數','狀態','備註','更新時間'];
function GAS(){return localStorage.getItem('GAS網址')||''}
function 儲存設定(){localStorage.setItem('GAS網址',document.getElementById('GAS網址').value.trim());alert('已儲存')}
async function 呼叫API(action,data={}){const url=GAS();if(!url)throw new Error('請先貼上 GAS Web App URL');const r=await fetch(url,{method:'POST',headers:{'Content-Type':'text/plain;charset=utf-8'},body:JSON.stringify({action,...data})});return r.json()}
async function 載入資料(){try{const r=await 呼叫API('取得主檔管理資料',{工作表名稱:'10_共用素材主檔'});if(!r.成功)throw new Error(r.訊息);資料=r.資料||[];document.getElementById('狀態文字').textContent=`已載入 ${資料.length} 筆素材主檔`;渲染()}catch(e){document.getElementById('狀態文字').textContent='若尚未建立，請先執行升級_v2_4_共用素材主檔與紀錄表()。'+e.message}}
function 狀態判斷(x){if(String(x.狀態||'啟用')==='停用')return '停用';if(Number(x.目前庫存||0)<=Number(x.安全庫存||0))return '低庫存';if(Number(x.可分配數量||0)<=0)return '可分配不足';return '啟用'}
function 篩選(){const q=(document.getElementById('搜尋字').value||'').toLowerCase();const st=document.getElementById('狀態篩選').value;return 資料.filter(x=>{const t=`${x.共用素材編號||''} ${x.共用素材名稱||''} ${x.主要供應商||''}`.toLowerCase();if(q&&!t.includes(q))return false;if(st!=='全部'&&狀態判斷(x)!==st)return false;return true})}
function 渲染(){顯示資料=篩選();const low=顯示資料.filter(x=>狀態判斷(x)==='低庫存').length;const zero=顯示資料.filter(x=>狀態判斷(x)==='可分配不足').length;document.getElementById('統計區').innerHTML=[['顯示筆數',顯示資料.length],['低庫存',low],['可分配不足',zero],['總素材',資料.length]].map(x=>`<div class="玻璃 卡 p-4"><p class="小字">${x[0]}</p><p class="text-2xl font-black">${x[1]}</p></div>`).join('');document.getElementById('表格區').innerHTML=表格(顯示資料)}
function 表格(rows){if(!rows.length)return '<p class="text-slate-300">尚無資料</p>';return `<table class="w-full text-sm"><thead><tr>${欄.map(h=>`<th class="text-left p-2 text-teal-200">${h}</th>`).join('')}</tr></thead><tbody>${rows.map((r,i)=>`<tr onclick="填入索引(${i})" class="border-t border-slate-700 cursor-pointer hover:bg-slate-800/60">${欄.map(h=>`<td class="p-2 ${h==='目前庫存'&&狀態判斷(r)==='低庫存'?'紅':''}">${r[h]??''}</td>`).join('')}</tr>`).join('')}</tbody></table>`}
function 填入索引(i){const r=顯示資料[i];if(!r)return;欄.forEach(k=>{const el=document.getElementById(k);if(el)el.value=r[k]??''});if(!document.getElementById('可分配數量').value){document.getElementById('可分配數量').value=Math.max(Number(r.目前庫存||0)-Number(r.已鎖定數量||0),0)}}
function 取表單(){const o={};欄.forEach(k=>{const el=document.getElementById(k);if(el)o[k]=el.value});['目前庫存','安全庫存','已鎖定數量','可分配數量','採購前置天數'].forEach(k=>o[k]=Number(o[k]||0));o.更新時間=new Date().toISOString();return o}
async function 儲存素材(){const o=取表單();if(!o.共用素材編號)return alert('共用素材編號必填');if(!o.可分配數量)o.可分配數量=Math.max(Number(o.目前庫存||0)-Number(o.已鎖定數量||0),0);try{const r=await 呼叫API('新增或更新主檔',{工作表名稱:'10_共用素材主檔',資料:o});if(!r.成功)throw new Error(r.訊息);alert('已儲存');載入資料()}catch(e){alert(e.message)}}
function 轉CSV(rows){const esc=v=>`"${String(v??'').replace(/"/g,'""')}"`;return 欄.join(',')+'\n'+rows.map(r=>欄.map(h=>esc(r[h])).join(',')).join('\n')}
function 下載CSV(){const blob=new Blob(['\ufeff'+轉CSV(顯示資料)],{type:'text/csv;charset=utf-8'});const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='10_共用素材主檔.csv';a.click();URL.revokeObjectURL(a.href)}
document.getElementById('GAS網址').value=GAS();載入資料();
</script>
</body></html>
