<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>04 工站正式對接</title>
<style>
*{box-sizing:border-box}body{margin:0;font-family:Arial,'Noto Sans TC',sans-serif;background:#07111f;color:#ecfeff}.wrap{max-width:1180px;margin:auto;padding:16px 16px 80px}.hero,.card{background:#111c2f;border:1px solid #27405f;border-radius:22px;padding:18px;margin:12px 0;box-shadow:0 16px 40px #0007}.title{font-size:28px;font-weight:900;margin:6px 0}.sub{color:#a7c7d9}.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}.kpi{background:#0f2238;border:1px solid #1f5f78;border-radius:18px;padding:16px}.num{font-size:34px;font-weight:900}.ok{color:#86efac}.bad{color:#fca5a5}input,select,button{font-size:16px;padding:12px;border-radius:14px;border:1px solid #31506f;background:#0f172a;color:#fff;width:100%}button{background:#22d3ee;color:#06202a;font-weight:900;border:0;cursor:pointer}.toolbar{display:grid;grid-template-columns:1fr 130px 130px;gap:8px}.tabs{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}.tab{background:#132640;color:#dff;border:1px solid #2e5678}.active{background:#67e8f9!important;color:#05202d!important}.tablebox{overflow:auto;max-height:60vh;border-radius:16px;border:1px solid #2c4b6c}table{width:100%;border-collapse:collapse;min-width:900px}th,td{padding:9px;border-bottom:1px solid #203850;text-align:left;font-size:13px;vertical-align:top}th{position:sticky;top:0;background:#0b1728;color:#67e8f9}.small{font-size:13px;color:#9fb6c8}.pill{display:inline-block;border-radius:99px;padding:3px 9px;background:#1e3a5f;color:#bfdbfe;font-size:12px;font-weight:900}.footer{position:fixed;left:0;right:0;bottom:0;background:#020617cc;border-top:1px solid #1f3a56;padding:10px 16px;backdrop-filter:blur(10px)}@media(max-width:760px){.grid,.toolbar,.tabs{grid-template-columns:1fr}.title{font-size:23px}}
</style>
</head>
<body>
<div class="wrap">
<section class="hero"><div class="pill">正式 PWA 對接驗證</div><div class="title">04 工站資料正式對接</div><div class="sub" id="status">尚未讀取。請貼上 GAS Web App /exec 網址後同步資料。</div></section>
<section class="card"><div class="toolbar"><input id="url" placeholder="貼上 GAS Web App /exec 網址"><button onclick="saveUrl()">儲存</button><button onclick="loadData()">同步</button></div><div class="small" style="margin-top:8px">使用 action=取得04工站API資料；正式標準：259 / 282 / 259。</div></section>
<section class="grid" id="kpis"></section>
<section class="card"><div class="tabs"><button class="tab active" onclick="setType('工站產品關聯',this)">產品關聯</button><button class="tab" onclick="setType('工站機台關聯',this)">機台關聯</button><button class="tab" onclick="setType('工站班別產能',this)">班別產能</button></div><div style="margin-top:10px"><input id="q" placeholder="搜尋產品編號、客戶品號、品名、工站、機台" oninput="renderTable()"></div></section>
<section class="card"><div style="display:flex;justify-content:space-between;gap:8px;align-items:center"><h2 style="margin:0">資料明細</h2><span class="pill" id="count">0 筆</span></div><div class="tablebox" style="margin-top:12px" id="table">尚未讀取資料</div></section>
</div><div class="footer"><span id="foot">等待資料同步</span></div>
<script>
const KEY='GAS網址';let DATA=null;let TYPE='工站產品關聯';
const EXPECT={工站產品關聯:259,工站機台關聯:282,工站班別產能:259};
const COLS={
工站產品關聯:['關聯編號','產品編號','客戶品號','品名','工序','工站代碼','工站名稱','製程順序','是否主要工站','啟用','產品對應狀態','產能對應狀態'],
工站機台關聯:['關聯編號','工站代碼','工站名稱','產品編號','客戶品號','品名','工序','工序類型','區域','機台編號','機台型號','解析狀態'],
工站班別產能:['產能編號','產品編號','客戶品號','品名','工序','工站代碼','工站名稱','班別','標準工時_秒','8小時標準產能','需求人力','啟用']
};
document.getElementById('url').value=localStorage.getItem(KEY)||'';
function setStatus(t){document.getElementById('status').textContent=t;document.getElementById('foot').textContent=t}
function saveUrl(){const u=document.getElementById('url').value.trim();if(!u)return alert('請貼上 GAS Web App /exec 網址');localStorage.setItem(KEY,u);setStatus('GAS 網址已儲存')}
async function loadData(){const u=(localStorage.getItem(KEY)||document.getElementById('url').value.trim()).trim();if(!u)return alert('請貼上 GAS Web App /exec 網址');localStorage.setItem(KEY,u);setStatus('正式資料同步中...');try{const r=await fetch(u+'?action='+encodeURIComponent('取得04工站API資料')+'&t='+Date.now());const data=await r.json();if(!data.成功)throw new Error(data.訊息||'API 回傳失敗');DATA=data.資料||{};renderKpi(data.筆數||{});renderTable();setStatus('正式對接成功：PWA 已讀取 04 工站資料')}catch(e){setStatus('正式對接失敗：'+e.message);alert('正式對接失敗：'+e.message)}}
function renderKpi(nums){document.getElementById('kpis').innerHTML=Object.keys(EXPECT).map(k=>{const n=Number(nums[k]||0);const ok=n===EXPECT[k];return `<div class="kpi"><div class="small">${k}</div><div class="num">${n}</div><div class="${ok?'ok':'bad'}">${ok?'正常':'異常'}｜標準 ${EXPECT[k]}</div></div>`}).join('')}
function setType(t,btn){TYPE=t;document.querySelectorAll('.tab').forEach(b=>b.classList.remove('active'));btn.classList.add('active');renderTable()}
function renderTable(){if(!DATA){document.getElementById('table').textContent='尚未讀取資料';return}const q=document.getElementById('q').value.trim().toLowerCase();let rows=DATA[TYPE]||[];if(q)rows=rows.filter(x=>JSON.stringify(x).toLowerCase().includes(q));document.getElementById('count').textContent=TYPE+'｜'+rows.length+' 筆';const cols=COLS[TYPE];if(!rows.length){document.getElementById('table').textContent='查無資料';return}document.getElementById('table').innerHTML='<table><thead><tr>'+cols.map(c=>'<th>'+c+'</th>').join('')+'</tr></thead><tbody>'+rows.slice(0,300).map(r=>'<tr>'+cols.map(c=>'<td>'+(r[c]??'')+'</td>').join('')+'</tr>').join('')+'</tbody></table><div class="small" style="padding:10px">手機效能保護：最多顯示前 300 筆；搜尋會套用全部資料。</div>'}
if(localStorage.getItem(KEY))loadData();
</script>
</body>
</html>
