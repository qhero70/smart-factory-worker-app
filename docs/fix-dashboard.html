<!doctype html><html lang="zh-Hant"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>修補完成率儀表板</title><script src="https://cdn.tailwindcss.com"></script><script src="https://cdn.jsdelivr.net/npm/chart.js"></script><style>body{font-family:-apple-system,BlinkMacSystemFont,'Noto Sans TC','Segoe UI',sans-serif;background:#07111f;color:#ecfeff}.玻璃{background:rgba(15,23,42,.78);border:1px solid rgba(148,163,184,.22);backdrop-filter:blur(18px)}.卡{border-radius:22px;box-shadow:0 18px 45px rgba(0,0,0,.28)}.按鈕{border-radius:16px;padding:.75rem .9rem;font-weight:900}input,textarea{background:#0f172a!important;border:1px solid #334155!important;color:#fff!important;border-radius:14px!important;padding:.75rem!important;width:100%}.小字{font-size:.78rem;color:#94a3b8}</style></head><body><main class="max-w-7xl mx-auto p-4 pb-24"><section class="玻璃 卡 p-5 mb-4"><div class="flex flex-wrap justify-between items-center gap-3"><div><p class="text-teal-200 font-black text-sm">智慧製造中央作戰指揮中心 v3.3.0</p><h1 class="text-2xl md:text-4xl font-black">修補完成率儀表板</h1><p id="狀態文字" class="text-slate-300 mt-1">統計修補完成率、重測通過率、修補類型與狀態分布。</p></div><div class="flex gap-2"><a class="按鈕 bg-rose-200 text-slate-950" href="./fix-board.html">上線修補</a><a class="按鈕 bg-lime-200 text-slate-950" href="./retest-board.html">重測狀態</a></div></div></section><section class="玻璃 卡 p-4 mb-4"><div class="grid md:grid-cols-[1fr_auto_auto_auto] gap-2"><input id="GAS網址" placeholder="貼上 GAS Web App URL"><button class="按鈕 bg-teal-500 text-slate-950" onclick="儲存設定()">儲存</button><button class="按鈕 bg-cyan-300 text-slate-950" onclick="載入資料()">同步</button><button class="按鈕 bg-amber-300 text-slate-950" onclick="產生週報()">週報</button></div><div class="grid md:grid-cols-2 gap-2 mt-3"><button class="按鈕 bg-orange-300 text-slate-950" onclick="產生月報()">月報</button><button class="按鈕 bg-lime-300 text-slate-950" onclick="複製報告()">複製報告</button></div></section><section class="grid grid-cols-2 md:grid-cols-6 gap-3 mb-4" id="統計區"></section><section class="grid lg:grid-cols-2 gap-4 mb-4"><div class="玻璃 卡 p-4"><h2 class="font-black text-xl mb-3">修補狀態分布</h2><canvas id="狀態圖"></canvas></div><div class="玻璃 卡 p-4"><h2 class="font-black text-xl mb-3">重測狀態分布</h2><canvas id="重測圖"></canvas></div></section><section class="grid lg:grid-cols-2 gap-4"><div class="玻璃 卡 p-4"><h2 class="font-black text-xl mb-3">修補類型統計</h2><div id="類型區"></div></div><div class="玻璃 卡 p-4"><h2 class="font-black text-xl mb-3">上線修補週/月報</h2><textarea id="報告" rows="14"></textarea></div></section></main><script>let 資料=null,chart1=null,chart2=null;function GAS(){return localStorage.getItem('GAS網址')||''}function 儲存設定(){localStorage.setItem('GAS網址',document.getElementById('GAS網址').value.trim());alert('已儲存')}async function 呼叫API(action,data={}){const url=GAS();if(!url)throw new Error('請先貼上 GAS Web App URL');const r=await fetch(url,{method:'POST',headers:{'Content-Type':'text/plain;charset=utf-8'},body:JSON.stringify({action,...data})});return r.json()}async function 載入資料(){try{const r=await 呼叫API('取得_v3_3_修補完成率儀表板資料');if(!r.成功)throw new Error(r.訊息||'讀取失敗');資料=r;document.getElementById('狀態文字').textContent='修補完成率資料已同步';渲染()}catch(e){alert('請確認 GAS 已加入 v3_3 工具並重新部署。\n'+e.message)}}function 渲染(){const s=資料.統計||{};document.getElementById('統計區').innerHTML=[['錯誤總數',s.錯誤總數],['修補任務',s.修補任務總數],['修補完成率',(s.修補完成率||0)+'%'],['重測總數',s.重測總數],['重測通過率',(s.重測通過率||0)+'%'],['GitHub對照',s.GitHub對照數]].map(x=>`<div class="玻璃 卡 p-4"><p class="小字">${x[0]}</p><p class="text-2xl font-black">${x[1]||0}</p></div>`).join('');document.getElementById('類型區').innerHTML=統計表(資料.類型統計);畫圖()}function 統計表(obj){const rows=Object.keys(obj||{}).map(k=>({項目:k,數量:obj[k]}));if(!rows.length)return '<p class="text-slate-300">無資料</p>';return `<table class="w-full text-sm"><tbody>${rows.map(r=>`<tr class="border-t border-slate-700"><td class="p-2 text-teal-200">${r.項目}</td><td class="p-2 text-right">${r.數量}</td></tr>`).join('')}</tbody></table>`}function 畫圖(){if(chart1)chart1.destroy();if(chart2)chart2.destroy();const 狀態=資料.狀態統計||{};const 重測=資料.重測狀態統計||{};chart1=new Chart(document.getElementById('狀態圖'),{type:'bar',data:{labels:Object.keys(狀態),datasets:[{label:'修補任務',data:Object.values(狀態)}]},options:{plugins:{legend:{labels:{color:'#fff'}}},scales:{x:{ticks:{color:'#cbd5e1'}},y:{ticks:{color:'#cbd5e1'},beginAtZero:true}}}});chart2=new Chart(document.getElementById('重測圖'),{type:'bar',data:{labels:Object.keys(重測),datasets:[{label:'重測項目',data:Object.values(重測)}]},options:{plugins:{legend:{labels:{color:'#fff'}}},scales:{x:{ticks:{color:'#cbd5e1'}},y:{ticks:{color:'#cbd5e1'},beginAtZero:true}}}})}async function 產生週報(){try{const r=await 呼叫API('產生_v3_3_上線修補週報');document.getElementById('報告').value=typeof r==='string'?r:JSON.stringify(r,null,2)}catch(e){alert(e.message)}}async function 產生月報(){try{const r=await 呼叫API('產生_v3_3_上線修補月報');document.getElementById('報告').value=typeof r==='string'?r:JSON.stringify(r,null,2)}catch(e){alert(e.message)}}async function 複製報告(){const t=document.getElementById('報告').value;if(!t.trim())return alert('尚未產生報告');await navigator.clipboard.writeText(t);alert('已複製')}document.getElementById('GAS網址').value=GAS();載入資料();</script></body></html>
